<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Proto-Genesis · GM War Room</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050810;--sur:#0a0f1e;--sur2:#0f1628;--bdr:#1a2540;
  --ac:#ff6b35;--ac2:#cc3300;
  --tx:#c8d8f0;--dm:#7a94b0;--gr:#ffaa00;--rd:#ff3a5c;--gd:#ffd700;
  --gn:#44cc66
}
html,body{background:var(--bg);color:var(--tx);font-family:'Rajdhani',sans-serif;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:0 0 80px}
button{font-family:'Rajdhani',sans-serif;cursor:pointer}
input{font-family:'Rajdhani',sans-serif}
/* Header */
.hdr{background:linear-gradient(180deg,rgba(255,107,53,.09) 0%,transparent 100%);padding:16px 16px 0;text-align:center;border-bottom:1px solid var(--bdr);margin-bottom:0}
.hdr h1{font-family:'Orbitron',monospace;font-size:clamp(1.1rem,5vw,1.6rem);font-weight:900;letter-spacing:.06em}
.hdr h1 span{color:var(--ac)}
.hdr-sub{font-size:.62rem;color:var(--dm);letter-spacing:.2em;text-transform:uppercase;margin-top:3px;padding-bottom:10px}
/* Tab bar */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);background:var(--sur)}
.tab{flex:1;padding:10px 4px;font-family:'Orbitron',monospace;font-size:.44rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;border:none;color:var(--dm);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
/* Panels */
.panel{background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;margin:12px 14px;overflow:hidden}
.ph{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.ph-title{font-family:'Orbitron',monospace;font-size:.52rem;color:var(--dm);letter-spacing:.14em}
.pb{padding:12px 14px}
/* Buttons */
.btn{padding:7px 14px;border-radius:7px;border:none;font-family:'Orbitron',monospace;font-size:.5rem;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-ac{background:var(--ac);color:#fff}
.btn-rd{background:rgba(255,58,92,.15);border:1px solid rgba(255,58,92,.4);color:var(--rd)}
.btn-gn{background:rgba(68,204,102,.15);border:1px solid rgba(68,204,102,.4);color:var(--gn)}
.btn-gr{background:rgba(255,170,0,.12);border:1px solid rgba(255,170,0,.3);color:var(--gr)}
.btn-dm{background:rgba(122,148,176,.08);border:1px solid var(--bdr);color:var(--dm)}
.btn-sm{padding:4px 10px;font-size:.44rem}
/* Player card */
.p-card{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.p-card:last-child{margin-bottom:0}
.p-name{font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;color:var(--tx)}
.p-sub{font-size:.62rem;color:var(--dm);margin-top:1px}
/* HP control */
.hp-ctrl{display:flex;align-items:center;gap:6px}
.hp-num{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;min-width:36px;text-align:center}
.hp-bar{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;flex:1}
.hp-fill{height:100%;border-radius:3px;transition:width .3s,background .2s}
/* NPC stat card */
.npc-card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.npc-card:last-child{margin-bottom:0}
.npc-name{font-family:'Orbitron',monospace;font-size:.56rem;font-weight:700;color:var(--ac)}
.npc-role{font-size:.6rem;color:var(--dm);margin-top:1px;margin-bottom:6px}
/* Condition chips */
.cond-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;background:rgba(255,58,92,.1);border:1px solid rgba(255,58,92,.3);border-radius:20px;font-size:.54rem;font-family:'Orbitron',monospace;color:var(--rd);cursor:pointer}
/* Harvest queue */
.hq-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(255,170,0,.04);border:1px solid rgba(255,170,0,.15);border-radius:8px;margin-bottom:5px}
.hq-item:last-child{margin-bottom:0}
/* Round counter */
.round-big{font-family:'Orbitron',monospace;font-size:2.4rem;font-weight:900;color:var(--ac);text-align:center;line-height:1}
/* Log */
.log-entry{font-size:.64rem;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);color:var(--dm)}
.log-entry.header{color:var(--ac);font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.1em}
.log-entry.warn{color:var(--rd)}
.log-entry.good{color:var(--gn)}
/* Setup screen */
.setup-wrap{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:20px}
.setup-title{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;color:var(--ac);letter-spacing:.08em}
.setup-field{width:100%;max-width:360px}
.setup-field label{display:block;font-family:'Orbitron',monospace;font-size:.46rem;color:var(--dm);letter-spacing:.12em;margin-bottom:5px}
.setup-field input{width:100%;padding:12px 14px;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;color:var(--tx);font-size:.85rem;outline:none}
.setup-field input:focus{border-color:var(--ac)}
/* Condition toggle list */
.cond-grid{display:flex;flex-wrap:wrap;gap:5px}
.cond-toggle{padding:3px 9px;border-radius:20px;border:1px solid var(--bdr);background:var(--sur);color:var(--dm);font-size:.56rem;cursor:pointer;transition:all .15s}
.cond-toggle.on{background:rgba(255,58,92,.12);border-color:rgba(255,58,92,.4);color:var(--rd)}
/* Trial selector */
.trial-btn{flex:1;padding:10px 6px;font-family:'Orbitron',monospace;font-size:.44rem;font-weight:700;letter-spacing:.08em;border-radius:7px;border:1px solid var(--bdr);background:var(--sur);color:var(--dm);cursor:pointer;transition:all .15s;text-align:center}
.trial-btn.active{background:rgba(255,107,53,.12);border-color:var(--ac);color:var(--ac)}
/* Spacer */
.gap{margin-bottom:10px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

// ── CONFIG ─────────────────────────────────────────────────────────────────────
const FIREBASE_URL = 'https://pyrotheon-evo-sync-default-rtdb.firebaseio.com'; // Pyrotheon-Evo-Sync

// ── FIREBASE REST ──────────────────────────────────────────────────────────────
function fbURL(path){ return FIREBASE_URL + path + '.json'; }
async function fbRead(path){
  if(!FIREBASE_URL) return null;
  try{ const r=await fetch(fbURL(path)); return r.ok?await r.json():null; }catch{ return null; }
}
async function fbWrite(path, data){
  if(!FIREBASE_URL) return;
  try{ await fetch(fbURL(path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); }catch{}
}
async function fbPatch(path, data){
  if(!FIREBASE_URL) return;
  try{ await fetch(fbURL(path),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); }catch{}
}
async function fbDelete(path){
  if(!FIREBASE_URL) return;
  try{ await fetch(fbURL(path),{method:'DELETE'}); }catch{}
}

function roomBase(){ return '/rooms/' + GM.roomCode; }
function log(msg, type='info'){
  GM.log.unshift({msg, type, ts: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})});
  if(GM.log.length>120) GM.log.pop();
}
function fmtHp(hp, max){
  const pct = Math.max(0,Math.min(1,hp/max));
  const col = pct>.5?'var(--gn)':pct>.25?'#f5a623':'var(--rd)';
  return {pct, col};
}
function currentTrial(){ return GM.currentTrialIdx!==null ? TRIALS[GM.currentTrialIdx] : null; }
function e(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── FIREBASE SYNC ──────────────────────────────────────────────────────────────
async function pushMeta(){
  const t = currentTrial();
  await fbPatch(roomBase()+'/meta', {
    planet: GM.planet,
    currentTrial: t ? t.id : null,
    trialLabel: t ? t.label : null,
    round: GM.round,
    adaptationWindowOpen: GM.adaptWindowOpen,
  });
}

function statusTier(hp, maxHp){
  const pct = hp / maxHp;
  if(pct > 0.6) return 'Healthy';
  if(pct > 0.3) return 'Bloodied';
  if(hp > 0)    return 'Critical';
  return 'Dead';
}

async function pushNpcRoster(){
  // Pushes NPC names + status tiers to Firebase so players can pick targets.
  // HP is never sent — GM only.
  const roster = {};
  for(const npc of GM.npcs){
    roster[npc.id] = { name: npc.name, statusTier: statusTier(npc.hp, npc.maxHp) };
  }
  // Also push connected players as valid targets
  for(const [pid, p] of Object.entries(GM.players)){
    roster[pid] = { name: p.name, statusTier: statusTier(p.hp, p.maxHp), isPlayer: true };
  }
  await fbWrite(roomBase()+'/targets', roster);
}
async function pushSignalStart(){
  await fbWrite(roomBase()+'/signals/trialStart', Date.now());
  await fbDelete(roomBase()+'/signals/trialEnd');
}
async function pushSignalEnd(){
  await fbWrite(roomBase()+'/signals/trialEnd', Date.now());
}
async function pushPlayerCombat(pid){
  const p = GM.players[pid]; if(!p) return;
  await fbPatch(roomBase()+'/creatures/'+pid+'/combat', {
    hp: p.hp,
    maxHp: p.maxHp,
    heatStrainStacks: p.heatStrain||0,
    conditions: p.conditions||[],
    resourceTokens: p.resourceTokens||0,
    epBalance: p.epBalance||0,
    lineageTrait: p.lineageTrait||null,
    flaggedCorrection: false,
  });
}
async function pushAllPlayerCombat(){
  for(const pid of Object.keys(GM.players)) await pushPlayerCombat(pid);
}

// ── POLL (read harvest/platform requests + player buildSnapshots) ──────────────
async function poll(){
  if(!GM.roomCode || !FIREBASE_URL) return;
  // Read harvest requests
  const hq = await fbRead(roomBase()+'/harvestRequests');
  if(hq){
    const pending = Object.entries(hq).filter(([,v])=>v.status==='pending');
    // Merge into local queue (avoid duplicates)
    for(const [id,v] of pending){
      if(!GM.harvestQueue.find(x=>x.id===id)){
        GM.harvestQueue.push({...v,id});
        log(`🍖 Harvest request: ${v.playerName||v.playerId}`, 'warn');
      }
    }
  }
  // Read platform destroy requests
  const pq = await fbRead(roomBase()+'/platformDestroyRequests');
  if(pq){
    const pending = Object.entries(pq).filter(([,v])=>v.status==='pending');
    for(const [id,v] of pending){
      if(!GM.platformDestroyQueue.find(x=>x.id===id)){
        GM.platformDestroyQueue.push({...v,id});
        log(`💥 Platform Destroy request: ${v.playerName||v.playerId}`, 'warn');
      }
    }
  }
  // Read flagged corrections
  for(const pid of Object.keys(GM.players)){
    const combat = await fbRead(roomBase()+'/creatures/'+pid+'/combat');
    if(combat?.flaggedCorrection){
      log(`⚑ HP correction flagged by ${GM.players[pid]?.name||pid}`, 'warn');
      // Clear the flag
      await fbPatch(roomBase()+'/creatures/'+pid+'/combat', {flaggedCorrection:false});
    }
  }
  // Read damage requests
  const dq = await fbRead(roomBase()+'/damageRequests');
  if(dq){
    const pending = Object.entries(dq).filter(([,v])=>v.status==='pending');
    for(const [id,v] of pending){
      if(!GM.damageQueue.find(x=>x.id===id)){
        GM.damageQueue.push({...v,id});
        log(`⚔ Damage request: ${v.playerName} → ${v.targetName} for ${v.amount}`, 'warn');
      }
    }
  }
  render();
}
function startPolling(){
  if(GM.pollTimer) clearInterval(GM.pollTimer);
  poll();
  GM.pollTimer = setInterval(poll, 5000);
}

// ── ROOM SETUP ─────────────────────────────────────────────────────────────────
async function createRoom(){
  const code = GM.roomCode.trim().toUpperCase();
  if(!code){ log('Enter a room code first.','warn'); render(); return; }
  GM.roomCode = code;
  await fbWrite(roomBase()+'/meta', {
    planet: GM.planet,
    currentTrial: null,
    trialLabel: null,
    round: 0,
    adaptationWindowOpen: false,
    createdAt: Date.now(),
  });
  await fbDelete(roomBase()+'/signals');
  await fbDelete(roomBase()+'/harvestRequests');
  await fbDelete(roomBase()+'/platformDestroyRequests');
  log(`Room ${code} created on Firebase.`, 'good');
  log(`Player link: ${location.origin}${location.pathname.replace('pyrotheon-gm.html','')}Definitive_Build.html?room=${code}`, 'good');
  GM.tab = 'trial';
  startPolling();
  render();
}

function addPlayerManual(name, maxHp){
  const id = 'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  GM.players[id] = {name, hp:maxHp, maxHp, heatStrain:0, conditions:[], resourceTokens:0, epBalance:150};
  log(`Added player: ${name} (${maxHp} HP)`);
  render();
}
function removePlayer(pid){
  delete GM.players[pid];
  if(GM.expandedPlayer===pid) GM.expandedPlayer=null;
  render();
}

// ── TRIAL CONTROL ──────────────────────────────────────────────────────────────
async function launchTrial(idx){
  GM.currentTrialIdx = idx;
  GM.round = 1;
  GM.trialActive = true;
  GM.adaptWindowOpen = false;
  GM.scriptCard = 0;
  GM.scriptOpen = true;
  // Load NPC presets (local)
  const t = TRIALS[idx];
  GM.npcs = JSON.parse(JSON.stringify(NPC_PRESETS[t.id]||[]));
  GM.harvestQueue = [];
  GM.platformDestroyQueue = [];
  GM.damageQueue = [];
  // Reset resource tokens for all players
  for(const p of Object.values(GM.players)){ p.resourceTokens=0; p.conditions=[]; }
  await pushMeta();
  await pushSignalStart();
  await pushAllPlayerCombat();
  await pushNpcRoster();
  log(`═══ ${t.label} LAUNCHED ═══`,'header');
  log(`Round ${GM.round} | ${t.rounds_hint}`);
  render();
}
async function endTrial(){
  GM.trialActive = false;
  await pushSignalEnd();
  await pushMeta();
  log(`═══ TRIAL ENDED ═══`,'header');
  render();
}
async function nextRound(){
  GM.round++;
  // T3 auto Heat Strain
  if(GM.currentTrialIdx===2){
    for(const p of Object.values(GM.players)){
      p.heatStrain = (p.heatStrain||0)+1;
      log(`🔥 ${p.name}: Heat Strain → ${p.heatStrain}`, 'warn');
    }
    await pushAllPlayerCombat();
  }
  await pushMeta();
  log(`── Round ${GM.round} ──`,'header');
  render();
}
async function openAdaptWindow(){
  GM.adaptWindowOpen = true;
  await pushMeta();
  log('Adaptation window OPEN','good');
  render();
}
async function closeAdaptWindow(){
  GM.adaptWindowOpen = false;
  await pushMeta();
  log('Adaptation window CLOSED');
  render();
}

// ── HARVEST CONFIRM/REJECT ─────────────────────────────────────────────────────
async function confirmHarvest(reqId){
  const req = GM.harvestQueue.find(x=>x.id===reqId); if(!req) return;
  const pid = req.playerId;
  const p = GM.players[pid];
  if(p){
    const t = currentTrial();
    const amount = (GM.currentTrialIdx===0) ? 2 : 1; // T1=2 Food Tokens, T2-4=1 each
    p.resourceTokens = (p.resourceTokens||0) + amount;
    await pushPlayerCombat(pid);
    log(`✓ Harvest confirmed: ${req.playerName} +${amount} ${t?.harvest_label||'token(s)'} (now ${p.resourceTokens})`,'good');
  }
  // Mark done in Firebase + remove from local queue
  await fbPatch(roomBase()+'/harvestRequests/'+reqId, {status:'confirmed'});
  GM.harvestQueue = GM.harvestQueue.filter(x=>x.id!==reqId);
  render();
}
async function rejectHarvest(reqId){
  const req = GM.harvestQueue.find(x=>x.id===reqId); if(!req) return;
  await fbPatch(roomBase()+'/harvestRequests/'+reqId, {status:'rejected'});
  GM.harvestQueue = GM.harvestQueue.filter(x=>x.id!==reqId);
  log(`✗ Harvest rejected: ${req.playerName}`,'warn');
  render();
}
async function confirmPlatformDestroy(reqId){
  const req = GM.platformDestroyQueue.find(x=>x.id===reqId); if(!req) return;
  const pid = req.playerId;
  const p = GM.players[pid];
  if(p){
    p.resourceTokens = (p.resourceTokens||0)+2; // T3: 2 Ember Marks per platform
    await pushPlayerCombat(pid);
    log(`✓ Platform Destroyed: ${req.playerName} +2 Ember Marks (now ${p.resourceTokens})`,'good');
  }
  await fbPatch(roomBase()+'/platformDestroyRequests/'+reqId, {status:'confirmed'});
  GM.platformDestroyQueue = GM.platformDestroyQueue.filter(x=>x.id!==reqId);
  render();
}
async function rejectPlatformDestroy(reqId){
  const req = GM.platformDestroyQueue.find(x=>x.id===reqId); if(!req) return;
  await fbPatch(roomBase()+'/platformDestroyRequests/'+reqId, {status:'rejected'});
  GM.platformDestroyQueue = GM.platformDestroyQueue.filter(x=>x.id!==reqId);
  render();
}

async function confirmDamage(reqId){
  const req = GM.damageQueue.find(x=>x.id===reqId); if(!req) return;
  const {targetId, targetType, targetName, amount} = req;
  if(targetType==='npc'){
    const npc = GM.npcs.find(x=>x.id===targetId);
    if(npc){
      npc.hp = Math.max(0, npc.hp - amount);
      log(`⚔ ${req.playerName} → ${targetName}: -${amount} HP (now ${npc.hp}/${npc.maxHp})`,'good');
      // Push updated statusTier — never raw HP
      await fbPatch(roomBase()+'/targets/'+targetId, { statusTier: statusTier(npc.hp, npc.maxHp) });
    }
  } else if(targetType==='player'){
    const p = GM.players[targetId];
    if(p){
      p.hp = Math.max(0, p.hp - amount);
      await pushPlayerCombat(targetId);
      await fbPatch(roomBase()+'/targets/'+targetId, { statusTier: statusTier(p.hp, p.maxHp) });
      log(`⚔ ${req.playerName} → ${targetName}: -${amount} HP (now ${p.hp}/${p.maxHp})`,'good');
    }
  }
  await fbPatch(roomBase()+'/damageRequests/'+reqId, {status:'confirmed'});
  GM.damageQueue = GM.damageQueue.filter(x=>x.id!==reqId);
  render();
}
async function rejectDamage(reqId){
  const req = GM.damageQueue.find(x=>x.id===reqId); if(!req) return;
  await fbPatch(roomBase()+'/damageRequests/'+reqId, {status:'rejected'});
  GM.damageQueue = GM.damageQueue.filter(x=>x.id!==reqId);
  log(`✗ Damage rejected: ${req.playerName} → ${req.targetName}`,'warn');
  render();
}
async function awardEpAll(amount, reason){
  for(const [pid,p] of Object.entries(GM.players)){
    p.epBalance = (p.epBalance||150)+amount;
    await pushPlayerCombat(pid);
  }
  log(`+${amount} EP to all — ${reason}`,'good');
  render();
}
async function awardEpPlayer(pid, amount, reason){
  const p = GM.players[pid]; if(!p) return;
  p.epBalance = (p.epBalance||150)+amount;
  await pushPlayerCombat(pid);
  log(`+${amount} EP → ${p.name}${reason?' — '+reason:''}`,'good');
  render();
}
async function awardTokensToEp(){
  // Convert remaining resource tokens to EP at 5EP each, then clear
  const t = currentTrial(); if(!t) return;
  for(const [pid,p] of Object.entries(GM.players)){
    const tokens = p.resourceTokens||0;
    if(tokens>0){
      const ep = tokens*t.harvest_remainder_ep;
      p.epBalance = (p.epBalance||150)+ep;
      p.resourceTokens = 0;
      await pushPlayerCombat(pid);
      log(`${p.name}: ${tokens} tokens → +${ep} EP`,'good');
    }
  }
  render();
}
async function awardHpRefresh(){
  // Check threshold and apply refresh
  const t = currentTrial(); if(!t||!t.harvest_threshold) return;
  for(const [pid,p] of Object.entries(GM.players)){
    const tokens = p.resourceTokens||0;
    if(tokens>=t.harvest_threshold){
      p.hp = p.maxHp;
      await pushPlayerCombat(pid);
      log(`💚 ${p.name}: HP refreshed to ${p.maxHp} (${tokens} ${t.harvest_label})`,'good');
    } else {
      log(`${p.name}: only ${tokens} ${t.harvest_label} — no HP refresh`,'warn');
    }
  }
  render();
}
async function awardLineageTrait(){
  for(const [pid,p] of Object.entries(GM.players)){
    p.lineageTrait = 'Fire Immunity + CON+2';
    await pushPlayerCombat(pid);
  }
  log('🔥 Lineage Trait awarded: Fire Immunity + CON+2','good');
  render();
}
async function awardLeviathanKill(){
  await awardEpAll(35, 'Leviathan kill');
}

async function setPlayerHp(pid, delta){
  const p = GM.players[pid]; if(!p) return;
  p.hp = Math.max(0, Math.min(p.maxHp, (p.hp||p.maxHp)+delta));
  await pushPlayerCombat(pid);
  render();
}
async function setPlayerHpAbs(pid, val){
  const p = GM.players[pid]; if(!p) return;
  p.hp = Math.max(0, Math.min(p.maxHp, val));
  await pushPlayerCombat(pid);
  render();
}
async function setHeatStrain(pid, delta){
  const p = GM.players[pid]; if(!p) return;
  p.heatStrain = Math.max(0, (p.heatStrain||0)+delta);
  await pushPlayerCombat(pid);
  render();
}
async function toggleCondition(pid, cond){
  const p = GM.players[pid]; if(!p) return;
  const c = p.conditions||[];
  p.conditions = c.includes(cond) ? c.filter(x=>x!==cond) : [...c, cond];
  await pushPlayerCombat(pid);
  render();
}
async function npcHp(npcId, delta){
  const n = GM.npcs.find(x=>x.id===npcId); if(!n) return;
  n.hp = Math.max(0, Math.min(n.maxHp, n.hp+delta));
  if(GM.roomCode && FIREBASE_URL)
    await fbPatch(roomBase()+'/targets/'+npcId, { statusTier: statusTier(n.hp, n.maxHp) });
  render();
}

  const t = currentTrial();

  return `

    <button class="tab ${GM.tab==='players'?'active':''}" data-tab="players">Players${(GM.harvestQueue.length+GM.platformDestroyQueue.length+GM.damageQueue.length)>0?' ⚠'+(GM.harvestQueue.length+GM.platformDestroyQueue.length+GM.damageQueue.length):''}</button>

  `;
}

    <div style="font-size:.76rem;color:var(--dm);text-align:center;max-width:300px">Create a room to start. Share the player link and you're running.</div>
    <div class="setup-field">
      <label>ROOM CODE</label>
      <input id="setup-code" type="text" maxlength="8" placeholder="e.g. PYRO01" value="${GM.roomCode}"
        style="text-transform:uppercase;letter-spacing:.18em;text-align:center"
        oninput="GM.roomCode=this.value.toUpperCase()"/>
    </div>
    <div class="setup-field">
      <label>PLANET</label>
      <select id="setup-planet" style="width:100%;padding:12px 14px;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;color:var(--tx);font-size:.85rem;outline:none" onchange="GM.planet=this.value">
        <option value="pyrotheon">Pyrotheon</option>
        <option value="glacara" disabled>Glacara (locked)</option>
        <option value="verath" disabled>Verath (locked)</option>
        <option value="khara" disabled>Khara (locked)</option>
      </select>
    </div>
    ${!FIREBASE_URL?`<div style="padding:10px 14px;background:rgba(255,58,92,.07);border:1px solid rgba(255,58,92,.2);border-radius:8px;font-size:.64rem;color:var(--rd);max-width:360px;text-align:center">⚠ FIREBASE_URL is empty. Set it at the top of the script to enable live sync.</div>`:''}
    <button class="btn btn-ac" style="width:100%;max-width:360px;padding:14px;font-size:.72rem" data-createroom="1">CREATE ROOM →</button>

function renderScriptPanel(t){
  if(!t) return '';
  const script = TRIAL_SCRIPT[t.id] || [];
  if(script.length===0) return '';
  const idx = Math.max(0, Math.min(GM.scriptCard, script.length-1));
  const card = script[idx];
  const TYPE_STYLE = {
    read:    {icon:'📖', label:'READ ALOUD',  border:'rgba(255,107,53,.4)',  bg:'rgba(255,107,53,.06)',  col:'#ff6b35'},
    mechanic:{icon:'⚙',  label:'MECHANIC',    border:'rgba(255,170,0,.35)',   bg:'rgba(255,170,0,.05)',   col:'#ffaa00'},
    npc:     {icon:'🦎', label:'NPC',         border:'rgba(255,58,92,.35)',   bg:'rgba(255,58,92,.05)',   col:'#ff3a5c'},
    event:   {icon:'⚡', label:'EVENT',       border:'rgba(204,68,255,.35)',  bg:'rgba(204,68,255,.05)',  col:'#cc44ff'},
    award:   {icon:'🪙', label:'AWARDS',      border:'rgba(255,215,0,.35)',   bg:'rgba(255,215,0,.05)',   col:'#ffd700'},
    warning: {icon:'⚠',  label:'IMPORTANT',   border:'rgba(255,58,92,.5)',    bg:'rgba(255,58,92,.08)',   col:'#ff3a5c'},
  };
  const st = TYPE_STYLE[card.type] || TYPE_STYLE.mechanic;
  const isRead = card.type === 'read';
  const progress = `${idx+1} / ${script.length}`;

  return `<div style="margin:10px 14px 0;border:1px solid ${st.border};border-radius:12px;background:${st.bg};overflow:hidden">
    <!-- Script header -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid ${st.border}">
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:.9rem">${st.icon}</span>
        <span style="font-family:'Orbitron',monospace;font-size:.44rem;font-weight:700;color:${st.col};letter-spacing:.12em">${st.label}</span>
        <span style="font-size:.62rem;color:var(--dm)">${card.title}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-family:'Orbitron',monospace;font-size:.42rem;color:var(--dm)">${progress}</span>
        <button data-scriptoggle="1" style="background:none;border:none;color:var(--dm);font-size:.7rem;cursor:pointer;padding:0 4px">${GM.scriptOpen?'▲':'▼'}</button>
      </div>
    </div>
    ${GM.scriptOpen?`
    <!-- Card body -->
    <div style="padding:14px 14px 10px">
      <!-- Main text — large if read-aloud -->
      <div style="font-size:${isRead?'.85rem':'.74rem'};line-height:${isRead?'1.8':'1.65'};color:${isRead?'var(--tx)':'var(--tx)'};white-space:pre-wrap;font-style:${isRead?'italic':'normal'};font-family:${isRead?"'Rajdhani',sans-serif":"inherit"}">${e(card.body)}</div>
      <!-- GM note (smaller, muted) -->
      ${card.gm?`<div style="margin-top:10px;padding:8px 10px;background:rgba(0,0,0,.25);border-left:2px solid var(--dm);border-radius:0 6px 6px 0">
        <div style="font-family:'Orbitron',monospace;font-size:.4rem;color:var(--dm);letter-spacing:.1em;margin-bottom:4px">GM NOTE</div>
        <div style="font-size:.66rem;color:var(--dm);line-height:1.6;white-space:pre-wrap">${e(card.gm)}</div>
      </div>`:''}
    </div>
    <!-- Navigation -->
    <div style="display:flex;gap:6px;padding:0 14px 12px">
      <button data-scriptprev="1" ${idx===0?'disabled':''} style="flex:1;padding:8px;font-family:'Orbitron',monospace;font-size:.48rem;font-weight:700;background:var(--sur);border:1px solid var(--bdr);border-radius:7px;color:${idx===0?'var(--bdr)':'var(--dm)'};cursor:${idx===0?'default':'pointer'}">← PREV</button>
      <button data-scriptnext="1" ${idx===script.length-1?'disabled':''} style="flex:1;padding:8px;font-family:'Orbitron',monospace;font-size:.48rem;font-weight:700;background:${idx<script.length-1?st.col:'var(--sur)'};border:1px solid ${idx<script.length-1?st.col:'var(--bdr)'};border-radius:7px;color:${idx<script.length-1?'#fff':'var(--bdr)'};cursor:${idx===script.length-1?'default':'pointer'}">NEXT →</button>
    </div>`:''}
  </div>`;
}

  return `
  ${renderScriptPanel(t)}

  <!-- Player link -->
  <div class="panel">
    <div class="ph"><div class="ph-title">PLAYER LINK</div></div>
    <div class="pb" style="display:flex;flex-direction:column;gap:6px">
      <div style="font-size:.66rem;color:var(--dm);word-break:break-all;padding:8px 10px;background:var(--sur);border-radius:6px;border:1px solid var(--bdr)">${shareUrl}</div>
      <button class="btn btn-dm btn-sm" data-copylink="${e(shareUrl)}">📋 Copy Link</button>

  <!-- Round + trial controls -->

    <div class="ph">

      <div style="display:flex;gap:6px;align-items:center">
        ${GM.trialActive
          ?`<button class="btn btn-rd btn-sm" data-endtrial="1">End Trial</button>`
          :`<button class="btn btn-gn btn-sm" data-launchtrial="${GM.currentTrialIdx}">▶ Launch</button>`}

      <!-- Round counter -->
      <div style="text-align:center;padding:10px 0">
        <div style="font-family:'Orbitron',monospace;font-size:.44rem;color:var(--dm);letter-spacing:.15em;margin-bottom:4px">ROUND</div>

      <!-- Trial info -->
      <div style="font-size:.64rem;color:var(--dm);line-height:1.7;padding:8px 10px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr)">

        ${t.harvest_threshold?`<div><strong style="color:var(--tx)">Threshold:</strong> ${t.harvest_threshold} → ${t.harvest_threshold_reward}</div>`:''}
        <div><strong style="color:var(--tx)">EP Award:</strong> ${t.ep_award}</div>
        <div style="margin-top:4px;color:var(--gr)">⚠ ${t.special}</div>

      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${t.harvest_threshold?`<button class="btn btn-gn btn-sm" data-hprefresh="1">💚 Check HP Refresh</button>`:''}
        <button class="btn btn-gr btn-sm" data-tokenstoep="1">🪙 Tokens → EP</button>
        ${GM.currentTrialIdx===2?`<button class="btn btn-gr btn-sm" data-leviathankill="1">🦎 Leviathan Kill (+35 EP all)</button>`:''}
        ${GM.currentTrialIdx===3?`<button class="btn btn-gn btn-sm" data-lineagetrait="1">🔥 Award Lineage Trait</button>`:''}

function renderPlayersTab(t){
  const pids = Object.keys(GM.players);
  const pendingH = GM.harvestQueue;
  const pendingP = GM.platformDestroyQueue;
  const pendingD = GM.damageQueue;
  return `
  <!-- Add player -->
  <div class="panel">
    <div class="ph"><div class="ph-title">ADD PLAYER</div></div>
    <div class="pb" style="display:flex;gap:8px">
      <input id="new-p-name" placeholder="Name" style="flex:2;padding:7px 10px;background:var(--sur);border:1px solid var(--bdr);border-radius:7px;color:var(--tx);font-size:.78rem;outline:none"/>
      <input id="new-p-hp" placeholder="Max HP" type="number" min="1" max="999" style="flex:1;padding:7px 10px;background:var(--sur);border:1px solid var(--bdr);border-radius:7px;color:var(--tx);font-size:.78rem;outline:none"/>
      <button class="btn btn-ac btn-sm" data-addplayer="1">+ Add</button>
    </div>
  </div>

  <!-- Harvest queue -->
  ${pendingH.length>0||pendingP.length>0||pendingD.length>0?`<div class="panel">
    <div class="ph"><div class="ph-title" style="color:var(--gr)">⚠ PENDING REQUESTS (${pendingH.length+pendingP.length+pendingD.length})</div></div>
    <div class="pb" style="display:flex;flex-direction:column;gap:6px">
      ${pendingH.map(req=>`<div class="hq-item">
        <div>
          <div style="font-size:.72rem;font-weight:700;color:var(--tx)">🍖 Harvest — ${e(req.playerName||req.playerId)}</div>
          <div style="font-size:.58rem;color:var(--dm)">${t?.harvest_label||'Token'} · ${t?.harvest_per||''}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-gn btn-sm" data-confirmharvest="${req.id}">✓ Confirm</button>
          <button class="btn btn-rd btn-sm" data-rejectharvest="${req.id}">✗ Reject</button>
        </div>
      </div>`).join('')}
      ${pendingP.map(req=>`<div class="hq-item">
        <div>
          <div style="font-size:.72rem;font-weight:700;color:var(--tx)">💥 Platform Destroy — ${e(req.playerName||req.playerId)}</div>
          <div style="font-size:.58rem;color:var(--dm)">+2 Ember Marks if confirmed</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-gn btn-sm" data-confirmpd="${req.id}">✓ Confirm</button>
          <button class="btn btn-rd btn-sm" data-rejectpd="${req.id}">✗ Reject</button>
        </div>
      </div>`).join('')}
      ${pendingD.map(req=>`<div class="hq-item">
        <div>
          <div style="font-size:.72rem;font-weight:700;color:var(--tx)">⚔ Attack — ${e(req.playerName||req.playerId)} → ${e(req.targetName)}</div>
          <div style="font-size:.58rem;color:var(--dm)">${req.amount} damage · ${req.targetType==='npc'?'NPC':'Player'}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-gn btn-sm" data-confirmdr="${req.id}">✓ Apply</button>
          <button class="btn btn-rd btn-sm" data-rejectdr="${req.id}">✗ Reject</button>
        </div>
      </div>`).join('')}
    </div>
  </div>`:''}

  <!-- Player cards -->
  ${pids.length===0?`<div style="padding:24px;text-align:center;color:var(--dm);font-size:.74rem">No players added yet. Add them above or they'll appear when they join via the player link.</div>`:''}
  <div style="padding:0 14px">
    ${pids.map(pid=>{
      const p = GM.players[pid];
      const {pct,col} = fmtHp(p.hp, p.maxHp);
      const expanded = GM.expandedPlayer===pid;
      const hs = p.heatStrain||0;
      const hsCol = hs>=5?'var(--rd)':hs>=3?'#f5a623':'var(--ac)';
      return `<div class="p-card">
        <!-- Header row -->
        <div style="display:flex;align-items:center;gap:8px;cursor:pointer" data-expandplayer="${pid}">
          <div style="flex:1">
            <div class="p-name">${e(p.name||'Unnamed')}</div>
            <div class="p-sub">${p.maxHp} max HP · ${p.resourceTokens||0} ${t?.harvest_label||'tokens'} · ${p.epBalance||0} EP</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;color:${col}">${p.hp}</div>
            <div style="font-size:.54rem;color:var(--dm)">/ ${p.maxHp}</div>
          </div>
          <div style="font-size:.7rem;color:var(--dm)">${expanded?'▲':'▼'}</div>
        </div>
        <!-- HP bar -->
        <div class="hp-bar" style="margin-top:6px">
          <div class="hp-fill" style="width:${Math.round(pct*100)}%;background:${col}"></div>
        </div>
        <!-- Conditions summary -->
        ${(p.conditions||[]).length>0?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">${(p.conditions||[]).map(c=>`<span class="cond-chip">${c}</span>`).join('')}</div>`:''}
        <!-- Expanded controls -->
        ${expanded?`<div style="margin-top:10px;display:flex;flex-direction:column;gap:10px;padding-top:10px;border-top:1px solid var(--bdr)">
          <!-- HP controls -->
          <div>
            <div style="font-family:'Orbitron',monospace;font-size:.42rem;color:var(--dm);letter-spacing:.1em;margin-bottom:6px">HIT POINTS</div>
            <div class="hp-ctrl">
              <button class="btn btn-rd btn-sm" data-phpdelta="${pid}:-5">-5</button>
              <button class="btn btn-rd btn-sm" data-phpdelta="${pid}:-1">-1</button>
              <span class="hp-num" style="color:${col}">${p.hp}</span>
              <button class="btn btn-gn btn-sm" data-phpdelta="${pid}:+1">+1</button>
              <button class="btn btn-gn btn-sm" data-phpdelta="${pid}:+5">+5</button>
              <button class="btn btn-gn btn-sm" data-phpfull="${pid}">Full</button>
            </div>
          </div>
          <!-- Heat Strain -->
          <div>
            <div style="font-family:'Orbitron',monospace;font-size:.42rem;color:${hsCol};letter-spacing:.1em;margin-bottom:6px">HEAT STRAIN: ${hs}${hs>=3?' ⚠':''}</div>
            <div style="display:flex;gap:5px;align-items:center">
              <button class="btn btn-dm btn-sm" data-phs="${pid}:-1">-1</button>
              <div style="display:flex;gap:3px">${Array.from({length:6},(_,i)=>`<div style="width:14px;height:14px;border-radius:50%;border:1.5px solid ${i<hs?hsCol:'var(--bdr)'};background:${i<hs?hsCol+'44':'transparent'}"></div>`).join('')}</div>
              <button class="btn btn-rd btn-sm" data-phs="${pid}:+1">+1</button>
            </div>
          </div>
          <!-- Tokens -->
          <div>
            <div style="font-family:'Orbitron',monospace;font-size:.42rem;color:var(--dm);letter-spacing:.1em;margin-bottom:6px">${(t?.harvest_label||'TOKENS').toUpperCase()}</div>
            <div style="display:flex;gap:6px;align-items:center">
              <button class="btn btn-dm btn-sm" data-ptokens="${pid}:-1">-1</button>
              <span style="font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;color:var(--ac);min-width:28px;text-align:center">${p.resourceTokens||0}</span>
              <button class="btn btn-gr btn-sm" data-ptokens="${pid}:+1">+1</button>
              <button class="btn btn-gr btn-sm" data-ptokens="${pid}:+2">+2</button>
            </div>
          </div>
          <!-- EP -->
          <div>
            <div style="font-family:'Orbitron',monospace;font-size:.42rem;color:var(--dm);letter-spacing:.1em;margin-bottom:6px">EP BALANCE</div>
            <div style="display:flex;gap:6px;align-items:center">
              <button class="btn btn-dm btn-sm" data-pep="${pid}:-5">-5</button>
              <span style="font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;color:var(--gd);min-width:36px;text-align:center">${p.epBalance||0}</span>
              <button class="btn btn-gr btn-sm" data-pep="${pid}:+5">+5</button>
              <button class="btn btn-gr btn-sm" data-pep="${pid}:+10">+10</button>
              <button class="btn btn-gr btn-sm" data-pep="${pid}:+25">+25</button>
            </div>
          </div>
          <!-- Conditions -->
          <div>
            <div style="font-family:'Orbitron',monospace;font-size:.42rem;color:var(--dm);letter-spacing:.1em;margin-bottom:6px">CONDITIONS</div>
            <div class="cond-grid">
              ${CONDITIONS.map(c=>`<button class="cond-toggle${(p.conditions||[]).includes(c)?' on':''}" data-pcond="${pid}:${c}">${c}</button>`).join('')}
            </div>
          </div>
          <!-- Remove -->
          <button class="btn btn-rd btn-sm" style="align-self:flex-start" data-removeplayer="${pid}">Remove Player</button>
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

    ${!t?`<div style="color:var(--dm);font-size:.74rem">Launch a trial first to see NPC presets.</div>`:''}
    ${trialNpcs.length===0&&t?`<div style="color:var(--dm);font-size:.74rem">No NPC presets for this trial.</div>`:''}

          </div>
          <div style="text-align:right;min-width:52px">
            <div style="font-family:'Orbitron',monospace;font-size:.9rem;font-weight:900;color:${col}">${npc.hp}</div>
            <div style="font-size:.54rem;color:var(--dm)">/ ${npc.maxHp}</div>

        </div>

// ── CLICK HANDLER ──────────────────────────────────────────────────────────────
document.addEventListener('click', function(ev){
  const t = ev.target.closest('[data-tab],[data-createroom],[data-launchtrial],[data-endtrial],[data-nextround],[data-adaptopen],[data-hprefresh],[data-tokenstoep],[data-leviathankill],[data-lineagetrait],[data-addplayer],[data-removeplayer],[data-expandplayer],[data-phpdelta],[data-phpfull],[data-phs],[data-ptokens],[data-pep],[data-pcond],[data-npchp],[data-npchpfull],[data-confirmharvest],[data-rejectharvest],[data-confirmpd],[data-rejectpd],[data-confirmdr],[data-rejectdr],[data-selecttrial],[data-copylink],[data-clearlog],[data-scriptnext],[data-scriptprev],[data-scriptoggle]');
  if(!t) return;

  if(t.dataset.tab){ GM.tab=t.dataset.tab; render(); return; }
  if(t.dataset.createroom){ createRoom(); return; }
  if(t.dataset.selecttrial){ GM.currentTrialIdx=parseInt(t.dataset.selecttrial); GM.scriptCard=0; GM.scriptOpen=true; GM.tab='trial'; render(); return; }
  if(t.dataset.launchtrial){ launchTrial(parseInt(t.dataset.launchtrial)); return; }
  if(t.dataset.endtrial){ endTrial(); return; }
  if(t.dataset.nextround){ nextRound(); return; }
  if(t.dataset.adaptopen){ GM.adaptWindowOpen?closeAdaptWindow():openAdaptWindow(); return; }
  if(t.dataset.hprefresh){ awardHpRefresh(); return; }
  if(t.dataset.tokenstoep){ awardTokensToEp(); return; }
  if(t.dataset.leviathankill){ awardLeviathanKill(); return; }
  if(t.dataset.lineagetrait){ awardLineageTrait(); return; }
  if(t.dataset.addplayer){
    const name = document.getElementById('new-p-name')?.value?.trim();
    const hp   = parseInt(document.getElementById('new-p-hp')?.value)||20;
    if(name){ addPlayerManual(name, hp); } else { log('Enter a player name.','warn'); render(); }
    return;
  }
  if(t.dataset.removeplayer){ removePlayer(t.dataset.removeplayer); return; }
  if(t.dataset.expandplayer){
    const pid=t.dataset.expandplayer;
    GM.expandedPlayer = GM.expandedPlayer===pid?null:pid;
    render(); return;
  }
  if(t.dataset.phpdelta){
    const [pid,raw]=t.dataset.phpdelta.split(':');
    setPlayerHp(pid,parseInt(raw)); return;
  }
  if(t.dataset.phpfull){
    const pid=t.dataset.phpfull; const p=GM.players[pid]; if(p){p.hp=p.maxHp;pushPlayerCombat(pid);}
    render(); return;
  }
  if(t.dataset.phs){
    const [pid,raw]=t.dataset.phs.split(':');
    setHeatStrain(pid,parseInt(raw)); return;
  }
  if(t.dataset.ptokens){
    const [pid,raw]=t.dataset.ptokens.split(':');
    const p=GM.players[pid]; if(!p) return;
    p.resourceTokens=Math.max(0,(p.resourceTokens||0)+parseInt(raw));
    pushPlayerCombat(pid); render(); return;
  }
  if(t.dataset.pep){
    const [pid,raw]=t.dataset.pep.split(':');
    awardEpPlayer(pid,parseInt(raw)); return;
  }
  if(t.dataset.pcond){
    const [pid,...rest]=t.dataset.pcond.split(':'); toggleCondition(pid,rest.join(':')); return;
  }
  if(t.dataset.npchp){
    const [id,raw]=t.dataset.npchp.split(':'); npcHp(id,parseInt(raw)); return;
  }
  if(t.dataset.npchpfull){
    const n=GM.npcs.find(x=>x.id===t.dataset.npchpfull); if(n){n.hp=n.maxHp;render();} return;
  }
  if(t.dataset.confirmharvest){ confirmHarvest(t.dataset.confirmharvest); return; }
  if(t.dataset.rejectharvest){ rejectHarvest(t.dataset.rejectharvest); return; }
  if(t.dataset.confirmpd){ confirmPlatformDestroy(t.dataset.confirmpd); return; }
  if(t.dataset.rejectpd){ rejectPlatformDestroy(t.dataset.rejectpd); return; }
  if(t.dataset.confirmdr){ confirmDamage(t.dataset.confirmdr); return; }
  if(t.dataset.rejectdr){ rejectDamage(t.dataset.rejectdr); return; }
  if(t.dataset.copylink){
    navigator.clipboard?.writeText(t.dataset.copylink).then(()=>{ t.textContent='✓ Copied!'; setTimeout(()=>{t.textContent='📋 Copy Link';},1500); });
    return;
  }
  if(t.dataset.clearlog){ GM.log=[]; render(); return; }
  if(t.dataset.scriptnext){
    const script = TRIAL_SCRIPT[TRIALS[GM.currentTrialIdx]?.id] || [];
    GM.scriptCard = Math.min(GM.scriptCard+1, script.length-1);
    render(); return;
  }
  if(t.dataset.scriptprev){
    GM.scriptCard = Math.max(GM.scriptCard-1, 0);
    render(); return;
  }
  if(t.dataset.scriptoggle){ GM.scriptOpen=!GM.scriptOpen; render(); return; }
});

// ── BOOT ───────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>

                <div className="ph"><h2>Saved Characters</h2></div>
                <div className="pb">
                  {saved.map((c,i)=>(
                    <div key={c.id} className="saved-item">
                      <div style={{flex:1}}>
                        <div className="saved-name">{c.name||"Unnamed"}</div>
                        <div className="saved-sub">{[SIZES.find(x=>x.id===c.sizeId)?.name,TYPES.find(x=>x.id===c.typeId)?.name].filter(Boolean).join(" \u00b7 ")}</div>
                      </div>
                      <button className="btn btn-p" style={{fontSize:".56rem",padding:"5px 9px"}} onClick={()=>{
  // New saves store combat under _combat key
  // Legacy saves had creatureLevel/currentHp directly on s — migrate those
  const {_combat, creatureLevel:cl, currentHp:ch, id:_id, savedAt:_sa, ...buildOnly} = c;
  setS(buildOnly);
  setCombat(_combat ?? {currentHp: ch??null, creatureLevel: cl??1});
  setStep(6);
}}>Load</button>
                      <button className="btn btn-d" onClick={()=>persistSaves(saved.filter((_,j)=>j!==i))}>Del</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>
        );
      }

      default: return null;
    }
  }

  const planetPalette = s.planet && PLANETS[s.planet] && PLANETS[s.planet].palette ? PLANETS[s.planet].palette : PLANETS.pyrotheon.palette;

  return (
    <>
      <style>{css}</style>
      <div className="wrap" style={{"--ac":planetPalette.ac||"#ff6b35","--ac2":planetPalette.ac2||"#cc3300","--ac3":planetPalette.ac3||"#ff6b35","--gr":planetPalette.gr||"#ffaa00","--gd":planetPalette.gd||"#ffd700"}}>
        <div className="builder-hero">
          <h1 style={{letterSpacing:".06em",fontSize:"clamp(1.6rem,7vw,2.6rem)"}}>PROTO<span style={{color:"var(--dm)",fontWeight:300,fontSize:".7em",margin:"0 7px",verticalAlign:"middle",letterSpacing:0}}>•</span><span>GENESIS</span></h1>
          <div className="sub" style={{marginTop:4}}>
            Evolution Builder
            {s.planet && (
              <div style={{marginTop:3,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span style={{color:"var(--ac)",letterSpacing:".2em"}}>{PLANETS[s.planet].name.toUpperCase()}</span>
                <button onClick={() => setScreen("planets")} style={{background:"none",border:"1px solid rgba(255,255,255,.1)",borderRadius:4,color:"var(--dm)",fontSize:".55rem",padding:"2px 7px",cursor:"pointer",fontFamily:"'Orbitron',monospace",letterSpacing:".1em"}}>CHANGE</button>
              </div>
            )}
          </div>
        </div>

        {step > 0 && (
          <div className="sticky-hud">
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontSize:".52rem",color:"var(--dm)",letterSpacing:".1em"}}>EP</span>
              <div style={{flex:1,height:4,background:"var(--bdr)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:2,background:spent>EP_BUDGET?"var(--rd)":"linear-gradient(90deg,var(--ac),var(--gd))",width:Math.min(100,(spent/EP_BUDGET)*100)+"%",transition:"width .3s"}} />
              </div>
              <span style={{fontFamily:"'Orbitron',monospace",fontSize:".75rem",fontWeight:700,color:spent>EP_BUDGET?"var(--rd)":"var(--gd)"}}>{spent}/{EP_BUDGET}</span>
            </div>
          </div>
        )}

        <div className="wrap-inner">{renderPage()}</div>

        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,maxWidth:860,margin:"0 auto"}}>
          <div className="bottom-nav">
            {NAV_STEPS.map((lbl, i) => (
              <button key={i} className={"bnav-btn"+(i===step?" active":i<step?" done":"")} onClick={() => goToStep(i)}>{lbl}</button>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

function quickStackCost(n) { return 5 * Math.pow(2, Math.floor((n - 1) / 2)); }
function quickTotalCost(stacks) {
  let total = 0;
  for (let i = 1; i <= stacks; i++) total += quickStackCost(i);
  return total;
}

      {id:"poisons", label:"Poisons or Deters", desc:"Chemical warning. Toxic deterrent. Touching it costs something.", collapsed:"Poisons or deters"},

function getSpecimenDiscounts(s) {
  const q = s.specimenQ || {};
  const d = {};
  if (q.q1 === "modular") d.type_swarm = 5;
  if (q.q1 === "vermiform") d.type_ooze = 5;
  if (q.q1 === "radial") d.sense_tremor = 5;
  if (q.q2 === "predator") d.die_offense = 5;
  if (q.q2 === "ambush") d.move_suckers = 5;
  if (q.q2 === "scavenger") d.resist_affinity = 5;
  if (q.q2 === "grazer") d.sustain = 5;
  if (q.q3 === "pack") d.type_beast = 5;
  if (q.q3 === "symbiotic") d.type_plant = 5;
  if (q.q3 === "parasitic") d.type_aberration = 5;
  if (q.q3 === "solitary") d.type_monstrosity = 5;
  if (q.q4 === "fights") d.hd_upgrade = 5;
  if (q.q4 === "flees") d.move_flight_burrow = 5;
  if (q.q4 === "poisons") d.adapt_venom = 5;
  if (q.q4 === "endures") d.adapt_regen = 5;
  return d;
}
function specimenTypeId(s) {
  const q0ans = (s.specimenQ||{}).q0;
  if (!q0ans) return s.typeId;
  const q0def = SPECIMEN_QUESTIONS[0].options.find(o => o.id === q0ans);
  return q0def ? q0def.typeId : s.typeId;
}
function specimenProficiencies(s) {
  const q = s.specimenQ || {};
  const profs = [];
  const bodyProf = {bilateral:"Athletics", radial:"Perception", vermiform:"Stealth", modular:"Insight"};
  if (q.q1 && bodyProf[q.q1]) profs.push(bodyProf[q.q1]);
  const nicheProf = {predator:"Intimidation", ambush:"Stealth", scavenger:"Survival", grazer:"Endurance"};
  if (q.q2 && nicheProf[q.q2]) { const np = nicheProf[q.q2]; if (!profs.includes(np)) profs.push(np); }
  const threatSave = {fights:"STR saves", flees:"DEX saves", poisons:"CON saves", endures:"CON saves"};
  if (q.q4 && threatSave[q.q4]) { const tp = threatSave[q.q4]; if (!profs.includes(tp)) profs.push(tp); }
  const fallbacks = ["Perception","Survival","Athletics","Stealth","Endurance","Insight"];
  fallbacks.forEach(f => { if (profs.length < 3 && !profs.includes(f)) profs.push(f); });
  return profs.slice(0, 3);
}

function traitCost(id, typeId) {
  const t = TRAITS.find(v => v.id === id); if (!t) return 0;
  let cost = t.cost;
  if (id === "relentless" && typeId === "beast") cost -= 5;
  if (id === "reckless" && typeId === "monstrosity") cost -= 5;
  if (id === "constricting" && typeId === "ooze") cost -= 5;
  if (id === "packtactics" && typeId === "swarm") cost -= 5;
  return cost;
}
function senseCost(id, typeId) {
  const s = SENSES.find(v => v.id === id); if (!s) return 0;
  let cost = s.cost;
  if (id === "telepathy" && typeId === "aberration") cost -= 5;
  return cost;
}

function calcEP(s) {
  const disc = getSpecimenDiscounts(s);
  let ep = 0;
  const sz = SIZES.find(x => x.id === s.sizeId); if (sz) ep += sz.cost;
  s.senses.forEach(id => { ep += senseCost(id, specimenTypeId(s)); });
  s.moves.forEach(id => {
    const x = MOVES.find(v => v.id === id); if (x) {
      let mCost = x.cost;
      if (["burrower","suckers","flight"].includes(id) && disc.move_flight_burrow) mCost = Math.max(0, mCost - disc.move_flight_burrow);
      if (id === "suckers" && disc.move_suckers) mCost = Math.max(0, mCost - disc.move_suckers);
      ep += mCost;
    }
  });
  Object.entries(s.moveCounts||{}).forEach(([id,cnt]) => {
    if (id === "quick") { ep += quickTotalCost(cnt); }
    else { const x = MOVES.find(v => v.id === id); if (x && cnt > 0) ep += x.cost * cnt; }
  });
  const elDefs = s.elementalDefenses || [];
  elDefs.forEach(ed => {
    let base = ed.tier==="obsidian" ? 40 : ed.tier==="magma" ? 20 : 10;
    const isElemental = specimenTypeId(s) === "elemental";
    if (isElemental) base -= (ed.tier==="obsidian" ? 15 : 5);
    if (ed.tier==="obsidian") {
      const hasResist = elDefs.some(o => o.element===ed.element && o.tier==="magma");
      if (hasResist) base = Math.max(0, base - 5);
    }
    ep += Math.max(0, base);
  });
  (s.traits||[]).forEach(id => {
    let tCost = traitCost(id, specimenTypeId(s));
    ep += tCost;
  });
  const epBonuses = s.statEPBonuses || {};
  const totalBuys = Object.values(epBonuses).reduce((t,v) => t+(v||0), 0);
  for (let i = 0; i < totalBuys; i++) ep += i===0?5:i===1?10:20;
  const ar = ARMORS.find(x => x.id === s.armorId); if (ar) ep += ar.cost;
  let hdCost = hdTotalCost(s.hdChoice || "1d4");
  if (hdCost > 0 && disc.hd_upgrade) hdCost = Math.max(0, hdCost - disc.hd_upgrade);
  ep += hdCost;
  const acN = s.acStacks || 0;
  ep += acN > 0 ? 5 * (Math.pow(2, acN) - 1) : 0;
  Object.entries(s.otherDef||{}).forEach(([id,cnt]) => { const d = OTHER_DEF.find(x => x.id === id); if (d && cnt > 0) ep += d.cost * cnt; });
  ep += (s.slots.length - 1) * 10;
  let predatorDieDisc = disc.die_offense || 0;
  s.slots.forEach(sl => {
    if (sl.dbl) ep += 50;
    let aDieCost = dieTotalCost(sl.aDie || "1d4");
    if (predatorDieDisc > 0 && ["Offense","AOE"].includes(sl.aRole) && aDieCost > 0) {
      aDieCost = Math.max(0, aDieCost - predatorDieDisc); predatorDieDisc = 0;
    }
    ep += aDieCost;
    ep += dieTotalCost(sl.bDie || "1d4");
    ep += dieTotalCost(sl.rDie || "1d4");
  });
  return ep;
}
function getStatBonuses(s) {
  const b = {STR:0,DEX:0,CON:0,INT:0,WIS:0,CHA:0};
  const sz = SIZES.find(x => x.id === s.sizeId);
  if (sz) {
    Object.entries(sz.bon).forEach(([k,v]) => { b[k] = (b[k]||0) + v; });
    if (sz.choose2) (s.medBonus||[]).forEach(k => { b[k] = (b[k]||0) + 1; });
  }
  return b;
}
function finalStats(s) {
  const b = getStatBonuses(s);
  const epB = s.statEPBonuses || {};
  const out = {};
  STAT_KEYS.forEach(k => { out[k] = ((s.statAssign||{})[k]||8) + (b[k]||0) + (epB[k]||0); });
  return out;
}
function calcAC(s) {
  const fs = finalStats(s);
  const acBonus = s.acStacks || 0;
  if (s.armorId === "hardened") return 13 + statMod(fs.DEX) + acBonus;
  if (s.armorId === "adaptive") return 13 + statMod(fs.DEX) + statMod(fs[s.adaptStat]||10) + acBonus;
  return null;
}
function getSpeed(s) {
  const sz = SIZES.find(x => x.id === s.sizeId);
  let spd = sz ? sz.speed : 20;
  const quickCount = (s.moveCounts || {}).quick || 0;
  spd += quickCount * 5;
  return spd;
}
function primaryStat(fs) {
  return STAT_KEYS.reduce((best, k) => fs[k] > fs[best] ? k : best, "STR");
}

        transparent 2px,
        rgba(0,0,0,.08) 2px,

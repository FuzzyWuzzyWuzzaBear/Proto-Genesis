      );
    }
    .boot-cursor { animation: boot-blink .8s step-end infinite; }
    .login-input-crt {
      background: rgba(0,20,10,.7) !important;
      border: 1px solid rgba(0,255,100,.25) !important;
      color: #00ff88 !important;
      font-family: 'Orbitron', monospace !important;
      letter-spacing: .15em !important;
      caret-color: #00ff88;
    }
    .login-input-crt::placeholder { color: rgba(0,255,100,.3) !important; }
    .login-input-crt:focus { border-color: rgba(0,255,100,.6) !important; box-shadow: 0 0 12px rgba(0,255,100,.15); }
    .btn-crt-p {
      background: transparent !important;
      border: 1px solid rgba(0,255,100,.5) !important;
      color: #00ff88 !important;
      font-family: 'Orbitron', monospace !important;
      letter-spacing: .15em !important;
    }
    .btn-crt-p:hover { background: rgba(0,255,100,.08) !important; border-color: #00ff88 !important; }
    .btn-crt-p:disabled { opacity:.3 !important; }
    .btn-crt-g {
      background: transparent !important;
      border: 1px solid rgba(0,255,100,.2) !important;
      color: rgba(0,255,100,.5) !important;
      font-family: 'Orbitron', monospace !important;
      letter-spacing: .12em !important;
    }
  `;

  const S = 300; // radar SVG size

  return (
    <>
      <style>{loginCss}</style>
      <div style={{minHeight:"100vh",background:"#030a04",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",fontFamily:"'Rajdhani',sans-serif",color:"#00ff88",overflow:"hidden",position:"relative"}}>

        {/* Full-screen scanlines */}
        <div className="crt-scanline" style={{position:"fixed",inset:0,zIndex:0,borderRadius:0}} />

        {/* Boot terminal text — top left */}
        <div style={{position:"fixed",top:16,left:16,fontFamily:"'Orbitron',monospace",fontSize:".45rem",color:"rgba(0,255,100,.45)",letterSpacing:".1em",lineHeight:1.8,zIndex:1,pointerEvents:"none"}}>
          <div>USER: ████████</div>
          <div>SYSTEM BOOT SEQUENCE INITIATED</div>
          <div>PLANET SCAN / REINITIATED...</div>
          <div>SIGNAL LOCK: <span style={{color:"rgba(0,255,100,.7)"}}>ACQUIRING</span><span className="boot-cursor">_</span></div>
        </div>

        {/* Radar */}
        <div style={{position:"relative",width:S,height:S,marginBottom:8,flexShrink:0,zIndex:1}}>
          <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`} style={{display:"block"}}>
            <defs>
              <radialGradient id="radarBg" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#0a2010" />
                <stop offset="100%" stopColor="#030a04" />
              </radialGradient>
              <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="rgba(0,255,100,.18)" />
                <stop offset="100%" stopColor="rgba(0,255,100,0)" />
              </radialGradient>
            </defs>

            {/* Radar background circle */}
            <circle cx={S/2} cy={S/2} r={S/2-2} fill="url(#radarBg)" stroke="rgba(0,255,100,.2)" strokeWidth="1" />

            {/* Concentric rings */}
            {[0.25,0.45,0.65,0.85].map((r,i) => (
              <circle key={i} cx={S/2} cy={S/2} r={(S/2-2)*r} fill="none" stroke="rgba(0,255,100,.12)" strokeWidth="1" />
            ))}

            {/* Cross hairs */}
            <line x1={S/2} y1={4} x2={S/2} y2={S-4} stroke="rgba(0,255,100,.08)" strokeWidth="1" />
            <line x1={4} y1={S/2} x2={S-4} y2={S/2} stroke="rgba(0,255,100,.08)" strokeWidth="1" />

            {/* Sweep arm */}
            <g className="radar-sweep-arm">
              <path d={`M ${S/2} ${S/2} L ${S/2} ${2} A ${S/2-2} ${S/2-2} 0 0 1 ${S-2} ${S/2}`} fill="url(#sweepGrad)" opacity=".6" />
              <line x1={S/2} y1={S/2} x2={S/2} y2={2} stroke="rgba(0,255,100,.5)" strokeWidth="1.5" />
            </g>

            {/* Planet orbs */}
            {RADAR_PLANETS.map(p => {
              const pos = orbPos(p.angle, p.r, S);
              return (
                <g key={p.key}>
                  {/* Glow */}
                  <circle cx={pos.x} cy={pos.y} r={14} fill={p.color} opacity={.08} />
                  {/* Orb */}
                  <circle className="orb-pulse" cx={pos.x} cy={pos.y} r={7} fill={p.color} opacity={.85} />
                  {/* Label */}
                  <text x={pos.x} y={pos.y + 20} textAnchor="middle" fontFamily="'Orbitron',monospace" fontSize="7" fill={p.color} opacity={.7} letterSpacing="1">{p.label}</text>
                </g>
              );
            })}

            {/* Center dot */}
            <circle cx={S/2} cy={S/2} r={3} fill="rgba(0,255,100,.6)" />
          </svg>

          {/* Scanlines over radar */}
          <div className="crt-scanline" style={{position:"absolute",inset:0,borderRadius:"50%"}} />
        </div>

        {/* Title — contained, won't clip */}
        <div style={{textAlign:"center",marginBottom:24,zIndex:1,width:"100%",padding:"0 16px"}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"clamp(1.6rem,7vw,2.8rem)",letterSpacing:".08em",color:"#e8ffe8",lineHeight:1,whiteSpace:"nowrap"}}>
            PROTO<span style={{color:"rgba(0,255,100,.5)",margin:"0 4px"}}>|</span>GENESIS
          </div>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:".5rem",letterSpacing:".35em",color:"rgba(0,255,100,.4)",marginTop:6,textTransform:"uppercase"}}>Evolution Builder · System v2.0</div>
        </div>

        {/* UI panel */}
        <div style={{width:"100%",maxWidth:320,zIndex:1}}>

          {/* Name entry */}
          {!path && (
            <div style={{marginBottom:16}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:".48rem",letterSpacing:".2em",color:"rgba(0,255,100,.5)",marginBottom:6,textTransform:"uppercase"}}>
                IDENT: DESIGNATE YOURSELF
              </div>
              <input
                className="txt login-input-crt"
                value={nameInput}
                onChange={e => setNameInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && canContinue) setPath("build"); }}
                placeholder="ENTER DESIGNATION..."
                style={{fontSize:".85rem",padding:"11px 14px",width:"100%",textTransform:"uppercase"}}
                autoFocus
              />
            </div>
          )}

          {/* Path buttons */}
          {canContinue && !path && (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button className="btn btn-crt-p" style={{padding:"13px",fontSize:".62rem",width:"100%"}} onClick={() => setPath("build")}>
                ▶ BUILD A CREATURE
              </button>
              <button className="btn btn-crt-g" style={{padding:"13px",fontSize:".62rem",width:"100%"}} onClick={() => setPath("join")}>
                ▶ JOIN A TRIAL
              </button>
            </div>
          )}

          {/* Build confirm */}
          {canContinue && path === "build" && (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:".48rem",color:"rgba(0,255,100,.5)",letterSpacing:".15em",marginBottom:4}}>
                DESIGNATION CONFIRMED: <span style={{color:"#00ff88"}}>{nameInput.trim().toUpperCase()}</span>
              </div>
              <button className="btn btn-crt-p" style={{padding:"13px",fontSize:".62rem",width:"100%"}} onClick={() => handleContinue("build")}>
                ▶ INITIATE SEQUENCE
              </button>
              <button className="btn btn-crt-g" style={{padding:"10px",fontSize:".55rem",width:"100%"}} onClick={() => setPath(null)}>◀ BACK</button>
            </div>
          )}

          {/* Join room */}
          {canContinue && path === "join" && (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:".48rem",color:"rgba(0,255,100,.5)",letterSpacing:".15em",marginBottom:4}}>
                ENTER ROOM SIGNAL CODE
              </div>
              <input
                className="txt login-input-crt"
                value={roomInput}
                onChange={e => setRoomInput(e.target.value.toUpperCase())}
                onKeyDown={e => { if (e.key === "Enter" && roomInput.trim()) handleContinue("join"); }}
                placeholder="XXXXXX"
                style={{fontSize:"1.4rem",padding:"12px 14px",letterSpacing:".3em",textAlign:"center",width:"100%"}}
                maxLength={6}
                autoFocus
              />
              <button className="btn btn-crt-p" style={{padding:"13px",fontSize:".62rem",width:"100%",opacity:roomInput.trim()?1:.35}} disabled={!roomInput.trim()} onClick={() => handleContinue("join")}>
                ▶ LOCK ON
              </button>
              <button className="btn btn-crt-g" style={{padding:"10px",fontSize:".55rem",width:"100%"}} onClick={() => setPath(null)}>◀ BACK</button>
            </div>
          )}

          {/* Returning player hint */}
          {saved.length > 0 && !path && (
            <div style={{marginTop:20,fontFamily:"'Orbitron',monospace",fontSize:".44rem",color:"rgba(0,255,100,.3)",letterSpacing:".12em",textAlign:"center"}}>
              {saved.length} STORED SPECIMEN{saved.length !== 1 ? "S" : ""} DETECTED
            </div>
          )}
        </div>

      </div>
    </>
  );
}

function App() {
  // screen controls top-level routing: "login" | "planets" | "builder"
  const [screen, setScreen] = useState("login");
  const [step, setStep] = useState(0);
  const [s, setS] = useState(defaultState());
  // combat is intentionally separate — Firebase will only ever sync this object
  const [combat, setCombat] = useState(defaultCombat());
  // player identity — set once at login, never mutated by builder or combat logic
  const [player, setPlayer] = useState(defaultPlayer());
  const [activeSubSlot, setActiveSubSlot] = useState({});
  const [collapsedSlots, setCollapsedSlots] = useState({});
  const [saved, setSaved] = useState(() => {
    try { const stored = localStorage.getItem("pyrotheon_saves"); return stored ? JSON.parse(stored) : []; }
    catch(e) { return []; }
  });
  const [expandedTrial, setExpandedTrial] = useState(null);
  const [splashIdx, setSplashIdx] = useState(0);

  function persistSaves(newSaves) {
    setSaved(newSaves);
    try { localStorage.setItem("pyrotheon_saves", JSON.stringify(newSaves)); } catch(e) {}
  }

  const fs = finalStats(s);
  const hd = getHD(s);
  const sz = SIZES.find(x => x.id === s.sizeId);
  const ty = TYPES.find(x => x.id === s.typeId);
  const spd = getSpeed(s);
  const ac = calcAC(s);
  const bonuses = getStatBonuses(s);

  function upd(patch) { setS(prev => Object.assign({}, prev, patch)); }
  function toggle(arr, v) { return arr.includes(v) ? arr.filter(x => x !== v) : arr.concat([v]); }
  function goToStep(n) { setStep(n); window.scrollTo({top:0, behavior:"smooth"}); }
  function updSlot(idx, patch) {
    setS(prev => {
      const slots = prev.slots.map((sl, i) => i === idx ? Object.assign({}, sl, patch) : sl);
      return Object.assign({}, prev, {slots});
    });
  }

  const spent = calcEP(s);
  const lvlBonus = ((combat.creatureLevel||1) - 1) * 10;
  const EP_BUDGET = EP_MAX + lvlBonus;
  const remaining = EP_BUDGET - spent;

  const PLANET_KEYS = Object.keys(PLANETS);

  // ── LOGIN ──
  if (screen === "login") {
    return <LoginScreen saved={saved} player={player} setPlayer={setPlayer} setScreen={setScreen} css={css} />;
  }

  // ── PLANET CAROUSEL ──
  if (screen === "planets") {
    const pk = PLANET_KEYS[splashIdx];
    const pl = PLANETS[pk];
    const pd = getPlanetData(pk);
    const acColor = pl.palette ? pl.palette.ac : "#ff6b35";
    const canPrev = splashIdx > 0;
    const canNext = splashIdx < PLANET_KEYS.length - 1;

    return (
      <>
        <style>{css}</style>
        <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",fontFamily:"'Rajdhani',sans-serif",color:"var(--tx)"}}>
          <div style={{padding:"28px 20px 14px",textAlign:"center",background:`linear-gradient(180deg,${acColor}22 0%,transparent 100%)`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14}}>
              <button disabled={!canPrev} onClick={() => setSplashIdx(i=>i-1)} style={{background:"none",border:"none",color:canPrev?acColor:"rgba(255,255,255,.1)",fontSize:"2.2rem",lineHeight:1,cursor:canPrev?"pointer":"default",padding:"0 4px"}}>‹</button>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:"clamp(2.2rem,10vw,3.2rem)",fontWeight:900,color:acColor,letterSpacing:".08em"}}>{pl.name}</div>
              <button disabled={!canNext} onClick={() => setSplashIdx(i=>i+1)} style={{background:"none",border:"none",color:canNext?acColor:"rgba(255,255,255,.1)",fontSize:"2.2rem",lineHeight:1,cursor:canNext?"pointer":"default",padding:"0 4px"}}>›</button>
            </div>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:".65rem",color:"var(--dm)",letterSpacing:".25em",textTransform:"uppercase",marginTop:6}}>{pl.tagline}</div>
            <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:8}}>
              {PLANET_KEYS.map((_, i) => <div key={i} style={{width:6,height:6,borderRadius:"50%",background:i===splashIdx?acColor:"var(--bdr)",transition:"background .2s"}} />)}
            </div>
          </div>
          <div style={{padding:"0 20px",maxWidth:600,margin:"0 auto",width:"100%"}}>
            <div style={{fontSize:".8rem",color:"var(--dm)",lineHeight:1.7,margin:"14px 0 10px"}}>{pd.lore}</div>
            {pd.trials.length > 0 && <>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:".52rem",letterSpacing:".2em",textTransform:"uppercase",color:acColor,marginBottom:8,marginTop:12}}>The Trials</div>
              {pd.trials.map((t, i) => {
                const isOpen = expandedTrial === i;
                return (
                  <div key={i} style={{marginBottom:8,borderRadius:8,border:`1px solid ${isOpen?acColor+"44":"var(--bdr)"}`,overflow:"hidden",transition:"border-color .2s"}}>
                    <div onClick={() => setExpandedTrial(isOpen?null:i)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"var(--sur)",cursor:"pointer"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontFamily:"'Orbitron',monospace",fontSize:".58rem",fontWeight:700,color:acColor}}>{t.name}</span>
                        <span style={{fontSize:".82rem",fontWeight:600,color:"var(--tx)"}}>{t.label}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontFamily:"'Orbitron',monospace",fontSize:".6rem",color:acColor,fontWeight:700}}>{t.points}</span>
                        <span style={{color:"var(--dm)",fontSize:".9rem",transition:"transform .2s",display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)"}}>›</span>
                      </div>
                    </div>
                    {isOpen && (
                      <div style={{padding:"12px 14px",borderTop:`1px solid ${acColor}33`,background:"rgba(255,107,53,.03)"}}>
                        <div style={{fontSize:".72rem",color:"var(--dm)",lineHeight:1.6,marginBottom:10}}>{t.challenge}</div>
                        {t.refresh && (
                          <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:10,padding:"6px 10px",background:"rgba(255,255,255,.03)",borderRadius:6,border:"1px solid var(--bdr)"}}>
                            <span style={{fontSize:".7rem",flexShrink:0}}>{t.refresh.includes("NO") ? "⚠" : "✓"}</span>
                            <span style={{fontSize:".68rem",color:t.refresh.includes("NO")?"var(--rd)":"var(--gr)",lineHeight:1.5}}>{t.refresh}</span>
                          </div>
                        )}
                        {t.buildTips && t.buildTips.length > 0 && <>
                          <div style={{fontFamily:"'Orbitron',monospace",fontSize:".52rem",letterSpacing:".15em",textTransform:"uppercase",color:"var(--dm)",marginBottom:6}}>Build Tips</div>
                          {t.buildTips.map((tip, j) => (
                            <div key={j} style={{display:"flex",gap:6,marginBottom:4,alignItems:"flex-start"}}>
                              <span style={{color:acColor,fontSize:".65rem",flexShrink:0,marginTop:1}}>›</span>
                              <span style={{fontSize:".68rem",color:"var(--dm)",lineHeight:1.5}}>{tip}</span>
                            </div>
                          ))}
                        </>}
                      </div>
                    )}
                  </div>
                );
              })}
            </>}
            {pd.warnings.length > 0 && <>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:".52rem",letterSpacing:".2em",textTransform:"uppercase",color:acColor,margin:"12px 0 8px"}}>Know Before You Build</div>
              {pd.warnings.map((w, i) => (
                <div key={i} style={{display:"flex",gap:6,alignItems:"flex-start",padding:"4px 0",fontSize:".72rem",color:"var(--dm)"}}>
                  <span style={{color:acColor,flexShrink:0}}>⚠</span>{w}
                </div>
              ))}
            </>}
          </div>
          <div style={{padding:"20px 20px 30px",maxWidth:600,margin:"0 auto",width:"100%",marginTop:"auto"}}>
            {pl.locked
              ? <div style={{width:"100%",padding:"14px",background:"var(--sur)",color:"var(--dm)",fontFamily:"'Orbitron',monospace",fontSize:".65rem",letterSpacing:".15em",textAlign:"center",borderRadius:10,border:"1px solid var(--bdr)",textTransform:"uppercase"}}>— World Locked —</div>
              : <button onClick={() => { upd({planet:pk}); setScreen("builder"); }} style={{width:"100%",padding:"16px",background:acColor,color:"#000",border:"none",borderRadius:10,fontFamily:"'Orbitron',monospace",fontSize:".8rem",fontWeight:900,letterSpacing:".15em",cursor:"pointer",textTransform:"uppercase",boxShadow:`0 0 30px ${acColor}44`}}>
                  Begin Evolution →
                </button>
            }
          </div>
        </div>
      </>
    );
  }

  // ── BUILDER ──
  function renderPage() {
    switch(step) {
      // ── SPECIMEN ──
      case 0: {
        let qStep = s.specimenStep || 0;
        const sq = s.specimenQ || {};
        const allQDone = SPECIMEN_QUESTIONS.every(q => sq[q.id]);
        if (allQDone && qStep < SPECIMEN_QUESTIONS.length) qStep = SPECIMEN_QUESTIONS.length;

        function collapseChip(qIdx) {
          const qDef = SPECIMEN_QUESTIONS[qIdx];
          const chosen = qDef.options.find(o => o.id === sq[qDef.id]);
          if (!chosen) return null;
          return (
            <div onClick={() => upd({specimenStep:qIdx, specimenQ: (() => { const c = Object.assign({},sq); SPECIMEN_QUESTIONS.slice(qIdx).forEach(q=>{c[q.id]=null;}); return c; })()})}
              style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 10px",background:"var(--sur2)",border:"1px solid var(--bdr)",borderRadius:6,cursor:"pointer",marginBottom:4,transition:"border-color .15s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--ac)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="var(--bdr)"}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontFamily:"'Orbitron',monospace",fontSize:".5rem",color:"var(--dm)",letterSpacing:".12em",textTransform:"uppercase"}}>{["Type","Body","Niche","Social","Threat"][qIdx]}</span>
                <span style={{fontSize:".8rem",fontWeight:600,color:"var(--tx)"}}>{chosen.collapsed}</span>
              </div>
              <span style={{fontSize:".6rem",color:"var(--dm)",opacity:.4}}>✎</span>
            </div>
          );
        }

        function BackLink(toPrev) {
          return (
            <div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",marginTop:20,opacity:.6}}
              onClick={() => {
                const cleared = Object.assign({},sq);
                if (toPrev >= 0) { SPECIMEN_QUESTIONS.slice(toPrev).forEach(q=>{cleared[q.id]=null;}); upd({specimenStep:toPrev,specimenQ:cleared}); }
                else { cleared[SPECIMEN_QUESTIONS[SPECIMEN_QUESTIONS.length-1].id]=null; upd({specimenStep:SPECIMEN_QUESTIONS.length-1,specimenQ:cleared}); }
              }}>
              <span style={{fontSize:"1rem",color:"var(--dm)"}}>‹</span>
              <span style={{fontFamily:"'Orbitron',monospace",fontSize:".6rem",color:"var(--dm)",letterSpacing:".1em"}}>BACK</span>
            </div>
          );
        }

        return (
          <div className="panel">
            <div className="ph" style={{padding:"7px 14px"}}><h2>Specimen</h2></div>
            <div className="pb" style={{padding:"10px 14px"}}>
              {SPECIMEN_QUESTIONS.map((qDef, i) => { if (!sq[qDef.id]) return null; if (i >= qStep && !allQDone) return null; return <div key={qDef.id}>{collapseChip(i)}</div>; })}
              {!allQDone && (() => {
                const qDef = SPECIMEN_QUESTIONS[qStep];
                if (!qDef) return null;
                return (
                  <div>
                    <div style={{fontSize:".88rem",fontWeight:600,color:"var(--tx)",marginBottom:qDef.options.length>4?8:12,lineHeight:1.4}}>{qDef.prompt}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:qDef.options.length>4?5:8}}>
                      {qDef.options.map(opt => {
                        const isSel = sq[qDef.id] === opt.id;
                        return (
                          <div key={opt.id} onClick={() => {
                            const newSq = Object.assign({},sq,{[qDef.id]:opt.id});
                            SPECIMEN_QUESTIONS.slice(qStep+1).forEach(q=>{newSq[q.id]=null;});
                            const patch = {specimenQ:newSq, specimenStep:qStep+1};
                            if (qDef.id==="q0") patch.typeId = opt.typeId;
                            upd(patch);
                          }} style={{background:isSel?"rgba(255,107,53,.08)":"var(--sur2)",border:isSel?"2px solid var(--ac)":"1px solid var(--bdr)",borderRadius:8,padding:qDef.options.length>4?"8px 12px":"13px 14px",cursor:"pointer",transition:"all .15s"}}>
                            <div style={{fontWeight:700,fontSize:qDef.options.length>4?".82rem":".9rem",color:isSel?"var(--ac)":"var(--tx)",marginBottom:2}}>{opt.label}</div>
                            <div style={{fontSize:qDef.options.length>4?".68rem":".73rem",color:"var(--dm)",lineHeight:1.45}}>{opt.desc}</div>
                          </div>
                        );
                      })}
                    </div>
                    {qStep > 0 && BackLink(qStep - 1)}
                  </div>
                );
              })()}
              {allQDone && (
                <div>
                  <div style={{fontSize:".95rem",fontWeight:600,color:"var(--tx)",marginBottom:10,lineHeight:1.4}}>What is this creature called?</div>
                  <input className="txt" value={s.name} onChange={e => upd({name:e.target.value})} placeholder="Give it a name..." style={{fontSize:"1.1rem",padding:"12px 14px",marginBottom:8}} />
                  <div style={{fontSize:".72rem",color:"var(--dm)",lineHeight:1.5,marginBottom:16}}>A name given after understanding. It will carry forward.</div>
                  {s.name && s.name.trim() && (
                    <button className="btn btn-p" style={{width:"100%",padding:"11px",fontSize:".7rem",letterSpacing:".1em"}} onClick={() => goToStep(1)}>Begin Evolution →</button>
                  )}
                  {BackLink(-1)}
                </div>
              )}
            </div>
          </div>
        );
      }

      // ── BODY & MOTION ──
      case 1: {
        const bmStep = s.bodyMotionStep || 0;
        const hdValue = s.hdChoice || "1d4";
        const hdCost = hdTotalCost(hdValue);
        const sizeValue = sz ? sz.name : null;
        const moveNames = s.moves.map(id => { const m=MOVES.find(x=>x.id===id); return m?m.name:""; });
        const quickCount = s.moveCounts.quick || 0;
        if (quickCount > 0) moveNames.unshift("Quick ×"+quickCount);
        const moveValue = moveNames.length > 0 ? moveNames.join(", ") : "Walk only";

        function BMChip({label, value, onEdit}) {
          return (
            <div onClick={onEdit} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 10px",background:"var(--sur2)",border:"1px solid var(--bdr)",borderRadius:6,cursor:"pointer",marginBottom:4,transition:"border-color .15s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--ac)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="var(--bdr)"}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontFamily:"'Orbitron',monospace",fontSize:".5rem",color:"var(--dm)",letterSpacing:".12em",textTransform:"uppercase"}}>{label}</span>
                <span style={{fontSize:".8rem",fontWeight:600,color:"var(--tx)"}}>{value}</span>
              </div>
              <span style={{fontSize:".6rem",color:"var(--dm)",opacity:.4}}>✎</span>
            </div>
          );
        }
        function ConfirmBtn({label, onClick}) {
          return <button className="btn btn-p" style={{width:"100%",padding:"10px",fontSize:".7rem",letterSpacing:".1em",marginTop:14}} onClick={onClick}>{label}</button>;
        }
        function BMBack({toStep, label}) {
          return (
            <div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",marginTop:16,opacity:.6}} onClick={() => upd({bodyMotionStep:toStep})}>
              <span style={{fontSize:"1rem",color:"var(--dm)"}}>‹</span>
              <span style={{fontFamily:"'Orbitron',monospace",fontSize:".6rem",color:"var(--dm)",letterSpacing:".1em"}}>BACK TO {label.toUpperCase()}</span>
            </div>
          );
        }

        return (
          <div className="panel">
            <div className="ph"><h2>Body & Motion</h2></div>
            <div className="pb">
              {bmStep > 0 && <BMChip label="Hit Die" value={hdValue+(hdCost>0?" ("+hdCost+" EP)":"")} onEdit={() => upd({bodyMotionStep:0})} />}
              {bmStep > 1 && <BMChip label="Size" value={sizeValue||"—"} onEdit={() => upd({bodyMotionStep:1})} />}
              {bmStep > 2 && <BMChip label="Movement" value={moveValue} onEdit={() => upd({bodyMotionStep:2})} />}

              {bmStep === 0 && (() => {
                const hd = s.hdChoice || "1d4";
                const dieIdx = HD_LIST.indexOf(hd);
                const totalCost = hdTotalCost(hd);
                return (
                  <div>
                    <div className="sec" style={{marginBottom:14}}>Hit Die</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                      <button onClick={() => { if(dieIdx>0) upd({hdChoice:HD_LIST[dieIdx-1]}); }} style={{background:"none",border:"1px solid var(--bdr)",borderRadius:"50%",width:40,height:40,color:"var(--dm)",fontSize:"1.2rem",cursor:"pointer"}}>‹</button>
                      <div style={{textAlign:"center",flex:1}}>
                        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"2.4rem",color:"var(--gd)"}}>{hd}</div>
                        <div style={{fontSize:".65rem",color:totalCost>0?"var(--ac3)":"var(--dm)",marginTop:8,fontFamily:"'Orbitron',monospace"}}>{totalCost>0?totalCost+" EP total":"base — free"}</div>
                        <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:10}}>
                          {HD_LIST.map((d,i) => <div key={d} style={{width:6,height:6,borderRadius:"50%",background:i===dieIdx?"var(--ac)":"var(--bdr)",transition:"background .15s"}} />)}
                        </div>
                      </div>
                      <button onClick={() => { if(dieIdx<HD_LIST.length-1) upd({hdChoice:HD_LIST[dieIdx+1]}); }} style={{background:"none",border:"1px solid var(--bdr)",borderRadius:"50%",width:40,height:40,color:"var(--dm)",fontSize:"1.2rem",cursor:"pointer"}}>›</button>
                    </div>
                    <ConfirmBtn label="Confirm Hit Die →" onClick={() => upd({bodyMotionStep:1})} />
                  </div>
                );
              })()}

              {bmStep === 1 && (
                <div>
                  <div className="sec" style={{marginBottom:12}}>Size</div>
                  <div className="cards">
                    {SIZES.map(item => {
                      const isSel = s.sizeId === item.id;
                      return (
                        <div key={item.id} onClick={() => { upd({sizeId:item.id}); if(!item.choose2) setTimeout(()=>upd({bodyMotionStep:2}),200); }}
                          style={{background:isSel?"rgba(255,107,53,.08)":"var(--sur2)",border:isSel?"2px solid var(--ac)":"1px solid var(--bdr)",borderRadius:8,padding:"11px",cursor:"pointer",transition:"all .15s",position:"relative"}}>
                          <div style={{fontWeight:600,fontSize:".88rem",color:isSel?"var(--ac)":"var(--tx)",marginBottom:2}}>{item.name}</div>
                          <div style={{fontFamily:"'Orbitron',monospace",fontSize:".58rem",color:"var(--ac3)",marginBottom:3}}>{item.cost===0?"Free":item.cost+" EP"}</div>
                          <div style={{fontSize:".65rem",color:"var(--ac)",marginBottom:3}}>{item.mods}</div>
                          <div style={{fontSize:".65rem",color:"var(--dm)",lineHeight:1.4}}>{item.traits}</div>
                        </div>
                      );
                    })}
                  </div>
                  {sz && sz.choose2 && (
                    <div style={{marginTop:10,padding:"10px 12px",background:"rgba(255,107,53,.04)",border:"1px solid rgba(255,107,53,.15)",borderRadius:8}}>
                      <div className="sec" style={{marginBottom:8}}>Medium Bonus — Choose 2 stats for +1 each</div>
                      <div style={{display:"flex",gap:8,marginBottom:10}}>
                        <select value={s.medBonus[0]||"STR"} onChange={e=>upd({medBonus:[e.target.value,s.medBonus[1]||"DEX"]})}>
                          {STAT_KEYS.map(k => <option key={k} value={k}>{k}</option>)}
                        </select>
                        <select value={s.medBonus[1]||"DEX"} onChange={e=>upd({medBonus:[s.medBonus[0]||"STR",e.target.value]})}>
                          {STAT_KEYS.map(k => <option key={k} value={k}>{k}</option>)}
                        </select>
                      </div>
                      <ConfirmBtn label="Confirm Size →" onClick={() => upd({bodyMotionStep:2})} />
                    </div>
                  )}
                  <BMBack toStep={0} label="Hit Die" />
                </div>
              )}

              {bmStep === 2 && (
                <div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div className="sec" style={{marginBottom:0}}>Speed & Movement</div>
                    <div style={{fontFamily:"'Orbitron',monospace",fontSize:"1.2rem",fontWeight:900,color:"var(--ac)"}}>{spd}ft</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:"var(--sur2)",border:"1px solid var(--bdr)",borderRadius:8,marginBottom:10}}>
                    <div>
                      <div style={{fontSize:".8rem",fontWeight:600,color:"var(--tx)",marginBottom:1}}>Quick</div>
                      <div style={{fontSize:".62rem",color:"var(--dm)"}}>+5ft per stack · escalating cost</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                      <button className="sub-btn" style={{padding:"3px 13px",fontSize:"1.1rem",lineHeight:1,opacity:quickCount>0?1:.3}} onClick={() => { const mc=Object.assign({},s.moveCounts); mc.quick=Math.max(0,(mc.quick||0)-1); upd({moveCounts:mc}); }}>−</button>
                      <div style={{textAlign:"center",minWidth:28}}>
                        <div style={{fontFamily:"'Orbitron',monospace",fontSize:"1rem",color:"var(--ac)"}}>{quickCount}</div>
                        {quickCount>0 && <div style={{fontSize:".55rem",color:"var(--ac3)"}}>{quickTotalCost(quickCount)} EP</div>}
                      </div>
                      <button className="sub-btn sa" style={{padding:"3px 13px",fontSize:"1.1rem",lineHeight:1}} onClick={() => { const mc=Object.assign({},s.moveCounts); mc.quick=(mc.quick||0)+1; upd({moveCounts:mc}); }}>+</button>
                    </div>
                  </div>
                  <div className="cards">
                    {MOVES.filter(item => item.id !== "quick").map(item => {
                      const isSel = s.moves.includes(item.id);
                      return <Card key={item.id} item={item} selected={isSel} multi={true} onClick={() => upd({moves:toggle(s.moves,item.id)})} />;
                    })}
                  </div>
                  <ConfirmBtn label="Confirm Movement →" onClick={() => upd({bodyMotionStep:3})} />
                  <BMBack toStep={1} label="Size" />
                </div>
              )}

              {bmStep === 3 && (
                <div style={{textAlign:"center",padding:"20px 0"}}>
                  <div style={{fontFamily:"'Orbitron',monospace",fontSize:".65rem",color:"var(--gr)",letterSpacing:".2em",marginBottom:8}}>BODY CONFIGURED</div>
                  <div style={{fontSize:".8rem",color:"var(--dm)",marginBottom:16}}>Continue to Stats to assign your ability scores.</div>
                  <button className="btn btn-p" style={{width:"100%",padding:"11px",fontSize:".7rem",letterSpacing:".1em"}} onClick={() => goToStep(2)}>Continue to Stats →</button>
                  <BMBack toStep={2} label="Movement" />
                </div>
              )}
            </div>
          </div>
        );
      }

      // ── STATS ──
      case 2: {
        const ARRAY_VALUES = [16,15,14,12,10,8];
        const assigned = s.statAssign || {};
        const pending = s.statPending !== undefined ? s.statPending : null;
        const usedValues = Object.values(assigned);
        const epBonuses = s.statEPBonuses || {};
        const totalBuys = Object.values(epBonuses).reduce((t,v)=>t+(v||0),0);
        const totalEPCost = (() => { let t=0; for(let i=0;i<totalBuys;i++) t+=i===0?5:i===1?10:20; return t; })();
        const nextEPCost = totalBuys===0?5:totalBuys===1?10:20;
        const allAssigned = ARRAY_VALUES.every(v => usedValues.includes(v));

        function selectValue(v) { if (pending===v) { upd({statPending:null}); return; } upd({statPending:v}); }
        function assignStat(k) { if (pending===null) return; const na=Object.assign({},assigned); na[k]=pending; upd({statAssign:na,statPending:null}); }
        function clearStat(k) { const na=Object.assign({},assigned); delete na[k]; upd({statAssign:na,statPending:null}); }

        return (
          <div className="panel">
            <div className="ph"><h2>Ability Scores</h2></div>
            <div className="pb">
              <div className="sec" style={{marginBottom:10}}>Standard Array — tap a value, then tap a stat</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                {ARRAY_VALUES.map(v => {
                  const used = usedValues.includes(v);
                  const isSel = pending === v;
                  return (
                    <div key={v} onClick={() => !used && selectValue(v)} style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:"1rem",padding:"8px 14px",borderRadius:8,cursor:used?"default":"pointer",border:isSel?"2px solid var(--ac)":"1px solid var(--bdr)",background:isSel?"rgba(255,107,53,.12)":used?"rgba(255,255,255,.03)":"var(--sur2)",color:used?"var(--dm)":isSel?"var(--ac)":"var(--tx)",textDecoration:used?"line-through":"none",transition:"all .15s"}}>
                      {v}
                    </div>
                  );
                })}
              </div>
              <div className="stats-g">
                {STAT_KEYS.map(k => {
                  const base = assigned[k] || null;
                  const epB = epBonuses[k] || 0;
                  const sizeB = bonuses[k] || 0;
                  const final = base ? base + sizeB + epB : null;
                  const isTarget = pending !== null && !base;
                  return (
                    <div key={k} style={{background:isTarget?"rgba(255,107,53,.05)":"var(--sur2)",border:isTarget?"1px dashed var(--ac)":"1px solid var(--bdr)",borderRadius:8,padding:"10px 8px",textAlign:"center",transition:"all .15s",position:"relative"}}>
                      <div style={{fontFamily:"'Orbitron',monospace",fontSize:".56rem",color:"var(--dm)",marginBottom:3}}>{k}</div>
                      {final !== null ? <>
                        <div onClick={() => { if(pending===null) clearStat(k); }} style={{cursor:"pointer"}}>
                          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"1.5rem",color:"var(--tx)"}}>{final}</div>
                          <div style={{fontSize:".65rem",color:"var(--dm)",marginTop:2}}>{fmtMod(statMod(final))}</div>
                          {(sizeB!==0||epB!==0) && <div style={{fontSize:".52rem",color:"var(--ac3)",marginTop:1}}>{base}{sizeB!==0?(sizeB>0?" +"+sizeB:" "+sizeB):""}{epB>0?" +"+epB:""}</div>}
                          <div style={{position:"absolute",top:5,right:7,fontSize:".52rem",color:"var(--dm)",opacity:.4}}>×</div>
                        </div>
                        <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:8,borderTop:"1px solid var(--bdr)",paddingTop:6}}>
                          <button className="sub-btn" style={{padding:"1px 8px",opacity:epB>0?1:.2,fontSize:".85rem"}} onClick={e=>{e.stopPropagation();const nb=Object.assign({},epBonuses);nb[k]=Math.max(0,(nb[k]||0)-1);upd({statEPBonuses:nb});}}>−</button>
                          <span style={{fontFamily:"'Orbitron',monospace",fontSize:".65rem",color:epB>0?"var(--ac3)":"var(--dm)",minWidth:16,textAlign:"center",paddingTop:2}}>{epB}</span>
                          <button className="sub-btn sa" style={{padding:"1px 8px",fontSize:".85rem"}} onClick={e=>{e.stopPropagation();const nb=Object.assign({},epBonuses);nb[k]=(nb[k]||0)+1;upd({statEPBonuses:nb});}}>+</button>
                        </div>
                      </> : <div onClick={() => { if(pending!==null) assignStat(k); }} style={{cursor:isTarget?"pointer":"default"}}>
                        <div style={{fontFamily:"'Orbitron',monospace",fontSize:"1.4rem",color:isTarget?"var(--ac)":"var(--bdr)"}}>—</div>
                      </div>}
                    </div>
                  );
                })}
              </div>
              {allAssigned && totalBuys > 0 && <div style={{fontSize:".62rem",color:"var(--ac2)",textAlign:"center",marginTop:6,opacity:.7}}>{totalBuys} EP boost{totalBuys!==1?"s":""} · {totalEPCost} EP · next {nextEPCost} EP</div>}
              {pending !== null && <div style={{marginTop:10,fontSize:".72rem",color:"var(--ac)",textAlign:"center",letterSpacing:".05em"}}>Placing <strong style={{fontFamily:"'Orbitron',monospace"}}>{pending}</strong> — tap a stat box</div>}
              {allAssigned && pending === null && <button className="btn btn-p" style={{width:"100%",padding:"11px",fontSize:".7rem",letterSpacing:".1em",marginTop:14}} onClick={() => goToStep(3)}>Confirm Stats →</button>}
            </div>
          </div>
        );
      }

      // ── ABILITIES ──
      case 3: {
        const NEEDS_ATTACK = ["Offense","Controller","Tank"];
        const NEEDS_DIE_A = ["Offense","AOE","Heal","Controller","Tank"];
        const NEEDS_DIE_B = ["Offense","AOE"];
        const NEEDS_DIE_R = ["Offense","AOE","Heal","Controller","Tank"];
        const AOE_SHAPES = [
          {id:"line",label:"25ft Line",desc:"5ft wide, 25ft long from you."},
          {id:"cone",label:"15ft Cone",desc:"15ft cone in a chosen direction."},
          {id:"burst",label:"10ft Radius",desc:"Centered on you or adjacent point."},
          {id:"splash",label:"Ranged Splash",desc:"Thrown 60ft, 5ft radius on impact."},
        ];

        return (
          <>
            {s.slots.map((slot, idx) => {
              const isCollapsed = collapsedSlots[idx];
              const slotStat = slot.atkStat || null;
              const hasSaveRole = SAVE_ROLES.includes(slot.aRole) || SAVE_ROLES.includes(slot.bRole) || SAVE_ROLES.includes(slot.rRole);
              const pickedTypes = slot._pickedTypes || [];
              const slotNeedsAttack = pickedTypes.some(t => { const rk=t==="a"?"aRole":"rRole"; return NEEDS_ATTACK.includes(slot[rk]); });
              let slotStep = activeSubSlot[idx] !== undefined ? activeSubSlot[idx] : 0;

              function goSlotStep(n) { setActiveSubSlot(prev => { const x=Object.assign({},prev); x[idx]=n; return x; }); }

              function BackBar(toStep, label, clearPatch) {
                return (
                  <div style={{borderTop:"1px solid var(--bdr)",marginTop:16,paddingTop:12,display:"flex",alignItems:"center",gap:6,cursor:"pointer",opacity:.6}} onClick={() => { if(clearPatch) updSlot(idx,clearPatch); goSlotStep(toStep); }}>
                    <span style={{fontSize:"1rem",color:"var(--dm)"}}>‹</span>
                    <span style={{fontSize:".65rem",color:"var(--dm)",fontFamily:"'Orbitron',monospace",letterSpacing:".1em"}}>{label.toUpperCase()}</span>
                  </div>
                );
              }

              const primaryRole = slot.aRole!=="--"?slot.aRole:slot.rRole!=="--"?slot.rRole:slot.bRole;
              const attackWord = slot.attackType==="ranged"?"Ranged":"Melee";
              const slotTitle = primaryRole && primaryRole!=="--" ? (slotNeedsAttack?attackWord+" "+primaryRole:primaryRole) : "Unconfigured Slot";
              const atkMod = slot.atkStat ? statMod(fs[slot.atkStat]) : 0;
              const bAtkMod = statMod(fs[slot.bAtkStat||(slot.bAttackType==="ranged"?"DEX":"STR")]);
              const healMod = statMod(fs["CON"]);

              function roleMod(role, typeKey) {
                const mod = typeKey==="b"?bAtkMod:atkMod;
                if (["Offense","AOE","Controller","Tank","Support"].includes(role)) return fmtMod(mod);
                if (["Heal"].includes(role)) return fmtMod(healMod);
                return null;
              }
              function shortDesc(role, typeKey) {
                const det = (ROLE_DETAIL[role]||{})[typeKey] || "";
                const dieSrc = typeKey==="a"?(slot.aDie||"1d4"):typeKey==="b"?(slot.bDie||slot.aDie||"1d4"):(slot.rDie||"1d4");
                const mod = roleMod(role)||"";
                return det.split(".")[0]
                  .replace("damage die damage", dieSrc+" "+mod)
                  .replace("damage die HP", dieSrc+" "+mod)
                  .replace("damage die", dieSrc+(mod?" "+mod:""))
                  .replace("Melee attack (5ft) or Ranged attack (60ft)", attackWord+" attack");
              }

              if (isCollapsed) return (
                <div key={idx} className="panel" style={{borderColor:"var(--gr)",cursor:"pointer"}} onClick={() => setCollapsedSlots(p=>{const n=Object.assign({},p);n[idx]=false;return n;})}>
                  <div style={{padding:"12px 16px 14px"}}>
                    <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8}}>
                      <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"1rem",color:"var(--gr)"}}>{slotTitle}</div>
                      <div style={{fontSize:".6rem",color:"var(--dm)",fontFamily:"'Orbitron',monospace",letterSpacing:".1em"}}>tap to edit</div>
                    </div>
                    {slotNeedsAttack && (
                      <div style={{fontSize:".75rem",color:"var(--dm)",marginBottom:10,borderBottom:"1px solid var(--bdr)",paddingBottom:8}}>
                        <span style={{color:"var(--ac3)",fontWeight:600}}>{slot.atkStat||slotStat}</span>
                        <span style={{color:"var(--ac3)",fontWeight:600,marginLeft:4}}>{fmtMod(atkMod)}</span>
                        <span style={{margin:"0 6px",opacity:.4}}>·</span>
                        <span>{slot.dmgType||"—"}</span>
                        {hasSaveRole && <><span style={{margin:"0 6px",opacity:.4}}>·</span><span style={{color:"var(--gr)"}}>DC {8+3+atkMod}</span></>}
                      </div>
                    )}
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {slot.aRole !== "--" && (
                        <div>
                          <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:3}}>
                            <span style={{fontFamily:"'Orbitron',monospace",fontSize:".52rem",color:"var(--ac)",letterSpacing:".1em"}}>ACTION</span>
                            <span style={{fontSize:".8rem",color:"var(--tx)",fontWeight:600}}>{slot.aRole}</span>
                            {slot.aDie && roleMod(slot.aRole,"a") && <span style={{fontFamily:"'Orbitron',monospace",fontSize:".7rem",color:"var(--gd)"}}>{slot.aDie} {roleMod(slot.aRole,"a")}</span>}
                          </div>
                          <div style={{fontSize:".7rem",color:"var(--dm)",lineHeight:1.45,paddingLeft:36}}>{shortDesc(slot.aRole,"a")}</div>
                        </div>
                      )}
                      {slot.bRole !== "--" && (
                        <div>
                          <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:3}}>
                            <span style={{fontFamily:"'Orbitron',monospace",fontSize:".52rem",color:"var(--ac2)",letterSpacing:".1em"}}>BONUS</span>
                            <span style={{fontSize:".8rem",color:"var(--tx)",fontWeight:600}}>{slot.bRole}</span>
                          </div>
                          <div style={{fontSize:".7rem",color:"var(--dm)",lineHeight:1.45,paddingLeft:36}}>{shortDesc(slot.bRole,"b")}</div>
                        </div>
                      )}
                      {slot.rRole !== "--" && (
                        <div>
                          <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:3}}>
                            <span style={{fontFamily:"'Orbitron',monospace",fontSize:".52rem",color:"var(--ac3)",letterSpacing:".1em"}}>REACTION</span>
                            <span style={{fontSize:".8rem",color:"var(--tx)",fontWeight:600}}>{slot.rRole}</span>
                          </div>
                          <div style={{fontSize:".7rem",color:"var(--dm)",lineHeight:1.45,paddingLeft:36}}>{shortDesc(slot.rRole,"r")}</div>
                        </div>
                      )}
                    </div>
                    <div style={{fontSize:".6rem",color:"var(--dm)",marginTop:10,textAlign:"right",opacity:.4}}>tap to expand</div>
                  </div>
                </div>
              );

              return (
                <div key={idx} className="panel" style={{borderColor:idx===0?"var(--bdr)":"rgba(255,107,53,.25)"}}>
                  <div className="ph" style={{gap:8}}>
                    <h2 style={{fontFamily:"'Orbitron',monospace",fontSize:".65rem",fontWeight:600,letterSpacing:".15em"}}>SLOT {idx+1}</h2>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:"auto"}}>
                      <span style={{fontSize:".58rem",color:"var(--dm)"}}>×2 use</span>
                      <div className={"tog"+(slot.dbl?" on":"")} onClick={() => updSlot(idx,{dbl:!slot.dbl})} />
                    </div>
                    {idx > 0 && <button className="btn btn-d" style={{marginLeft:4}} onClick={() => { setS(prev=>{const ns=Object.assign({},prev);ns.slots=prev.slots.filter((_,i)=>i!==idx);return ns;}); setActiveSubSlot(prev=>{const n=Object.assign({},prev);delete n[idx];return n;}); }}>Remove</button>}
                  </div>
                  <div className="pb">
                    {slotStep === 0 && (
                      <div>
                        <div className="sec" style={{marginBottom:10}}>What will this slot do?</div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                          {[{key:"a",label:"Action",desc:"Your main move each turn."},{key:"b",label:"Bonus",desc:"A secondary effect."},{key:"r",label:"Reaction",desc:"Triggers on others' turns."}].map(t => {
                            const picked = pickedTypes.includes(t.key);
                            return (
                              <div key={t.key} onClick={() => {
                                const cur = slot._pickedTypes || [];
                                if (cur.includes(t.key)) { updSlot(idx,{_pickedTypes:cur.filter(x=>x!==t.key),[t.key==="a"?"aRole":t.key==="b"?"bRole":"rRole"]:"--"}); }
                                else { updSlot(idx,{_pickedTypes:cur.concat([t.key])}); setTimeout(()=>goSlotStep(1),180); }
                              }} style={{background:picked?"rgba(255,107,53,.1)":"var(--sur2)",border:picked?"2px solid var(--ac)":"1px solid var(--bdr)",borderRadius:8,padding:"12px 8px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
                                <div style={{fontWeight:700,fontSize:".9rem",color:picked?"var(--ac)":"var(--tx)",marginBottom:3}}>{t.label}</div>
                                <div style={{fontSize:".62rem",color:"var(--dm)",lineHeight:1.4}}>{t.desc}</div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {slotStep === 1 && (
                      <div>
                        {pickedTypes.map(typeKey => {
                          const label = typeKey==="a"?"Action":typeKey==="b"?"Bonus Action":"Reaction";
                          const rKey = typeKey==="a"?"aRole":typeKey==="b"?"bRole":"rRole";
                          const cardCls = typeKey==="a"?"rsa":typeKey==="b"?"rsb":"rsr";
                          const acCol = typeKey==="a"?"var(--ac)":typeKey==="b"?"var(--ac2)":"var(--ac3)";
                          const selectedRole = slot[rKey];
                          return (
                            <div key={typeKey} style={{marginBottom:16}}>
                              <div className="sec" style={{marginBottom:8,color:acCol}}>{label}</div>
                              <div className="role-cards">
                                {ROLES.map(role => {
                                  const det = (ROLE_DETAIL[role]||{})[typeKey] || "";
                                  const isSel = selectedRole === role;
                                  return (
                                    <div key={role}>
                                      <div className={"role-card"+(isSel?" "+cardCls:"")} onClick={() => {
                                        const patch = {[rKey]:isSel?"--":role};
                                        if (role!=="AOE") patch.aoeShape = null;
                                        updSlot(idx,patch);
                                        if (!isSel) {
                                          const updated = Object.assign({},slot,patch);
                                          const allDone = pickedTypes.every(t=>{const rk=t==="a"?"aRole":t==="b"?"bRole":"rRole";return updated[rk]&&updated[rk]!=="--";});
                                          if (allDone) {
                                            const needsAtk = pickedTypes.some(t=>{const rk=t==="a"?"aRole":"rRole";return NEEDS_ATTACK.includes(updated[rk]);});
                                            const needsShape = pickedTypes.some(t=>{const rk=t==="a"?"aRole":"rRole";return updated[rk]==="AOE";});
                                            const needsHeal = pickedTypes.some(t=>{const rk=t==="a"?"aRole":t==="b"?"bRole":"rRole";return updated[rk]==="Heal";});
                                            const needsSave = pickedTypes.some(t=>{const rk=t==="a"?"aRole":t==="b"?"bRole":"rRole";return SAVE_ROLES.includes(updated[rk]);});
                                            const nextStep = needsAtk?3:needsShape?2:needsHeal?3:needsSave?3:4;
                                            setTimeout(()=>goSlotStep(nextStep),180);
                                          }
                                        }
                                      }}>
                                        <div className="role-name">{role}</div>
                                        {det && <div className="role-det">{det}</div>}
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          );
                        })}
                        {BackBar(0,"← Change types",{_pickedTypes:[],aRole:"--",bRole:"--",rRole:"--"})}
                      </div>
                    )}

                    {slotStep === 2 && (
                      <div>
                        <div className="sec" style={{marginBottom:10}}>AOE Shape</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                          {AOE_SHAPES.map(shape => {
                            const isSel = slot.aoeShape === shape.id;
                            return (
                              <div key={shape.id} onClick={() => { updSlot(idx,{aoeShape:shape.id}); setTimeout(()=>goSlotStep(3),180); }} style={{background:isSel?"rgba(255,107,53,.1)":"var(--sur2)",border:isSel?"2px solid var(--ac)":"1px solid var(--bdr)",borderRadius:8,padding:"12px 10px",cursor:"pointer",transition:"all .15s"}}>
                                <div style={{fontWeight:700,fontSize:".85rem",color:isSel?"var(--ac)":"var(--tx)",marginBottom:4}}>{shape.label}</div>
                                <div style={{fontSize:".62rem",color:"var(--dm)",lineHeight:1.4}}>{shape.desc}</div>
                              </div>
                            );
                          })}
                        </div>
                        {BackBar(1,"← Change roles",{aoeShape:null})}
                      </div>
                    )}

                    {slotStep === 3 && (
                      <div>
                        <div className="sec" style={{marginBottom:10}}>Attack Setup</div>
                        {pickedTypes.includes("a") && NEEDS_ATTACK.includes(slot.aRole) && <>
                          <div style={{fontSize:".65rem",color:"var(--ac)",fontFamily:"'Orbitron',monospace",letterSpacing:".1em",marginBottom:8}}>ACTION ATTACK</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:slot.attackType?12:0}}>
                            {["melee","ranged"].map(t => {
                              const isSel = slot.attackType===t;
                              return (
                                <div key={t} onClick={() => updSlot(idx,{attackType:t,atkStat:null,dmgType:null})} style={{background:isSel?"rgba(255,107,53,.1)":"var(--sur2)",border:isSel?"2px solid var(--ac)":"1px solid var(--bdr)",borderRadius:8,padding:"12px 10px",cursor:"pointer",transition:"all .15s",textAlign:"center"}}>
                                  <div style={{fontWeight:700,fontSize:".9rem",color:isSel?"var(--ac)":"var(--tx)",marginBottom:2,textTransform:"capitalize"}}>{t}</div>
                                  <div style={{fontSize:".62rem",color:"var(--dm)"}}>{t==="ranged"?"60ft range":"5ft reach"}</div>
                                </div>
                              );
                            })}
                          </div>
                          {slot.attackType && (
                            <div style={{marginBottom:16}}>
                              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                                <StatPicker value={slot.atkStat||null} onChange={k=>{ updSlot(idx,{atkStat:k}); if(k&&slot.dmgType) setTimeout(()=>goSlotStep(4),180); }} />
                                <DmgTypePicker value={slot.dmgType||null} onChange={t=>{ updSlot(idx,{dmgType:t}); if(t&&slot.atkStat) setTimeout(()=>goSlotStep(4),180); }} />
                              </div>
                            </div>
                          )}
                        </>}
                        {pickedTypes.some(t=>{ const rk=t==="a"?"aRole":t==="b"?"bRole":"rRole"; return slot[rk]==="Heal"; }) && <>
                          <div style={{fontSize:".65rem",color:"var(--gr)",fontFamily:"'Orbitron',monospace",letterSpacing:".1em",marginBottom:8,marginTop:slot.aRole&&NEEDS_ATTACK.includes(slot.aRole)?12:0}}>HEAL SETUP</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:slot.healType?12:0}}>
                            {["melee","ranged"].map(t=>{const isSel=slot.healType===t;return(
                              <div key={t} onClick={()=>updSlot(idx,{healType:t})} style={{background:isSel?"rgba(255,170,0,.12)":"var(--sur2)",border:isSel?"2px solid var(--gr)":"1px solid var(--bdr)",borderRadius:8,padding:"12px 10px",cursor:"pointer",textAlign:"center"}}>
                                <div style={{fontWeight:700,fontSize:".9rem",color:isSel?"var(--gr)":"var(--tx)",marginBottom:2,textTransform:"capitalize"}}>{t}</div>
                                <div style={{fontSize:".62rem",color:"var(--dm)"}}>{t==="melee"?"5ft · +1 die":"30ft · no bonus"}</div>
                              </div>
                            );})}
                          </div>
                          {slot.healType && <>
                            <div className="sec" style={{marginBottom:8}}>Heal Stat</div>
                            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:16}}>
                              {["STR","DEX","CON","INT","WIS","CHA"].map(k=>{const isSel=(slot.healStat||"CON")===k;return(
                                <div key={k} onClick={()=>{ updSlot(idx,{healStat:k}); setTimeout(()=>goSlotStep(4),180); }} style={{background:isSel?"rgba(255,170,0,.12)":"var(--sur2)",border:isSel?"2px solid var(--gr)":"1px solid var(--bdr)",borderRadius:7,padding:"8px 4px",cursor:"pointer",textAlign:"center"}}>
                                  <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:".75rem",color:isSel?"var(--gr)":"var(--tx)"}}>{k}</div>
                                </div>
                              );})}
                            </div>
                          </>}
                        </>}
                        {pickedTypes.some(t=>{ const rk=t==="a"?"aRole":t==="b"?"bRole":"rRole"; return SAVE_ROLES.includes(slot[rk]) && slot[rk]!=="AOE"; }) && <>
                          <div style={{fontSize:".65rem",color:"var(--ac3)",fontFamily:"'Orbitron',monospace",letterSpacing:".1em",marginBottom:8,marginTop:8}}>SAVE SETUP</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
                            <StatPicker value={slot.atkStat||null} onChange={k=>{ updSlot(idx,{atkStat:k}); if(k&&slot.dmgType) setTimeout(()=>goSlotStep(4),180); }} />
                            <DmgTypePicker value={slot.dmgType||null} onChange={t=>{ updSlot(idx,{dmgType:t}); if(t&&slot.atkStat) setTimeout(()=>goSlotStep(4),180); }} />
                          </div>
                        </>}
                        {pickedTypes.some(t=>{ const rk=t==="a"?"aRole":t==="b"?"bRole":"rRole"; return slot[rk]==="AOE"; }) && <>
                          <div style={{fontSize:".65rem",color:"var(--ac3)",fontFamily:"'Orbitron',monospace",letterSpacing:".1em",marginBottom:8,marginTop:8}}>AOE SETUP</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
                            <StatPicker value={slot.atkStat||null} onChange={k=>{ updSlot(idx,{atkStat:k}); if(k&&slot.dmgType) setTimeout(()=>goSlotStep(4),180); }} />
                            <DmgTypePicker value={slot.dmgType||null} onChange={t=>{ updSlot(idx,{dmgType:t}); if(t&&slot.atkStat) setTimeout(()=>goSlotStep(4),180); }} />
                          </div>
                        </>}
                        {BackBar(1,"← Change roles",{attackType:null,atkStat:null,dmgType:null,healType:null,healStat:null})}
                      </div>
                    )}

                    {slotStep === 4 && (
                      <div>
                        {pickedTypes.filter(t => { const rk=t==="a"?"aRole":t==="b"?"bRole":"rRole"; const nk=t==="a"?NEEDS_DIE_A:t==="b"?NEEDS_DIE_B:NEEDS_DIE_R; return nk.includes(slot[rk]); }).map(typeKey => {
                          const label = typeKey==="a"?"Action":typeKey==="b"?"Bonus Action":"Reaction";
                          const dieKey = typeKey==="a"?"aDie":typeKey==="b"?"bDie":"rDie";
                          const roleDie = slot[dieKey]||"1d4";
                          const dieIdx = DIE_LIST.indexOf(roleDie);
                          const totalCost = dieTotalCost(roleDie);
                          return (
                            <div key={typeKey} style={{marginBottom:16}}>
                              <div className="sec" style={{marginBottom:12}}>{label} — Damage Die</div>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                                <button onClick={() => { if(dieIdx>0) updSlot(idx,{[dieKey]:DIE_LIST[dieIdx-1]}); }} style={{background:"none",border:"1px solid var(--bdr)",borderRadius:"50%",width:36,height:36,color:"var(--dm)",fontSize:"1.1rem",cursor:"pointer"}}>‹</button>
                                <div style={{textAlign:"center",flex:1}}>
                                  <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:"2rem",color:"var(--gd)"}}>{roleDie}</div>
                                  <div style={{fontSize:".65rem",color:totalCost>0?"var(--ac3)":"var(--dm)",marginTop:6,fontFamily:"'Orbitron',monospace"}}>{totalCost>0?totalCost+" EP total":"base — free"}</div>
                                </div>
                                <button onClick={() => { if(dieIdx<DIE_LIST.length-1) updSlot(idx,{[dieKey]:DIE_LIST[dieIdx+1]}); }} style={{background:"none",border:"1px solid var(--bdr)",borderRadius:"50%",width:36,height:36,color:"var(--dm)",fontSize:"1.1rem",cursor:"pointer"}}>›</button>
                              </div>
                              <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:12}}>
                                {DIE_LIST.map((d,i) => <div key={d} style={{width:6,height:6,borderRadius:"50%",background:i===dieIdx?"var(--ac)":"var(--bdr)",transition:"background .15s"}} />)}
                              </div>
                            </div>
                          );
                        })}
                        <button className="btn btn-p" style={{width:"100%",padding:"11px",fontSize:".7rem",letterSpacing:".1em",marginTop:8}} onClick={() => { setActiveSubSlot(prev=>{const n=Object.assign({},prev);n[idx]=5;return n;}); setCollapsedSlots(prev=>{const n=Object.assign({},prev);n[idx]=true;return n;}); }}>✓ Confirm Slot</button>
                        {BackBar(slotNeedsAttack||SAVE_ROLES.some(r=>r===slot.aRole||r===slot.bRole||r===slot.rRole)?3:1, slotNeedsAttack||SAVE_ROLES.some(r=>r===slot.aRole||r===slot.bRole||r===slot.rRole)?"← Change setup":"← Change roles", {})}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
            <div className="panel" style={{borderStyle:"dashed",borderColor:"rgba(255,107,53,.25)",cursor:"pointer",marginBottom:10}} onClick={() => setS(prev=>{const ns=Object.assign({},prev);ns.slots=prev.slots.concat([{aRole:"--",bRole:"--",rRole:"--",dbl:false,aDie:"1d4",bDie:"1d4",rDie:"1d4",attackType:null,atkStat:null,dmgType:null,bAttackType:null,bAtkStat:null,bDmgType:null,aoeShape:null,healStat:null,healType:null,_pickedTypes:[]}]);return ns;})}>
              <div className="ph" style={{justifyContent:"center",borderBottom:"none"}}>
                <span style={{fontFamily:"'Orbitron',monospace",fontSize:".65rem",color:"var(--ac)",letterSpacing:".1em"}}>+ ADD SLOT</span>
                <span style={{fontFamily:"'Orbitron',monospace",fontSize:".65rem",color:"var(--ac3)",marginLeft:6}}>+10 EP</span>
              </div>
            </div>
            {collapsedSlots[0] && (
              <button className="btn btn-p" style={{width:"100%",padding:"11px",fontSize:".7rem",letterSpacing:".1em",marginTop:4}} onClick={() => goToStep(4)}>Confirm Abilities →</button>
            )}
          </>
        );
      }

      // ── TRAITS ──
      case 4: {
        const tiers = [10, 15, 20, 25];
        const tierLabels = {10:"10 EP", 15:"15 EP", 20:"20 EP", 25:"25 EP"};
        const traitTiers = s.traitTiers || {10:true,15:false,20:false,25:false};
        function toggleTier(cost) { upd({traitTiers:Object.assign({},traitTiers,{[cost]:!traitTiers[cost]})}); }
        return (
          <div className="panel">
            <div className="ph"><h2>Traits</h2></div>
            <div className="pb">
              {tiers.map(cost => {
                const tierTraits = TRAITS.filter(t => traitCost(t.id, s.typeId) === cost);
                if (tierTraits.length === 0) return null;
                const isOpen = traitTiers[cost];
                const selectedInTier = tierTraits.filter(t => (s.traits||[]).includes(t.id)).length;
                return (
                  <div key={cost} style={{marginBottom:8}}>
                    <div onClick={() => toggleTier(cost)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"var(--sur2)",borderRadius:isOpen?"8px 8px 0 0":"8px",border:"1px solid var(--bdr)",cursor:"pointer",userSelect:"none"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontFamily:"'Orbitron',monospace",fontSize:".62rem",fontWeight:700,color:selectedInTier>0?"var(--ac3)":"var(--dm)"}}>{tierLabels[cost]}</span>
                        {selectedInTier > 0 && <span style={{fontFamily:"'Orbitron',monospace",fontSize:".55rem",background:"rgba(255,107,53,.15)",border:"1px solid rgba(255,107,53,.3)",borderRadius:4,padding:"1px 6px",color:"var(--ac3)"}}>{selectedInTier} selected</span>}
                      </div>
                      <span style={{color:"var(--dm)",fontSize:".8rem",transition:"transform .15s",display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)"}}>›</span>
                    </div>
                    {isOpen && (
                      <div style={{border:"1px solid var(--bdr)",borderTop:"none",borderRadius:"0 0 8px 8px",padding:10}}>
                        <div className="cards">
                          {tierTraits.map(item => {
                            const sel = (s.traits||[]).includes(item.id);
                            const cost2 = traitCost(item.id, s.typeId);
                            const item2 = cost2 !== item.cost ? Object.assign({},item,{cost:cost2}) : item;
                            return <Card key={item.id} item={item2} selected={sel} multi={true} onClick={() => { const cur=s.traits||[]; upd({traits:sel?cur.filter(x=>x!==item.id):cur.concat([item.id])}); }} />;
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
              <button className="btn btn-p" style={{width:"100%",padding:"11px",fontSize:".7rem",letterSpacing:".1em",marginTop:8}} onClick={() => goToStep(5)}>Continue to Defense →</button>
            </div>
          </div>
        );
      }

      // ── DEFENSE ──
      case 5: {
        const elDefs = s.elementalDefenses || [];
        const ELEMENTS = ["Fire","Cold","Acid","Lightning","Thunder","Poison","Psychic","Necrotic"];
        const TIERS = [
          {id:"heat", label:"Affinity", cost:10, disc:5, desc:"Advantage on saves vs. this element."},
          {id:"magma", label:"Resistance", cost:20, disc:5, desc:"Resistance to this element."},
          {id:"obsidian", label:"Immunity", cost:40, disc:15, desc:"Immunity to this element."},
        ];
        const isElemental = specimenTypeId(s) === "elemental";
        function tierCost(el, tierId) {
          let base = TIERS.find(t=>t.id===tierId).cost;
          if (isElemental) base -= TIERS.find(t=>t.id===tierId).disc;
          if (tierId==="obsidian") { const hasResist = elDefs.some(d=>d.element===el&&d.tier==="magma"); if(hasResist) base=Math.max(0,base-5); }
          return Math.max(0,base);
        }
        function addEntry(el, tier) { const next=elDefs.filter(d=>!(d.element===el&&d.tier===tier)); upd({elementalDefenses:next.concat([{element:el,tier}])}); }
        function removeEntry(el, tier) { upd({elementalDefenses:elDefs.filter(d=>!(d.element===el&&d.tier===tier))}); }
        function hasEntry(el, tier) { return elDefs.some(d=>d.element===el&&d.tier===tier); }
        const activeElements = ELEMENTS.filter(el => elDefs.some(d=>d.element===el));

        return (
          <>
            <div className="panel">
              <div className="ph"><h2>Elemental Defense</h2></div>
              <div className="pb">
                {activeElements.length > 0 && (
                  <div style={{marginBottom:14}}>
                    {activeElements.map(el => {
                      return (
                        <div key={el} style={{background:"var(--sur2)",border:"1px solid rgba(255,107,53,.2)",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                            <span style={{fontFamily:"'Orbitron',monospace",fontSize:".72rem",fontWeight:700,color:"var(--ac)"}}>{el}</span>
                            <button onClick={() => upd({elementalDefenses:elDefs.filter(d=>d.element!==el)})} style={{background:"none",border:"none",color:"var(--rd)",fontSize:".65rem",cursor:"pointer",fontFamily:"'Orbitron',monospace"}}>REMOVE</button>
                          </div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            {TIERS.map(tier => {
                              const active = hasEntry(el,tier.id);
                              const cost = tierCost(el,tier.id);
                              return (
                                <div key={tier.id} onClick={() => active?removeEntry(el,tier.id):addEntry(el,tier.id)} style={{flex:1,minWidth:80,background:active?"rgba(255,107,53,.1)":"var(--sur2)",border:active?"2px solid var(--ac)":"1px solid var(--bdr)",borderRadius:7,padding:"8px",cursor:"pointer",textAlign:"center",transition:"all .15s",position:"relative"}}>
                                  <div style={{fontWeight:700,fontSize:".78rem",color:active?"var(--ac)":"var(--tx)",marginBottom:2}}>{tier.label}</div>
                                  <div style={{fontFamily:"'Orbitron',monospace",fontSize:".58rem",color:"var(--ac3)"}}>{cost} EP</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                <div className="sec" style={{marginBottom:8}}>{activeElements.length>0?"Add Another Element":"Choose Element"}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {ELEMENTS.filter(el=>!activeElements.includes(el)).map(el => (
                    <button key={el} className="sub-btn" style={{flex:"none",padding:"7px 14px"}} onClick={() => addEntry(el,"heat")}>+ {el}</button>
                  ))}
                </div>
                {isElemental && <div className="info" style={{marginTop:10,fontSize:".65rem"}}>Elemental type discount applied.</div>}
              </div>
            </div>

            <div className="panel">
              <div className="ph" style={{justifyContent:"space-between"}}><h2>Heightened Reflexes</h2></div>
              <div className="pb">
                {(() => {
                  const isSel = (s.otherDef["reflexes"]||0) > 0;
                  return <>
                    <Card item={OTHER_DEF[0]} selected={isSel} multi={true} onClick={() => { const od=Object.assign({},s.otherDef); od.reflexes=isSel?0:1; upd({otherDef:od, reflexStat:isSel?null:s.reflexStat}); }} />
                    {isSel && !s.reflexStat && (
                      <div style={{marginTop:8,padding:"10px 12px",background:"var(--sur2)",borderRadius:8,border:"1px solid var(--bdr)"}}>
                        <div className="sec" style={{marginBottom:8}}>Choose Saving Throw Stat</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {STAT_KEYS.map(k => <button key={k} className="sub-btn" style={{flex:"none",padding:"5px 12px"}} onClick={() => upd({reflexStat:k})}>{k}</button>)}
                        </div>
                      </div>
                    )}
                    {isSel && s.reflexStat && (
                      <div style={{marginTop:8,padding:"8px 14px",background:"rgba(255,107,53,.08)",borderRadius:7,display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontFamily:"'Orbitron',monospace",fontSize:".75rem",fontWeight:700,color:"var(--ac)"}}>{s.reflexStat} saves</span>
                        <button className="sub-btn" style={{padding:"2px 10px",fontSize:".58rem",borderColor:"var(--rd)",color:"var(--rd)",flex:"none"}} onClick={() => upd({reflexStat:null})}>change</button>
                      </div>
                    )}
                  </>;
                })()}
              </div>
            </div>

            <div className="panel">
              <div className="ph" style={{justifyContent:"space-between"}}>
                <h2>Armor &amp; Saves</h2>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:"1.3rem",fontWeight:600,color:"var(--gd)"}}>{ac !== null ? "AC "+ac : "—"}</div>
              </div>
              <div className="pb">
                <div className="info">Only one armor type. Selection affects AC.</div>
                <div className="cards">
                  {ARMORS.map(item => <Card key={item.id} item={item} selected={s.armorId===item.id} multi={false} onClick={() => upd({armorId:s.armorId===item.id?null:item.id})} />)}
                </div>
                {s.armorId === "adaptive" && (
                  <div style={{marginTop:10}}>
                    <div className="sec">Adaptive Hide: Extra Stat</div>
                    <select value={s.adaptStat} onChange={e=>upd({adaptStat:e.target.value})} style={{maxWidth:120}}>

                {(()=>{

                      const typeStr=["Offense","AOE","Support"].includes(role)?(slot.dmgType||"--"):role==="Heal"?"Heal":role==="Controller"?"Psychic":role==="Tank"?"Push":"--";

                              <div style={{fontFamily:"'Orbitron',monospace",fontSize:".48rem",color:statCol1,opacity:.7,marginBottom:1}}>{role==="Offense"?"HIT":role==="Heal"?"":"DC"}</div>
                              <div style={{fontFamily:"'Orbitron',monospace",fontSize:".88rem",fontWeight:900,color:statCol1}}>{val1}</div>

                              <span style={{fontFamily:"'Orbitron',monospace",fontSize:".82rem",fontWeight:900,color:"var(--gd)"}}>{val2}</span>
                            </div>
                          </div>
                          {desc&&<div style={{fontSize:".72rem",color:"var(--tx)",lineHeight:1.6,marginTop:4,padding:"6px 10px",background:"rgba(255,107,53,.05)",border:"1px solid rgba(255,107,53,.15)",borderRadius:6,borderLeft:"3px solid var(--ac)"}}>{desc}</div>}

                        {ab(slot.bRole,"b","bDie","BONUS","var(--ac2)")}
                        {ab(slot.rRole,"r","rDie","REACTION","var(--ac3)")}
                      </div>

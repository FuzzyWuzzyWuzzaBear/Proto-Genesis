y has largely stopped being relevant to this creature's internal function."}]}}},"regenerator":{"name":"Regenerator","fantasy":"Wins by outlasting. Still there when everything else has run out of resources. Attrition is the strategy.","typeDiscounts":["beast","plant"],"nodes":{"universal":[{"id":"reg_1","name":"Rapid Cellular Repair","tier":1,"epoch":1,"cost":10,"prerequisite":null,"unlocksNext":["reg_2"],"mechanics":[{"type":"passive","text":"At the start of each of your turns, regain HP equal to your CON modifier (minimum 1). Triggers even at 1 HP."},{"type":"passive","text":"You stabilize automatically when reduced to 0 HP rather than making death saves"}],"flavorText":"The body's damage response is faster than normal biology explains. Wounds that would take other organisms hours to close begin sealing in seconds.","questionnaireDiscount":"\u22125 EP if Threat = Adapts and Endures or Niche = Grazer"},{"id":"reg_2","name":"Sustained Metabolism","tier":2,"epoch":1,"cost":15,"prerequisite":"reg_1","unlocksNext":["reg_3"],"mechanics":[{"type":"passive","text":"CON modifier added to HP total at start of each trial"},{"type":"passive","text":"When you use a healing ability, add CON modifier to HP restored; once per round when an ally within 30 ft uses a healing ability, you also regain HP equal to CON modifier"}],"flavorText":"The body has optimized its resource economy \u2014 it produces repair material faster than sustained damage depletes it."},{"id":"reg_3","name":"Regenerative Dominance","tier":3,"epoch":2,"cost":20,"prerequisite":"reg_2","unlocksNext":["reg_4A_pyr","reg_4A_gla","reg_4A_ver","reg_4A_kha"],"mechanics":[{"type":"passive","text":"Node 1 regen increases to CON modifier \u00d7 2 per turn; you cannot be reduced below 1 HP by any single hit"},{"type":"zone","text":"Once per trial, declare a Recovery Zone \u2014 at start of each round, all allies regain HP equal to 5 + CON modifier; persists until you leave or trial ends"}],"flavorText":"At civilizational scale, your lineage's sustain becomes a strategic posture. The longer the engagement runs, the more your side improves."}],"planetExclusive":{"pyrotheon":[{"id":"reg_4A_pyr","name":"Pyrogenic Regrowth","tier":4,"epoch":3,"cost":30,"prerequisite":"reg_3","unlocksNext":["reg_5A_pyr"],"mechanics":[{"type":"passive","text":"When you take fire damage, regain HP equal to half the damage instead; when you take any other damage type, Node 1 regen triggers immediately as a free reaction"},{"type":"active","uses":"1/trial","name":"Volcanic Recovery","text":"Regain HP equal to your current missing HP; for 2 rounds your regen triggers twice per turn"}],"flavorText":"Your lineage evolved in an environment where external damage is constant \u2014 the only survivors were those that turned volcanic punishment into biological feedback."},{"id":"reg_5A_pyr","name":"The Undying Forge","tier":5,"epoch":3,"cost":40,"prerequisite":"reg_4A_pyr","unlocksNext":[],"mechanics":[{"type":"passive","text":"Cannot be reduced below 1 HP by any means; regen triggers at start of every creature's turn, not just your own"},{"type":"passive","text":"When at full HP and would regain HP, convert excess into temporary HP (max CON modifier \u00d7 5)"},{"type":"active","uses":"1/trial","name":"Regenerative Cascade","text":"For 3 rounds, all damage you receive is immediately repaired at start of your next turn"}],"flavorText":"The question is not whether the creature will recover \u2014 it will \u2014 but how much punishment needs to be applied before the enemy accepts they cannot win by attrition."}],"glacara":[{"id":"reg_4A_gla","name":"Deep Restoration","tier":4,"epoch":3,"cost":30,"prerequisite":"reg_3","unlocksNext":["reg_5A_gla"],"mechanics":[{"type":"passive","text":"At end of each round (not just your turn), regain HP equal to CON modifier \u00d7 2 (continuous \u2014 runs between turns as well as on them)"},{"type":"active","uses":"1/trial","name":"Pressure Seal","text":"Enter deep repair mode for 2 rounds; regain 30 HP at start of each; take minimum damage from all sources (all damage dice count as 1)"}],"flavorText":"The deep-pressure organisms that survived Glacara evolved repair systems that operate on geological timescale \u2014 slow to trigger but effectively impossible to outpace."},{"id":"reg_5A_gla","name":"The Unkillable Depth","tier":5,"epoch":3,"cost":40,"prerequisite":"reg_4A_gla","unlocksNext":[],"mechanics":[{"type":"passive","text":"HP maximum cannot be reduced; at start of each round regain HP equal to CON modifier \u00d7 4 (stacks with all other regen); first time each trial you would drop to 0 HP, instead drop to half current HP"},{"type":"passive","text":"Enemies that attempt to subjugate you must first reduce you to 0 HP"},{"type":"active","uses":"1/trial","name":"Glacial Endurance","text":"For 2 rounds regen triggers three times per turn; cannot be moved, prone, or have conditions applied; at end of 2nd round all enemies in your zone take damage equal to total HP regained during those 2 rounds (bludgeoning, no save)"}],"flavorText":"The only winning move is to not engage \u2014 which, at civilizational scale, is its own kind of victory."}],"verath":[{"id":"reg_4A_ver","name":"Mycelial Restoration","tier":4,"epoch":3,"cost":30,"prerequisite":"reg_3","unlocksNext":["reg_5A_ver"],"mechanics":[{"type":"passive","text":"In zones with Spore Drift saturation or Overgrown terrain, regen increases to CON modifier \u00d7 3 per turn; when enemies in your zone take poison damage, regain HP equal to half the damage dealt"},{"type":"active","uses":"1/trial","name":"Network Repair","text":"Regain HP equal to 10 \u00d7 number of Spore Drift stacks on all enemies combined; remove all negative conditions"}],"flavorText":"The spore network doesn't just fail to damage your lineage \u2014 it actively repairs it. The mycelium treats your body as infrastructure worth maintaining."},{"id":"reg_5A_ver","name":"Living Network Node","tier":5,"epoch":3,"cost":40,"prerequisite":"reg_4A_ver","unlocksNext":[],"mechanics":[{"type":"passive","text":"When you drop to 0 HP, disperse into the spore network \u2014 untargetable for 1 round; reform at start of next turn in any Overgrown zone at 50% HP; once per trial"},{"type":"passive","text":"At start of each round, every ally on the map regains HP equal to your CON modifier; enemies with 3+ Spore Drift stacks take 1d6 poison damage"},{"type":"active","uses":"1/trial","name":"Distributed Repair","text":"Regain HP equal to max HP \u00d7 0.5 (rounded down); remove all conditions and ongoing damage effects"}],"flavorText":"The creature is no longer an individual maintaining itself. It is a node the network maintains."}],"khara":[{"id":"reg_4A_kha","name":"Mineral Regrowth","tier":4,"epoch":3,"cost":30,"prerequisite":"reg_3","unlocksNext":["reg_5A_kha"],"mechanics":[{"type":"passive","text":"When you regain HP while touching stone, add STR modifier to the amount; once per trial when reduced below 25% HP, immediately regain HP equal to CON modifier \u00d7 10"},{"type":"active","uses":"1/trial","name":"Stone Infusion","text":"Regain HP equal to 20 + CON modifier \u00d7 5; for the rest of the trial your Node 1 regen increases by your STR modifier permanently"}],"flavorText":"Your lineage's repair process draws directly from the mineral content of the ground. You don't heal back to what you were. You heal back to something slightly better."},{"id":"reg_5A_kha","name":"The Geological Body","tier":5,"epoch":3,"cost":40,"prerequisite":"reg_4A_kha","unlocksNext":[],"mechanics":[{"type":"passive","text":"Your regen from all sources cannot be suppressed, prevented, or reduced; at start of each round regain HP equal to STR modifier + CON modifier combined"},{"type":"passive","text":"Damage you take is reduced by 5 after all other reductions"},{"type":"active","uses":"1/trial","name":"Deep Time","text":"For 2 rounds, regain 25 HP at start of every turn (yours and every other creature's \u2014 triggers on every initiative count); at end of 2nd round, restore to full HP"}],"flavorText":"Damage and recovery are operating on such different timescales that combat damage is functionally a rounding error in the geological math."}]}}},"apexStriker":{"name":"Apex Striker","fantasy":"Built around one thing: the single attack that ends the conversation. Everything builds toward that moment.","typeDiscounts":["monstrosity","elemental","aberration"],"nodes":{"universal":[{"id":"str_1","name":"Killing Instinct","tier":1,"epoch":1,"cost":10,"prerequisite":null,"unlocksNext":["str_2"],"mechanics":[{"type":"passive","text":"Once per round, when you hit with an attack, add your proficiency bonus to the damage roll"},{"type":"passive","text":"When you reduce a creature to 0 HP, your next attack roll this round has advantage"}],"flavorText":"The creature's threat model has collapsed to a single question: how do I end this. Everything else is noise.","questionnaireDiscount":"\u22125 EP if Threat = Fights Head-On or Social = Solitary"},{"id":"str_2","name":"Apex Focus","tier":2,"epoch":1,"cost":15,"prerequisite":"str_1","unlocksNext":["str_3"],"mechanics":[{"type":"passive","text":"Once per combat, declare an Apex Strike before making an attack roll \u2014 this attack deals an additional damage die of your natural weapon type; usable once per round maximum"},{"type":"passive","text":"Advantage on attack rolls against creatures that are at full HP"}],"flavorText":"The body has learned to concentrate resources. Most of the time it holds back. When it stops holding back, the difference is visible."},{"id":"str_3","name":"Devastating Momentum","tier":3,"epoch":2,"cost":20,"prerequisite":"str_2","unlocksNext":["str_4A_pyr","str_4A_gla","str_4A_ver","str_4A_kha"],"mechanics":[{"type":"passive","text":"Apex Strike now adds two additional damage dice instead of one; target makes CON save (DC 13) or be Stunned until end of their next turn"},{"type":"zone","text":"Once per trial, designate one zone as a Kill Zone \u2014 first Apex Strike against a creature in it is automatically a critical hit (maximum damage, no roll)"}],"flavorText":"At civilizational scale, your lineage's capacity for decisive action becomes the capacity to break engagements before they develop."}],"planetExclusive":{"pyrotheon":[{"id":"str_4A_pyr","name":"Thermal Spike","tier":4,"epoch":3,"cost":30,"prerequisite":"str_3","unlocksNext":["str_5A_pyr"],"mechanics":[{"type":"passive","text":"Apex Strike deals +2d8 fire damage; this fire damage ignores resistance and immunity"},{"type":"active","uses":"1/trial","name":"Ignition Point","text":"Build thermal charge for one round (cannot use Apex Strike); next round Apex Strike deals triple damage dice and target makes CON save (DC 15) or catches fire (2d6 fire damage at start of each turn until they use an action to extinguish)"}],"flavorText":"Your lineage evolved to deliver explosive thermal bursts on contact \u2014 the difference between a flame and a detonation."},{"id":"str_5A_pyr","name":"The Detonation","tier":5,"epoch":3,"cost":40,"prerequisite":"str_4A_pyr","unlocksNext":[],"mechanics":[{"type":"passive","text":"Apex Strike now adds three additional damage dice; fire damage from Apex Strike cannot be reduced, resisted, or immunized against under any circumstances"},{"type":"passive","text":"When you kill a creature with Apex Strike, all enemies within 1 zone take 2d8 fire damage"},{"type":"active","uses":"1/trial","name":"Critical Mass","text":"Build charge for one full round; following round Apex Strike is automatic critical hit dealing quadruple dice plus 4d8 fire damage; if this kills the target, immediately make another Apex Strike against any creature in range at advantage"}],"flavorText":"The creature has stopped being a predator that uses fire and become a detonation event that occasionally chooses targets."}],"glacara":[{"id":"str_4A_gla","name":"Pressure Strike","tier":4,"epoch":3,"cost":30,"prerequisite":"str_3","unlocksNext":["str_5A_gla"],"mechanics":[{"type":"passive","text":"Apex Strike ignores AC bonuses from armor, natural armor, and magical effects"},{"type":"active","uses":"1/trial","name":"Depth Charge","text":"Apex Strike automatically hits regardless of AC; deals full damage plus 3d10 bludgeoning; target makes STR save (DC 15) or be knocked prone and pushed 2 zones away"}],"flavorText":"Your lineage evolved to deliver force the way pressure delivers force at depth \u2014 compression, not impact."},{"id":"str_5A_gla","name":"The Killing Depth","tier":5,"epoch":3,"cost":40,"prerequisite":"str_4A_gla","unlocksNext":[],"mechanics":[{"type":"passive","text":"Apex Strike ignores all damage reduction, resistances, immunities, and HP thresholds \u2014 the damage lands unmodified by any defensive calculation"},{"type":"passive","text":"When you use Apex Strike, you may declare it a Depth Strike \u2014 if target is reduced to 0 HP, they cannot be stabilized, revived, or restored by any means this trial"},{"type":"active","uses":"1/trial","name":"Abyssal Pressure","text":"Apex Strike deals +5d12 bludgeoning damage; target makes CON save (DC 17); failure = reduced to 0 HP regardless of current HP total; success = take full 5d12 + Stunned 2 rounds"}],"flavorText":"At the deepest pressure, force stops being a quantity and becomes a categorical statement."}],"verath":[{"id":"str_4A_ver","name":"Venom Spike","tier":4,"epoch":3,"cost":30,"prerequisite":"str_3","unlocksNext":["str_5A_ver"],"mechanics":[{"type":"passive","text":"Apex Strike delivers venom payload \u2014 target makes CON save (DC 14) or takes 3d8 poison damage at start of each of their next 3 turns"},{"type":"active","uses":"1/trial","name":"Full Dose","text":"Apex Strike this round: CON save (DC 16). Failure: Poisoned + Incapacitated 2 rounds, then 4d10 poison damage when Incapacitation ends. Success: Poisoned 3 rounds + half damage immediately."}],"flavorText":"Your lineage evolved the biological equivalent of a loading mechanism \u2014 the body holds a full dose in reserve, delivers it in a single concentrated strike."},{"id":"str_5A_ver","name":"The Last Breath","tier":5,"epoch":3,"cost":40,"prerequisite":"str_4A_ver","unlocksNext":[],"mechanics":[{"type":"passive","text":"Any creature you hit with Apex Strike has their maximum HP reduced by the damage dealt for the rest of the trial"},{"type":"passive","text":"Creatures at 3+ Spore Drift stacks take double damage from your Apex Strike"},{"type":"active","uses":"1/trial","name":"Lethal Dose","text":"One creature makes CON save (DC 17). Failure: 6d10 poison damage + HP maximum reduced to current HP total for rest of trial. Success: half damage + HP maximum reduced by 25%."}],"flavorText":"The venom payload has reached a concentration where it isn't damaging the target's biology \u2014 it's replacing it."}],"khara":[{"id":"str_4A_kha","name":"Tectonic Strike","tier":4,"epoch":3,"cost":30,"prerequisite":"str_3","unlocksNext":["str_5A_kha"],"mechanics":[{"type":"passive","text":"Apex Strike deals +2d10 bludgeoning damage; if target is already below 75% HP, they make STR save (DC 14) or be knocked prone and lose their next turn entirely"},{"type":"active","uses":"1/trial","name":"Geological Force","text":"Apex Strike deals maximum damage on all dice plus STR modifier \u00d7 3 bonus; target makes CON save (DC 16) or be Stunned 2 rounds"}],"flavorText":"Your lineage evolved to hit the way tectonic plates hit \u2014 not fast, not frequent, but with a force that has no biological analogue."},{"id":"str_5A_kha","name":"The Inevitable Strike","tier":5,"epoch":3,"cost":40,"prerequisite":"str_4A_kha","unlocksNext":[],"mechanics":[{"type":"passive","text":"Apex Strike cannot be interrupted, redirected, or avoided by any reaction or ability; if it misses, still deals half damage"},{"type":"passive","text":"Once per trial, declare Apex Strike Inevitable \u2014 target cannot use any ability, reaction, or effect to reduce or avoid the damage (includes damage reduction, evasion, resistances, saving throws)"},{"type":"active","uses":"1/trial","name":"The Weight of Stone","text":"Apex Strike deals +4d12 bludgeoning damage; target knocked prone, loses next two turns, and makes STR save (DC 17) or HP maximum permanently reduced to half for rest of trial"}],"flavorText":"This creature doesn't telegraph. It simply arrives at the moment the strike occurs and the strike has already happened by the time defense becomes relevant."}]}}}}};
const TECH_DATA={"version":"1.0","description":"Proto-Genesis Tech Trees \u2014 all four planets, trunk + two branches each","costLadder":{"trunk1":10,"trunk2":15,"branch1":20,"branch2":25,"branch3":30,"branch4":35,"branch5":40,"branch6":45},"planets":{"pyrotheon":{"name":"Pyrotheon","trunkNarrative":"Your civilization learned to survive the volcano before it learned to use it.","trunk":[{"id":"pyr_t1","name":"Slag Forging","tier":"trunk1","epoch":2,"trial":1,"cost":10,"prerequisite":null,"unlocksNext":["pyr_t2"],"mechanics":[{"type":"passive","text":"+1 to attack rolls"},{"type":"passive","text":"Melee natural weapons deal +1 damage die type (e.g. 1d8 \u2192 1d10)"}],"flavorText":"Your lineage has learned to work raw volcanic slag into crude tools and weapons. Not refined \u2014 brutal and effective."},{"id":"pyr_t2","name":"Pressure Casting","tier":"trunk2","epoch":2,"trial":2,"cost":15,"prerequisite":"pyr_t1","unlocksNext":["pyr_a1","pyr_b1"],"mechanics":[{"type":"passive","text":"+1 AC (crude armor/shielding)"},{"type":"zone","text":"Once per trial, designate one zone as a Forge Site \u2014 allied units in that zone gain +1 attack while it's held"}],"flavorText":"Using volcanic pressure vents and crude molds, your civilization produces structured metal components."}],"branches":{"A":{"name":"Thermal Mastery","tagline":"The volcano is not a hazard. It is a weapon.","spaceAgeOutcome":"Energy broker civilization \u2014 thermal infrastructure controllers.","nodes":[{"id":"pyr_a1","name":"Vent Tapping","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"pyr_t2","unlocksNext":["pyr_a2"],"mechanics":[{"type":"active","uses":"1/trial","name":"Pressure Burst","text":"One zone within 2 zones of your position: all enemies make a CON save (DC 13) or take 2d6 fire damage and are pushed back 1 zone"},{"type":"passive","text":"Immune to Heat Strain stacks 1\u20132"}],"flavorText":"Your civilization has learned to redirect natural vent pressure for offensive use."},{"id":"pyr_a2","name":"Thermal Conduit Network","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"pyr_a1","unlocksNext":["pyr_a3"],"mechanics":[{"type":"passive","text":"Each zone you control generates +1 bonus scoring point per round (in addition to base zone value)"},{"type":"zone","text":"Forge Site (from T2) now applies to all zones you control, not just one"}],"flavorText":"Underground conduits carry geothermal energy across your held territory."},{"id":"pyr_a3","name":"Superheated Arsenal","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"pyr_a2","unlocksNext":["pyr_a4"],"mechanics":[{"type":"passive","text":"Your attacks deal an additional 1d6 fire damage"},{"type":"passive","text":"Enemies you hit must make a CON save (DC 14) or gain 1 Heat Strain stack"}],"flavorText":"Your weapons now channel concentrated thermal energy. Strikes leave lasting damage."},{"id":"pyr_a4","name":"Magma Redirection","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"pyr_a3","unlocksNext":["pyr_a5"],"mechanics":[{"type":"active","uses":"1/trial","name":"Lava Channel","text":"Create a barrier between two adjacent zones; enemies cannot cross without taking 3d6 fire damage and spending their full movement"},{"type":"zone","text":"One zone of your choice becomes Scorched \u2014 enemies entering take 1d6 fire damage; persists until end of trial"}],"flavorText":"You can redirect subsurface magma flows to reshape battlefield geography."},{"id":"pyr_a5","name":"Geothermal Singularity","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"pyr_a4","unlocksNext":["pyr_a6"],"mechanics":[{"type":"passive","text":"+2 to all attack rolls"},{"type":"active","uses":"1/trial","name":"Eruption","text":"All enemies in one zone take 4d8 fire damage; that zone is destroyed (removed from scoring) for the remainder of the trial"}],"flavorText":"Your civilization has achieved a unified planetary heat grid. The volcano obeys you."},{"id":"pyr_a6","name":"Living Volcano","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"pyr_a5","unlocksNext":[],"mechanics":[{"type":"passive","text":"All fire damage you deal ignores resistance"},{"type":"active","uses":"1/trial","name":"Core Detonation","text":"All enemies on the map take 2d6 fire damage; enemies below 50% HP must make a CON save (DC 16) or be subjugated immediately (counts as your subjugation action this trial)"}],"flavorText":"Your civilization has fused with the planet's thermal systems. In space, you carry that energy with you."}]},"B":{"name":"Conventional Metallurgy","tagline":"The volcano gave us the metal. What we build with it is ours.","spaceAgeOutcome":"Infrastructure and engineering civilization \u2014 everyone needs what they've built.","nodes":[{"id":"pyr_b1","name":"Alloy Development","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"pyr_t2","unlocksNext":["pyr_b2"],"mechanics":[{"type":"passive","text":"+2 AC"},{"type":"passive","text":"Sellback value of biological traits increases to 70%"}],"flavorText":"Your civilization refines raw slag into proper alloys \u2014 stronger, lighter, more versatile."},{"id":"pyr_b2","name":"Fortified Settlement","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"pyr_b1","unlocksNext":["pyr_b3"],"mechanics":[{"type":"zone","text":"One zone you control becomes a Fortress Zone \u2014 enemies attacking into it have disadvantage on attack rolls; you have advantage on defensive reactions in it"},{"type":"passive","text":"You cannot be subjugated while inside your Fortress Zone"}],"flavorText":"Your settlements are now constructed, not claimed. Walls, gates, defensive positioning."},{"id":"pyr_b3","name":"Siege Engineering","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"pyr_b2","unlocksNext":["pyr_b4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Siege Assault","text":"One enemy zone: all defenders make a DEX save (DC 14) or take 3d6 bludgeoning damage; you may immediately contest that zone this round (no movement cost)"},{"type":"passive","text":"Your attacks against enemies in Fortress Zones ignore the defensive bonus"}],"flavorText":"You've turned your construction expertise into offensive capability \u2014 mobile siege platforms, breaching equipment."},{"id":"pyr_b4","name":"Distributed Infrastructure","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"pyr_b3","unlocksNext":["pyr_b5"],"mechanics":[{"type":"passive","text":"Your movement between zones costs 0 (you can move freely between any zones you've held at any point this trial)"},{"type":"passive","text":"Enemies need DC 16 instead of DC 15 to break free from your subjugation"}],"flavorText":"Your civilization has built roads, supply chains, and relay stations across the map."},{"id":"pyr_b5","name":"Industrial Forge","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"pyr_b4","unlocksNext":["pyr_b6"],"mechanics":[{"type":"passive","text":"At the start of each round, recover HP equal to CON modifier \u00d7 2 (resupply and reinforcement)"},{"type":"active","uses":"1/trial","name":"Emergency Refit","text":"Immediately restore 25% of your max HP"}],"flavorText":"Mass production. Your civilization equips armies faster than enemies can deplete them."},{"id":"pyr_b6","name":"Planetary Infrastructure","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"pyr_b5","unlocksNext":[],"mechanics":[{"type":"passive","text":"You score double points for zone control (each zone counts as 2 zones for scoring)"},{"type":"active","uses":"1/trial","name":"Eminent Domain","text":"Claim any one uncontested zone on the map instantly, regardless of position"}],"flavorText":"Your civilization has built the bones of the planet \u2014 and in space, everyone will need what you've made."}]}}},"glacara":{"name":"Glacara","trunkNarrative":"Your civilization learned to read the planet before it learned to use it.","trunk":[{"id":"gla_t1","name":"Vent Mapping","tier":"trunk1","epoch":2,"trial":1,"cost":10,"prerequisite":null,"unlocksNext":["gla_t2"],"mechanics":[{"type":"passive","text":"You always know the current Collapse risk for every zone (GM reveals section stability ratings at round start)"},{"type":"passive","text":"+1 to all DEX and CON saves"}],"flavorText":"Your lineage has charted the vent network beneath the ice \u2014 knowing where pressure builds, where safe passage lies, where the shelf is thin."},{"id":"gla_t2","name":"Thermal Drilling","tier":"trunk2","epoch":2,"trial":2,"cost":15,"prerequisite":"gla_t1","unlocksNext":["gla_a1","gla_b1"],"mechanics":[{"type":"zone","text":"Once per trial, create a Passage between any two non-adjacent zones you occupy \u2014 units can move between them as if adjacent for the rest of the trial"},{"type":"passive","text":"You are immune to Collapse damage"}],"flavorText":"Using vent heat, your civilization bores through ice to create controlled passages and new access routes."}],"branches":{"A":{"name":"Geothermal Engineering","tagline":"The vents are not a hazard. They are an engine.","spaceAgeOutcome":"Power broker civilization \u2014 galactic energy infrastructure.","nodes":[{"id":"gla_a1","name":"Vent Tapping","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"gla_t2","unlocksNext":["gla_a2"],"mechanics":[{"type":"passive","text":"Cold Exposure stacks do not affect your units"},{"type":"zone","text":"Each zone you control that contains a vent generates +1 bonus scoring point per round"}],"flavorText":"Your civilization has learned to cap and channel vent output rather than avoid it."},{"id":"gla_a2","name":"Pressure Grid","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"gla_a1","unlocksNext":["gla_a3"],"mechanics":[{"type":"passive","text":"Passage (from T2) now connects all zones you control simultaneously \u2014 free movement between any held zones"},{"type":"passive","text":"+1 to attack rolls for each consecutive round you've held your current zone (max +3, resets if zone lost)"}],"flavorText":"A network of pressure conduits connects your held zones, distributing geothermal energy across your territory."},{"id":"gla_a3","name":"Superheated Bores","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"gla_a2","unlocksNext":["gla_a4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Bore Strike","text":"Target any one zone on the map regardless of your position; all enemies take 3d8 fire damage and make a CON save (DC 14) or lose their movement next round"},{"type":"passive","text":"Your attacks deal +1d6 fire damage"}],"flavorText":"Your drilling technology has been weaponized \u2014 bore strikes from below, bypassing surface defenses entirely."},{"id":"gla_a4","name":"Core Tap","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"gla_a3","unlocksNext":["gla_a5"],"mechanics":[{"type":"active","uses":"1/trial","name":"Thermal Surge","text":"Choose one zone; it becomes Superheated for 3 rounds. Enemies entering or starting their turn there take 2d6 fire damage. Allies are immune."},{"type":"passive","text":"Immune to Heat Strain (in addition to Cold Exposure immunity from A1)"}],"flavorText":"Your civilization has reached the planetary core. Effectively unlimited energy, with all the instability that implies."},{"id":"gla_a5","name":"Geothermal Cascade","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"gla_a4","unlocksNext":["gla_a6"],"mechanics":[{"type":"passive","text":"Bore Strike (A3) can now target up to 2 zones simultaneously"},{"type":"zone","text":"When you lose a zone, enemies who captured it take 2d6 fire damage at the start of their next turn"}],"flavorText":"You've linked multiple core taps into a cascade network. One trigger ripples across the whole system."},{"id":"gla_a6","name":"Planetary Engine","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"gla_a5","unlocksNext":[],"mechanics":[{"type":"passive","text":"All zones you control are permanently Superheated for enemies (no action cost, always active)"},{"type":"active","uses":"1/trial","name":"Controlled Meltdown","text":"Every zone on the map takes 2d10 fire damage applied to all enemies present. You are immune. All zones become contested (scoring resets) and must be recaptured."}],"flavorText":"Your civilization has turned Glacara itself into a machine. In space, you are the galaxy's power broker."}]},"B":{"name":"Cryo-Engineering","tagline":"The cold is not the enemy. It is the most reliable weapon you have.","spaceAgeOutcome":"Cold-environment civilization \u2014 operates where everyone else cannot.","nodes":[{"id":"gla_b1","name":"Ice Casting","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"gla_t2","unlocksNext":["gla_b2"],"mechanics":[{"type":"zone","text":"Once per trial, erect an Ice Wall between two adjacent zones \u2014 enemies cannot cross without spending full movement and making a DC 13 Athletics check; failure means they stay put"},{"type":"passive","text":"+1 AC (cryo-reinforced plating)"}],"flavorText":"Your civilization shapes ice structurally \u2014 walls, bridges, barriers \u2014 with precision and speed."},{"id":"gla_b2","name":"Cold Snap Weaponry","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"gla_b1","unlocksNext":["gla_b3"],"mechanics":[{"type":"passive","text":"Your attacks impose 1 Cold Exposure stack on hit"},{"type":"passive","text":"Enemies with 2+ Cold Exposure stacks have disadvantage on attacks against you"}],"flavorText":"Cryo-weapons that flash-freeze on contact, slowing enemies and locking joints."},{"id":"gla_b3","name":"Permafrost Zones","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"gla_b2","unlocksNext":["gla_b4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Permafrost","text":"One zone becomes Frozen for the rest of the trial; enemies in it when cast make a CON save (DC 14) or are restrained until end of their next turn; all movement into/out of the zone costs double"},{"type":"passive","text":"You and allies ignore movement penalties in Frozen zones"}],"flavorText":"Your civilization can flash-freeze entire zones, turning them into impassable terrain or killing fields."},{"id":"gla_b4","name":"Cryo-Shell Armor","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"gla_b3","unlocksNext":["gla_b5"],"mechanics":[{"type":"passive","text":"At the start of each round, if you are in a Frozen zone or a zone with Cold Exposure active, regain HP equal to CON modifier \u00d7 3"},{"type":"passive","text":"+2 AC (cryo-shell is now a full defensive system)"}],"flavorText":"Living ice-shell technology that regenerates under cold conditions."},{"id":"gla_b5","name":"Absolute Zero Field","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"gla_b4","unlocksNext":["gla_b6"],"mechanics":[{"type":"active","uses":"1/trial","name":"Zero Field","text":"One zone; all enemies make a CON save (DC 15) or be frozen solid: incapacitated until end of next round, take 4d8 cold damage, and gain 2 Cold Exposure stacks"},{"type":"passive","text":"Permafrost (B3) now affects two zones simultaneously"}],"flavorText":"Your civilization can project localized zero-kelvin fields \u2014 brief, catastrophic, and surgical."},{"id":"gla_b6","name":"Glacial Dominion","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"gla_b5","unlocksNext":[],"mechanics":[{"type":"passive","text":"Immune to all cold damage and Cold Exposure; enemies adjacent to you gain 1 Cold Exposure stack at the start of each round (passive emanation)"},{"type":"active","uses":"1/trial","name":"Deep Freeze","text":"All enemies on the map make a CON save (DC 16); failure = 3d10 cold damage + restrained until end of next round. Success = half damage only. Your zones cannot be contested this round."}],"flavorText":"Your civilization has mastered cold as completely as anything can. The universe's cold is your home."}]}}},"verath":{"name":"Verath","trunkNarrative":"Your civilization learned to read life itself before it learned to direct it.","trunk":[{"id":"ver_t1","name":"Mycelial Mapping","tier":"trunk1","epoch":2,"trial":1,"cost":10,"prerequisite":null,"unlocksNext":["ver_t2"],"mechanics":[{"type":"passive","text":"You always know the exact HP and active conditions of all enemies on the map"},{"type":"passive","text":"You cannot be surprised; enemies do not gain advantage from flanking you"}],"flavorText":"Your civilization has learned to read the spore network \u2014 interpreting chemical signals, tracking movement through mycelial vibration."},{"id":"ver_t2","name":"Spore Cultivation","tier":"trunk2","epoch":2,"trial":2,"cost":15,"prerequisite":"ver_t1","unlocksNext":["ver_a1","ver_b1"],"mechanics":[{"type":"active","uses":"1/trial","name":"Spore Cloud","text":"One zone; all enemies make a CON save (DC 12) or gain 1 Spore Drift stack"},{"type":"passive","text":"You are immune to Spore Drift (including Murval's passive production)"}],"flavorText":"Your civilization has learned to cultivate and concentrate specific spore strains \u2014 the foundation for either biological control or chemical synthesis."}],"branches":{"A":{"name":"Directed Biotechnology","tagline":"Life is programmable. You are learning the language.","spaceAgeOutcome":"Terraforming and seeding civilization \u2014 they grow things everywhere.","nodes":[{"id":"ver_a1","name":"Symbiont Bonding","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"ver_t2","unlocksNext":["ver_a2"],"mechanics":[{"type":"passive","text":"+1d6 poison damage on all attacks (symbiont venom delivery)"},{"type":"passive","text":"Once per round when you take damage, your symbiont absorbs some impact \u2014 reduce incoming damage by your CON modifier"}],"flavorText":"Your civilization cultivates biological symbiotes that enhance combat capability."},{"id":"ver_a2","name":"Growth Acceleration","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"ver_a1","unlocksNext":["ver_a3"],"mechanics":[{"type":"zone","text":"Each zone you hold for 2+ consecutive rounds becomes Overgrown \u2014 enemies entering take 1d6 poison damage; your units gain +1 AC while in Overgrown zones"},{"type":"passive","text":"Your symbiont (A1) damage increases to 2d6 poison"}],"flavorText":"You can accelerate biological growth in zones you control \u2014 terrain-altering fungal bloom that changes the battlefield."},{"id":"ver_a3","name":"Directed Organism","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"ver_a2","unlocksNext":["ver_a4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Deploy Organism","text":"Place a Directed Organism in any zone you control. It has AC 14, HP 30, attacks once per round for 2d8 poison damage against one enemy in its zone. It persists until destroyed or end of trial."},{"type":"passive","text":"Enemies that start their turn in an Overgrown zone must make a CON save (DC 13) or gain 1 Spore Drift stack"}],"flavorText":"Your civilization can direct semi-autonomous biological organisms as battlefield assets."},{"id":"ver_a4","name":"Biological Override","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"ver_a3","unlocksNext":["ver_a5"],"mechanics":[{"type":"active","uses":"1/trial","name":"Override","text":"One enemy with 2+ Spore Drift stacks makes a WIS save (DC 15). On failure, they attack their nearest ally instead of you this round and cannot move toward your units."},{"type":"passive","text":"Spore Drift stacks on enemies you inflict cap at 4 instead of the standard maximum"}],"flavorText":"Your biotech has advanced to the point of partial neural hijacking \u2014 enemies exposed to your spores can be redirected."},{"id":"ver_a5","name":"Apex Organism","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"ver_a4","unlocksNext":["ver_a6"],"mechanics":[{"type":"passive","text":"Directed Organism (A3) now has AC 16, HP 60, attacks twice per round for 2d10 poison damage, and when destroyed explodes for 2d8 poison damage to all enemies in its zone"},{"type":"active","uses":"1/trial","name":"Accelerate","text":"Your Directed Organism takes an extra turn immediately"}],"flavorText":"Your Directed Organism has been evolved into something that makes enemies reconsider their life choices."},{"id":"ver_a6","name":"Living World","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"ver_a5","unlocksNext":[],"mechanics":[{"type":"passive","text":"All zones on the map are treated as Overgrown for your units (you've seeded the whole battlefield)"},{"type":"active","uses":"1/trial","name":"World Bloom","text":"Every enemy on the map gains 2 Spore Drift stacks immediately; enemies with 3+ stacks make a WIS save (DC 16) or are Overridden as per A4, attacking their nearest ally this round"}],"flavorText":"Your civilization and the planet are no longer distinguishable. You seed life; you are life."}]},"B":{"name":"Chemical/Pharmaceutical","tagline":"The planet's chemistry is a library. You have learned to read it \u2014 and rewrite it.","spaceAgeOutcome":"Pharmaceutical civilization \u2014 controls what everyone else puts in their bodies.","nodes":[{"id":"ver_b1","name":"Compound Synthesis","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"ver_t2","unlocksNext":["ver_b2"],"mechanics":[{"type":"passive","text":"+1d6 poison damage on all attacks (synthesized venom coating)"},{"type":"passive","text":"Once per trial, neutralize all Spore Drift stacks on an ally (or yourself) as a bonus action"}],"flavorText":"Your civilization has learned to isolate and synthesize active compounds from the spore network."},{"id":"ver_b2","name":"Stimulant Distribution","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"ver_b1","unlocksNext":["ver_b3"],"mechanics":[{"type":"passive","text":"+10 ft movement"},{"type":"passive","text":"Advantage on initiative rolls and on the first attack roll of each combat round"}],"flavorText":"Performance-enhancing compounds distributed to your forces before and during battle."},{"id":"ver_b3","name":"Debilitant Aerosol","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"ver_b2","unlocksNext":["ver_b4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Aerosol Deployment","text":"One zone; all enemies make a CON save (DC 14) or be Poisoned (disadvantage on attack rolls and ability checks) for 3 rounds"},{"type":"passive","text":"Enemies Poisoned by your effects also have their movement reduced by 10 ft"}],"flavorText":"Weaponized synthesis \u2014 airborne compounds that degrade enemy function without killing them outright."},{"id":"ver_b4","name":"Adaptive Formula","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"ver_b3","unlocksNext":["ver_b5"],"mechanics":[{"type":"passive","text":"At the start of each trial, choose one damage type \u2014 you have resistance to that type for the trial"},{"type":"active","uses":"1/trial","name":"Emergency Dose","text":"Immediately end one condition affecting you (Poisoned, Restrained, Frightened, etc.) and gain advantage on all saves for 1 round"}],"flavorText":"Your pharmaceutical division now synthesizes in real time \u2014 adapting compounds to whatever threat is present."},{"id":"ver_b5","name":"Mass Debilitation","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"ver_b4","unlocksNext":["ver_b6"],"mechanics":[{"type":"passive","text":"Aerosol Deployment (B3) now affects all zones simultaneously"},{"type":"passive","text":"Enemies Poisoned by your effects cannot benefit from healing or HP recovery for the duration"}],"flavorText":"Your aerosols have become strategic-scale weapons \u2014 theater-wide deployment."},{"id":"ver_b6","name":"Pharmaceutical Dominion","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"ver_b5","unlocksNext":[],"mechanics":[{"type":"passive","text":"All enemies on the map are Poisoned; they make a CON save (DC 14) at the start of each turn to end the condition, on failure it persists (no initial save to apply)"},{"type":"active","uses":"1/trial","name":"Total Synthesis","text":"Choose one enemy; they make a CON save (DC 17). Failure = Incapacitated for 2 rounds and lose 25% of their max HP. Success = Poisoned for 3 rounds and disadvantage on all saves."}],"flavorText":"Your civilization controls the biochemistry of the battlefield absolutely. In space, you are the only ones who can synthesize certain compounds \u2014 or their antidotes."}]}}},"khara":{"name":"Khara","trunkNarrative":"Your civilization learned to read the stone before it learned to move through it.","trunk":[{"id":"kha_t1","name":"Structural Analysis","tier":"trunk1","epoch":2,"trial":1,"cost":10,"prerequisite":null,"unlocksNext":["kha_t2"],"mechanics":[{"type":"passive","text":"You always know the Pressure Sickness stack level of every zone and every creature on the map"},{"type":"passive","text":"+1 to all STR and CON saves"}],"flavorText":"Your civilization can read load-bearing patterns, pressure differentials, and tunnel integrity at a glance."},{"id":"kha_t2","name":"Controlled Excavation","tier":"trunk2","epoch":2,"trial":2,"cost":15,"prerequisite":"kha_t1","unlocksNext":["kha_a1","kha_b1"],"mechanics":[{"type":"zone","text":"Once per trial, collapse a tunnel between two adjacent zones \u2014 enemies in the passage make a DEX save (DC 13) or take 3d6 bludgeoning damage; the connection is destroyed for the rest of the trial"},{"type":"passive","text":"Your movement never triggers Pressure Sickness stacks"}],"flavorText":"Precision tunneling \u2014 not just moving through the earth, but shaping it deliberately."}],"branches":{"A":{"name":"Siege and Excavation","tagline":"The tunnel is a weapon. You are learning to aim it.","spaceAgeOutcome":"Megastructure engineering civilization \u2014 they build the bones of space stations and ringworlds.","nodes":[{"id":"kha_a1","name":"Breach Drilling","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"kha_t2","unlocksNext":["kha_a2"],"mechanics":[{"type":"active","uses":"1/trial","name":"Breach","text":"Instantly destroy one barrier or Ice Wall on the map; units may immediately move through the gap"},{"type":"passive","text":"Your siege assault actions deal +1d6 damage and ignore cover bonuses"}],"flavorText":"Purpose-built drilling rigs that punch through fortifications and barriers in minutes."},{"id":"kha_a2","name":"Undermining","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"kha_a1","unlocksNext":["kha_a3"],"mechanics":[{"type":"zone","text":"Designate one enemy-held zone as Undermined \u2014 enemies in it have disadvantage on attack rolls; if they hold it for 2+ consecutive rounds, they take 2d6 bludgeoning damage at round end"},{"type":"passive","text":"You may enter Undermined zones without triggering the instability effects"}],"flavorText":"Your excavators tunnel beneath enemy zones, destabilizing their footing."},{"id":"kha_a3","name":"Siege Platform","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"kha_a2","unlocksNext":["kha_a4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Deploy Platform","text":"Place a Siege Platform in any zone you control. AC 18, HP 50, provides +2 AC to all allies in its zone. Enemies attacking into the zone have disadvantage. Cannot move but persists until destroyed."},{"type":"passive","text":"While adjacent to your Siege Platform, you have advantage on all attack rolls"}],"flavorText":"Mobile, heavily armored excavation platforms that function as rolling fortresses."},{"id":"kha_a4","name":"Deep Strike","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"kha_a3","unlocksNext":["kha_a5"],"mechanics":[{"type":"active","uses":"1/trial","name":"Tunnel Strike","text":"Teleport to any zone on the map; immediately make a full attack action against all enemies in that zone with advantage; they cannot use reactions"},{"type":"passive","text":"Once per round, move between any two zones you've previously occupied without spending movement"}],"flavorText":"Your tunneling capability now lets you strike from completely unexpected angles \u2014 emerging beneath enemy positions."},{"id":"kha_a5","name":"Excavation Cascade","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"kha_a4","unlocksNext":["kha_a6"],"mechanics":[{"type":"active","uses":"1/trial","name":"Structural Collapse","text":"Choose up to 3 adjacent zones; all enemies make a DEX save (DC 15) or take 4d8 bludgeoning damage and are knocked prone; zones become Rubble (movement costs double) for the rest of the trial"},{"type":"passive","text":"Undermining (A2) now affects two zones simultaneously"}],"flavorText":"Mass excavation \u2014 whole sections of the map can be restructured in minutes."},{"id":"kha_a6","name":"World Drill","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"kha_a5","unlocksNext":[],"mechanics":[{"type":"passive","text":"All zones you control are connected by your tunnel network \u2014 free movement between all held zones, no action cost"},{"type":"active","uses":"1/trial","name":"Planetary Bore","text":"Target any one enemy; DEX save (DC 17) or fall into a bore shaft: removed from the map for 2 rounds (can't act, score, or be targeted), then reenter at 50% HP in a zone of your choice. On success, they take 4d10 bludgeoning damage and are moved to an adjacent zone of your choice."}],"flavorText":"Your civilization can excavate anything, anywhere, at any scale. In space, you bore through moons."}]},"B":{"name":"Acoustic and Seismic","tagline":"Sound travels through stone. Your civilization has been listening for a very long time.","spaceAgeOutcome":"Intelligence and early-warning civilization \u2014 they always know what's coming.","nodes":[{"id":"kha_b1","name":"Resonance Reading","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"kha_t2","unlocksNext":["kha_b2"],"mechanics":[{"type":"passive","text":"Tremorsense 60 ft \u2014 sense all creatures within 60 ft through vibration, even through walls; they cannot hide from you while on the ground"},{"type":"passive","text":"You cannot be ambushed or surprised by any means"}],"flavorText":"Fine-tuned acoustic sensors let your civilization detect movement, position, and intent through stone."},{"id":"kha_b2","name":"Dissonance Emitters","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"kha_b1","unlocksNext":["kha_b3"],"mechanics":[{"type":"active","uses":"1/trial","name":"Dissonance Pulse","text":"One zone; all enemies make a CON save (DC 13) or have disadvantage on all rolls for 2 rounds"},{"type":"passive","text":"Enemies within 30 ft of you have disadvantage on concentration checks and WIS saves"}],"flavorText":"Targeted vibration emitters that disrupt enemy coordination and focus."},{"id":"kha_b3","name":"Seismic Strike","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"kha_b2","unlocksNext":["kha_b4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Seismic Strike","text":"One zone; all enemies take 3d8 bludgeoning damage ignoring AC entirely. CON save (DC 14) or knocked prone."},{"type":"passive","text":"Your attacks deal +1d6 bludgeoning damage (vibration-resonant strikes)"}],"flavorText":"Your civilization weaponizes ground vibration \u2014 targeted micro-quakes that hit through armor and fortification."},{"id":"kha_b4","name":"Acoustic Network","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"kha_b3","unlocksNext":["kha_b5"],"mechanics":[{"type":"passive","text":"You have perfect information about all creatures on the map \u2014 HP, conditions, position; GM reveals enemy intended actions at start of each round"},{"type":"passive","text":"Enemies cannot benefit from invisibility, stealth, or hidden positioning against you"}],"flavorText":"A civilization-scale acoustic sensor grid \u2014 you perceive the entire battlefield at all times."},{"id":"kha_b5","name":"Resonance Cascade","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"kha_b4","unlocksNext":["kha_b6"],"mechanics":[{"type":"passive","text":"Seismic Strike (B3) now hits all zones simultaneously (one save, one damage roll applied to all enemies on the map)"},{"type":"zone","text":"Each zone you hold generates a constant low-frequency field \u2014 enemies starting their turn in your zones take 1d6 bludgeoning damage (no save)"}],"flavorText":"You've learned to trigger sympathetic resonance across your seismic network \u2014 one strike echoes everywhere."},{"id":"kha_b6","name":"Geological Dominion","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"kha_b5","unlocksNext":[],"mechanics":[{"type":"passive","text":"You gain a flat +5 bonus to all attack rolls, saving throws, and ability checks; enemies take a flat \u22123 penalty to all attack rolls and saving throws against you"},{"type":"active","uses":"1/trial","name":"Resonance Event","text":"All enemies on the map take 5d10 bludgeoning damage, are knocked prone, and lose their movement next round. All zones become contested simultaneously. Your units are completely immune."}],"flavorText":"Your civilization hears and speaks through the planet. The stone is your instrument."}]}}}}};
const APEX_DATA={"version":"1.0","description":"Proto-Genesis Apex Biology \u2014 planet-distinct biological transcendence paths. Requires zero tech nodes purchased throughout the campaign. Two trunk nodes available from Epoch 2; three capstone nodes unlock at Epoch 3 transition.","eligibilityRule":"Zero tech nodes purchased at any point in the campaign. Purchasing even one tech node permanently closes this path.","timing":{"trunk":"Available from Epoch 2, Trial 1 onward \u2014 purchase any time during Epoch 2 adaptation windows","capstones":"Unlock at Epoch 3 transition window only \u2014 must have purchased both trunk nodes first","note":"A lineage may delay purchasing trunk nodes until the Epoch 3 transition window and buy all five nodes at once, provided they have never purchased a tech node."},"costLadder":{"trunk1":30,"trunk2":40,"capstone1":50,"capstone2":60,"capstone3":70,"total":250},"planets":{"pyrotheon":{"name":"Pyrotheon","pathName":"The Embered Path","pathNarrative":"They did not master the volcano. They became it.","trunk":[{"id":"pyr_apex_t1","name":"Pyrogenic Core","tier":"trunk1","epoch":2,"cost":30,"prerequisite":null,"unlocksNext":["pyr_apex_t2"],"mechanics":[{"type":"passive","text":"Complete immunity to fire damage and Heat Strain (all stacks)"},{"type":"passive","text":"Creatures that hit you with melee attacks take 1d6 fire damage (contact burn)"}],"flavorText":"The creature's metabolic processes have shifted to thermogenic \u2014 body heat measured in hundreds of degrees, not tens. External fire is irrelevant. Internal fire is the point."},{"id":"pyr_apex_t2","name":"Magmatic Skin","tier":"trunk2","epoch":2,"cost":40,"prerequisite":"pyr_apex_t1","unlocksNext":["pyr_apex_c1"],"mechanics":[{"type":"passive","text":"+3 AC (magmatic plating \u2014 regenerates between rounds)"},{"type":"passive","text":"At the start of each round, recover HP equal to CON modifier \u00d7 2 (the skin reseals)"},{"type":"passive","text":"You leave scorched terrain wherever you move \u2014 enemies entering zones you've passed through this trial take 1d4 fire damage"}],"flavorText":"The outer layer has begun the conversion \u2014 not armor, not hide. Cooling slag that reshapes after every strike."}],"capstones":[{"id":"pyr_apex_c1","name":"Thermal Sovereignty","tier":"capstone1","epoch":3,"cost":50,"prerequisite":"pyr_apex_t2","unlocksNext":["pyr_apex_c2"],"mechanics":[{"type":"passive","text":"All fire damage you deal ignores both resistance and immunity"},{"type":"passive","text":"+2d6 fire damage on all attacks"},{"type":"active","uses":"1/trial","name":"Thermal Nova","text":"All enemies on the map take 3d6 fire damage and gain 1 Heat Strain stack. No save. This is not a weapon \u2014 it is a physiological event."}],"flavorText":"Your creature no longer generates heat \u2014 it is heat, in a form that happens to have opinions. The distinction between the creature and a volcanic event is now philosophical."},{"id":"pyr_apex_c2","name":"Eruptive Form","tier":"capstone2","epoch":3,"cost":60,"prerequisite":"pyr_apex_c1","unlocksNext":["pyr_apex_c3"],"mechanics":[{"type":"passive","text":"Once per round when you take damage, immediately deal fire damage equal to the damage received to the attacker (your body vents pressure)"},{"type":"passive","text":"You cannot be subjugated. You cannot be restrained. An active eruption is not a condition that can be held."},{"type":"active","uses":"1/trial","name":"Controlled Eruption","text":"Choose one zone; it is destroyed (removed from map scoring) for the rest of the trial. All enemies in it take 5d10 fire damage. You emerge in any adjacent zone. The terrain does not recover."}],"flavorText":"The body now controls pressure the way a volcano controls pressure \u2014 by choosing when not to release it. And then releasing it."},{"id":"pyr_apex_c3","name":"Living Caldera","tier":"capstone3","epoch":3,"cost":70,"prerequisite":"pyr_apex_c2","unlocksNext":[],"mechanics":[{"type":"passive","text":"Immune to all damage types except cold and force (your body processes everything else as fuel)"},{"type":"passive","text":"Enemies that start their turn within 2 zones of you must make a CON save (DC 16) or take 2d8 fire damage and gain 1 Heat Strain stack (proximity event \u2014 you don't have to act)"},{"type":"active","uses":"1/trial","name":"Pyroclastic Ascension","text":"For this round, you become untargetable and deal 4d10 fire damage to all enemies on the map. No save. No range limit. You are briefly everywhere the heat is."}],"flavorText":"There is no longer a meaningful distinction between this creature and the volcanic planet it evolved on. In space, it carries that planet with it \u2014 a mobile geological event with intent."}]},"glacara":{"name":"Glacara","pathName":"The Deep Covenant","pathNarrative":"They went down far enough that the surface stopped mattering.","trunk":[{"id":"gla_apex_t1","name":"Abyssal Conditioning","tier":"trunk1","epoch":2,"cost":30,"prerequisite":null,"unlocksNext":["gla_apex_t2"],"mechanics":[{"type":"passive","text":"Complete immunity to Cold Exposure (all stacks) and Collapse damage"},{"type":"passive","text":"Tremorsense 30 ft \u2014 sense all creatures through vibration; they cannot hide from you while touching the ground"},{"type":"passive","text":"You do not need light to function; darkness imposes no penalties"}],"flavorText":"The lineage spent enough geological time in the deep vent networks that pressure and darkness stopped being threats and became home. The body reorganized accordingly."},{"id":"gla_apex_t2","name":"Pressure Physiology","tier":"trunk2","epoch":2,"cost":40,"prerequisite":"gla_apex_t1","unlocksNext":["gla_apex_c1"],"mechanics":[{"type":"passive","text":"+4 AC (pressure-hardened exterior \u2014 the body is dense in ways armor cannot replicate)"},{"type":"passive","text":"Immunity to being knocked prone, pushed, or moved against your will"},{"type":"passive","text":"Your melee attacks deal +1d8 cold damage (body temperature is a weapon in the other direction)"}],"flavorText":"Organs rebuilt for deep operation. The circulatory system handles pressure differentials that would rupture anything surface-adapted. The creature is now operating on different physical assumptions than everything else on the map."}],"capstones":[{"id":"gla_apex_c1","name":"Vent Communion","tier":"capstone1","epoch":3,"cost":50,"prerequisite":"gla_apex_t2","unlocksNext":["gla_apex_c2"],"mechanics":[{"type":"passive","text":"You always know the location, HP, and active conditions of every creature on the map (the vent network tells you \u2014 heat signatures, pressure displacement, vibration)"},{"type":"active","uses":"1/trial","name":"Vent Surge","text":"Direct a vent eruption through the network; one zone anywhere on the map; all enemies take 4d8 cold damage and make a STR save (DC 15) or be pushed 2 zones in a direction of your choice. You are immune."}],"flavorText":"The creature has developed a direct biological relationship with the vent network \u2014 not technological tapping, but actual organic integration. The vents respond to it like a nervous system responds to pain."},{"id":"gla_apex_c2","name":"Glacial Permanence","tier":"capstone2","epoch":3,"cost":60,"prerequisite":"gla_apex_c1","unlocksNext":["gla_apex_c3"],"mechanics":[{"type":"passive","text":"At the start of each round, recover 15 HP (the body's geological repair rate)"},{"type":"passive","text":"You cannot be subjugated. If an attempt is made, the attacker takes 2d8 cold damage and the attempt fails automatically."},{"type":"passive","text":"When you drop to 0 HP for the first time in a trial, you instead drop to 1 HP and are immune to damage until the start of your next turn (deep physiology has a failsafe)"}],"flavorText":"The creature no longer ages in any meaningful sense during a trial. Injuries that would accumulate on anything else simply don't. The deep adapted to pressure by making the body's responses geological i   };

  // ── Niche + Social + Threat — combined closing sentence ──────────────────
  const nicheMap = {

  const e1 = (entityPhrases[entity]||{})[p] || '';
  const e2 = (formPhrases[form]||{})[p] || '';
  const nText = nicheMap[niche] || niche;
  const sText = socialMap[social] || social;
  const e3threat = (threatMap[threat]||{})[p] || '';
  const e3 = `It ${nText}, ${sText}. ${e3threat}`;

  return [e1, e2, e3].filter(Boolean).join(' ');
}

// ── FIREBASE REST HELPERS ──────────────────────────────────────────────────────
function fbURL(path){ return FIREBASE_URL + path + '.json'; }
async function fbRead(path){
  if(!FIREBASE_URL) return null;
  try{ const r=await fetch(fbURL(path)); return r.ok ? await r.json() : null; }
  catch{ return null; }
}
async function fbWrite(path, data){
  if(!FIREBASE_URL) return;
  try{ await fetch(fbURL(path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); }
  catch{}
}
async function fbPatch(path, data){
  if(!FIREBASE_URL) return;
  try{ await fetch(fbURL(path),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); }
  catch{}
}

// ── RESISTANCE / IMMUNITY DERIVATION ──────────────────────────────────────────
// Derives from buildSnapshot (S.archetypes.unlockedNodes + S.techTree.unlockedNodes)
// then applies CS.lineageTrait override from Firebase.
function deriveResistances(){
  const res = new Set(), imm = new Set();
  const bio = S.archetypes?.unlockedNodes || [];
  const tech = S.techTree?.unlockedNodes || [];
  // Bio archetype nodes
  if(bio.includes('adp_1')) res.add('1 type (build choice)');
  if(bio.includes('adp_3')) res.add('2nd type (build choice)');
  if(bio.includes('adp_4A_pyr')){ imm.add('Fire'); imm.add('Heat Strain'); res.delete('1 type (build choice)'); }
  if(bio.includes('adp_5A_pyr')){ /* all res → imm, handled by 4A */ }
  if(bio.includes('adp_4A_gla')){ imm.add('Cold'); imm.add('Cold Exposure'); res.delete('1 type (build choice)'); }
  if(bio.includes('def_4A_pyr')){ res.add('Fire'); res.add('Bludgeoning'); res.add('Piercing'); }
  if(bio.includes('def_5A_pyr')){ imm.add('Fire'); imm.add('Heat Strain'); }
  if(bio.includes('def_4A_gla')){ res.add('Cold'); res.add('Bludgeoning'); }
  // Tech nodes
  if(tech.includes('pyr_a1')) imm.add('Heat Strain 1–2');
  if(tech.includes('gla_a4')) imm.add('Heat Strain');
  if(tech.includes('gla_b1') || tech.includes('gla_b2')) res.add('Cold (partial)');
  // Lineage Trait override from Firebase (T4 survivor reward)
  if(CS.lineageTrait && CS.lineageTrait.includes('Fire Immunity')){
    imm.add('Fire'); imm.add('Heat Strain');
  }
  return { resistances: [...res], immunities: [...imm] };
}

  if(!ROOM_CODE || !FIREBASE_URL || !targetId || !amount) return;
  const target = CS.targets[targetId];
  const reqId = 'dr_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  await fbWrite('/rooms/' + ROOM_CODE + '/damageRequests/' + reqId, {
    playerId: PLAYER_ID,
    playerName: S.name || 'Unnamed',
    targetId,
    targetType: target?.isPlayer ? 'player' : 'npc',
    targetName: target?.name || targetId,
    amount: parseInt(amount),
    ts: Date.now(),
    status: 'pending',
  });
}

// ── INTERACT: POLLING ──────────────────────────────────────────────────────────
async function pollInteract(){
  if(!ROOM_CODE || !FIREBASE_URL) return;
  const base = '/rooms/' + ROOM_CODE;
  const [sigStart, sigEnd, meta, combat, targets, sigInit, attackRequests, hazardRequests] = await Promise.all([
    fbRead(base + '/signals/trialStart'),
    fbRead(base + '/signals/trialEnd'),
    fbRead(base + '/meta'),
    fbRead(base + '/creatures/' + PLAYER_ID + '/combat'),
    fbRead(base + '/targets'),
    fbRead(base + '/signals/initiative'),
    fbRead(base + '/attackRequests'),
    fbRead(base + '/hazardRequests'),
  ]);
  if(meta){
    if(meta.currentTrial !== undefined) CS.currentTrial = meta.currentTrial;
    if(meta.trialLabel   !== undefined) CS.trialLabel   = meta.trialLabel;
    if(meta.round        !== undefined) CS.round        = meta.round;
    if(meta.planet       !== undefined) CS.planet       = meta.planet;
    CS.adaptationWindowOpen = !!(meta.adaptationWindowOpen);
  }
  if(combat){
    if(combat.hp              !== undefined) CS.hp              = combat.hp;
    if(combat.maxHp           !== undefined) CS.maxHp           = combat.maxHp;
    if(combat.heatStrainStacks!== undefined) CS.heatStrainStacks= combat.heatStrainStacks;
    if(combat.conditions      !== undefined) CS.conditions      = combat.conditions || [];
    if(combat.resourceTokens  !== undefined) CS.resourceTokens  = combat.resourceTokens;
    if(combat.epBalance       !== undefined) CS.epBalance       = combat.epBalance;
    if(combat.lineageTrait    !== undefined) CS.lineageTrait    = combat.lineageTrait;
  }
  // Targets roster (names + status tiers, HP never sent)
  if(targets) CS.targets = targets;
  // Initiative signal
  if(sigInit && sigStart && !sigEnd){
    if(!CS.initiativeOpen){
      CS.initiativeOpen = true;
      CS.initiativeSubmitted = false;
      CS.initiativeRoll = '';
    }
  } else {
    CS.initiativeOpen = false;
  }
  // Incoming hazard requests targeting this player
  if(hazardRequests){
    const myHazard = Object.entries(hazardRequests)
      .filter(([id,req])=>req.status==='pending' && Array.isArray(req.targets) && req.targets.includes(PLAYER_ID))
      .sort(([,a],[,b])=>b.ts-a.ts)[0];
    if(myHazard){
      const [reqId, req] = myHazard;
      if(CS.incomingHazardReqId !== reqId){
        CS.incomingHazard = req;
        CS.incomingHazardReqId = reqId;
        CS.hazardSaveRoll = '';
        CS.hazardResponded = false;
      }
    } else {
      if(CS.incomingHazard) CS.incomingHazard = null;
    }
  }
  if(attackRequests){
    const myAttack = Object.entries(attackRequests)
      .filter(([id,req])=>req.status==='pending' && Array.isArray(req.targets) && req.targets.includes(PLAYER_ID))
      .sort(([,a],[,b])=>b.expiresAt-a.expiresAt)[0]; // most recent
    if(myAttack){
      const [reqId, req] = myAttack;
      if(CS.incomingAttackReqId !== reqId){
        CS.incomingAttack = req;
        CS.incomingAttackReqId = reqId;
        CS.saveRoll = '';
        CS.reactionUsed = false;
        CS.reactionText = '';
        CS.attackResponded = false;
      }
    } else {
      // No pending attacks for us
      if(CS.incomingAttack) CS.incomingAttack = null;
    }
  }
  // Trial state machine
  const trialLive = sigStart && !sigEnd;
  if(trialLive && !INTERACT_ACTIVE){
    INTERACT_ACTIVE = true;
    ADAPT_OVERLAY   = false;
  }
  if(!trialLive && INTERACT_ACTIVE){
    INTERACT_ACTIVE = false;
    if(CS.adaptationWindowOpen) ADAPT_OVERLAY = true;
  }
  render();
}
function startInteractPolling(){
  stopInteractPolling();
  pollInteract();
  INTERACT_POLL = setInterval(pollInteract, 5000);
}
function stopInteractPolling(){
  if(INTERACT_POLL){ clearInterval(INTERACT_POLL); INTERACT_POLL = null; }
}

// ── MATH ──────────────────────────────────────────────────────────────────────
function statMod(v){return Math.floor((v-10)/2)}
function fmtMod(v){return(v>=0?"+":"")+v}
function hdTotalCost(hd){
  let t=0;
  for(const [d,c] of Object.entries(HD_COSTS))
    if(HD_LIST.indexOf(d)<=HD_LIST.indexOf(hd)&&d!=="1d4") t+=c;
  return t;
}
// dieTotalCost: cantrip die cost (always melee/action baseline)
function dieTotalCost(die){ return DIE_COSTS_MA[die]||0; }
// Full ability EP cost for one encounter ability object
function calcAbilityEP(ab){
  if(!ab||!ab.role) return 0;
  let ep=5; // base slot cost
  if(ab.delivery==='ranged') ep+=5;
  if(ab.delivery==='aoe')    ep+=10;
  if(ab.aoeShape==='splash') ep+=quickTotalCost(ab.splashRange||0);
  if(ab.aoeShape==='line')  ep+=quickTotalCost(ab.lineRange||0);
  if(ab.aoeShape==='cone')  ep+=quickTotalCost(ab.coneRange||0);
  if(ab.aoeShape==='burst') ep+=quickTotalCost(ab.burstRange||0);
  if(ab.role==='Control'){
    ep+=dieCost(ab.controlDie||'1d4',ab.actionType,ab.delivery);
    ep+=COND_COSTS[ab.condition]||0;
    ep+=DUR_COSTS[ab.duration]||0;
  } else if(ab.role==='Support'){
    // No die cost for Support
  } else if(ab.role==='Heal'){
    if(ab.die&&ab.die!=='1d4') ep+=dieCost(ab.die,ab.actionType,ab.delivery);
    for(const d of ab.extraDice||[]) ep+=5+dieCost(d,ab.actionType,ab.delivery)*2;
  } else {
    ep+=dieCost(ab.die||'1d4',ab.actionType,ab.delivery);
    for(const d of ab.extraDice||[]) ep+=5+dieCost(d,ab.actionType,ab.delivery)*2;
  }
  // Bastion duration cost
  if(ab.role==='Bastion'){
    const bd=ab.bastDur||'fleeting';
    ep+=(bd==='lingering'?5:bd==='persistent'?15:0);
  }
  for(const p of ab.properties||[]) ep+=PROP_COSTS[p]||0;
  ep+=USES_COSTS[ab.extraUses||0]||0;
  return ep;
}
// Quick stack cost: 5,5,10,10,15,15 per pair of stacks; max 6 stacks
function quickStackCost(n){ const tier=Math.ceil(n/2); return tier===1?5:tier===2?10:15; }
// Second die costs double the primary die table
// (extraDice cost: 5 EP unlock + dieCost(d)*2 per die, computed inline)
function quickTotalCost(n){ let t=0; for(let i=1;i<=n;i++) t+=quickStackCost(i); return t; }
const QUICK_MAX=6;
function nodeCostDisc(id){
  const n=NODES[id];if(!n)return 0;
  let c=n.cost;
  if(n.nodeType==='bio'&&(n.tier===1||n.tier===2)&&(TYPE_DISC[S.typeId]||[]).includes(n.archetype))
    c=Math.max(0,c-5);
  return c;
}
function calcEP(){
  let ep=0;
  const sz=SIZES.find(x=>x.id===S.sizeId);if(sz)ep+=sz.cost;
  ep+=hdTotalCost(S.hdChoice||"1d4");
  // Land speed quick stacks
  ep+=quickTotalCost(S.landQuick||0);
  // Alt movement types
  for(const [id,mv] of Object.entries(S.altMoves||{})){
    const def=ALT_MOVES.find(x=>x.id===id);
    if(mv.owned&&def){ ep+=def.baseCost; ep+=quickTotalCost(mv.quick||0); }
  }
  // Blink Step
  if(S.blinkstep?.purchased){ep+=BLINK_STEP.cost;const _bsac={action:0,bonus:5,reaction:5};ep+=_bsac[S.blinkstep.actionType||'action']||0;const _bsdc=[0,5,15,35,65];ep+=_bsdc[Math.min(S.blinkstep.distance||0,4)];}
  const epB=S.statEPBonuses||{},tots=Object.values(epB).reduce((t,v)=>t+(v||0),0);
  for(let i=0;i<tots;i++)ep+=i===0?5:i===1?10:20;
  // Cantrip: die upgrade + delivery + shape range costs (slot is free)
  ep+=dieTotalCost(S.cantrip.die||"1d4");
  for(const d of S.cantrip.extraDice||[]) ep+=5+dieTotalCost(d)*2;
  if(S.cantrip.delivery==='ranged') ep+=5;
  if(S.cantrip.delivery==='aoe')   ep+=10;
  if((S.cantrip.properties||[]).includes('aoe_selective')) ep+=10;
  if(S.cantrip.aoeShape==='splash') ep+=quickTotalCost(S.cantrip.splashRange||0);
  if(S.cantrip.aoeShape==='line')   ep+=quickTotalCost(S.cantrip.lineRange||0);
  if(S.cantrip.aoeShape==='cone')   ep+=quickTotalCost(S.cantrip.coneRange||0);
  if(S.cantrip.aoeShape==='burst')  ep+=quickTotalCost(S.cantrip.burstRange||0);
  // Encounter abilities: 5 EP base each + 10 EP per additional slot
  const abs=S.abilities||[];
  if(abs.length>1) ep+=(abs.length-1)*10;
  for(const ab of abs) ep+=calcAbilityEP(ab);
  for(const id of S.archetypes?.unlockedNodes||[])ep+=nodeCostDisc(id);
  for(const id of S.techTree?.unlockedNodes||[]){const n=NODES[id];if(n)ep+=n.cost}
  for(const id of S.apexBiology?.unlockedNodes||[]){const n=NODES[id];if(n)ep+=n.cost}
  return ep;
}
function lvlBonus(){return((S.creatureLevel||1)-1)*10}
function budget(){return EP_MAX+lvlBonus()}
function remaining(){return budget()-calcEP()}

function getFinalStats(){
  const out={},epB=S.statEPBonuses||{},assign=S.statAssign||{};
  const sz=SIZES.find(x=>x.id===S.sizeId);
  for(const k of STAT_KEYS){
    let v=(assign[k]||8)+(epB[k]||0);
    if(sz?.bon?.[k]) v+=sz.bon[k];
    // Medium choose2: medBonus is [stat0, stat1] — each adds +1 independently
    if(sz?.choose2){
      const med=S.medBonus||[];
      med.forEach(s=>{ if(s===k) v+=1; });
    }
    out[k]=v;
  }
  return out;
}
function getSpeed(){
  const sz=SIZES.find(x=>x.id===S.sizeId);
  return(sz?.speed||20)+(S.landQuick||0)*5;
}
function calcAC(){
  const fs=getFinalStats(),dex=statMod(fs.DEX||10);
  if((S.archetypes?.unlockedNodes||[]).includes('def_1'))return 13+dex+statMod(fs.CON||10);
  return 10+dex;
}
function getMaxHP(){
  const fs=getFinalStats(),conMod=statMod(fs.CON||10);
  const hd=S.hdChoice||"1d4",szhd=SIZES.find(x=>x.id===S.sizeId)?.hd||"1d4";
  const idx=Math.max(HD_LIST.indexOf(hd),HD_LIST.indexOf(szhd));
  const hdN=parseInt(HD_LIST[idx].split('d')[1]||4);
  const hdCount=4+(S.creatureLevel||1);
  return Math.floor(hdN/2+1)*hdCount+conMod*hdCount;
}

// ── PURCHASE ──────────────────────────────────────────────────────────────────
function allOwned(){
  return[...(S.archetypes?.unlockedNodes||[]),...(S.techTree?.unlockedNodes||[]),...(S.apexBiology?.unlockedNodes||[])];
}
function canBuy(id){
  const n=NODES[id];if(!n)return{ok:false,why:"Not found"};
  if(allOwned().includes(id))return{ok:false,why:"Owned"};
  if(n.prerequisite&&!allOwned().includes(n.prerequisite))return{ok:false,why:"Requires prerequisite"};
  if(n.nodeType==='apex'&&(S.techTree?.unlockedNodes||[]).length>0)return{ok:false,why:"Apex Biology closed"};
  const ep=S.currentEpoch||1;
  if(n.tier===3&&ep<2)return{ok:false,why:"Unlocks Epoch 2"};
  if((n.tier>=4||(n.nodeType==='apex'&&!n.id.includes('_t')))&&ep<3)return{ok:false,why:"Unlocks Epoch 3"};
  if(n.nodeType==='bio'){
    const{primary,secondary}=S.archetypes||{};
    if(n.archetype!==primary&&n.archetype!==secondary)return{ok:false,why:"Select archetype first"};
  }
  if(n.planetExclusive&&n.planet!==S.planet)return{ok:false,why:PLANETS[n.planet]?.name+" only"};
  if(remaining()<nodeCostDisc(id))return{ok:false,why:"Need "+nodeCostDisc(id)+" EP"};
  return{ok:true};
}
function buyNode(id){
  const chk=canBuy(id);if(!chk.ok)return;
  const n=NODES[id];
  if(n.nodeType==='bio')S.archetypes={...S.archetypes,unlockedNodes:[...S.archetypes.unlockedNodes,id]};
  else if(n.nodeType==='apex')S.apexBiology={...S.apexBiology,unlockedNodes:[...S.apexBiology.unlockedNodes,id]};
  else{S.techTree={...S.techTree,unlockedNodes:[...S.techTree.unlockedNodes,id]};S.apexBiology={...S.apexBiology,eligible:false}}
  render();
}
function sellNode(id){
  if(allOwned().some(x=>NODES[x]?.prerequisite===id))return;
  const n=NODES[id];
  if(n.nodeType==='bio')S.archetypes={...S.archetypes,unlockedNodes:S.archetypes.unlockedNodes.filter(x=>x!==id)};
  else if(n.nodeType==='apex')S.apexBiology={...S.apexBiology,unlockedNodes:S.apexBiology.unlockedNodes.filter(x=>x!==id)};
  else{S.techTree={...S.techTree,unlockedNodes:S.techTree.unlockedNodes.filter(x=>x!==id)};
    if(!S.techTree.unlockedNodes.length)S.apexBiology={...S.apexBiology,eligible:true}}
  render();
}

// ── SUGGESTIONS ───────────────────────────────────────────────────────────────
function suggestArch(){
  const sc={predator:0,defender:0,sensor:0,adaptor:0,regenerator:0,apexStriker:0};
  for(const{qId,aId,p,s}of Q_ARCH_MAP){if(S.specimenQ[qId]===aId){sc[p]+=1;if(s)sc[s]+=0.5}}
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  return{primary:sorted[0][0],secondary:sorted[1][0]};
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function e(s){return String(s||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function getArchChain(archKey){
  const arch=BIO_DATA.archetypes[archKey];if(!arch)return[];
  const chain=arch.nodes.universal.map(n=>n.id);
  if(S.planet){(arch.nodes.planetExclusive[S.planet]||[]).forEach(n=>chain.push(n.id))}
  return chain;
}
function isStepDone(i){
  if(i===0)return SPECIMEN_QS.every(q=>S.specimenQ[q.id]);
  if(i===1)return!!S.sizeId&&S.bodyMotionStep>=5;
  if(i===2)return STAT_KEYS.every(k=>S.statAssign[k]);
  if(i===3)return !!(S.cantrip?.dmgType&&S.cantrip?.stat&&S.cantrip?.delivery&&(S.cantrip?.delivery!=='aoe'||S.cantrip?.aoeShape));
  if(i===4)return!!(S.archetypes?.primary)&&(S.archetypes?.unlockedNodes||[]).length>0;
  if(i===5)return false;
  return false;
}
function primaryStat(fs){return STAT_KEYS.reduce((b,k)=>fs[k]>fs[b]?k:b,"STR")}

// ── HTML HELPERS ──────────────────────────────────────────────────────────────
function chainHTML(archKey){
  const chain=getArchChain(archKey),owned=S.archetypes?.unlockedNodes||[];
  return '<div class="chain">'+chain.map((id,i)=>{
    const isO=owned.includes(id),n=NODES[id],isX=n?.planetExclusive;
    const cls=isO?'owned':isX?'excl':'';
    const line=i>0?`<div class="chain-line${isO||owned.includes(chain[i-1])?' done':''}"></div>`:'';
    return line+`<div class="chain-dot ${cls}" title="${e(n?.name||'')}">${i+1}</div>`;
  }).join('')+'</div>';
}
function mechHTML(m){
  const tag=m.type==='active'?'▶ Active':m.type==='zone'?'⬡ Zone':'◆ Passive';
  const cls=`mt-${m.type}`;
  const nm=m.name?`<span class="mname">${e(m.name)}: </span>`:'';
  const uses=m.uses?`<span style="color:var(--ac2);font-family:'Orbitron',monospace;font-size:.5rem">[${e(m.uses)}] </span>`:'';
  return `<div class="mrow"><span class="mtag ${cls}">${tag}</span><div class="mtxt">${nm}${uses}${e(m.text)}</div></div>`;
}
function nodeCardHTML(id,showLocked=true){
  const n=NODES[id];if(!n)return'';
  const owned=allOwned().includes(id);
  const chk=canBuy(id),avail=!owned&&chk.ok,locked=!owned&&!avail;
  if(locked&&!showLocked)return'';
  const c=nodeCostDisc(id),orig=n.cost,hasDisc=c<orig;
  const epochLbl=n.tier<=2?'E1':n.tier===3?'E2':'E3';
  const planLbl=n.planetExclusive?` · ${PLANETS[n.planet]?.icon||''} Excl`:'';
  const cardCls=owned?'owned':avail?'avail':locked?'locked':'';
  const hdrBg=owned?'rgba(255,170,0,.08)':avail?'rgba(204,51,0,.1)':'var(--sur2)';
  const nameCol=owned?'var(--gr)':avail?'var(--ac)':'var(--dm)';
  const epCol=owned?'var(--gr)':avail?'var(--gd)':'var(--dm)';
  const discH=hasDisc?`<span style="text-decoration:line-through;opacity:.5;margin-right:3px">${orig}</span>`:'';
  const btnH=avail?`<button class="btn" style="background:var(--ac);color:#000;padding:2px 8px;font-size:.5rem;margin-top:3px" data-buy="${id}">Buy</button>`
    :owned?`<button class="btn-d" style="font-size:.5rem;margin-top:3px" data-sell="${id}">Sell</button>`
    :locked?`<div style="font-size:.5rem;color:var(--dm);font-family:'Orbitron',monospace;margin-top:2px">${e(chk.why)}</div>`:'';
  const bodyH=(owned||avail)?`<div class="node-body">
    <div class="node-flavor">${e(n.flavorText||'')}</div>
    ${(n.mechanics||[]).map(mechHTML).join('')}
  </div>`:(locked&&showLocked)?`<div class="node-body"><div class="node-flavor">${e(n.flavorText||'')}</div></div>`:'';
  return `<div class="node-card ${cardCls}">
    <div class="node-hdr" style="background:${hdrBg}">
      <div>
        <div class="node-name" style="color:${nameCol}">${owned?'✓ ':''}${e(n.name)}</div>
        <div class="node-epoch">${epochLbl}${planLbl}</div>
      </div>
      <div style="text-align:right">
        <div class="node-ep" style="color:${epCol}">${discH}${c} EP</div>
        ${btnH}
      </div>
    </div>${bodyH}
  </div>`;
}

      <ellipse cx="${(S*.37).toFixed(1)}" cy="${(S*.33).toFixed(1)}" rx="${(S*.09).toFixed(1)}" ry="${(S*.05).toFixed(1)}" fill="rgba(220,170,100,.1)" transform="rotate(-25,${(S*.37).toFixed(1)},${(S*.33).toFixed(1)})"/>
      ${anim?`<style>@keyframes pyr-vein-pulse{0%,100%{opacity:.2}50%{opacity:.55}}</style>`:''}
    </svg>`;
  }

  return '';
}

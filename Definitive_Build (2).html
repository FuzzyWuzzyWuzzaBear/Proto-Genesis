function renderSplash(){
  const keys=Object.keys(PLANETS),pk=keys[SPLASH_IDX],pl=PLANETS[pk];
  const ac=pl.palette.ac;
  const canP=SPLASH_IDX>0,canN=SPLASH_IDX<keys.length-1;
  let trialHTML='';
  if(pl.trials.length){
    trialHTML=`<div style="font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.15em;color:var(--dm);text-transform:uppercase;margin-bottom:8px">Trials</div>`;
    for(let i=0;i<pl.trials.length;i++){
      const t=pl.trials[i],isOpen=SPLASH_TRIAL===i;
      trialHTML+=`<div style="margin-bottom:8px;border-radius:8px;border:1px solid ${isOpen?ac+'66':' var(--bdr)'};overflow:hidden">
        <div data-trial="${i}" style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;background:var(--sur2)">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-family:'Orbitron',monospace;font-size:.56rem;font-weight:700;color:${ac}">${t.points}</span>
            <span style="font-size:.82rem;font-weight:600">${e(t.label)}</span>
          </div>
          <span style="color:var(--dm);font-size:.8rem">${isOpen?'▲':'▼'}</span>
        </div>
        ${isOpen?`<div style="padding:10px 12px;border-top:1px solid ${ac}33;background:var(--sur)">
          <div style="font-size:.7rem;color:var(--dm);line-height:1.6;margin-bottom:8px">${e(t.challenge)}</div>
          ${t.refresh?`<div style="display:flex;gap:6px;margin-bottom:6px;align-items:flex-start">
            <span style="font-size:.68rem;flex-shrink:0">${t.refresh.includes('NO')?'⚠':'✓'}</span>
            <span style="font-size:.66rem;color:${t.refresh.includes('NO')?'var(--rd)':'var(--dm)'}">${e(t.refresh)}</span>
          </div>`:''}
          ${t.tips?.length?`<div style="font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.12em;color:var(--dm);text-transform:uppercase;margin-bottom:5px">Build Tips</div>
          ${t.tips.map(tip=>`<div style="display:flex;gap:6px;margin-bottom:3px"><span style="color:${ac};font-size:.62rem;flex-shrink:0">›</span><span style="font-size:.66rem;color:var(--dm)">${e(tip)}</span></div>`).join('')}`:''}
        </div>`:''}
      </div>`;
    }
  }
  let warnHTML='';
  if(pl.warnings.length){
    warnHTML=`<div style="font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.15em;color:var(--dm);text-transform:uppercase;margin:12px 0 8px">Warnings</div>
    ${pl.warnings.map(w=>`<div style="display:flex;gap:6px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--bdr)">
      <span style="color:${ac};flex-shrink:0">⚠</span><span style="font-size:.7rem;color:var(--dm)">${e(w)}</span>
    </div>`).join('')}`;
  }
  return `
  <div style="min-height:100vh;background:var(--bg);display:flex;flex-direction:column">
    <div style="padding:28px 20px 14px;text-align:center;background:linear-gradient(180deg,${ac}18 0%,transparent 100%)">
      <div style="display:flex;align-items:center;justify-content:center;gap:14px">
        <button data-splashprev="1" ${!canP?'disabled':''} style="background:none;border:1px solid var(--bdr);border-radius:50%;width:36px;height:36px;color:var(--dm);font-size:1.1rem;cursor:pointer">‹</button>
        <div style="font-family:'Orbitron',monospace;font-size:clamp(2rem,9vw,3rem);font-weight:900;color:${ac};letter-spacing:.04em">${pl.name.toUpperCase()}</div>
        <button data-splashnext="1" ${!canN?'disabled':''} style="background:none;border:1px solid var(--bdr);border-radius:50%;width:36px;height:36px;color:var(--dm);font-size:1.1rem;cursor:pointer">›</button>
      </div>
      <div style="font-family:'Orbitron',monospace;font-size:.62rem;color:var(--dm);letter-spacing:.15em;margin-top:4px">${e(pl.tagline)}</div>
      <div style="display:flex;gap:6px;justify-content:center;margin-top:10px">
        ${keys.map((_,i)=>`<div style="width:6px;height:6px;border-radius:50%;background:${i===SPLASH_IDX?ac:'var(--bdr)'}"></div>`).join('')}
      </div>
    </div>
    <div style="padding:0 20px;max-width:600px;margin:0 auto;width:100%;flex:1">
      <!-- Planet portrait -->
      <div style="display:flex;justify-content:center;margin:16px 0 20px">
        <div style="position:relative;filter:drop-shadow(0 0 18px ${ac}55)">
          ${planetSVG(pk, 160, true)}
        </div>
      </div>
      <div style="font-size:.78rem;color:var(--dm);line-height:1.7;margin:0 0 10px">${e(pl.lore)}</div>
      ${trialHTML}${warnHTML}
    </div>
    <div style="padding:20px 20px 36px;max-width:600px;margin:0 auto;width:100%">
      ${pl.locked
        ?`<div style="width:100%;padding:14px;background:var(--sur);color:var(--dm);border-radius:8px;font-family:'Orbitron',monospace;font-size:.6rem;text-align:center;letter-spacing:.1em">— World Locked —</div>`
        :`<button data-beginevol="${pk}" style="width:100%;padding:14px;background:${ac};color:#000;border:none;border-radius:8px;font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;letter-spacing:.1em;cursor:pointer">Begin Evolution →</button>`
      }
    </div>
  </div>`;
}

// ── BODY & MOTION FLAVOR GENERATOR ───────────────────────────────────────────
function generateBMFlavor(S){
  const sz=SIZES.find(x=>x.id===S.sizeId);
  const hd=S.hdChoice||'1d4';
  const am=S.altMoves||{};
  const lq=S.landQuick||0;
  const spd=getSpeed();
  const baseSpd=sz?.speed||20; // size's native land speed
  const ownedAlt=ALT_MOVES.filter(m=>am[m.id]?.owned);
  const hasBlink=S.blinkstep?.purchased;

  // Size sentence — remove "fast" framing for tiny/small since they aren't inherently fast
  const szPhrases={
    tiny:'A tiny frame — low-profile, built for angles and concealment rather than mass.',
    small:'A small frame — nimble and precise, trading mass for deflection and mobility.',
    medium:'A medium frame — adaptable architecture, no single trait dominant, no obvious weakness.',
    large:'A large frame — mass is the primary tool. Everything this creature does, it does through presence.',
  };
  const s1=szPhrases[S.sizeId]||'';

  // Hit die sentence
  const hdPhrases={
    '1d4':'Structurally fragile — this creature survives through evasion, not absorption.',
    '1d6':'Lightly built — takes damage but not designed to.',
    '1d8':'Moderate durability — built to weather a fight, not necessarily win one on attrition.',
    '1d10':'Durable — designed to take punishment and remain functional.',
    '1d12':'Heavily built — damage is an expected part of operating in this body.',
    '2d8':'Exceptionally resilient — this creature is designed to absorb significant punishment and continue.',
  };
  const s2=hdPhrases[hd]||'';

  // Movement sentence — speed described relative to size baseline
  const spdDelta=spd-baseSpd; // how much above size base
  let spdDesc;
  if(spdDelta<=0)        spdDesc=`${spd}ft land speed — baseline for its size`;
  else if(spdDelta<=5)   spdDesc=`${spd}ft land speed — slightly above baseline`;
  else if(spdDelta<=10)  spdDesc=`${spd}ft land speed — meaningfully faster than baseline`;
  else if(spdDelta<=15)  spdDesc=`${spd}ft land speed — notably fast for its frame`;
  else                   spdDesc=`${spd}ft land speed — exceptionally fast, well beyond baseline`;

  const movParts=[spdDesc];
  ownedAlt.forEach(m=>{
    const labels={
      aquatic:'aquatic movement (breathes underwater)',
      burrower:'burrowing capability (bypasses terrain)',
      climb:'climb speed (full speed on walls and ceilings)',
      flight:'true flight (ignores ground terrain entirely)',
    };
    movParts.push(labels[m.id]||m.label);
  });
  if(hasBlink){
    const at=S.blinkstep.actionType||'action';
    const dist=30+(S.blinkstep.distance||0)*10;
    const atLabel={action:'action',bonus:'bonus action',reaction:'reaction'}[at]||at;
    movParts.push(`Blink Step — ${dist}ft teleport as ${atLabel}`);
  }
  const s3=movParts.length===1
    ?`Movement: ${movParts[0]}.`
    :`Movement: ${movParts[0]}. Additional: ${movParts.slice(1).join(', ')}.`;

  return [s1,s2,s3].filter(Boolean).join(' ');
}

// ── STEP 2: STATS ─────────────────────────────────────────────────────────────
function renderStep2(){
  const ARRAY=[16,15,14,12,10,8];
  const assign=S.statAssign||{},pending=S.statPending,epB=S.statEPBonuses||{};
  const used=Object.values(assign);
  const avail=[...new Set(ARRAY.filter(v=>used.filter(u=>u===v).length<ARRAY.filter(a=>a===v).length))];
  const allAssigned=ARRAY.every(v=>used.includes(v));
  const globalBonusTotal=Object.values(epB).reduce((t,v)=>t+(v||0),0);
  function globalNextCost(){ return globalBonusTotal===0?5:globalBonusTotal===1?10:20; }
  let html=`<div class="panel"><div class="ph"><h2>Ability Scores</h2></div><div class="pb">
    <div class="sec" style="margin-top:0">Standard Array — tap a value, then tap a stat</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">`;
  for(const v of ARRAY){
    const isUsed=used.includes(v),isSel=pending===v;
    html+=`<div data-statval="${v}" style="font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;padding:8px 12px;border-radius:6px;cursor:${isUsed?'default':'pointer'};border:1px solid ${isSel?'var(--ac)':isUsed?'var(--bdr)':'var(--bdr)'};background:${isSel?'rgba(255,107,53,.1)':isUsed?'rgba(255,255,255,.03)':'var(--sur2)'};color:${isUsed?'var(--dm)':isSel?'var(--ac)':'var(--tx)'};opacity:${isUsed?.45:1}">${v}</div>`;
  }
  html+=`</div><div class="stats-g">`;
  for(const k of STAT_KEYS){
    const base=assign[k],epb=epB[k]||0,final=base?base+epb:null;
    const isTarget=pending!==null&&!base;
    const nextCost=globalNextCost();
    const atGlobalMax=globalBonusTotal>=3;
    html+=`<div class="sbox${isTarget?' sel':''}" data-statkey="${k}" style="${isTarget?'border-color:var(--ac);':''}">
      <div class="sn">${k}</div>
      ${final!==null
        ?`<div class="sv" style="color:var(--ac)">${final}</div>
           <div class="sm">${fmtMod(statMod(final))}</div>
           <div style="display:flex;align-items:center;justify-content:center;gap:3px;margin-top:5px">
             <button data-statdown="${k}" ${epb===0?'disabled':''} class="sub-btn" style="padding:0 7px;font-size:.85rem;line-height:1.6" >−</button>
             <span style="font-family:'Orbitron',monospace;font-size:.52rem;color:${epb>0?'var(--ac3)':'var(--dm)'};min-width:20px;text-align:center">${epb>0?'+'+epb+' ↑':'EP'}</span>
             <button data-statup="${k}" ${atGlobalMax?'disabled':''} class="sub-btn sa" style="padding:0 5px;font-size:.48rem;line-height:1.6" >+${nextCost}</button>
           </div>
           <button class="btn-d" style="font-size:.46rem;padding:1px 4px;margin-top:4px;width:100%;letter-spacing:.04em" data-statclear="${k}">× clear</button>`
        :`<div style="font-family:'Orbitron',monospace;font-size:1.4rem;color:var(--dm)">—</div>`
      }
    </div>`;
  }
  html+=`</div>`;
  if(pending!==null)html+=`<div style="margin-top:8px;font-size:.72rem;color:var(--ac);text-align:center">Tap a stat to assign <strong>${pending}</strong></div>`;
  if(allAssigned&&pending===null)
    html+=`<button class="btn btn-p" style="width:100%;padding:11px;font-size:.7rem;margin-top:12px" data-goto="3">Abilities →</button>`;
  html+=`</div></div>`;
  return html;
}

// ── STEP 3: ABILITIES ─────────────────────────────────────────────────────────
function renderStep3(){
  const c=S.cantrip,abs=S.abilities||[],fs=getFinalStats(),rem=remaining();
  const e2=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // ── helpers ──
  function dieCarousel(die,upKey,downKey,actionType,delivery,label){
    const tbl=getDieCosts(actionType||'action',delivery||'melee');
    const cost=tbl[die]||0,baseCost=tbl['1d4']||0,upgrade=cost-baseCost;
    const idx=DIE_LIST.indexOf(die||'1d4');
    const dots=DIE_LIST.map((_,i)=>`<div style="width:5px;height:5px;border-radius:50%;background:${i===idx?'var(--ac)':'var(--bdr)'}"></div>`).join('');
    return `${label?`<div class="sec">${label}</div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0">
      <button data-diedown="${downKey}" ${idx===0?'disabled':''} style="background:none;border:1px solid var(--bdr);border-radius:6px;padding:7px 14px;color:var(--dm);font-size:1.1rem;cursor:pointer">&minus;</button>
      <div style="text-align:center">
        <div style="display:flex;justify-content:center;margin-bottom:4px">${dieSVG(die||'1d4','var(--gd)')}</div>
        <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:1.6rem;color:var(--gd)">${die||'1d4'}</div>
        <div style="font-size:.6rem;color:${upgrade>0?'var(--ac3)':'var(--dm)'}">${upgrade>0?'+'+upgrade+' EP':'Base &mdash; free'}</div>
        <div style="display:flex;gap:4px;justify-content:center;margin-top:5px">${dots}</div>
      </div>
      <button data-dieup="${upKey}" ${idx===DIE_LIST.length-1?'disabled':''} style="background:none;border:1px solid var(--bdr);border-radius:6px;padding:7px 14px;color:var(--dm);font-size:1.1rem;cursor:pointer">+</button>
    </div>`;
  }

  // extraDiceSection: shows each extra die as a mini carousel, plus Add Die button
  // prefix = "c" (cantrip) or ability id
  // actionType/delivery needed for cost calculation
  function extraDiceSection(extraDice, prefix, actionType, delivery){
    const MAX_EXTRA=3;
    let h=`<div class="sec" style="margin-bottom:8px">Additional Dice <span style="font-size:.6em;font-weight:400;color:var(--dm)">(5 EP unlock + double upgrade cost each)</span></div>`;
    // Each purchased die gets a carousel
    extraDice.forEach((die,idx)=>{
      const dIdx=DIE_LIST.indexOf(die);
      const cost=5+dieCost(die,actionType||'action',delivery||'melee')*2;
      h+=`<div style="background:var(--sur2);border:1px solid rgba(255,107,53,.3);border-radius:8px;padding:8px 12px;margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <div style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);letter-spacing:.1em">DIE ${idx+1}</div>
          <button data-extradie="${prefix}:remove:${idx}" style="font-family:'Orbitron',monospace;font-size:.48rem;padding:2px 7px;background:none;border:1px solid var(--bdr);border-radius:4px;color:var(--dm);cursor:pointer">✕ REMOVE</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="display:flex;justify-content:center;margin-bottom:2px">${dieSVG(die,'var(--ac)')}</div>
          <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:1.2rem;color:var(--ac)">${die}</div>
            <div style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--ac3)">${cost} EP</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <button data-extradie="${prefix}:down:${idx}" ${dIdx<=0?'disabled':''} class="sub-btn" style="padding:3px 14px;font-size:1rem">−</button>
            <div style="font-family:'Orbitron',monospace;font-size:.6rem;color:var(--dm)">${dIdx+1}/${DIE_LIST.length}</div>
            <button data-extradie="${prefix}:up:${idx}" ${dIdx>=DIE_LIST.length-1?'disabled':''} class="sub-btn sa" style="padding:3px 14px;font-size:1rem">+</button>
          </div>
        </div>
      </div>`;
    });
    // Add Die button (if under cap)
    if(extraDice.length<MAX_EXTRA){
      const unlockCost=5;
      h+=`<button data-extradie="${prefix}:add" class="sub-btn" style="width:100%;padding:8px;font-size:.6rem;font-family:'Orbitron',monospace;letter-spacing:.08em;margin-bottom:12px">
        + ADD DIE &nbsp;<span style="opacity:.6">${unlockCost} EP unlock + upgrade cost</span>
      </button>`;
    } else {
      h+=`<div style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);text-align:center;margin-bottom:12px">MAX 3 ADDITIONAL DICE</div>`;
    }
    return h;
  }



  // Shape size stepper — works for all 4 AoE shapes
  function shapeRangeRow(shape, stacks, upKey, downKey, col){
    const CFG={
      line: {base:15,step:5,unit:'ft long',label:'LENGTH — BASE 15ft',stepLabel:'+5ft length'},
      cone: {base:15,step:5,unit:'ft cone',label:'CONE SIZE — BASE 15ft',stepLabel:'+5ft cone'},
      burst:{base:5, step:5,unit:'ft radius',label:'RADIUS — BASE 5ft',stepLabel:'+5ft radius'},
      splash:{base:5,step:5,unit:'ft radius',label:'BLAST RADIUS — BASE 5ft',stepLabel:'+5ft blast radius'},
    };
    const cfg=CFG[shape]||CFG.splash;
    const curFt=cfg.base+stacks*cfg.step;
    const nextCost=stacks<QUICK_MAX?quickStackCost(stacks+1):null;
    const totalCost=quickTotalCost(stacks);
    return `<div style="margin-bottom:12px;padding:10px 14px;background:var(--sur2);border:1px solid rgba(255,107,53,.25);border-radius:8px">
      <div style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);letter-spacing:.1em;margin-bottom:6px">${cfg.label}</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="display:flex;align-items:baseline;gap:8px">
            <span style="font-family:'Orbitron',monospace;font-weight:900;font-size:1.2rem;color:${col}">${curFt}ft</span>
            ${totalCost>0?`<span style="font-family:'Orbitron',monospace;font-size:.52rem;color:var(--ac3)">+${totalCost} EP</span>`:''}
          </div>
          <div style="font-size:.58rem;color:var(--dm)">${cfg.stepLabel}${nextCost?' · next: '+nextCost+' EP':' · max reached'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button data-splashq="${downKey}" ${stacks===0?'disabled':''} class="sub-btn" style="padding:3px 12px;font-size:1rem">−</button>
          <div style="font-family:'Orbitron',monospace;font-size:.75rem;color:var(--dm);min-width:14px;text-align:center">${stacks}</div>
          <button data-splashq="${upKey}" ${stacks>=QUICK_MAX?'disabled':''} class="sub-btn sa" style="padding:3px 12px;font-size:1rem">+</button>
        </div>
      </div>
    </div>`;
  }
  function splashRangeRow(stacks, upKey, downKey, col){ return shapeRangeRow('splash',stacks,upKey,downKey,col); }

  // ── Stat carousel — replaces statPicker dropdowns ─────────────────────────
  function statCarousel(current, dataKeyPrefix, healOnly, accentCol){
    const keys=healOnly?['INT','WIS','CHA','CON']:['STR','DEX','CON','INT','WIS','CHA'];
    const _sidxKey=dataKeyPrefix; const curIdx=STAT_IDX[_sidxKey]!==undefined?STAT_IDX[_sidxKey]:Math.max(0,keys.indexOf(current||keys[0]));
    const k=keys[curIdx];
    const sm=STAT_META[k]||{icon:'?',color:'var(--ac)',label:k,flavor:''};
    const mod=statMod(fs[k]||10);
    const pips=keys.map((_,i)=>{
      const sz=i===curIdx?'9px':'6px';
      const col=keys[i]===current?accentCol:i===curIdx?'var(--dm)':'var(--bdr)';
      return `<div style="width:${sz};height:${sz};border-radius:50%;background:${col};transition:all .15s;flex-shrink:0"></div>`;
    }).join('');
    const isSel=current===k;
    return `<div style="border:1px solid ${isSel?sm.color:'var(--bdr)'};border-radius:10px;overflow:hidden;transition:border-color .2s;margin-bottom:8px">
      <div class="pb" style="padding-top:14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button data-statprev="${dataKeyPrefix}" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&lsaquo;</button>
          <div style="flex:1;display:flex;justify-content:center;gap:6px;align-items:center">${pips}</div>
          <button data-statnext="${dataKeyPrefix}" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&rsaquo;</button>
        </div>
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:2.2rem;margin-bottom:6px">${sm.icon}</div>
          <div style="font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:${sm.color};letter-spacing:.06em;margin-bottom:4px">${sm.label.toUpperCase()}</div>
          <div style="font-family:'Orbitron',monospace;font-size:.8rem;color:${sm.color};margin-bottom:8px">${fmtMod(mod)}</div>
          ${isSel?`<div style="display:inline-block;font-family:'Orbitron',monospace;font-size:.5rem;padding:2px 7px;border-radius:3px;background:${sm.color};color:#000;font-weight:700;margin-bottom:8px">SELECTED</div><br>`:''}
          <div style="font-size:.82rem;color:var(--tx);opacity:.82;line-height:1.65;max-width:360px;margin:0 auto;padding:0 8px">${sm.flavor}</div>
        </div>
        <button data-pick="${dataKeyPrefix}:${k}" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem;background:${sm.color};color:#000">
          ${isSel?'&#10003; Confirm '+k+' &rarr;':'Select '+k+' &rarr;'}
        </button>
      </div>
    </div>`;
  }

  // ── Damage type carousel — replaces dmgTypePicker chip grid ───────────────
  function dmgTypeCarousel(current, dataKeyPrefix, accentCol){
    const types=DMG_TYPES;
    const _didxKey=dataKeyPrefix; const curIdx=DMG_IDX[_didxKey]!==undefined?DMG_IDX[_didxKey]:Math.max(0,types.indexOf(current||types[0]));
    const t=types[curIdx];
    const dm=DMG_META[t]||{icon:'?',color:'var(--ac)',flavor:''};
    const pips=types.map((_,i)=>{
      const sz=i===curIdx?'9px':'6px';
      const col=types[i]===current?accentCol:i===curIdx?'var(--dm)':'var(--bdr)';
      return `<div style="width:${sz};height:${sz};border-radius:50%;background:${col};transition:all .15s;flex-shrink:0"></div>`;
    }).join('');
    const isSel=current===t;
    return `<div style="border:1px solid ${isSel?dm.color:'var(--bdr)'};border-radius:10px;overflow:hidden;transition:border-color .2s;margin-bottom:8px">
      <div class="pb" style="padding-top:14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button data-dmgprev="${dataKeyPrefix}" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&lsaquo;</button>
          <div style="flex:1;display:flex;justify-content:center;gap:6px;align-items:center">${pips}</div>
          <button data-dmgnext="${dataKeyPrefix}" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&rsaquo;</button>
        </div>
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:2.2rem;margin-bottom:6px">${dm.icon}</div>
          <div style="font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:${dm.color};letter-spacing:.06em;margin-bottom:10px">${t.toUpperCase()}</div>
          ${isSel?`<div style="display:inline-block;font-family:'Orbitron',monospace;font-size:.5rem;padding:2px 7px;border-radius:3px;background:${dm.color};color:#000;font-weight:700;margin-bottom:8px">SELECTED</div><br>`:''}
          <div style="font-size:.82rem;color:var(--tx);opacity:.82;line-height:1.65;max-width:360px;margin:0 auto;padding:0 8px">${dm.flavor}</div>
        </div>
        <button data-pick="${dataKeyPrefix}:${t}" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem;background:${dm.color};color:#000">
          ${isSel?'&#10003; Confirm '+t+' &rarr;':'Select '+t+' &rarr;'}
        </button>
      </div>
    </div>`;
  }

  // ── Combined stat+dmg step: stat carousel first, then dmg carousel ─────────
  function statDmgCarousels(currentStat, currentDmg, statKeyPrefix, dmgKeyPrefix, healOnly, accentCol){
    // Derive the "confirmed" key: the ability ID part of statKeyPrefix (e.g. 'c' or abId)
    const _scKey=statKeyPrefix.split(':')[0]==='c'?'c':statKeyPrefix.split(':')[0];
    const _statConfirmed=STAT_CONFIRMED.has(_scKey)&&!!currentStat;

    if(!_statConfirmed){
      // Step A: stat carousel open, damage type hidden
      let h=`<div class="sec" style="margin-bottom:8px">Attack Stat</div>`;
      h+=statCarousel(currentStat, statKeyPrefix, healOnly, accentCol);
      return h;
    } else {
      // Step B: stat confirmed — collapsed chip + damage type carousel open
      const sm=STAT_META[currentStat]||{icon:'?',color:accentCol,label:currentStat};
      const mod=statMod(fs[currentStat]||10);
      let h=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.25);border:1px solid ${sm.color}44;border-radius:8px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:1.3rem">${sm.icon}</span>
          <div>
            <div style="font-family:'Orbitron',monospace;font-size:.62rem;font-weight:900;color:${sm.color};letter-spacing:.06em">${currentStat} <span style="font-size:.55rem;opacity:.7">${fmtMod(mod)}</span></div>
            <div style="font-size:.6rem;color:var(--dm)">Attack Stat</div>
          </div>
        </div>
        <button data-statreopen="${_scKey}" style="font-family:'Orbitron',monospace;font-size:.48rem;color:var(--dm);background:none;border:1px solid var(--bdr);border-radius:4px;padding:3px 8px;cursor:pointer;letter-spacing:.06em">CHANGE</button>
      </div>`;
      h+=`<div class="sec" style="margin-bottom:8px">Damage Type</div>`;
      h+=dmgTypeCarousel(currentDmg, dmgKeyPrefix, accentCol);
      return h;
    }
  }

  function sentenceHeader(parts, color){
    const col=color||'var(--ac)';
    return `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-bottom:12px;padding:7px 10px;background:rgba(0,0,0,.25);border-radius:7px;border:1px solid var(--bdr)">
      ${parts.map((p,i)=>`${i>0?`<span style="color:var(--dm);font-size:.6rem;opacity:.5">&rsaquo;</span>`:''}
      <span data-chipopen="${p.key||i}" style="font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:4px;cursor:${p.locked?'pointer':'default'};color:${p.locked?col:'var(--dm)'};background:${p.locked?col+'18':'transparent'};border:${p.locked?'1px solid '+col+'40':'1px dashed var(--bdr)'};opacity:${p.locked?1:.45}">${e2(p.label)}</span>`).join('')}
    </div>`;
  }

  // ── CANTRIP BUILDER ──────────────────────────────────────────────────────────
  // Determine the natural next step (what's still missing)
  const cantripDone=(CANTRIP_SEC==='confirmed')||(c.delivery&&(c.delivery!=='aoe'||c.aoeShape)&&c.stat&&c.dmgType);
  const cantripShapeRangeEP=c.aoeShape==='splash'?quickTotalCost(c.splashRange||0):c.aoeShape==='line'?quickTotalCost(c.lineRange||0):c.aoeShape==='cone'?quickTotalCost(c.coneRange||0):c.aoeShape==='burst'?quickTotalCost(c.burstRange||0):0;
  const cantripEP=dieTotalCost(c.die||'1d4')+(c.extraDice||[]).reduce((t,d)=>t+5+dieTotalCost(d)*2,0)+cantripShapeRangeEP;

  // Which step is the active one (first incomplete step):
  // 'delivery' → 'aoeShape' (if aoe) → 'statdmg' (stat+dmgType combined) → 'die'
  function cantripActiveStep(){
    if(!c.delivery) return 'delivery';
    if(c.delivery==='aoe'&&!c.aoeShape) return 'aoeShape';
    if(!c.stat||!c.dmgType) return 'statdmg';
    return 'die';
  }
  // The open step: if CANTRIP_SEC is set (user tapped a chip), show that; else show natural next step
  // If CANTRIP_SEC is a pending delivery value ('dlv:xxx'), cStep = 'delivery'
  const cStep = (CANTRIP_SEC&&CANTRIP_SEC.startsWith('dlv:')) ? 'delivery' : (CANTRIP_SEC&&CANTRIP_SEC.startsWith('shape:')) ? 'aoeShape' : (CANTRIP_SEC || cantripActiveStep());

  // Build sentence header chips
  const cParts=[];
  const dLabel=c.delivery==='melee'?'Melee':c.delivery==='ranged'?'Ranged':c.delivery==='aoe'?'AoE':null;
  cParts.push({label:dLabel||'Delivery',locked:!!c.delivery,key:'c:delivery'});
  if(c.delivery==='aoe') cParts.push({label:c.aoeShape?c.aoeShape.charAt(0).toUpperCase()+c.aoeShape.slice(1):'Shape',locked:!!c.aoeShape,key:'c:aoeShape'});
  if(c.stat)  cParts.push({label:c.stat,locked:true,key:'c:statdmg'});
  if(c.dmgType) cParts.push({label:c.dmgType,locked:true,key:'c:statdmg'});
  if(!c.stat||!c.dmgType) cParts.push({label:c.stat?c.dmgType||'Damage Type':c.dmgType?c.stat||'Stat':'Stat + Type',locked:false,key:'c:statdmg'});
  cParts.push({label:c.die||'1d4',locked:true,key:'c:die'});
  for(const d of c.extraDice||[]) cParts.push({label:'+'+d,locked:true,key:'c:die'});

  // When confirmed, show collapsed chip with tap-to-edit
  let cantripHTML='';
  if(cStep==='confirmed'){
    const parts=[
      c.delivery==='melee'?'Melee':c.delivery==='ranged'?'Ranged':'AoE'+(c.aoeShape?' ('+c.aoeShape.charAt(0).toUpperCase()+c.aoeShape.slice(1)+')':''),
      c.stat,c.dmgType,c.die||'1d4',...(c.extraDice||[]).map(d=>'+'+d)
    ].filter(Boolean).join(' \u203a ');
    cantripHTML=`<div class="panel" style="border-color:rgba(255,170,0,.35);cursor:pointer" data-cantopen="delivery">
      <div style="padding:12px 16px">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px">
          <span style="font-family:'Orbitron',monospace;font-weight:900;font-size:.65rem;color:var(--gr)">CANTRIP</span>
          <span style="font-family:'Orbitron',monospace;font-size:.52rem;color:var(--dm)">tap to edit</span>
        </div>
        <div style="font-family:'Orbitron',monospace;font-size:.72rem;color:var(--gr);margin-bottom:${cantripEP>0?4:0}px">${parts}</div>
        ${cantripEP>0?`<div style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--ac3)">${cantripEP} EP</div>`:''}
      </div>
    </div>`;
  }

  let html = cantripHTML || `<div class="panel" style="border-color:rgba(255,170,0,.4)">
    <div class="ph">
      <h2 style="color:var(--gr)">CANTRIP</h2>
      <span style="font-size:.6rem;color:var(--dm);margin-left:auto">&infin; uses &bull; No Properties${cantripEP>0?' &bull; '+cantripEP+' EP':''}</span>
    </div>
    <div class="pb">
      <div class="info" style="margin-bottom:10px">Your natural attack &mdash; always available, never expended.</div>
      ${sentenceHeader(cParts,'var(--gr)')}`;

  if(!cantripHTML && cStep==='delivery'){
    const _do=[{id:'melee',label:'Melee',sub:'5ft reach',cost:'base',ep:'',icon:'🦷'},{id:'ranged',label:'Ranged',sub:'60ft range',cost:'+5 EP',ep:'+5',icon:'🎯'},{id:'aoe',label:'AoE',sub:'Shape required',cost:'+10 EP',ep:'+10',icon:'💥'}];
    // Pending = what arrows have navigated to; committed = what was last confirmed
    const _pending=CANTRIP_SEC&&CANTRIP_SEC.startsWith('dlv:')?CANTRIP_SEC.slice(4):null;
    const _dSel=_pending||c.delivery||'melee';
    const _dIdx=_do.findIndex(x=>x.id===_dSel);
    const _committed=c.delivery;
    html+=`<div class="sec" style="margin-bottom:8px">Delivery</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <button data-dlvprev="c" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&lsaquo;</button>
      <div style="flex:1;text-align:center">
        <div style="font-size:2.2rem;margin-bottom:6px">${_do[_dIdx]?.icon||''}</div>
        <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:1.6rem;color:var(--gr)">${_do[_dIdx]?.label||''}</div>
        <div style="font-size:.66rem;color:var(--dm);margin-top:2px">${_do[_dIdx]?.sub||''}</div>
        <div style="font-family:'Orbitron',monospace;font-size:.54rem;color:${_do[_dIdx]?.ep?'var(--ac3)':'var(--dm)'};margin-top:2px">${_do[_dIdx]?.cost||'base'}</div>
        <div style="display:flex;gap:5px;justify-content:center;margin-top:8px">
          ${_do.map((_,i)=>`<div style="width:7px;height:7px;border-radius:50%;background:${i===_dIdx?'var(--gr)':'var(--bdr)'};transition:background .15s"></div>`).join('')}
        </div>
      </div>
      <button data-dlvnext="c" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&rsaquo;</button>
    </div>
    <button data-cantpick="delivery:${_dSel}" class="btn btn-p" style="width:100%;padding:10px;font-size:.68rem">Confirm Delivery &rarr;</button>`;
  }

  // Step: AoE shape
  if(!cantripHTML && cStep==='aoeShape'){
    const _shapePending=CANTRIP_SEC&&CANTRIP_SEC.startsWith('shape:')?CANTRIP_SEC.slice(6):null;
    const _so=[{id:'line',label:'Line',sub:'5ft wide · 15ft+ long',icon:'━'},{id:'cone',label:'Cone',sub:'15ft+ cone from you',icon:'▷'},{id:'burst',label:'Burst',sub:'5ft+ radius centered',icon:'◎'},{id:'splash',label:'Splash',sub:'Thrown 60ft · 5ft+ radius',icon:'💧'}];
    const _sSel=(_shapePending||c.aoeShape)||'line';
    const _sIdx=_so.findIndex(x=>x.id===_sSel);
    html+=`<div class="sec" style="margin-bottom:8px">AoE Shape</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <button data-shapeprev="c" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&lsaquo;</button>
      <div style="flex:1;text-align:center">
        ${_sSel ? `
          <div style="font-size:1.6rem;margin-bottom:4px">${_so[_sIdx]?.icon||''}</div>
          <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:1.4rem;color:var(--gr)">${_so[_sIdx]?.label||''}</div>
          <div style="font-size:.64rem;color:var(--dm);margin-top:3px">${_so[_sIdx]?.sub||''}</div>
        ` : `<div style="font-size:.7rem;color:var(--dm);font-family:'Orbitron',monospace">&#8592; Use arrows to select</div>`}
        <div style="display:flex;gap:5px;justify-content:center;margin-top:8px">
          ${_so.map((_,i)=>`<div style="width:7px;height:7px;border-radius:50%;background:${i===_sIdx?'var(--gr)':'var(--bdr)'};transition:background .15s"></div>`).join('')}

  const sug=suggestArch(),typeKey=S.typeId;

  const ARCH_KEYS=Object.keys(ARCH_META);

  // ── Helper: carousel panel (used in pick phases) ──────────────────────────

    const k=ARCH_KEYS[idx];

    const discBadge=hasDisc?`<span style="font-family:'Orbitron',monospace;font-size:.5rem;padding:2px 6px;border-radius:3px;background:#2a1a00;color:var(--gr);border:1px solid var(--gr)">&minus;5 EP on first 2 nodes</span>`:'';

        ctaBtn=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button data-archsetsec="${k}" class="btn btn-p" style="padding:11px;font-size:.65rem">

      <div class="pb" style="padding-top:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <button data-archprev="1" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&lsaquo;</button>
          <div style="flex:1;display:flex;justify-content:center;gap:6px;align-items:center">${pips}</div>
          <button data-archnext="1" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&rsaquo;</button>
        </div>
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:2rem;margin-bottom:6px">${m.icon}</div>
          <div style="font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:${isCurrentPrim?m.color:isCurrentSec?'var(--ac2)':'var(--tx)'};letter-spacing:.06em;margin-bottom:8px">${m.name.toUpperCase()}</div>
          <div style="display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;min-height:20px">${statusLabel} ${discBadge}</div>
          <div style="font-size:.84rem;color:var(--tx);opacity:.8;line-height:1.7;max-width:400px;margin:0 auto;padding:0 4px">${m.fantasy}</div>
        </div>
        <div style="display:flex;justify-content:center;margin-bottom:16px;padding:10px 0;border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr)">
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="font-family:'Orbitron',monospace;font-size:.46rem;color:var(--dm);letter-spacing:.15em">NODE CHAIN</div>
            ${chainHTML(k)}
            <div style="font-size:.6rem;color:var(--dm)">5 universal &bull; 2 ${(PLANETS[S.planet]||PLANETS.pyrotheon).name} exclusive</div>
          </div>
        </div>
        ${ctaBtn}
      </div>
    </div>`;
  }

  // ── Helper: node tree panel for one archetype ─────────────────────────────
  function nodeTreeHTML(archKey, label, acol, nextPhaseBtn){
    const am=ARCH_META[archKey];
    const chain=getArchChain(archKey);
    const owned=S.archetypes?.unlockedNodes||[];
    const ownedInChain=owned.filter(id=>chain.includes(id));
    const curIdx=Math.max(0,Math.min(NODE_IDX[archKey]||0, chain.length-1));
    const id=chain[curIdx];
    const n=NODES[id];
    if(!n) return '';
    const isOwned=owned.includes(id);
    const chk=canBuy(id);
    const isAvail=!isOwned&&chk.ok;
    const isLocked=!isOwned&&!isAvail;
    const c=nodeCostDisc(id),orig=n.cost,hasDisc=c<orig;
    const epochLbl=n.tier<=2?'E1':n.tier===3?'E2':'E3';
    const planLbl=n.planetExclusive?` · ${PLANETS[n.planet]?.icon||''} Exclusive`:'';
    const statusCol=isOwned?'var(--gr)':isAvail?acol:'var(--dm)';
    const bgCol=isOwned?'rgba(255,170,0,.06)':isAvail?acol+'12':'var(--sur2)';
    const borderCol=isOwned?'var(--gr)':isAvail?acol:'var(--bdr)';
    const discH=hasDisc?`<span style="text-decoration:line-through;opacity:.5;margin-right:4px;font-size:.65rem">${orig}</span>`:'';

    // Pip track — chain dots showing owned/available/locked
    const pips=chain.map((_,i)=>{
      const pid=chain[i];
      const isO=owned.includes(pid);
      const isA=!isO&&canBuy(pid).ok;
      const sz=i===curIdx?'10px':'7px';
      const col=isO?'var(--gr)':isA?acol:i===curIdx?'var(--dm)':'var(--bdr)';
      return `<div style="width:${sz};height:${sz};border-radius:50%;background:${col};transition:all .15s;flex-shrink:0;${isO?'box-shadow:0 0 4px var(--gr)':''}"></div>`;
    }).join('');

    // Action button
    let actionBtn='';
    if(isOwned)       actionBtn=`<button data-sell="${id}" class="btn-d" style="width:100%;padding:9px;font-size:.58rem;margin-top:10px">Sell (refund ${c} EP)</button>`;
    else if(isAvail)  actionBtn=`<button data-buy="${id}" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem;margin-top:10px;background:${acol};color:#000">Buy — ${discH}${c} EP</button>`;
    else              actionBtn=`<div style="padding:10px 14px;background:rgba(0,0,0,.2);border-radius:8px;margin-top:10px;font-family:'Orbitron',monospace;font-size:.56rem;color:var(--dm);text-align:center">${e(chk.why)}</div>`;

    return `<div class="panel" style="border-color:${borderCol};transition:border-color .2s;background:${bgCol}">
      <div class="ph" style="background:${acol}0a">
        <h2 style="color:${acol}">${am.icon} ${am.name}</h2>
        <span style="font-family:'Orbitron',monospace;font-size:.48rem;color:${acol};background:${acol}18;border:1px solid ${acol}40;border-radius:3px;padding:2px 6px;margin-left:auto">${label}</span>
      </div>
      <div class="pb" style="padding-top:14px">
        <!-- Node carousel nav -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button data-nodeprev="${archKey}" ${curIdx===0?'disabled':''} style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:${curIdx===0?.35:1}">&lsaquo;</button>
          <div style="flex:1;display:flex;justify-content:center;gap:6px;align-items:center">${pips}</div>
          <button data-nodenext="${archKey}" ${curIdx===chain.length-1?'disabled':''} style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:${curIdx===chain.length-1?.35:1}">&rsaquo;</button>
        </div>
        <!-- Node detail -->
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-family:'Orbitron',monospace;font-size:.48rem;color:var(--dm);letter-spacing:.15em;margin-bottom:6px">${epochLbl}${planLbl} · NODE ${curIdx+1} OF ${chain.length}</div>
          <div style="font-family:'Orbitron',monospace;font-size:1.05rem;font-weight:900;color:${statusCol};letter-spacing:.04em;margin-bottom:4px">${isOwned?'✓ ':''}${e(n.name)}</div>
          ${isOwned?`<div style="display:inline-block;font-family:'Orbitron',monospace;font-size:.48rem;padding:2px 7px;border-radius:3px;background:var(--gr);color:#000;font-weight:700;margin-bottom:8px">OWNED</div>`:''}
          ${isLocked?`<div style="display:inline-block;font-family:'Orbitron',monospace;font-size:.48rem;padding:2px 7px;border-radius:3px;background:var(--bdr);color:var(--dm);font-weight:700;margin-bottom:8px">LOCKED</div>`:''}
          <div style="font-size:.78rem;color:var(--tx);opacity:.75;font-style:italic;line-height:1.65;max-width:400px;margin:0 auto;padding:0 4px">${e(n.flavorText||'')}</div>
        </div>
        <!-- Mechanics -->
        <div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px;margin-bottom:6px;opacity:${isLocked?.5:1}">
          ${(n.mechanics||[]).map(m=>{
            const tag=m.type==='active'?'▶ Active':m.type==='zone'?'⬡ Zone':'◆ Passive';
            const cls=`mt-${m.type}`;
            const nm=m.name?`<span class="mname">${e(m.name)}: </span>`:'';
            const uses=m.uses?`<span style="color:var(--ac2);font-family:'Orbitron',monospace;font-size:.5rem">[${e(m.uses)}] </span>`:'';
            return `<div class="mrow" style="margin-bottom:5px"><span class="mtag ${cls}">${tag}</span><div class="mtxt">${nm}${uses}${e(m.text)}</div></div>`;
          }).join('')}
        </div>
        ${actionBtn}
        <div style="margin-top:10px;border-top:1px solid var(--bdr);padding-top:12px">
          ${nextPhaseBtn}
        </div>
      </div>
    </div>`;
  }

  // ── Render based on phase ─────────────────────────────────────────────────
  let html='';

  if(ARCH_PHASE==='pick_primary'){
    html+=carouselHTML('pick_primary');
  }
  else if(ARCH_PHASE==='buy_primary'){
    const am=ARCH_META[primary];
    const _primOwned=(S.archetypes?.unlockedNodes||[]).filter(id=>getArchChain(primary).includes(id)).length;
    const continueBtn=(_primOwned>0
      ? `<button data-archphase="pick_secondary" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem">Confirm Primary &rarr; Choose Secondary</button>`
      : `<div style="padding:10px;text-align:center;font-family:'Orbitron',monospace;font-size:.56rem;color:var(--dm)">Buy at least one node to continue</div>`
    )+`<button data-archphase="pick_primary" class="btn btn-g" style="width:100%;padding:10px;font-size:.62rem;margin-top:8px;border:1px solid var(--bdr)">&larr; Change Primary Archetype</button>`;
    html+=nodeTreeHTML(primary,'PRIMARY',am.color,continueBtn);
  }
  else if(ARCH_PHASE==='pick_secondary'){
    // Show locked primary header
    const am=ARCH_META[primary];
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.2);border-radius:8px;margin-bottom:8px">
      <span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm)">PRIMARY:</span>
      <span style="font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;color:var(--ac)">${am.icon} ${am.name}</span>
      <span data-archphase="buy_primary" style="font-family:'Orbitron',monospace;font-size:.48rem;color:var(--dm);cursor:pointer;margin-left:auto;text-decoration:underline">view nodes</span>
    </div>`;
    html+=carouselHTML('pick_secondary');
  }
  else if(ARCH_PHASE==='buy_secondary'){
    // Show locked primary header
    const pam=ARCH_META[primary];
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.2);border-radius:8px;margin-bottom:8px">
      <span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm)">PRIMARY:</span>
      <span style="font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;color:var(--ac)">${pam.icon} ${pam.name}</span>
      <span data-archphase="buy_primary" style="font-family:'Orbitron',monospace;font-size:.48rem;color:var(--dm);cursor:pointer;margin-left:auto;text-decoration:underline">view nodes</span>
    </div>`;
    if(secondary){
      const sam=ARCH_META[secondary];
      const _secOwned=(S.archetypes?.unlockedNodes||[]).filter(id=>getArchChain(secondary).includes(id)).length;
      const doneBtn=(_secOwned>0
        ? `<button data-archphase="done" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem">Confirm &rarr; Summary</button>`
        : `<div style="padding:10px;text-align:center;font-family:'Orbitron',monospace;font-size:.56rem;color:var(--dm)">Buy at least one node to confirm</div>`
      )+`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <button data-archphase="pick_secondary" class="btn btn-g" style="padding:10px;font-size:.6rem;border:1px solid var(--bdr)">&larr; Change Secondary</button>
        <button data-archphase="buy_primary" class="btn btn-g" style="padding:10px;font-size:.6rem;border:1px solid var(--bdr)">View Primary Nodes</button>
      </div>`;
      html+=nodeTreeHTML(secondary,'SECONDARY','var(--ac2)',doneBtn);
    } else {
      // Skipped secondary — just show confirm
      html+=`<div class="panel"><div class="pb" style="text-align:center;padding:20px">
        <div style="font-family:'Orbitron',monospace;font-size:.62rem;color:var(--dm);margin-bottom:14px">No secondary archetype selected</div>
        <button data-archphase="done" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem">Confirm &rarr; Summary</button>
        <div style="margin-top:8px"><span data-archphase="pick_secondary" style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);cursor:pointer;text-decoration:underline">&larr; Add secondary</span></div>
      </div></div>`;
    }
  }
  else {
    // done — stacked summary cards with descriptions and node counts
    const pam=ARCH_META[primary]||{};
    const sam=secondary?ARCH_META[secondary]:null;
    const owned=S.archetypes?.unlockedNodes||[];

    function archSummaryCard(archKey, roleLabel, acol, bgCol, editPhase){
      const am=ARCH_META[archKey];
      const chain=getArchChain(archKey);
      const ownedInChain=owned.filter(id=>chain.includes(id));
      const epSpent=ownedInChain.reduce((t,id)=>t+(NODES[id]?.cost||0),0);

      // Build a stat-block entry for each owned node
      function nodeEntry(id){
        const n=NODES[id];
        if(!n) return '';
        const epochLbl=n.tier<=2?'E1':n.tier===3?'E2':'E3';
        const planetTag=n.planetExclusive?` &bull; ${(PLANETS[S.planet]||PLANETS.pyrotheon).icon} Excl`:'';
        const mechs=(n.mechanics||[]).map(m=>{
          const tagLabel=m.type==='active'?'Active':m.type==='zone'?'Zone':'Passive';
          const tagCls=m.type==='active'?'mt-active':m.type==='zone'?'mt-zone':'mt-passive';
          const nm=m.name?`<span style="font-weight:700;color:var(--gd)">${m.name}: </span>`:'';
          const uses=m.uses?`<span style="font-family:'Orbitron',monospace;font-size:.46rem;color:var(--ac2)">[${m.uses}] </span>`:'';
          return `<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px">
            <span class="mtag ${tagCls}" style="flex-shrink:0;margin-top:1px">${tagLabel}</span>
            <span style="font-size:.68rem;color:var(--tx);line-height:1.4">${nm}${uses}${m.text}</span>
          </div>`;
        }).join('');
        return `<div style="padding:9px 0;border-bottom:1px solid var(--bdr)">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
            <div>
              <span style="font-weight:700;font-size:.84rem;color:${acol}">${n.name}</span>
              <span style="font-family:'Orbitron',monospace;font-size:.46rem;color:var(--dm);margin-left:6px">${epochLbl}${planetTag}</span>
            </div>
            <span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm)">${n.cost} EP</span>
          </div>
          ${n.flavorText?`<div style="font-size:.64rem;color:var(--dm);font-style:italic;line-height:1.35;margin-bottom:6px">${n.flavorText}</div>`:''}
          ${mechs}
        </div>`;
      }

      const nodeTable=ownedInChain.map(nodeEntry).join('');

      return `<div style="border:1px solid ${acol}44;border-radius:10px;overflow:hidden;margin-bottom:8px">
        <!-- Header -->
        <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:${bgCol}">
          <div style="font-size:1.5rem">${am.icon}</div>
          <div style="flex:1">
            <div style="font-family:'Orbitron',monospace;font-size:.44rem;color:${acol};letter-spacing:.15em;margin-bottom:2px">${roleLabel}</div>
            <div style="font-family:'Orbitron',monospace;font-size:.88rem;font-weight:900;color:${acol}">${am.name}</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Orbitron',monospace;font-size:.52rem;color:var(--dm)">${ownedInChain.length} node${ownedInChain.length!==1?'s':''}</div>
            <div style="font-family:'Orbitron',monospace;font-size:.52rem;color:${acol}">${epSpent} EP</div>
          </div>
        </div>
        <!-- Body -->
        <div style="padding:10px 14px 0;background:var(--sur2)">
          <!-- Archetype description -->
          <div style="font-size:.76rem;color:var(--tx);opacity:.75;line-height:1.6;padding-bottom:10px;border-bottom:1px solid var(--bdr);margin-bottom:${ownedInChain.length?'0':'10px'}">${am.fantasy}</div>
          <!-- Node stat blocks -->
          ${nodeTable}
          <!-- Edit button -->
          <div style="padding:10px 0">
            <button data-archphase="${editPhase}" style="width:100%;padding:7px;border-radius:6px;font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:.08em;cursor:pointer;background:transparent;border:1px solid ${acol}44;color:${acol}">
              ${ownedInChain.length?'Edit Nodes':'Buy Nodes'} &rarr;
            </button>
          </div>
        </div>
      </div>`;
    }

    html+=archSummaryCard(primary,'PRIMARY ARCHETYPE','var(--ac)','rgba(255,107,53,.06)','buy_primary');
    if(sam){
      html+=archSummaryCard(secondary,'SECONDARY ARCHETYPE','var(--ac2)','rgba(204,51,0,.06)','buy_secondary');
    } else {
      html+=`<div style="border:1px dashed var(--bdr);border-radius:10px;padding:14px;text-align:center;margin-bottom:8px">
        <span data-archphase="pick_secondary" style="font-family:'Orbitron',monospace;font-size:.56rem;color:var(--dm);cursor:pointer">+ Add Secondary Archetype</span>
      </div>`;
    }
    html+=`<button data-goto="5" class="btn btn-p" style="width:100%;padding:11px;font-size:.7rem;margin-top:4px">Summary &rarr;</button>`;
  }

  return html;
}

// ── STEP 6: SUMMARY ───────────────────────────────────────────────────────────
function renderStep5(){
  const fs=getFinalStats(),sz=SIZES.find(x=>x.id===S.sizeId),ty=TYPES.find(x=>x.id===S.typeId);
  const archs=[S.archetypes?.primary,S.archetypes?.secondary].filter(Boolean);
  const lvl=S.creatureLevel||1,hdCount=4+lvl;
  const conMod=statMod(fs.CON||10);
  const hd=S.hdChoice||"1d4",szhd=sz?.hd||"1d4";
  const hdIdx=Math.max(HD_LIST.indexOf(hd),HD_LIST.indexOf(szhd));
  const finalHD=HD_LIST[hdIdx],hdN=parseInt(finalHD.split('d')[1]||4);
  const avgHp=Math.floor(hdN/2+1)*hdCount+conMod*hdCount;
  const curHp=S.currentHp!==null?S.currentHp:avgHp;
  const hpPct=Math.max(0,Math.min(1,curHp/avgHp));
  const hpCol=hpPct>.5?'var(--ac)':hpPct>.25?'#f5a623':'var(--rd)';
  const ac=calcAC(),spd=getSpeed(),ps=primaryStat(fs),dc=8+getProfBonus()+statMod(fs[ps]);
  const profBonus=getProfBonus();
  const inSession=!!(ROOM_CODE);
  const pl=PLANETS[S.planet]||PLANETS.pyrotheon;
  const plAc=pl.palette.ac;

  let html='';

  // ── SESSION STATUS BANNER ──────────────────────────────────────────────────
  if(inSession){
    html+=`<div style="margin:10px 0 4px;padding:10px 14px;background:rgba(255,107,53,.07);border:1px solid rgba(255,107,53,.25);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div>
        <div style="font-family:'Orbitron',monospace;font-size:.44rem;color:${plAc};letter-spacing:.14em;margin-bottom:2px">SESSION ACTIVE</div>
        <div style="font-size:.68rem;color:var(--dm)">Room <strong style="color:var(--tx)">${ROOM_CODE}</strong> · Build locked</div>
      </div>
      <div style="font-family:'Orbitron',monospace;font-size:.42rem;color:var(--gd);text-align:right">
        <div>EP BALANCE</div>
        <div style="font-size:.9rem;font-weight:900">${CS.epBalance||calcEP()||0}</div>
      </div>
    </div>`;
  } else {
    html+=`<div style="margin:10px 0 4px;padding:8px 14px;background:rgba(122,148,176,.05);border:1px solid var(--bdr);border-radius:10px;display:flex;align-items:center;gap:8px">
      <div style="font-size:.66rem;color:var(--dm)">No active session. Your GM's link will connect you automatically.</div>
    </div>`;
  }

  html+=`<div class="panel"><div class="pb" style="padding-top:14px">
    <!-- NAME INPUT -->
    <div style="margin-bottom:10px">
      <div style="font-family:'Orbitron',monospace;font-size:.44rem;color:var(--dm);letter-spacing:.12em;margin-bottom:5px">SPECIMEN NAME</div>
      <input data-nameinput="1" type="text" maxlength="40" placeholder="Name your specimen…"
        value="${e(S.name||'')}"
        ${inSession?'readonly style="opacity:.6;cursor:default;"':''}
        style="width:100%;padding:9px 12px;background:var(--sur2);border:1px solid ${inSession?'var(--bdr)':plAc+'66'};border-radius:8px;color:var(--tx);font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700;outline:none;letter-spacing:.04em"/>
      ${inSession?`<div style="font-size:.58rem;color:var(--dm);margin-top:3px">Name locked after session join.</div>`:''}
    </div>
    <div style="font-size:.7rem;color:var(--dm);margin-bottom:12px">${[sz?.name,ty?.name,PLANETS[S.planet]?.name].filter(Boolean).join(' · ')}</div>
    <!-- HP / AC / Speed block -->
    <div style="display:grid;grid-template-columns:1fr 1.6fr 1fr;gap:8px;margin-bottom:12px">
      <div style="text-align:center;background:var(--sur2);border-radius:10px;border:1px solid var(--bdr);padding:10px 4px">
        <div style="font-family:'Orbitron',monospace;font-size:.44rem;color:var(--dm);letter-spacing:.1em">SPEED</div>
        <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:1.2rem;color:var(--ac)">${spd}ft</div>
      </div>
      <div style="text-align:center;background:var(--sur2);border-radius:10px;border:1px solid var(--bdr);padding:10px 4px">
        <div style="font-family:'Orbitron',monospace;font-size:.44rem;color:var(--dm);letter-spacing:.1em">HIT POINTS</div>
        <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:1.3rem;color:${hpCol}">${curHp} / ${avgHp}</div>
        <div style="display:flex;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden;margin:4px 6px">
          <div style="width:${hpPct*100}%;background:${hpCol};border-radius:2px"></div>
        </div>
        <div style="display:flex;justify-content:center;gap:6px;margin-top:4px">
          <button data-hp="-1" style="background:none;border:1px solid var(--bdr);border-radius:4px;padding:2px 8px;color:var(--dm);font-size:.7rem;cursor:pointer">−</button>
          <button data-hp="reset" style="background:none;border:none;color:var(--dm);font-size:.6rem;cursor:pointer">↺</button>

      ${[{l:"Hit Dice",v:hdCount+"×"+finalHD},{l:"Save DC",v:dc,a:"var(--ac)"},{l:"Prof Bonus",v:"+"+profBonus,a:"var(--gr)"}].map(x=>`
      <div style="text-align:center;background:var(--sur2);border-radius:8px;border:1px solid var(--bdr);padding:8px 4px">

    </div>
    <!-- Stat grid -->
    <div class="sum-stat-grid">
    ${STAT_KEYS.map(k=>{
      const score=fs[k],mod=statMod(score);
      return `<div style="background:var(--sur2);border-radius:8px;border:1px solid var(--bdr);padding:8px 5px">
        <div style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);font-weight:700;margin-bottom:5px">

          ${[{l:'Score',v:score},{l:'Mod',v:fmtMod(mod)},{l:'Save',v:fmtMod(mod)}].map(c=>
            `<div style="text-align:center">
              <div style="font-size:.44rem;color:var(--dm);font-family:'Orbitron',monospace">${c.l}</div>

    }).join('')}
    </div>
    <!-- Level controls — locked in session -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
      <div style="display:flex;align-items:baseline;gap:6px">
        <span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm)">LEVEL</span>
        <span style="font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;color:var(--ac)">${lvl}</span>

      ${inSession
        ? `<span style="font-family:'Orbitron',monospace;font-size:.42rem;color:var(--dm)">LOCKED</span>`
        : `<div style="display:flex;gap:6px">

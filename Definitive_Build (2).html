<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Proto-Genesis · Evolution Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050810;--sur:#0a0f1e;--sur2:#0f1628;--bdr:#1a2540;
  --ac:#ff6b35;--ac2:#cc3300;--ac3:#ff6b35;
  --tx:#c8d8f0;--dm:#7a94b0;--gr:#ffaa00;--rd:#ff3a5c;--gd:#ffd700
}
html,body{background:var(--bg);color:var(--tx);font-family:'Rajdhani',sans-serif;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;background:var(--bg);min-height:100vh}
.wrap-inner{padding:0 14px 100px}
/* Hero */
.builder-hero{padding:22px 14px 0;text-align:center;background:linear-gradient(180deg,rgba(255,107,53,.06) 0%,transparent 100%)}
h1{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,6vw,2.2rem);font-weight:900;letter-spacing:.06em;color:var(--tx)}
h1 span{color:var(--ac2)}
.sub{font-size:.72rem;color:var(--dm);letter-spacing:.2em;text-transform:uppercase;margin-top:4px}
/* Sticky HUD */
.sticky-hud{position:sticky;top:0;z-index:100;background:var(--bg);padding:6px 14px 8px;border-bottom:1px solid var(--bdr)}
.hud-inner{display:flex;align-items:center;gap:10px}
.hud-lbl{font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);letter-spacing:.15em;text-transform:uppercase}
.hud-track{flex:1;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.hud-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
.hud-ep{font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700}
/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg);border-top:1px solid var(--bdr);max-width:860px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none}
.bottom-nav::-webkit-scrollbar{display:none}
.bnav-btn{flex:1;min-width:72px;padding:12px 5px 14px;background:none;border:none;border-top:2px solid transparent;color:var(--dm);font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.06em;cursor:pointer;text-transform:uppercase;white-space:nowrap}
.bnav-btn.active{color:var(--ac);border-top-color:var(--ac)}
.bnav-btn.done{color:var(--gr)}
/* Panels */
.panel{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:12px}
.ph{padding:10px 16px;background:var(--sur2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.ph h2{font-family:'Orbitron',monospace;font-size:.62rem;font-weight:600;letter-spacing:.18em;color:var(--ac);text-transform:uppercase}
.pb{padding:14px}
.sec{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dm);margin:12px 0 7px}
.info{background:rgba(255,107,53,.05);border:1px solid rgba(255,107,53,.15);border-radius:7px;padding:8px 11px;font-size:.72rem;color:var(--dm);margin-bottom:10px}
/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.cards2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.card{background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:11px;cursor:pointer;position:relative;transition:border-color .15s;user-select:none}
.card:hover{border-color:var(--ac)}
.card.sel{border-color:var(--ac);background:rgba(255,107,53,.07)}
.card.sel::after{content:'';position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--ac)}
.card.msel{border-color:var(--ac2);background:rgba(204,51,0,.07)}
.card.msel::after{content:'';position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--ac2)}
.cn{font-weight:600;font-size:.86rem;color:var(--tx);margin-bottom:2px}
.cc{font-family:'Orbitron',monospace;font-size:.55rem;color:var(--ac3);margin-bottom:3px}
.ct{font-size:.7rem;color:var(--dm);line-height:1.45}
.cm{font-size:.7rem;color:var(--ac);margin-bottom:2px}
/* Buttons */
.btn{padding:8px 16px;border-radius:7px;font-family:'Orbitron',monospace;font-size:.6rem;font-weight:600;letter-spacing:.1em;cursor:pointer;border:none;text-transform:uppercase}
.btn-p{background:var(--ac);color:#000}
.btn-g{background:transparent;border:1px solid var(--bdr);color:var(--dm)}
.btn-d{background:transparent;border:1px solid var(--rd);color:var(--rd);font-size:.56rem;padding:4px 9px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.sub-btn{flex:1;padding:7px 4px;border-radius:6px;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-family:'Orbitron',monospace;font-size:.56rem;cursor:pointer;text-transform:uppercase}
.sub-btn.sa{border-color:var(--ac);color:var(--ac);background:rgba(255,107,53,.1)}
/* Chip (completed step indicator) */
.chip{display:flex;align-items:center;justify-content:space-between;padding:6px 11px;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;cursor:pointer;margin-bottom:5px;transition:border-color .12s}
.chip:hover{border-color:var(--ac)}
.chip-lbl{font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);letter-spacing:.1em}
.chip-val{font-weight:600;font-size:.82rem;color:var(--tx)}
.chip-edit{font-size:.58rem;color:var(--dm);opacity:.4}
/* Stats grid */
.stats-g{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.sbox{background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:9px 5px;text-align:center;cursor:pointer;transition:border-color .12s;position:relative}
.sbox:hover{border-color:var(--ac)}
.sn{font-family:'Orbitron',monospace;font-size:.54rem;color:var(--dm);margin-bottom:3px;letter-spacing:.1em}
.sv{font-family:'Orbitron',monospace;font-size:1.25rem;font-weight:900}
.sm{font-size:.72rem;color:var(--dm)}
/* Toggle */
.tog{width:32px;height:17px;background:var(--bdr);border-radius:9px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--ac2)}
.tog::after{content:'';position:absolute;width:11px;height:11px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.tog.on::after{transform:translateX(15px)}
/* Archetype cards */
.arch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.arch-card{background:var(--sur2);border:2px solid var(--bdr);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;position:relative;user-select:none}
.arch-card:hover{border-color:var(--ac)}
.arch-card.primary{border-color:var(--ac);background:rgba(255,107,53,.07)}
.arch-card.secondary{border-color:var(--ac2);background:rgba(204,51,0,.07)}
.badge{display:inline-block;font-family:'Orbitron',monospace;font-size:.44rem;padding:2px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.badge-p{background:var(--ac);color:#000}
.badge-s{background:var(--ac2);color:#fff}
.badge-sug{background:var(--gd);color:#000}
.badge-disc{background:#2a1a00;color:var(--gr);border:1px solid var(--gr)}
/* Chain dots */
.chain{display:flex;align-items:center;margin:6px 0 0;gap:0}
.chain-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-family:'Orbitron',monospace;border:2px solid var(--bdr);background:var(--sur2);color:var(--dm);flex-shrink:0}
.chain-dot.owned{background:var(--gr);border-color:var(--gr);color:#000}
.chain-dot.excl{border-color:var(--gd);color:var(--gd)}
.chain-line{flex:1;height:2px;background:var(--bdr)}
.chain-line.done{background:var(--gr)}
/* Node cards */
.node-card{border-radius:8px;overflow:hidden;margin-bottom:8px;border:1px solid var(--bdr)}
.node-card.owned{border-color:var(--gr)}
.node-card.avail{border-color:var(--ac2)}
.node-card.locked{opacity:.45}
.node-hdr{padding:8px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.node-name{font-weight:700;font-size:.84rem}
.node-ep{font-family:'Orbitron',monospace;font-size:.54rem}
.node-epoch{font-size:.54rem;color:var(--dm);font-family:'Orbitron',monospace;margin-top:1px}
.node-body{padding:8px 12px;background:var(--sur2)}
.node-flavor{font-size:.68rem;color:var(--dm);font-style:italic;margin-bottom:5px;line-height:1.35}
.mrow{display:flex;gap:5px;margin-bottom:3px;align-items:flex-start}
.mtag{font-family:'Orbitron',monospace;font-size:.44rem;padding:2px 4px;border-radius:3px;text-transform:uppercase;white-space:nowrap;margin-top:2px;flex-shrink:0}
.mt-passive{background:#1a0e00;color:var(--ac);border:1px solid var(--ac)}
.mt-active{background:#1a0800;color:var(--ac2);border:1px solid var(--ac2)}
.mt-zone{background:#1a0e00;color:var(--gr);border:1px solid var(--gr)}
.mtxt{font-size:.7rem;color:var(--tx);line-height:1.35}
.mname{font-weight:700;color:var(--gd)}
/* Role cards */
.role-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
.role-card{background:var(--sur);border:1px solid var(--bdr);border-radius:7px;padding:9px;cursor:pointer;transition:border-color .15s}
.role-card:hover{border-color:var(--ac)}
.role-card.rsa{border-color:var(--ac);background:rgba(255,107,53,.07)}
.role-card.rsb{border-color:var(--ac2);background:rgba(204,51,0,.07)}
.role-name{font-weight:600;font-size:.84rem;margin-bottom:3px}
.role-det{font-size:.66rem;color:var(--dm);line-height:1.4}
/* Sub-slot tabs */
.sub-btns{display:flex;gap:5px;margin-bottom:8px}
.sub-btn.sa{border-color:var(--ac);color:var(--ac);background:rgba(255,107,53,.1)}
.sub-btn.sb2{border-color:var(--ac2);color:var(--ac2);background:rgba(204,51,0,.1)}
.sub-btn.sr{border-color:var(--ac3);color:var(--ac3);background:rgba(255,107,53,.1)}
/* Summary */
.sum-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.sum-stat-box{background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:9px 5px;text-align:center}
/* Misc */
.txt{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:.85rem;padding:8px 10px;outline:none}
.txt:focus{border-color:var(--ac)}
select{background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;color:var(--tx);padding:5px 8px;font-family:'Rajdhani',sans-serif;font-size:.8rem}
button:disabled{opacity:.35;cursor:not-allowed}
.back-link{display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr)}
.back-link span{font-family:'Orbitron',monospace;font-size:.58rem;color:var(--dm)}
</style>
</head>

nger hunts in the biological sense. It exerts force the way a tectonic plate exerts force \u2014 inevitably, without acknowledgment of resistance."}]}}},"defender":{"name":"Defender","fantasy":"Built to be unmovable. The thing attacks bounce off of. Wins by being present after everything else has stopped.","typeDiscounts":["plant","ooze"],"nodes":{"universal":[{"id":"def_1","name":"Hardened Frame","tier":1,"epoch":1,"cost":10,"prerequisite":null,"unlocksNext":["def_2"],"mechanics":[{"type":"passive","text":"+2 AC (natural armor development)"},{"type":"passive","text":"When you take damage, reduce it by your CON modifier (minimum 1)"}],"flavorText":"The body has prioritized structural integrity over speed. Strikes that would stagger anything else register as pressure.","questionnaireDiscount":"\u22125 EP if Threat = Fights Head-On"},{"id":"def_2","name":"Immovable Presence","tier":2,"epoch":1,"cost":15,"prerequisite":"def_1","unlocksNext":["def_3"],"mechanics":[{"type":"passive","text":"Immunity to being knocked prone, pushed, or moved against your will"},{"type":"passive","text":"Enemies ending their turn adjacent to you make STR save (DC 12) or have movement reduced by 10 ft next round"}],"flavorText":"Size and mass stop being numbers and start being facts about the local geography."},{"id":"def_3","name":"Living Fortification","tier":3,"epoch":2,"cost":20,"prerequisite":"def_2","unlocksNext":["def_4A_pyr","def_4A_gla","def_4A_ver","def_4A_kha"],"mechanics":[{"type":"passive","text":"Allies in your zone have +1 AC and advantage on saving throws against being moved"},{"type":"zone","text":"Once per trial, declare your current zone a Fortified Position \u2014 enemies attacking into it have disadvantage on attack rolls; persists until you leave or trial ends"}],"flavorText":"At civilizational scale, your lineage's defensive physiology becomes literal infrastructure. Your body is the wall."}],"planetExclusive":{"pyrotheon":[{"id":"def_4A_pyr","name":"Magma Shell","tier":4,"epoch":3,"cost":30,"prerequisite":"def_3","unlocksNext":["def_5A_pyr"],"mechanics":[{"type":"passive","text":"Resistance to fire, bludgeoning, and piercing damage"},{"type":"active","uses":"1/trial","name":"Heat Vent","text":"All enemies in your zone take 2d8 fire damage + 1 Heat Strain stack. No save."}],"flavorText":"Your hide has partially mineralized. Attacks don't just fail to penetrate \u2014 they leave residue."},{"id":"def_5A_pyr","name":"Forge Body","tier":5,"epoch":3,"cost":40,"prerequisite":"def_4A_pyr","unlocksNext":[],"mechanics":[{"type":"passive","text":"Immune to fire damage and Heat Strain; damage reduction from Node 1 increases to CON modifier \u00d7 2"},{"type":"passive","text":"When reduced below 50% HP for the first time in a trial, all enemies in your zone take 3d6 fire damage immediately (no action required)"},{"type":"active","uses":"1/trial","name":"Molten Core","text":"For one round, all damage you deal is converted to fire damage and doubled; all damage you receive is halved"}],"flavorText":"The creature has stopped being defended by its hide and started being defined by it."}],"glacara":[{"id":"def_4A_gla","name":"Pressure Carapace","tier":4,"epoch":3,"cost":30,"prerequisite":"def_3","unlocksNext":["def_5A_gla"],"mechanics":[{"type":"passive","text":"Resistance to cold and bludgeoning damage; no single attack can deal more than 20 damage to you regardless of roll"},{"type":"active","uses":"1/trial","name":"Pressure Equalization","text":"Immediately reduce your current damage taken this round to zero and gain temporary HP equal to the damage prevented"}],"flavorText":"At depth, the body learns to treat incoming force as ambient pressure \u2014 categorically rather than individually."},{"id":"def_5A_gla","name":"The Immovable","tier":5,"epoch":3,"cost":40,"prerequisite":"def_4A_gla","unlocksNext":[],"mechanics":[{"type":"passive","text":"Cannot be subjugated; if attempted, attacker takes 2d8 cold damage and the attempt fails; your HP m bludgeoning damage and make DEX save (DC 14) or be Restrained until end of next turn; regain HP equal to half total damage dealt"}],"flavorText":"The creature's exterior is no longer biological in any meaningful sense. The distinction between creature and tunnel wall is a question of intent."},{"id":"def_5A_kha","name":"Geological Permanence","tier":5,"epoch":3,"cost":40,"prerequisite":"def_4A_kha","unlocksNext":[],"mechanics":[{"type":"passive","text":"Reduce all incoming damage by 10 (after resistances); cannot be moved against your will by any effect regardless of source"},{"type":"passive","text":"Your Fortified Position (Node 3) now applies to your current zone and all adjacent zones simultaneously"},{"type":"active","uses":"1/trial","name":"Deep Anchor","text":"Become completely immovable and immune to all damage for 2 rounds; at end of 2nd round, all enemies in your zone take damage equal to total damage absorbed during those 2 rounds (bludgeoning, ignores resistances)"}],"flavorText":"This creature does not survive damage. It simply does not acknowledge it at the timescale damage operates on."}]}}},"sensor":{"name":"Sensor","fantasy":"Your creature knows things. Not guesses \u2014 knows. Position, intent, weakness. At the top end it makes hidden information a thing that doesn't exist.","typeDiscounts":["aberration","swarm"],"nodes":{"universal":[{"id":"sen_1","name":"Heightened Perception","tier":1,"epoch":1,"cost":10,"prerequisite":null,"unlocksNext":["sen_2"],"mechanics":[{"type":"passive","text":"Cannot be surprised; always act in the first round of combat regardless of initiative order"},{"type":"passive","text":"Advantage on all Perception and Investigation checks; enemies cannot gain advantage from flanking"}],"flavorText":"The creature processes more of the environment than anything else on the map. Not faster \u2014 deeper.","questionnaireDiscount":"\u22125 EP if Threat = Flees or Hides"},{"id":"sen_2","name":"Sensory Expansion","tier":2,"epoch":1,"c he map at advantage"}],"flavorText":"Your heat-reading capability processes the entire battlefield as a single thermal model updated in real time."}],"glacara":[{"id":"sen_4A_gla","name":"Pressure Wave Reading","tier":4,"epoch":3,"cost":30,"prerequisite":"sen_3","unlocksNext":["sen_5A_gla"],"mechanics":[{"type":"passive","text":"Tremorsense extends to entire map; sense creatures through any medium; cannot be ambushed or targeted by hidden attackers from any direction"},{"type":"active","uses":"1/trial","name":"Deep Listen","text":"Go completely still for one round (cannot act); next turn you have advantage on all rolls, movement costs nothing, and first attack deals +3d8 cold damage"}],"flavorText":"Your lineage evolved in absolute darkness where pressure differentials are the only map."},{"id":"sen_5A_gla","name":"The Void Listener","tier":5,"epoch":3,"cost":40,"prerequisite":"sen_4A_gla","unlocksNext":[],"mechanics":[{"type":"passive","text":"Immune to all mind-affecting effects, surprise, and forced movement; advantage on all INT, WIS, and CHA saves"},{"type":"active","uses":"1/trial","name":"Still Water","text":"Full evasion for this round (attacks that hit deal half damage; attacks you'd take half damage from on a save deal none); your next attack deals double damage and the target cannot use reactions to reduce or avoid it"}],"flavorText":"At the deepest pressures, the creature stopped processing individual signals and started processing the entire medium."}],"verath":[{"id":"sen_4A_ver","name":"Mycelial Read","tier":4,"epoch":3,"cost":30,"prerequisite":"sen_3","unlocksNext":["sen_5A_ver"],"mechanics":[{"type":"passive","text":"Always know exact HP and conditions of every creature on the map; creatures with any Spore Drift stacks cannot hide their position from you"},{"type":"active","uses":"1/trial","name":"Network Pulse","text":"Every creature makes INT save (DC 14) or is Rattled until end of next turn (disadvantage on attacks and saves) and gains 1 Spore Drift stack"}],"flavorText":"Your nervous system has partially extended into the spore network, receiving its continuous broadcast of biological data."},{"id":"sen_5A_ver","name":"The Network Knows","tier":5,"epoch":3,"cost":40,"prerequisite":"sen_4A_ver","unlocksNext":[],"mechanics":[{"type":"passive","text":"Cannot be deceived, misdirected, or surprised; enemies with any Spore Drift stack have disadvantage on all rolls against you"},{"type":"active","uses":"1/trial","name":"Collective Response","text":"For one round, all allies have advantage on all rolls and all enemies have disadvantage on all rolls against any ally"}],"flavorText":"Your connection to the mycelial network has become deep enough that the network's distributed intelligence supplements your own."}],"khara":[{"id":"sen_4A_kha","name":"Seismic Sense","tier":4,"epoch":3,"cost":30,"prerequisite":"sen_3","unlocksNext":["sen_5A_kha"],"mechanics":[{"type":"passive","text":"Tremorsense extends to entire map while touching stone; know position and movement of every creature; +2 AC against all attacks"},{"type":"active","uses":"1/trial","name":"Geological Survey","text":"Immediately learn exact HP and conditions of all enemies; designate one zone as Fault Line \u2014 first enemy to enter makes DEX save (DC 15) or take 3d8 bludgeoning damage and fall prone"}],"flavorText":"Your lineage reads the planet through its bones. Every footstep, every weapon strike registers in the stone as legible data."},{"id":"sen_5A_kha","name":"The Stone Remembers","tier":5,"epoch":3,"cost":40,"prerequisite":"sen_4A_kha","unlocksNext":[],"mechanics":[{"type":"passive","text":"Each time a damage type successfully hits you, gain resistance to that damage type for the rest of the trial (max 3 types)"},{"type":"active","uses":"1/trial","name":"Deep Record","text":"GM reveals all undisclosed zone effects, trap mechanics, and enemy special abilities for the current trial; your attacks deal +3d8 damage for the rest of this round"}],"flavo ditioning Field \u2014 allies have advantage on CON saves and resistance to dominant hazard type; enemies entering make CON save (DC 13) or gain 1 stack of zone's primary hazard"}],"flavorText":"At civilizational scale, your lineage's environmental tolerance becomes a strategic asset."}],"planetExclusive":{"pyrotheon":[{"id":"adp_4A_pyr","name":"Pyrogenic Metabolism","tier":4,"epoch":3,"cost":30,"prerequisite":"adp_3","unlocksNext":["adp_5A_pyr"],"mechanics":[{"type":"passive","text":"Complete immunity to fire damage and Heat Strain; when you receive fire damage, regain HP equal to half the damage instead"},{"type":"active","uses":"1/trial","name":"Metabolic Surge","text":"For 2 rounds, all attacks deal +2d8 fire damage; shed fire at start of each round \u2014 all enemies in your zone take 1d6 fire damage"}],"flavorText":"Your lineage stopped treating volcanic heat as a condition to survive and started treating it as a metabolic input."},{"id":"adp_5A_pyr","name":"Living Forge","tier":5,"epoch":3,"cost":40,"prerequisite":"adp_4A_pyr","unlocksNext":[],"mechanics":[{"type":"passive","text":"All damage you deal converted to fire damage and ignores resistance; enemies starting their turn within 1 zone of you take 1d8 fire damage (proximity)"},{"type":"passive","text":"All resistances from Nodes 1 and 3 promoted to immunities"},{"type":"active","uses":"1/trial","name":"Full Conversion","text":"For 1 round deal double damage on all attacks; all enemies on the map take 2d6 fire damage at start of their turn for 2 rounds"}],"flavorText":"The creature's body chemistry has crossed a threshold \u2014 fire is not a weapon. Fire is exhaust."}],"glacara":[{"id":"adp_4A_gla","name":"Cryogenic Adaptation","tier":4,"epoch":3,"cost":30,"prerequisite":"adp_3","unlocksNext":["adp_5A_gla"],"mechanics":[{"type":"passive","text":"Complete immunity to cold damage and Cold Exposure; when you receive cold damage, regain HP equal to half the damage instead"},{"type":"active","uses":"1/trial",

            ${lvl<6?`<button data-lvl="+" class="btn-g" style="padding:3px 10px;font-size:.58rem;border:1px solid var(--bdr);border-radius:6px;cursor:pointer">+</button>`:''}
          </div>`}
    </div>
  </div></div>`;
  // Abilities — Cantrip + Encounter
  {
    const c=S.cantrip,abs=S.abilities||[];
    const cantripDone=(c.delivery&&(c.delivery!=='aoe'||c.aoeShape)&&c.stat&&c.dmgType);
    if(cantripDone||abs.some(a=>a.role)){
      html+=`<div class="panel"><div class="pb">
        <div style="font-family:'Orbitron',monospace;font-size:.58rem;letter-spacing:.15em;color:var(--ac);text-transform:uppercase;margin-bottom:10px">Action Economy</div>`;
      if(cantripDone){
        const mod=statMod(fs[c.stat]||10),hitStr=fmtMod(getProfBonus()+mod);
        const dmgMod=mod!==0?(' '+fmtMod(mod)):'';
        const dieStr=(c.die||'1d4')+(c.extraDice||[]).map(d=>'+'+d).join('')+dmgMod+' '+c.dmgType;
        const rangeStr=c.delivery==='melee'?'5ft':c.delivery==='ranged'?'60ft':(c.aoeShape||'AoE');
        html+=`<div style="margin-bottom:8px;background:var(--sur2);border-radius:8px;border:1px solid rgba(255,170,0,.25);padding:10px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <span style="font-family:'Orbitron',monospace;font-size:.48rem;color:var(--gr);background:rgba(255,170,0,.12);border:1px solid rgba(255,170,0,.3);border-radius:3px;padding:1px 5px">CANTRIP</span>
            <span style="font-weight:700;font-size:.86rem;color:var(--tx)">Natural Attack</span>
            <span style="font-family:'Orbitron',monospace;font-size:.54rem;color:var(--dm);margin-left:auto">${rangeStr} &bull; &infin; uses</span>
          </div>
          <div style="display:flex;gap:6px">
            <div style="background:rgba(0,0,0,.25);border:1px solid var(--gr);border-radius:6px;padding:4px 10px;text-align:center">
              <div style="font-family:'Orbitron',monospace;font-size:.42rem;color:var(--gr);opacity:.7">HIT</div>
              <div style="font-family:'Orbitron',monospace;font-size:.85rem;font-weight:900;color:var(--gr)">${hitStr}</div>
            </div>
            <div style="background:rgba(0,0,0,.25);border:1px solid rgba(255,215,0,.2);border-radius:6px;padding:4px 12px;flex:1;display:flex;align-items:center">
              <span style="font-family:'Orbitron',monospace;font-size:.8rem;font-weight:900;color:var(--gd)">${dieStr}</span>
            </div>
          </div>
        </div>`;
      }
      const propLabels={ongoing:'Ongoing',stagger:'Stagger',corrode:'Corrode',crit1:'Crit 19–20',crit2:'Crit 18–20',crit3:'Crit 17–20'};
      for(const ab of abs){
        if(!ab.role) continue;
        const isCtrl=ab.role==='Control';
        const isSupp=ab.role==='Support',isHealR=ab.role==='Heal';
        const mod=ab.stat?statMod(fs[ab.stat]||10):0;
        const hitStr=ab.stat?fmtMod(getProfBonus()+mod):'--';
        const dcStr=ab.stat?(8+getProfBonus()+mod)+'':'--';
        const dmgMod=!isCtrl&&mod!==0?(' '+fmtMod(mod)):'';
        const die=isCtrl?(ab.controlDie||'1d4'):(ab.die||'1d4');
        const dmgType=isCtrl?ab.controlDmgType:ab.dmgType;
        const dieStr=isSupp?'Buff'
          :isHealR?(ab.die&&ab.die!=='1d4'?ab.die+(ab.extraDice||[]).map(d=>'+'+d).join('')+fmtMod(mod):'Stat '+fmtMod(mod))
          :die==='1d4'&&!dmgType?'':die+((!isCtrl&&(ab.extraDice||[]).length)?(ab.extraDice||[]).map(d=>'+'+d).join(''):'')+dmgMod+(dmgType?' '+dmgType:'');
        const atLabel=ab.actionType==='action'?'ACTION':ab.actionType==='bonus'?'BONUS':ab.actionType==='reaction'?'REACTION':'';
        const atCol=ab.actionType==='bonus'?'var(--ac2)':ab.actionType==='reaction'?'var(--ac3)':'var(--ac)';
        const rangeStr=ab.delivery==='melee'?'5ft':ab.delivery==='ranged'?'60ft':(ab.aoeShape||'AoE');
        const props=ab.properties||[];
        html+=`<div style="margin-bottom:8px;background:var(--sur2);border-radius:8px;border:1px solid var(--bdr);padding:10px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            ${atLabel?`<span style="font-family:'Orbitron',monospace;font-size:.48rem;color:${atCol};background:${atCol}18;border:1px solid ${atCol}40;border-radius:3px;padding:1px 5px">${atLabel}</span>`:''}
            <span style="font-weight:700;font-size:.86rem;color:var(--tx)">${ab.role}${isCtrl&&ab.condition?' — '+ab.condition.charAt(0).toUpperCase()+ab.condition.slice(1):''}</span>
            <span style="font-family:'Orbitron',monospace;font-size:.54rem;color:var(--dm);margin-left:auto">${rangeStr} &bull; PB/enc</span>
          </div>
          <div style="display:flex;gap:6px${props.length?';margin-bottom:6px':''}">
            <div style="background:rgba(0,0,0,.25);border:1px solid ${isCtrl?'var(--gr)':'var(--ac)'};border-radius:6px;padding:4px 10px;min-width:48px;text-align:center">
              <div style="font-family:'Orbitron',monospace;font-size:.42rem;color:${isCtrl?'var(--gr)':'var(--ac)'};opacity:.7">${isCtrl?'DC':'HIT'}</div>
              <div style="font-family:'Orbitron',monospace;font-size:.85rem;font-weight:900;color:${isCtrl?'var(--gr)':'var(--ac)'}">${isCtrl?dcStr:hitStr}</div>
            </div>
            <div style="background:rgba(0,0,0,.25);border:1px solid rgba(255,215,0,.2);border-radius:6px;padding:4px 12px;flex:1;display:flex;align-items:center">
              <span style="font-family:'Orbitron',monospace;font-size:.8rem;font-weight:900;color:var(--gd)">${dieStr||'Condition only'}</span>
            </div>
          </div>
          ${props.length?`<div style="display:flex;flex-wrap:wrap;gap:4px">${props.map(p=>`<span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--ac3);background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.2);border-radius:3px;padding:1px 5px">${propLabels[p]||p}</span>`).join('')}</div>`:''}
          ${isCtrl&&ab.duration?`<div style="font-size:.6rem;color:var(--dm);margin-top:4px">Duration: ${ab.duration.charAt(0).toUpperCase()+ab.duration.slice(1)}${ab.duration==='persistent'?' — Concentration':''}</div>`:''}
        </div>`;
      }
      html+=`</div></div>`;
    }
  }
  // Archetype evolution paths
  for(const archKey of archs){
    const m=ARCH_META[archKey],chain=getArchChain(archKey),owned=S.archetypes?.unlockedNodes||[];
    html+=`<div class="panel">
      <div class="ph"><h2 style="color:${m.color}">${m.icon} ${m.name} — Path</h2></div>
      <div class="pb">`;
    for(const id of chain){
      const n=NODES[id],isO=owned.includes(id),chk=canBuy(id),isN=!isO&&chk.ok;
      html+=`<div class="node-card${isO?' owned':isN?' avail':''}" style="margin-bottom:5px">
        <div class="node-hdr" style="background:${isO?'rgba(255,170,0,.06)':isN?'rgba(204,51,0,.08)':'var(--sur2)'}">
          <div>
            <div class="node-name" style="color:${isO?'var(--gr)':isN?'var(--ac)':'var(--dm)'}">${isO?'✓ ':''}${e(n?.name||id)}
              ${!isO&&!isN?`<span style="font-size:.52rem;font-family:'Orbitron',monospace;color:var(--dm);margin-left:5px">${n?.tier<=2?'E1':n?.tier===3?'E2':'E3'}${n?.planetExclusive?' · Excl':''}</span>`:''}
            </div>
          </div>
          <div class="node-ep" style="color:${isO?'var(--gr)':'var(--dm)'}">${nodeCostDisc(id)} EP</div>
        </div>
        ${(isO||isN)&&n?`<div class="node-body">
          <div class="node-flavor">${e(n.flavorText||'')}</div>
          ${isO?(n.mechanics||[]).map(mechHTML).join(''):''}
        </div>`:''}
      </div>`;
    }
    html+=`</div></div>`;
  }
  // EP summary + export
  const sp=calcEP(),bud=budget();
  html+=`<div style="display:flex;gap:8px;margin-bottom:8px">
    <button class="btn btn-g" style="flex:1;font-size:.62rem" data-goto="0">← Edit</button>
    <button class="btn btn-p" style="flex:1;font-size:.62rem" id="export-btn">Export JSON</button>
  </div>
  <div style="padding:8px 12px;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;font-family:'Orbitron',monospace;font-size:.52rem;color:var(--dm);display:flex;justify-content:space-between">
    <span>EP SPENT: ${sp} / ${bud}</span><span>REMAINING: ${bud-sp}</span>
  </div>`;
  return html;
}

function backLink(target,type){
  const label=type==='qback'?'← Back':type==='bms'?'← Back':'← Back';
  if(type==='qback')return`<div class="back-link" data-qback="${target}"><span>${label}</span></div>`;
  if(type==='bms')return`<div class="back-link" data-bms="${target.replace('bms','')}"><span>${label}</span></div>`;
  return`<div class="back-link" data-goto="${target}"><span>${label}</span></div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(INTRO){app.innerHTML=renderIntro();return;}
  if(SPLASH){app.innerHTML=renderSplash();return;}
  if(INTERACT_ACTIVE || ADAPT_OVERLAY){app.innerHTML=renderInteract();return;}

  const pl=PLANETS[S.planet]||PLANETS.pyrotheon;
  const ac=pl.palette.ac,ac2=pl.palette.ac2;
  document.documentElement.style.setProperty('--ac',ac);
  document.documentElement.style.setProperty('--ac2',ac2);
  document.documentElement.style.setProperty('--ac3',ac);

  const ep=calcEP(),bud=budget(),rem=bud-ep,pct=Math.min(100,ep/bud*100);
  const over=rem<0;
  const hudCol=over?'var(--rd)':pct>85?'var(--gd)':pct>60?ac:'var(--gr)';

  const steps=[renderStep0,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5];
  const content=(steps[STEP]||renderStep0)();

  app.innerHTML=`
    <div class="wrap">
      <div class="builder-hero">
        <h1>PROTO<span>GENESIS</span></h1>
        <div class="sub">
          Evolution Builder
          ${S.planet?`<span style="display:inline-flex;align-items:center;gap:6px;margin-left:8px">
            <span style="color:${ac};letter-spacing:.2em">${pl.name.toUpperCase()}</span>
            <button data-backsplash="1" style="background:none;border:1px solid var(--bdr);border-radius:4px;padding:1px 7px;color:var(--dm);font-size:.56rem;cursor:pointer">✎</button>
          </span>`:''}
        </div>
      </div>
      ${STEP>0?`<div class="sticky-hud">
        <div class="hud-inner">
          <span class="hud-lbl">EP</span>
          <div class="hud-track"><div class="hud-fill" style="width:${pct}%;background:${hudCol}"></div></div>
          <span class="hud-ep" style="color:${hudCol}">${ep}</span>
          <span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm)">/ ${bud}</span>
        </div>
      </div>`:''}
      <div class="wrap-inner">${content}</div>
      <div class="bottom-nav">
        ${NAV_STEPS.map((lbl,i)=>`<button class="bnav-btn${STEP===i?' active':isStepDone(i)?' done':''}" data-goto="${i}">${lbl}</button>`).join('')}
      </div>
    </div>`;
}

function handleClick(e){
  const t=e.target.closest('[data-blinkpurchase],[data-blinkprev],[data-blinknext],[data-blinkdist],[data-sizeprev],[data-sizenext],[data-nodeprev],[data-nodenext],[data-specprev],[data-specnext],[data-goto],[data-qpick],[data-qback],[data-planet],[data-trial],[data-splashprev],[data-splashnext],[data-beginevol],[data-backsplash],[data-bms],[data-bms-set],[data-size],[data-hd],[data-qs],[data-move],[data-statval],[data-statkey],[data-statclear],[data-statup],[data-statdown],[data-arch],[data-archprev],[data-archnext],[data-archsetprim],[data-archsetsec],[data-archphase],[data-dlvprev],[data-dlvnext],[data-shapeprev],[data-shapenext],[data-buy],[data-sell],[data-hp],[data-lvl],[data-enterapp],[data-cantpick],[data-abpick],[data-abprop],[data-abgoto],[data-abconfirm],[data-addab],[data-rmab],[data-pick],[data-seconddie],[data-chipopen],[data-dieup],[data-diedown],[data-medbonustoggle],[data-medopen],[data-medpick],[data-mvq],[data-mvtoggle],[data-mvblink],[data-splashq],[data-abdrop],[data-cantconfirm],[data-cantopen],[data-extradie],[data-interact-harvest],[data-interact-platformdestroy],[data-interact-flagcorrection],[data-interact-toggleabs],[data-interact-toggleattack],[data-attack-target],[data-attack-confirm],[data-submitinit],[data-attackreact],[data-attackrespond],[data-hazardrespond],[id="export-btn"]');
  if(!t){render();return;}

  // ── NEW HANDLERS (session additions) ─────────────────────────────────────
  if(t.dataset.blinkpurchase!==undefined){
    if(t.dataset.blinkpurchase==='1'){
      S.blinkstep={purchased:true,actionType:'action',distance:0};
    } else {
      S.blinkstep={purchased:false,actionType:'action',distance:0};
    }
    render();return;
  }
  if(t.dataset.blinkprev!==undefined||t.dataset.blinknext!==undefined){
    const isNext=t.dataset.blinknext!==undefined;
    const ATO=['action','bonus','reaction'];
    const ci=ATO.indexOf(S.blinkstep?.actionType||'action');
    const ni=isNext?Math.min(ci+1,ATO.length-1):Math.max(ci-1,0);
    S.blinkstep={...S.blinkstep,actionType:ATO[ni]};
    render();return;
  }
  if(t.dataset.blinkdist!==undefined){
    const cur=S.blinkstep?.distance||0;
    const nv=t.dataset.blinkdist==='+'?Math.min(cur+1,4):Math.max(cur-1,0);
    S.blinkstep={...S.blinkstep,distance:nv};
    render();return;
  }
  if(t.dataset.sizeprev!==undefined||t.dataset.sizenext!==undefined){
    const isNext=t.dataset.sizenext!==undefined;
    SIZE_IDX=isNext?Math.min(SIZE_IDX+1,SIZES.length-1):Math.max(SIZE_IDX-1,0);
    render();return;
  }
  if(t.dataset.nodeprev!==undefined||t.dataset.nodenext!==undefined){
    const archKey=t.dataset.nodeprev!==undefined?t.dataset.nodeprev:t.dataset.nodenext;
    const isNext=t.dataset.nodenext!==undefined;
    const chain=getArchChain(archKey);
    const cur=NODE_IDX[archKey]||0;
    NODE_IDX[archKey]=isNext?Math.min(cur+1,chain.length-1):Math.max(cur-1,0);
    render();return;
  }
  if(t.dataset.specprev!==undefined||t.dataset.specnext!==undefined){
    const qId=t.dataset.specprev!==undefined?t.dataset.specprev:t.dataset.specnext;
    const isNext=t.dataset.specnext!==undefined;
    const sq=SPECIMEN_QS.find(q=>q.id===qId);
    if(sq){
      const cur=SPEC_IDX[qId]||0;
      SPEC_IDX[qId]=isNext?Math.min(cur+1,sq.options.length-1):Math.max(cur-1,0);
    }
    render();return;
  }
  if(t.dataset.goto!==undefined){STEP=parseInt(t.dataset.goto);render();return;}
  if(t.dataset.enterapp){INTRO=false;render();return;}
  if(t.dataset.splashprev){SPLASH_IDX=Math.max(0,SPLASH_IDX-1);SPLASH_TRIAL=null;render();return;}
  if(t.dataset.splashnext){SPLASH_IDX=Math.min(Object.keys(PLANETS).length-1,SPLASH_IDX+1);SPLASH_TRIAL=null;render();return;}
  if(t.dataset.beginevol){S.planet=t.dataset.beginevol;SPLASH=false;STEP=0;ARCH_PHASE='pick_primary';ARCH_IDX=0;render();return;}
  if(t.dataset.backsplash){SPLASH=true;render();return;}
  if(t.dataset.trial!==undefined){const i=parseInt(t.dataset.trial);SPLASH_TRIAL=SPLASH_TRIAL===i?null:i;render();return;}

  if(t.dataset.qpick!==undefined){
    const qi=parseInt(t.dataset.qpick),val=t.dataset.qval;
    const q={...S.specimenQ,[SPECIMEN_QS[qi].id]:val};
    SPECIMEN_QS.slice(qi+1).forEach(sq=>{q[sq.id]=null;});
    const patch={specimenQ:q,specimenStep:qi+1};
    if(SPECIMEN_QS[qi].id==='q0'){const opt=SPECIMEN_QS[qi].options.find(o=>o.id===val);if(opt)patch.typeId=opt.typeId||val;}
    S={...S,...patch};render();return;
  }
  if(t.dataset.qback!==undefined){
    const qi=parseInt(t.dataset.qback);
    const q={...S.specimenQ};
    for(let _i=qi;_i<SPECIMEN_QS.length;_i++) delete SPEC_IDX[SPECIMEN_QS[_i].id];
    SPECIMEN_QS.slice(qi).forEach(sq=>{q[sq.id]=null;});
    S={...S,specimenQ:q,specimenStep:qi};render();return;
  }

  if(t.dataset.bms!==undefined){S.bodyMotionStep=parseInt(t.dataset.bms);render();return;}
  if(t.dataset.bmsSet!==undefined){S.bodyMotionStep=parseInt(t.dataset.bmsSet);render();return;}
  if(t.dataset.size){
    const newSize=t.dataset.size;
    S.sizeId=newSize;
    SIZE_IDX=SIZES.findIndex(x=>x.id===newSize);
    if(newSize!=='medium'){
      S.medBonus=[null,null];
      S.bodyMotionStep=2;
    }
    render();return;
  }
  if(t.dataset.medopen!==undefined){
    const idx=parseInt(t.dataset.medopen);
    MED_OPEN=MED_OPEN===idx?null:idx;
    render();return;
  }
  if(t.dataset.medpick!==undefined){
    const[idx,stat]=t.dataset.medpick.split(':');
    const cur=[...(S.medBonus||[null,null])];
    cur[parseInt(idx)]=stat;
    S.medBonus=cur;
    MED_OPEN=null;
    render();return;
  }
  if(t.dataset.medbonustoggle){render();return;}
  if(t.dataset.hd){const i=HD_LIST.indexOf(S.hdChoice||'1d4');const ni=t.dataset.hd==='+'?Math.min(i+1,HD_LIST.length-1):Math.max(i-1,0);S.hdChoice=HD_LIST[ni];render();return;}
  // Cantrip confirm — collapses die section, allows Evolution button to show
  if(t.dataset.cantconfirm){CANTRIP_SEC='confirmed';render();return;}
  // Cantrip open step — advances cantrip to a named step
  if(t.dataset.cantopen){CANTRIP_SEC=t.dataset.cantopen;render();return;}
  // Splash range handler
  if(t.dataset.splashq){
    const[key,dir]=t.dataset.splashq.split(':').slice(-2); // last two parts are key and dir
    const fullKey=t.dataset.splashq;
    const isCantrip=fullKey.startsWith('c:');
    const delta=dir==='+'?1:-1;
    if(isCantrip){
      S.cantrip={...S.cantrip,splashRange:Math.max(0,Math.min(QUICK_MAX,(S.cantrip.splashRange||0)+delta))};
    } else {
      const abId=fullKey.split(':')[0];
      S.abilities=S.abilities.map(a=>a.id===abId?{...a,splashRange:Math.max(0,Math.min(QUICK_MAX,(a.splashRange||0)+delta))}:a);
    }
    render();return;
  }
  // AB_DROPDOWN handler (stat/dmgType dropdowns in ability builder)
  if(t.dataset.abdrop){
    const key=t.dataset.abdrop;
    AB_DROPDOWN=AB_DROPDOWN===key?null:key;
    render();return;
  }
  // Movement handlers
  if(t.dataset.mvq){
    const[id,dir]=t.dataset.mvq.split(':');
    const delta=dir==='+'?1:-1;
    if(id==='land'){
      S.landQuick=Math.max(0,Math.min(QUICK_MAX,(S.landQuick||0)+delta));
    } else {
      const am={...S.altMoves};
      am[id]={...am[id],quick:Math.max(0,Math.min(QUICK_MAX,(am[id]?.quick||0)+delta))};
      S.altMoves=am;
    }
    render();return;
  }
  if(t.dataset.mvtoggle){
    const id=t.dataset.mvtoggle;
    const am={...S.altMoves};
    const cur=am[id]||{owned:false,quick:0};
    am[id]={...cur,owned:!cur.owned,quick:cur.owned?0:cur.quick};
    S.altMoves=am;
    render();return;
  }
  // mvblink is now handled by blinkpurchase
  // Legacy handlers (no-op — old data-qs and data-move removed from UI)
  if(t.dataset.qs){render();return;}
  if(t.dataset.move){render();return;}

  if(t.dataset.statval!==undefined){
    const v=parseInt(t.dataset.statval);
    if(Object.values(S.statAssign).includes(v))return render();
    if(S.statPending===v){S.statPending=null;}else{S.statPending=v;}
    render();return;
  }
  // statup/statdown/statclear MUST come before statkey — buttons are children of the statkey div
  if(t.dataset.statclear){const na={...S.statAssign};delete na[t.dataset.statclear];S.statAssign=na;render();return;}
  if(t.dataset.statup){
    const k=t.dataset.statup,b=S.statEPBonuses[k]||0;
    const globalTotal=Object.values(S.statEPBonuses).reduce((t,v)=>t+(v||0),0);
    if(globalTotal<3){S.statEPBonuses={...S.statEPBonuses,[k]:b+1};}
    render();return;
  }
  if(t.dataset.statdown){const k=t.dataset.statdown,b=S.statEPBonuses[k]||0;if(b>0){S.statEPBonuses={...S.statEPBonuses,[k]:b-1};}render();return;}
  if(t.dataset.statkey){
    if(S.statPending===null)return render();
    S.statAssign={...S.statAssign,[t.dataset.statkey]:S.statPending};
    S.statPending=null;render();return;
  }

  // ── Cantrip handlers ──
  if(t.dataset.cantpick!==undefined){
    const[field,val]=t.dataset.cantpick.split(':');
    const patch={[field]:val};
    if(field==='delivery'&&val!=='aoe') patch.aoeShape=null;
    S.cantrip={...S.cantrip,...patch};
    // advance to next step by clearing CANTRIP_SEC (natural step logic takes over)
    if(field==='delivery') CANTRIP_SEC=val==='aoe'?'aoeShape':null;
    else if(field==='aoeShape') CANTRIP_SEC=val==='splash'?'aoeShape':null;
    else CANTRIP_SEC=null;
    render();return;
  }
  if(t.dataset.chipopen!==undefined){
    const key=t.dataset.chipopen;
    // Map chip keys to step names for cantrip
    const cantripKeyMap={'c:delivery':'delivery','c:aoeShape':'aoeShape','c:statdmg':'statdmg','c:die':'die'};
    if(cantripKeyMap[key]!==undefined){
      const step=cantripKeyMap[key];
      CANTRIP_SEC=CANTRIP_SEC===step?null:step;
      render();return;
    }
    // Encounter ability chip: format "abId:stepNum"
    const abId=key.split(':')[0],ss=parseFloat(key.split(':')[1]);
    if(!isNaN(ss)){ABILITY_STEP[abId]=ss;CANTRIP_SEC=null;render();return;}
    render();return;
  }
  if(t.dataset.extradie!==undefined){
    // format: "prefix:action:..." where prefix is "c" or abId
    // actions: "add", "remove:idx", "up:idx", "down:idx"
    const raw=t.dataset.extradie;
    const firstColon=raw.indexOf(':');
    const prefix=raw.slice(0,firstColon);
    const rest=raw.slice(firstColon+1); // e.g. "add", "remove:0", "up:1"
    const [action,idxStr]=rest.split(':');
    const idx=parseInt(idxStr);
    function mutateExtra(arr){
      arr=[...arr];
      if(action==='add'&&arr.length<3) arr.push('1d4');
      else if(action==='remove') arr.splice(idx,1);
      else if(action==='up'){const i=DIE_LIST.indexOf(arr[idx]);if(i<DIE_LIST.length-1)arr[idx]=DIE_LIST[i+1];}
      else if(action==='down'){const i=DIE_LIST.indexOf(arr[idx]);if(i>0)arr[idx]=DIE_LIST[i-1];}
      return arr;
    }
    if(prefix==='c'){
      S.cantrip={...S.cantrip,extraDice:mutateExtra(S.cantrip.extraDice||[])};
    } else {
      S.abilities=S.abilities.map(a=>a.id===prefix?{...a,extraDice:mutateExtra(a.extraDice||[])}:a);
    }
    render();return;
  }
  if(t.dataset.dieup!==undefined){
    const key=t.dataset.dieup;
    if(key==='c:die:up'){const ci=DIE_LIST.indexOf(S.cantrip.die||'1d4');S.cantrip={...S.cantrip,die:DIE_LIST[Math.min(ci+1,DIE_LIST.length-1)]};render();return;}
    if(key==='c:die:down'){const ci=DIE_LIST.indexOf(S.cantrip.die||'1d4');S.cantrip={...S.cantrip,die:DIE_LIST[Math.max(ci-1,0)]};render();return;}
    // encounter ability die up/down: format "abId:die:up" or "abId:cdie:up"
    const parts=key.split(':');const abId=parts[0],dieField=parts[1]==='cdie'?'controlDie':'die';
    const ci=DIE_LIST.indexOf((S.abilities.find(a=>a.id===abId)||{})[dieField]||'1d4');
    S.abilities=S.abilities.map(a=>a.id===abId?{...a,[dieField]:DIE_LIST[Math.min(ci+1,DIE_LIST.length-1)]}:a);
    render();return;
  }
  if(t.dataset.diedown!==undefined){
    const key=t.dataset.diedown;
    if(key==='c:die:up'){const ci=DIE_LIST.indexOf(S.cantrip.die||'1d4');S.cantrip={...S.cantrip,die:DIE_LIST[Math.min(ci+1,DIE_LIST.length-1)]};render();return;}
    if(key==='c:die:down'){const ci=DIE_LIST.indexOf(S.cantrip.die||'1d4');S.cantrip={...S.cantrip,die:DIE_LIST[Math.max(ci-1,0)]};render();return;}
    const parts=key.split(':');const abId=parts[0],dieField=parts[1]==='cdie'?'controlDie':'die';
    const ci=DIE_LIST.indexOf((S.abilities.find(a=>a.id===abId)||{})[dieField]||'1d4');
    S.abilities=S.abilities.map(a=>a.id===abId?{...a,[dieField]:DIE_LIST[Math.max(ci-1,0)]}:a);
    render();return;
  }
  // Ability pick: actionType, role, delivery, aoeShape, stat, dmgType, condition, duration, cdmgType
  if(t.dataset.abpick!==undefined){
    const parts=t.dataset.abpick.split(':');
    const abId=parts[0],field=parts[1],val=parts.slice(2).join(':');
    S.abilities=S.abilities.map(a=>{
      if(a.id!==abId) return a;
      const patch={[field]:val};
      // auto-advance step
      let nextStep=ABILITY_STEP[abId]||0;
      if(field==='actionType') nextStep=1;
      else if(field==='role'){patch.delivery=null;patch.aoeShape=null;patch.stat=null;patch.dmgType=null;patch.die='1d4';patch.extraDice=[];patch.properties=[];patch.condition=null;patch.duration=null;patch.controlDie=null;patch.controlDmgType=null;nextStep=2;}
      else if(field==='delivery') nextStep=val==='aoe'?2.5:3;
      else if(field==='aoeShape') nextStep=val==='splash'?2.5:3;
      else if(field==='stat'){ nextStep=a.role==='Damage'?(a.dmgType?5:3):a.role==='Support'?5:a.role==='Heal'?5:4; }
      else if(field==='condition') nextStep=5;
      else if(field==='duration') nextStep=6;
      else if(field==='dmgType') nextStep=5;
      else if(field==='cdmgType'){patch.controlDmgType=val;delete patch.cdmgType;}
      ABILITY_STEP[abId]=nextStep;
      return {...a,...patch};
    });
    render();return;
  }
  if(t.dataset.abprop!==undefined){
    const[abId,pid]=t.dataset.abprop.split(':');
    S.abilities=S.abilities.map(a=>{
      if(a.id!==abId) return a;
      const props=a.properties||[];
      let next;
      if(props.includes(pid)){
        if(pid==='crit1') next=props.filter(x=>!['crit1','crit2','crit3'].includes(x));
        else if(pid==='crit2') next=props.filter(x=>!['crit2','crit3'].includes(x));
        else next=props.filter(x=>x!==pid);
      } else {
        if((pid==='stagger'&&props.includes('corrode'))||(pid==='corrode'&&props.includes('stagger'))) return a;
        if(pid==='crit2'&&!props.includes('crit1')) return a;
        if(pid==='crit3'&&!props.includes('crit2')) return a;
        if(pid==='ongoing'&&(!a.die||a.die==='1d4')&&(!a.controlDie||a.controlDie==='1d4')) return a;
        next=props.concat([pid]);
      }
      return {...a,properties:next};
    });
    render();return;
  }
  if(t.dataset.abgoto!==undefined){const[abId,ss]=t.dataset.abgoto.split(':');ABILITY_STEP[abId]=parseFloat(ss);render();return;}
  if(t.dataset.abconfirm!==undefined){ABILITY_STEP[t.dataset.abconfirm]=99;render();return;}
  if(t.dataset.addab){S.abilities=[...S.abilities,newAbility()];const ab=S.abilities[S.abilities.length-1];ABILITY_STEP[ab.id]=0;render();return;}
  if(t.dataset.rmab!==undefined){const id=t.dataset.rmab;S.abilities=S.abilities.filter(a=>a.id!==id);delete ABILITY_STEP[id];render();return;}

  // data-pick: generic picker for stat/dmgType fields  format "field:value" or "abId:field:value" or "c:field"
  if(t.dataset.pick!==undefined){
    const parts=t.dataset.pick.split(':');
    // cantrip stat: "c:stat:STR" or cantrip dmgType: "c:dmgType:Fire"
    if(parts[0]==='c'){
      const field=parts[1],val=parts[2];
      S.cantrip={...S.cantrip,[field]:val};
      CANTRIP_SEC=null; AB_DROPDOWN=null;
      render();return;
    }
    // ability stat: "abId:stat:STR"  ability dmgType: "abId:dmgType:Fire"  ability cdmgType: "abId:cdmgType:Fire"
    const abId=parts[0],field=parts[1],val=parts.slice(2).join(':');
    S.abilities=S.abilities.map(a=>{
      if(a.id!==abId) return a;
      const patch={};
      if(field==='stat'){patch.stat=val; AB_DROPDOWN=null; if(a.role==='Damage'){if(a.dmgType) ABILITY_STEP[abId]=5;}else{ABILITY_STEP[abId]=4;}}
      else if(field==='dmgType'){patch.dmgType=val; AB_DROPDOWN=null; if(a.role==='Damage'){if(a.stat) ABILITY_STEP[abId]=5;}else{ABILITY_STEP[abId]=5;}}
      else if(field==='cdmgType'){patch.controlDmgType=val;}
      return {...a,...patch};
    });
    render();return;
  }

  if(t.dataset.arch){
    const k=t.dataset.arch,{primary,secondary}=S.archetypes;
    if(primary===k)S.archetypes={...S.archetypes,primary:null};
    else if(secondary===k)S.archetypes={...S.archetypes,secondary:null};
    else if(!primary)S.archetypes={...S.archetypes,primary:k};
    else if(!secondary&&k!==primary)S.archetypes={...S.archetypes,secondary:k};
    else S.archetypes={...S.archetypes,secondary:k};
    render();return;
  }
  if(t.dataset.archphase!==undefined){
    const newPhase=t.dataset.archphase;
    ARCH_PHASE=newPhase;
    // Sync carousel to relevant selection
    const keys=Object.keys(ARCH_META);
    if((newPhase==='pick_secondary'||newPhase==='buy_secondary')&&S.archetypes.secondary)
      ARCH_IDX=keys.indexOf(S.archetypes.secondary);
    else if((newPhase==='pick_primary'||newPhase==='buy_primary')&&S.archetypes.primary)
      ARCH_IDX=keys.indexOf(S.archetypes.primary);
    // Going back to pick_primary clears primary selection
    if(newPhase==='pick_primary') S.archetypes={...S.archetypes,primary:null,secondary:null,unlockedNodes:[]};
    // Going back to pick_secondary clears secondary selection only
    if(newPhase==='pick_secondary') S.archetypes={...S.archetypes,secondary:null};
    render();return;
  }
  // Shape slider prev/next
  if(t.dataset.shapeprev!==undefined||t.dataset.shapenext!==undefined){
    const SOPTS=['line','cone','burst','splash'];
    const isNext=t.dataset.shapenext!==undefined;
    const prefix=isNext?t.dataset.shapenext:t.dataset.shapeprev;
    const isCantrip=prefix==='c';
    if(isCantrip){
      const pendingMatch=CANTRIP_SEC&&CANTRIP_SEC.startsWith('shape:')?CANTRIP_SEC.slice(6):null;
      const cur=pendingMatch||S.cantrip.aoeShape||null;
      const ci=cur?SOPTS.indexOf(cur):-1;
      const ni=isNext?Math.min(Math.max(ci,0)+1,SOPTS.length-1):Math.max(Math.min(ci,SOPTS.length)-1,0);
      CANTRIP_SEC='shape:'+SOPTS[ni];
    } else {
      const cur=(S.abilities.find(a=>a.id===prefix)||{}).aoeShape||null;
      const ci=cur?SOPTS.indexOf(cur):-1;
      const ni=isNext?Math.min(Math.max(ci,0)+1,SOPTS.length-1):Math.max(Math.min(ci,SOPTS.length)-1,0);
      S.abilities=S.abilities.map(a=>a.id===prefix?{...a,aoeShape:SOPTS[ni]}:a);
    }
    render();return;
  }
  // Delivery slider prev/next — only updates pending selection, confirm commits
  if(t.dataset.dlvprev!==undefined||t.dataset.dlvnext!==undefined){
    const DOPTS=['melee','ranged','aoe'];
    const isNext=t.dataset.dlvnext!==undefined;
    const prefix=t.dataset.dlvprev!==undefined?t.dataset.dlvprev:t.dataset.dlvnext;
    const isCantrip=prefix==='c';
    if(isCantrip){
      // Read current pending OR committed value
      const pendingMatch=CANTRIP_SEC&&CANTRIP_SEC.startsWith('dlv:')?CANTRIP_SEC.slice(4):null;
      const cur=pendingMatch||S.cantrip.delivery||'melee';
      const ci=DOPTS.indexOf(cur);
      const ni=isNext?Math.min(ci+1,DOPTS.length-1):Math.max(ci-1,0);
      const nv=ci===-1?(isNext?DOPTS[0]:DOPTS[DOPTS.length-1]):DOPTS[ni];
      CANTRIP_SEC='dlv:'+nv; // pending — not committed yet
    } else {
      const cur=(S.abilities.find(a=>a.id===prefix)||{}).delivery||'melee';
      const ci=DOPTS.indexOf(cur);
      const ni=isNext?Math.min(ci+1,DOPTS.length-1):Math.max(ci-1,0);
      const nv=ci===-1?(isNext?DOPTS[0]:DOPTS[DOPTS.length-1]):DOPTS[ni];
      // Update delivery value but stay on step 2 — confirm button advances
      S.abilities=S.abilities.map(a=>{
        if(a.id!==prefix) return a;
        const patch={delivery:nv};
        if(nv!=='aoe') patch.aoeShape=null;
        ABILITY_STEP[prefix]=2; // stay on delivery step
        return {...a,...patch};
      });
    }
    render();return;
  }
  if(t.dataset.archprev!==undefined){
    const keys=Object.keys(ARCH_META);
    ARCH_IDX=(ARCH_IDX-1+keys.length)%keys.length;
    render();return;
  }
  if(t.dataset.archnext!==undefined){
    const keys=Object.keys(ARCH_META);
    ARCH_IDX=(ARCH_IDX+1)%keys.length;
    render();return;
  }
  if(t.dataset.archsetprim!==undefined){
    const k=t.dataset.archsetprim,{primary,secondary}=S.archetypes;
    if(primary===k){
      S.archetypes={...S.archetypes,primary:secondary||null,secondary:null};
    } else {
      S.archetypes={...S.archetypes,primary:k};
      if(secondary===k) S.archetypes={...S.archetypes,secondary:null};
    }
    // Advance to buying primary nodes
    ARCH_PHASE='buy_primary';
    render();return;
  }
  if(t.dataset.archsetsec!==undefined){
    const k=t.dataset.archsetsec,{primary,secondary}=S.archetypes;
    if(!primary){
      // Fallback: no primary yet, set as primary
      S.archetypes={...S.archetypes,primary:k};
      ARCH_PHASE='buy_primary';
    } else if(secondary===k){
      // Deselect secondary — back to pick
      S.archetypes={...S.archetypes,secondary:null};
    } else {
      S.archetypes={...S.archetypes,secondary:k};
      ARCH_PHASE='buy_secondary';
    }
    render();return;
  }
  if(t.dataset.buy){
    const boughtId=t.dataset.buy;
    buyNode(boughtId);
    for(const ak of ['primary','secondary']){
      const chain2=getArchChain(S.archetypes?.[ak]||'');
      if(chain2.includes(boughtId)){
        const ci=chain2.indexOf(boughtId);
        if(ci<chain2.length-1) NODE_IDX[S.archetypes?.[ak]||'']=ci+1;
      }
    }
    render();return;
  }
  if(t.dataset.sell){sellNode(t.dataset.sell);return;}

  if(t.dataset.hp){
    const avgHp2=getMaxHP();
    const cur=(S.currentHp!==null?S.currentHp:avgHp2);
    if(t.dataset.hp==='+1')S.currentHp=Math.min(avgHp2,cur+1);
    else if(t.dataset.hp==='-1')S.currentHp=Math.max(0,cur-1);
    else S.currentHp=null;
    render();return;
  }
  if(t.dataset.lvl){if(ROOM_CODE)return;S.creatureLevel=(t.dataset.lvl==='+'?Math.min(6,(S.creatureLevel||1)+1):Math.max(1,(S.creatureLevel||1)-1));S.currentHp=null;render();return;}

  // ── INTERACT PAGE HANDLERS ────────────────────────────────────────────────
  if(t.dataset.interactHarvest!==undefined){
    sendHarvestRequest();
    // Optimistic UI: flash feedback (GM confirms actual token increment)
    const btn=t; btn.textContent='✓ Sent!'; btn.disabled=true;
    setTimeout(()=>{ btn.textContent='🍖 HARVEST'; btn.disabled=false; }, 1800);
    return;
  }
  if(t.dataset.interactPlatformdestroy!==undefined){
    sendPlatformDestroyRequest();
    const btn=t; btn.textContent='✓ Sent!'; btn.disabled=true;
    setTimeout(()=>{ btn.textContent='💥 PLATFORM DESTROY'; btn.disabled=false; }, 1800);
    return;
  }
  if(t.dataset.interactFlagcorrection!==undefined){
    sendFlagCorrection();
    const btn=t; btn.textContent='✓ Flagged'; btn.disabled=true;
    setTimeout(()=>{ btn.textContent='⚑ FLAG HP'; btn.disabled=false; }, 2000);
    return;
  }
  if(t.dataset.submitinit!==undefined){
    const roll = CS.initiativeRoll || document.getElementById('init-roll-input')?.value;
    if(!roll){ render(); return; }
    sendInitiativeRoll(roll);
    render(); return;
  }
  if(t.dataset.attackreact!==undefined){
    CS.reactionUsed = (t.dataset.attackreact === 'yes');
    if(!CS.reactionUsed) CS.reactionText = '';
    render(); return;
  }
  if(t.dataset.attackrespond!==undefined){
    const saveVal = CS.saveRoll || document.getElementById('save-roll-input')?.value || '';
    const reactText = CS.reactionText || document.getElementById('reaction-text-input')?.value || '';
    sendAttackResponse(CS.incomingAttackReqId, CS.reactionUsed, reactText, saveVal);
    render(); return;
  }
  if(t.dataset.hazardrespond!==undefined){
    const saveVal = CS.hazardSaveRoll || document.getElementById('hazard-save-input')?.value || '';
    sendHazardResponse(CS.incomingHazardReqId, saveVal);
    render(); return;
  }
  if(t.dataset.interactToggleabs!==undefined){
    INTERACT_ABS_OPEN = !INTERACT_ABS_OPEN;
    render(); return;
  }
  if(t.dataset.interactToggleattack!==undefined){
    CS.attackOpen = !CS.attackOpen;
    CS.attackTarget = null; CS.attackDmg = '';
    render(); return;
  }
  if(t.dataset.attackTarget!==undefined){
    CS.attackTarget = t.dataset.attackTarget;
    CS.attackDmg = '';
    render(); return;
  }
  if(t.dataset.attackConfirm!==undefined){
    const dmg = parseInt(CS.attackDmg);
    if(!CS.attackTarget){ render(); return; }
    if(!dmg || dmg<=0){ render(); return; }
    sendDamageRequest(CS.attackTarget, dmg);
    const btn=t; btn.textContent='✓ Sent!'; btn.disabled=true;
    CS.attackDmg=''; CS.attackTarget=null; CS.attackOpen=false;
    setTimeout(()=>render(), 1400);
    return;
  }

  if(t.id==='export-btn'){
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=(S.name||'creature')+'.json';a.click();
    render();return;
  }
  render();
}

function handleChange(e){
  if(e.target.dataset.nameinput!==undefined){
    S.name = e.target.value;
    // Don't re-render — cursor would jump. Name is read on next render.
    return;
  }
  render();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
document.addEventListener('click', handleClick);
document.addEventListener('change', handleChange);
if(ROOM_CODE) startInteractPolling();
render();
</script>
</body>
</html>

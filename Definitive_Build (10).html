<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Proto-Genesis · Evolution Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050810;--sur:#0a0f1e;--sur2:#0f1628;--bdr:#1a2540;
  --ac:#ff6b35;--ac2:#cc3300;--ac3:#ff6b35;
  --tx:#c8d8f0;--dm:#7a94b0;--gr:#ffaa00;--rd:#ff3a5c;--gd:#ffd700
}
html,body{background:var(--bg);color:var(--tx);font-family:'Rajdhani',sans-serif;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;background:var(--bg);min-height:100vh}
.wrap-inner{padding:0 14px 100px}
/* Hero */
.builder-hero{padding:22px 14px 0;text-align:center;background:linear-gradient(180deg,rgba(255,107,53,.06) 0%,transparent 100%)}
h1{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,6vw,2.2rem);font-weight:900;letter-spacing:.06em;color:var(--tx)}
h1 span{color:var(--ac2)}
.sub{font-size:.72rem;color:var(--dm);letter-spacing:.2em;text-transform:uppercase;margin-top:4px}
/* Sticky HUD */
.sticky-hud{position:sticky;top:0;z-index:100;background:var(--bg);padding:6px 14px 8px;border-bottom:1px solid var(--bdr)}
.hud-inner{display:flex;align-items:center;gap:10px}
.hud-lbl{font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);letter-spacing:.15em;text-transform:uppercase}
.hud-track{flex:1;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.hud-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
.hud-ep{font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700}
/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg);border-top:1px solid var(--bdr);max-width:860px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none}
.bottom-nav::-webkit-scrollbar{display:none}
.bnav-btn{flex:1;min-width:72px;padding:12px 5px 14px;background:none;border:none;border-top:2px solid transparent;color:var(--dm);font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.06em;cursor:pointer;text-transform:uppercase;white-space:nowrap}
.bnav-btn.active{color:var(--ac);border-top-color:var(--ac)}
.bnav-btn.done{color:var(--gr)}
/* Panels */
.panel{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:12px}
.ph{padding:10px 16px;background:var(--sur2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.ph h2{font-family:'Orbitron',monospace;font-size:.62rem;font-weight:600;letter-spacing:.18em;color:var(--ac);text-transform:uppercase}
.pb{padding:14px}
.sec{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dm);margin:12px 0 7px}
.info{background:rgba(255,107,53,.05);border:1px solid rgba(255,107,53,.15);border-radius:7px;padding:8px 11px;font-size:.72rem;color:var(--dm);margin-bottom:10px}
/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.cards2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.card{background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:11px;cursor:pointer;position:relative;transition:border-color .15s;user-select:none}
.card:hover{border-color:var(--ac)}
.card.sel{border-color:var(--ac);background:rgba(255,107,53,.07)}
.card.sel::after{content:'';position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--ac)}
.card.msel{border-color:var(--ac2);background:rgba(204,51,0,.07)}
.card.msel::after{content:'';position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--ac2)}
.cn{font-weight:600;font-size:.86rem;color:var(--tx);margin-bottom:2px}
.cc{font-family:'Orbitron',monospace;font-size:.55rem;color:var(--ac3);margin-bottom:3px}
.ct{font-size:.7rem;color:var(--dm);line-height:1.45}
.cm{font-size:.7rem;color:var(--ac);margin-bottom:2px}
/* Buttons */
.btn{padding:8px 16px;border-radius:7px;font-family:'Orbitron',monospace;font-size:.6rem;font-weight:600;letter-spacing:.1em;cursor:pointer;border:none;text-transform:uppercase}
.btn-p{background:var(--ac);color:#000}
.btn-g{background:transparent;border:1px solid var(--bdr);color:var(--dm)}
.btn-d{background:transparent;border:1px solid var(--rd);color:var(--rd);font-size:.56rem;padding:4px 9px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.sub-btn{flex:1;padding:7px 4px;border-radius:6px;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-family:'Orbitron',monospace;font-size:.56rem;cursor:pointer;text-transform:uppercase}
.sub-btn.sa{border-color:var(--ac);color:var(--ac);background:rgba(255,107,53,.1)}
/* Chip (completed step indicator) */
.chip{display:flex;align-items:center;justify-content:space-between;padding:6px 11px;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;cursor:pointer;margin-bottom:5px;transition:border-color .12s}
.chip:hover{border-color:var(--ac)}
.chip-lbl{font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);letter-spacing:.1em}
.chip-val{font-weight:600;font-size:.82rem;color:var(--tx)}
.chip-edit{font-size:.58rem;color:var(--dm);opacity:.4}
/* Stats grid */
.stats-g{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.sbox{background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:9px 5px;text-align:center;cursor:pointer;transition:border-color .12s;position:relative}
.sbox:hover{border-color:var(--ac)}
.sn{font-family:'Orbitron',monospace;font-size:.54rem;color:var(--dm);margin-bottom:3px;letter-spacing:.1em}
.sv{font-family:'Orbitron',monospace;font-size:1.25rem;font-weight:900}
.sm{font-size:.72rem;color:var(--dm)}
/* Toggle */
.tog{width:32px;height:17px;background:var(--bdr);border-radius:9px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--ac2)}
.tog::after{content:'';position:absolute;width:11px;height:11px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.tog.on::after{transform:translateX(15px)}
/* Archetype cards */
.arch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.arch-card{background:var(--sur2);border:2px solid var(--bdr);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;position:relative;user-select:none}
.arch-card:hover{border-color:var(--ac)}
.arch-card.primary{border-color:var(--ac);background:rgba(255,107,53,.07)}
.arch-card.secondary{border-color:var(--ac2);background:rgba(204,51,0,.07)}
.badge{display:inline-block;font-family:'Orbitron',monospace;font-size:.44rem;padding:2px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.badge-p{background:var(--ac);color:#000}
.badge-s{background:var(--ac2);color:#fff}
.badge-sug{background:var(--gd);color:#000}
.badge-disc{background:#2a1a00;color:var(--gr);border:1px solid var(--gr)}
/* Chain dots */
.chain{display:flex;align-items:center;margin:6px 0 0;gap:0}
.chain-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-family:'Orbitron',monospace;border:2px solid var(--bdr);background:var(--sur2);color:var(--dm);flex-shrink:0}
.chain-dot.owned{background:var(--gr);border-color:var(--gr);color:#000}
.chain-dot.excl{border-color:var(--gd);color:var(--gd)}
.chain-line{flex:1;height:2px;background:var(--bdr)}
.chain-line.done{background:var(--gr)}
/* Node cards */
.node-card{border-radius:8px;overflow:hidden;margin-bottom:8px;border:1px solid var(--bdr)}
.node-card.owned{border-color:var(--gr)}
.node-card.avail{border-color:var(--ac2)}
.node-card.locked{opacity:.45}
.node-hdr{padding:8px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.node-name{font-weight:700;font-size:.84rem}
.node-ep{font-family:'Orbitron',monospace;font-size:.54rem}
.node-epoch{font-size:.54rem;color:var(--dm);font-family:'Orbitron',monospace;margin-top:1px}
.node-body{padding:8px 12px;background:var(--sur2)}
.node-flavor{font-size:.68rem;color:var(--dm);font-style:italic;margin-bottom:5px;line-height:1.35}
.mrow{display:flex;gap:5px;margin-bottom:3px;align-items:flex-start}
.mtag{font-family:'Orbitron',monospace;font-size:.44rem;padding:2px 4px;border-radius:3px;text-transform:uppercase;white-space:nowrap;margin-top:2px;flex-shrink:0}
.mt-passive{background:#1a0e00;color:var(--ac);border:1px solid var(--ac)}
.mt-active{background:#1a0800;color:var(--ac2);border:1px solid var(--ac2)}
.mt-zone{background:#1a0e00;color:var(--gr);border:1px solid var(--gr)}
.mtxt{font-size:.7rem;color:var(--tx);line-height:1.35}
.mname{font-weight:700;color:var(--gd)}
/* Role cards */
.role-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
.role-card{background:var(--sur);border:1px solid var(--bdr);border-radius:7px;padding:9px;cursor:pointer;transition:border-color .15s}
.role-card:hover{border-color:var(--ac)}
.role-card.rsa{border-color:var(--ac);background:rgba(255,107,53,.07)}
.role-card.rsb{border-color:var(--ac2);background:rgba(204,51,0,.07)}
.role-name{font-weight:600;font-size:.84rem;margin-bottom:3px}
.role-det{font-size:.66rem;color:var(--dm);line-height:1.4}
/* Sub-slot tabs */
.sub-btns{display:flex;gap:5px;margin-bottom:8px}
.sub-btn.sa{border-color:var(--ac);color:var(--ac);background:rgba(255,107,53,.1)}
.sub-btn.sb2{border-color:var(--ac2);color:var(--ac2);background:rgba(204,51,0,.1)}
.sub-btn.sr{border-color:var(--ac3);color:var(--ac3);background:rgba(255,107,53,.1)}
/* Summary */
.sum-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.sum-stat-box{background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:9px 5px;text-align:center}
/* Misc */
.txt{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:.85rem;padding:8px 10px;outline:none}
.txt:focus{border-color:var(--ac)}
select{background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;color:var(--tx);padding:5px 8px;font-family:'Rajdhani',sans-serif;font-size:.8rem}
button:disabled{opacity:.35;cursor:not-allowed}
.back-link{display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr)}
.back-link span{font-family:'Orbitron',monospace;font-size:.58rem;color:var(--dm)}
</style>
</head>

nger hunts in the biological sense. It exerts force the way a tectonic plate exerts force \u2014 inevitably, without acknowledgment of resistance."}]}}},"defender":{"name":"Defender","fantasy":"Built to be unmovable. The thing attacks bounce off of. Wins by being present after everything else has stopped.","typeDiscounts":["plant","ooze"],"nodes":{"universal":[{"id":"def_1","name":"Hardened Frame","tier":1,"epoch":1,"cost":10,"prerequisite":null,"unlocksNext":["def_2"],"mechanics":[{"type":"passive","text":"+2 AC (natural armor development)"},{"type":"passive","text":"When you take damage, reduce it by your CON modifier (minimum 1)"}],"flavorText":"The body has prioritized structural integrity over speed. Strikes that would stagger anything else register as pressure.","questionnaireDiscount":"\u22125 EP if Threat = Fights Head-On"},{"id":"def_2","name":"Immovable Presence","tier":2,"epoch":1,"cost":15,"prerequisite":"def_1","unlocksNext":["def_3"],"mechanics":[{"type":"passive","text":"Immunity to being knocked prone, pushed, or moved against your will"},{"type":"passive","text":"Enemies ending their turn adjacent to you make STR save (DC 12) or have movement reduced by 10 ft next round"}],"flavorText":"Size and mass stop being numbers and start being facts about the local geography."},{"id":"def_3","name":"Living Fortification","tier":3,"epoch":2,"cost":20,"prerequisite":"def_2","unlocksNext":["def_4A_pyr","def_4A_gla","def_4A_ver","def_4A_kha"],"mechanics":[{"type":"passive","text":"Allies in your zone have +1 AC and advantage on saving throws against being moved"},{"type":"zone","text":"Once per trial, declare your current zone a Fortified Position \u2014 enemies attacking into it have disadvantage on attack rolls; persists until you leave or trial ends"}],"flavorText":"At civilizational scale, your lineage's defensive physiology becomes literal infrastructure. Your body is the wall."}],"planetExclusive":{"pyrotheon":[{"id":"def_4A_pyr","name":"Magma Shell","tier":4,"epoch":3,"cost":30,"prerequisite":"def_3","unlocksNext":["def_5A_pyr"],"mechanics":[{"type":"passive","text":"Resistance to fire, bludgeoning, and piercing damage"},{"type":"active","uses":"1/trial","name":"Heat Vent","text":"All enemies in your zone take 2d8 fire damage + 1 Heat Strain stack. No save."}],"flavorText":"Your hide has partially mineralized. Attacks don't just fail to penetrate \u2014 they leave residue."},{"id":"def_5A_pyr","name":"Forge Body","tier":5,"epoch":3,"cost":40,"prerequisite":"def_4A_pyr","unlocksNext":[],"mechanics":[{"type":"passive","text":"Immune to fire damage and Heat Strain; damage reduction from Node 1 increases to CON modifier \u00d7 2"},{"type":"passive","text":"When reduced below 50% HP for the first time in a trial, all enemies in your zone take 3d6 fire damage immediately (no action required)"},{"type":"active","uses":"1/trial","name":"Molten Core","text":"For one round, all damage you deal is converted to fire damage and doubled; all damage you receive is halved"}],"flavorText":"The creature has stopped being defended by its hide and started being defined by it."}],"glacara":[{"id":"def_4A_gla","name":"Pressure Carapace","tier":4,"epoch":3,"cost":30,"prerequisite":"def_3","unlocksNext":["def_5A_gla"],"mechanics":[{"type":"passive","text":"Resistance to cold and bludgeoning damage; no single attack can deal more than 20 damage to you regardless of roll"},{"type":"active","uses":"1/trial","name":"Pressure Equalization","text":"Immediately reduce your current damage taken this round to zero and gain temporary HP equal to the damage prevented"}],"flavorText":"At depth, the body learns to treat incoming force as ambient pressure \u2014 categorically rather than individually."},{"id":"def_5A_gla","name":"The Immovable","tier":5,"epoch":3,"cost":40,"prerequisite":"def_4A_gla","unlocksNext":[],"mechanics":[{"type":"passive","text":"Cannot be subjugated; if attempted, attacker takes 2d8 cold damage and the attempt fails; your HP m he map at advantage"}],"flavorText":"Your heat-reading capability processes the entire battlefield as a single thermal model updated in real time."}],"glacara":[{"id":"sen_4A_gla","name":"Pressure Wave Reading","tier":4,"epoch":3,"cost":30,"prerequisite":"sen_3","unlocksNext":["sen_5A_gla"],"mechanics":[{"type":"passive","text":"Tremorsense extends to entire map; sense creatures through any medium; cannot be ambushed or targeted by hidden attackers from any direction"},{"type":"active","uses":"1/trial","name":"Deep Listen","text":"Go completely still for one round (cannot act); next turn you have advantage on all rolls, movement costs nothing, and first attack deals +3d8 cold damage"}],"flavorText":"Your lineage evolved in absolute darkness where pressure differentials are the only map."},{"id":"sen_5A_gla","name":"The Void Listener","tier":5,"epoch":3,"cost":40,"prerequisite":"sen_4A_gla","unlocksNext":[],"mechanics":[{"type":"passive","text":"Immune to all mind-affecting effects, surprise, and forced movement; advantage on all INT, WIS, and CHA saves"},{"type":"active","uses":"1/trial","name":"Still Water","text":"Full evasion for this round (attacks that hit deal half damage; attacks you'd take half damage from on a save deal none); your next attack deals double damage and the target cannot use reactions to reduce or avoid it"}],"flavorText":"At the deepest pressures, the creature stopped processing individual signals and started processing the entire medium."}],"verath":[{"id":"sen_4A_ver","name":"Mycelial Read","tier":4,"epoch":3,"cost":30,"prerequisite":"sen_3","unlocksNext":["sen_5A_ver"],"mechanics":[{"type":"passive","text":"Always know exact HP and conditions of every creature on the map; creatures with any Spore Drift stacks cannot hide their position from you"},{"type":"active","uses":"1/trial","name":"Network Pulse","text":"Every creature makes INT save (DC 14) or is Rattled until end of next turn (disadvantage on attacks and saves) and gains 1 Spore Drift stack"}],"flavorText":"Your nervous system has partially extended into the spore network, receiving its continuous broadcast of biological data."},{"id":"sen_5A_ver","name":"The Network Knows","tier":5,"epoch":3,"cost":40,"prerequisite":"sen_4A_ver","unlocksNext":[],"mechanics":[{"type":"passive","text":"Cannot be deceived, misdirected, or surprised; enemies with any Spore Drift stack have disadvantage on all rolls against you"},{"type":"active","uses":"1/trial","name":"Collective Response","text":"For one round, all allies have advantage on all rolls and all enemies have disadvantage on all rolls against any ally"}],"flavorText":"Your connection to the mycelial network has become deep enough that the network's distributed intelligence supplements your own."}],"khara":[{"id":"sen_4A_kha","name":"Seismic Sense","tier":4,"epoch":3,"cost":30,"prerequisite":"sen_3","unlocksNext":["sen_5A_kha"],"mechanics":[{"type":"passive","text":"Tremorsense extends to entire map while touching stone; know position and movement of every creature; +2 AC against all attacks"},{"type":"active","uses":"1/trial","name":"Geological Survey","text":"Immediately learn exact HP and conditions of all enemies; designate one zone as Fault Line \u2014 first enemy to enter makes DEX save (DC 15) or take 3d8 bludgeoning damage and fall prone"}],"flavorText":"Your lineage reads the planet through its bones. Every footstep, every weapon strike registers in the stone as legible data."},{"id":"sen_5A_kha","name":"The Stone Remembers","tier":5,"epoch":3,"cost":40,"prerequisite":"sen_4A_kha","unlocksNext":[],"mechanics":[{"type":"passive","text":"Each time a damage type successfully hits you, gain resistance to that damage type for the rest of the trial (max 3 types)"},{"type":"active","uses":"1/trial","name":"Deep Record","text":"GM reveals all undisclosed zone effects, trap mechanics, and enemy special abilities for the current trial; your attacks deal +3d8 damage for the rest of this round"}],"flavo ditioning Field \u2014 allies have advantage on CON saves and resistance to dominant hazard type; enemies entering make CON save (DC 13) or gain 1 stack of zone's primary hazard"}],"flavorText":"At civilizational scale, your lineage's environmental tolerance becomes a strategic asset."}],"planetExclusive":{"pyrotheon":[{"id":"adp_4A_pyr","name":"Pyrogenic Metabolism","tier":4,"epoch":3,"cost":30,"prerequisite":"adp_3","unlocksNext":["adp_5A_pyr"],"mechanics":[{"type":"passive","text":"Complete immunity to fire damage and Heat Strain; when you receive fire damage, regain HP equal to half the damage instead"},{"type":"active","uses":"1/trial","name":"Metabolic Surge","text":"For 2 rounds, all attacks deal +2d8 fire damage; shed fire at start of each round \u2014 all enemies in your zone take 1d6 fire damage"}],"flavorText":"Your lineage stopped treating volcanic heat as a condition to survive and started treating it as a metabolic input."},{"id":"adp_5A_pyr","name":"Living Forge","tier":5,"epoch":3,"cost":40,"prerequisite":"adp_4A_pyr","unlocksNext":[],"mechanics":[{"type":"passive","text":"All damage you deal converted to fire damage and ignores resistance; enemies starting their turn within 1 zone of you take 1d8 fire damage (proximity)"},{"type":"passive","text":"All resistances from Nodes 1 and 3 promoted to immunities"},{"type":"active","uses":"1/trial","name":"Full Conversion","text":"For 1 round deal double damage on all attacks; all enemies on the map take 2d6 fire damage at start of their turn for 2 rounds"}],"flavorText":"The creature's body chemistry has crossed a threshold \u2014 fire is not a weapon. Fire is exhaust."}],"glacara":[{"id":"adp_4A_gla","name":"Cryogenic Adaptation","tier":4,"epoch":3,"cost":30,"prerequisite":"adp_3","unlocksNext":["adp_5A_gla"],"mechanics":[{"type":"passive","text":"Complete immunity to cold damage and Cold Exposure; when you receive cold damage, regain HP equal to half the damage instead"},{"type":"active","uses":"1/trial","name":"Cold Conversion","text":"All enemies in your zone take 3d8 cold damage and make CON save (DC 14) or gain 2 Cold Exposure stacks; gain temporary HP equal to total damage dealt"}],"flavorText":"Your lineage adapted so completely to cold that the body's baseline temperature dropped below what other organisms can survive."},{"id":"adp_5A_gla","name":"Absolute Adaptation","tier":5,"epoch":3,"cost":40,"prerequisite":"adp_4A_gla","unlocksNext":[],"mechanics":[{"type":"passive","text":"All damage you deal converted to cold damage and ignores resistance; enemies hitting you with melee attacks take 1d8 cold damage and gain 1 Cold Exposure stack"},{"type":"passive","text":"At start of each round, if any enemy has 2+ Cold Exposure stacks, regain 10 HP"},{"type":"active","uses":"1/trial","name":"Environmental Override","text":"Every enemy gains 1 Cold Exposure stack; enemies at 2+ stacks make CON save (DC 15) or take 3d10 cold damage; your immunities apply to entire zone you occupy for rest of trial"}],"flavorText":"The cold is no longer a condition it survives \u2014 it is the condition everything else survives in relation to this creature."}],"verath":[{"id":"adp_4A_ver","name":"Spore Symbiosis","tier":4,"epoch":3,"cost":30,"prerequisite":"adp_3","unlocksNext":["adp_5A_ver"],"mechanics":[{"type":"passive","text":"Complete immunity to Spore Drift and poison damage; Spore Drift in zones you occupy cannot affect allies; when you move through a zone, enemies entering it for the first time this trial make CON save (DC 13) or gain 1 Spore Drift stack"},{"type":"active","uses":"1/trial","name":"Symbiotic Bloom","text":"All Spore Drift stacks on enemies double instantly (no save); gain temporary HP equal to 5 \u00d7 total Spore Drift stacks on all enemies combined"}],"flavorText":"Your lineage didn't just develop immunity to the spore network \u2014 it developed a symbiotic relationship with it."},{"id":"adp_5A_ver","name":"Complete Symbiont","tier":5,"epoch":3,"cost":40,"prer y has largely stopped being relevant to this creature's internal function."}]}}},"regenerator":{"name":"Regenerator","fantasy":"Wins by outlasting. Still there when everything else has run out of resources. Attrition is the strategy.","typeDiscounts":["beast","plant"],"nodes":{"universal":[{"id":"reg_1","name":"Rapid Cellular Repair","tier":1,"epoch":1,"cost":10,"prerequisite":null,"unlocksNext":["reg_2"],"mechanics":[{"type":"passive","text":"At the start of each of your turns, regain HP equal to your Proficiency Bonus − 1 (minimum 1). Triggers even at 1 HP."},{"type":"passive","text":"You stabilize automatically when reduced to 0 HP rather than making death saves"}],"flavorText":"The body's damage response is faster than normal biology explains. Wounds that would take other organisms hours to close begin sealing in seconds.","questionnaireDiscount":"\u22125 EP if Threat = Adapts and Endures or Niche = Grazer"},{"id":"reg_2","name":"Sustained Metabolism","tier":2,"epoch":1,"cost":15,"prerequisite":"reg_1","unlocksNext":["reg_3"],"mechanics":[{"type":"passive","text":"CON modifier added to HP total at start of each trial"},{"type":"passive","text":"When you use a healing ability, add CON modifier to HP restored; once per round when an ally within 30 ft uses a healing ability, you also regain HP equal to CON modifier"}],"flavorText":"The body has optimized its resource economy \u2014 it produces repair material faster than sustained damage depletes it."},{"id":"reg_3","name":"Regenerative Dominance","tier":3,"epoch":2,"cost":20,"prerequisite":"reg_2","unlocksNext":["reg_4A_pyr","reg_4A_gla","reg_4A_ver","reg_4A_kha"],"mechanics":[{"type":"passive","text":"Node 1 regen increases to your full Proficiency Bonus per turn; you cannot be reduced below 1 HP by any single hit"},{"type":"zone","text":"Once per trial, declare a Recovery Zone \u2014 at start of each round, all allies regain HP equal to 5 + CON modifier; persists until you leave or trial ends"}],"flavorText":"At civilizational scale, your lineage's sustain becomes a strategic posture. The longer the engagement runs, the more your side improves."}],"planetExclusive":{"pyrotheon":[{"id":"reg_4A_pyr","name":"Pyrogenic Regrowth","tier":4,"epoch":3,"cost":30,"prerequisite":"reg_3","unlocksNext":["reg_5A_pyr"],"mechanics":[{"type":"passive","text":"When you take fire damage, regain HP equal to half the damage instead; when you take any other damage type, Node 1 regen triggers immediately as a free reaction"},{"type":"active","uses":"1/trial","name":"Volcanic Recovery","text":"Regain HP equal to your current missing HP; for 2 rounds your regen triggers twice per turn"}],"flavorText":"Your lineage evolved in an environment where external damage is constant \u2014 the only survivors were those that turned volcanic punishment into biological feedback."},{"id":"reg_5A_pyr","name":"The Undying Forge","tier":5,"epoch":3,"cost":40,"prerequisite":"reg_4A_pyr","unlocksNext":[],"mechanics":[{"type":"passive","text":"Cannot be reduced below 1 HP by any means; regen triggers at start of every creature's turn, not just your own"},{"type":"passive","text":"When at full HP and would regain HP, convert excess into temporary HP (max CON modifier \u00d7 5)"},{"type":"active","uses":"1/trial","name":"Regenerative Cascade","text":"For 3 rounds, all damage you receive is immediately repaired at start of your next turn"}],"flavorText":"The question is not whether the creature will recover \u2014 it will \u2014 but how much punishment needs to be applied before the enemy accepts they cannot win by attrition."}],"glacara":[{"id":"reg_4A_gla","name":"Deep Restoration","tier":4,"epoch":3,"cost":30,"prerequisite":"reg_3","unlocksNext":["reg_5A_gla"],"mechanics":[{"type":"passive","text":"At end of each round (not just your turn), regain HP equal to CON modifier \u00d7 2 (continuous \u2014 runs between turns as well as on them)"},{"type":"active","uses":"1/trial","name":"Pressure Seal","text":"Enter deep repair mode for 2 rounds; regain 30 HP at start of each; take minimum damage from all sources (all damage dice count as 1)"}],"flavorText":"The deep-pressure organisms that survived Glacara evolved repair systems that operate on geological timescale \u2014 slow to trigger but effectively impossible to outpace."},{"id":"reg_5A_gla","name":"The Unkillable Depth","tier":5,"epoch":3,"cost":40,"prerequisite":"reg_4A_gla","unlocksNext":[],"mechanics":[{"type":"passive","text":"HP maximum cannot be reduced; at start of each round regain HP equal to CON modifier \u00d7 4 (stacks with all other regen); first time each trial you would drop to 0 HP, instead drop to half current HP"},{"type":"passive","text":"Enemies that attempt to subjugate you must first reduce you to 0 HP"},{"type":"active","uses":"1/trial","name":"Glacial Endurance","text":"For 2 rounds regen triggers three times per turn; cannot be moved, prone, or have conditions applied; at end of 2nd round all enemies in your zone take damage equal to total HP regained during those 2 rounds (bludgeoning, no save)"}],"flavorText":"The only winning move is to not engage \u2014 which, at civilizational scale, is its own kind of victory."}],"verath":[{"id":"reg_4A_ver","name":"Mycelial Restoration","tier":4,"epoch":3,"cost":30,"prerequisite":"reg_3","unlocksNext":["reg_5A_ver"],"mechanics":[{"type":"passive","text":"In zones with Spore Drift saturation or Overgrown terrain, regen increases to CON modifier \u00d7 3 per turn; when enemies in your zone take poison damage, regain HP equal to half the damage dealt"},{"type":"active","uses":"1/trial","name":"Network Repair","text":"Regain HP equal to 10 \u00d7 number of Spore Drift stacks on all enemies combined; remove all negative conditions"}],"flavorText":"The spore network doesn't just fail to damage your lineage \u2014 it actively repairs it. The mycelium treats your body as infrastructure worth maintaining."},{"id":"reg_5A_ver","name":"Living Network Node","tier":5,"epoch": \u2014 triggers on every initiative count); at end of 2nd round, restore to full HP"}],"flavorText":"Damage and recovery are operating on such different timescales that combat damage is functionally a rounding error in the geological math."}]}}},"apexStriker":{"name":"Apex Striker","fantasy":"Built around one thing: the single attack that ends the conversation. Everything builds toward that moment.","typeDiscounts":["monstrosity","elemental","aberration"],"nodes":{"universal":[{"id":"str_1","name":"Killing Instinct","tier":1,"epoch":1,"cost":10,"prerequisite":null,"unlocksNext":["str_2"],"mechanics":[{"type":"passive","text":"Once per round, when you hit with an attack, add your proficiency bonus to the damage roll"},{"type":"passive","text":"When you reduce a creature to 0 HP, your next attack roll this round has advantage"}],"flavorText":"The creature's threat model has collapsed to a single question: how do I end this. Everything else is noise.","questionnaireDiscount":"\u22125 EP if Threat = Fights Head-On or Social = Solitary"},{"id":"str_2","name":"Apex Focus","tier":2,"epoch":1,"cost":15,"prerequisite":"str_1","unlocksNext":["str_3"],"mechanics":[{"type":"passive","text":"Once per combat, declare an Apex Strike before making an attack roll \u2014 this attack deals an additional damage die of your natural weapon type; usable once per round maximum"},{"type":"passive","text":"Advantage on attack rolls against creatures that are at full HP"}],"flavorText":"The body has learned to concentrate resources. Most of the time it holds back. When it stops holding back, the difference is visible."},{"id":"str_3","name":"Devastating Momentum","tier":3,"epoch":2,"cost":20,"prerequisite":"str_2","unlocksNext":["str_4A_pyr","str_4A_gla","str_4A_ver","str_4A_kha"],"mechanics":[{"type":"passive","text":"Apex Strike now adds two additional damage dice instead of one; target makes CON save (DC 13) or be Stunned until end of their next turn"},{"type":"zone","text":"Once per trial, designate one zone as a Kill Zone \u2014 first Apex Strike against a creature in it is automatically a critical hit (maximum damage, no roll)"}],"flavorText":"At civilizational scale, your lineage's capacity for decisive action becomes the capacity to break engagements before they develop."}],"planetExclusive":{"pyrotheon":[{"id":"str_4A_pyr","name":"Thermal Spike","tier":4,"epoch":3,"cost":30,"prerequisite":"str_3","unlocksNext":["str_5A_pyr"],"mechanics":[{"type":"passive","text":"Apex Strike deals +2d8 fire damage; this fire damage ignores resistance and immunity"},{"type":"active","uses":"1/trial","name":"Ignition Point","text":"Build thermal charge for one round (cannot use Apex Strike); next round Apex Strike deals triple damage dice and target makes CON save (DC 15) or catches fire (2d6 fire damage at start of each turn until they use an action to extinguish)"}],"flavorText":"Your lineage evolved to deliver explosive thermal bursts on contact \u2014 the difference between a flame and a detonation."},{"id":"str_5A_pyr","name":"The Detonation","tier":5,"epoch":3,"cost":40,"prerequisite":"str_4A_pyr","unlocksNext":[],"mechanics":[{"type":"passive","text":"Apex Strike now adds three additional damage dice; fire damage from Apex Strike cannot be reduced, resisted, or immunized against under any circumstances"},{"type":"passive","text":"When you kill a creature with Apex Strike, all enemies within 1 zone take 2d8 fire damage"},{"type":"active","uses":"1/trial","name":"Critical Mass","text":"Build charge for one full round; following round Apex Strike is automatic critical hit dealing quadruple dice plus 4d8 fire damage; if this kills the target, immediately make another Apex Strike against any creature in range at advantage"}],"flavorText":"The creature has stopped being a predator that uses fire and become a detonation event that occasionally chooses targets."}],"glacara":[{"id":"str_4A_gla","name":"Pressure Strike","tier":4,"epoch":3,"cost":30,"prerequisite":"str_3","unlocksNext":["str_5A_gla"],"mechanics":[{"type":"passive","text":"Apex Strike ignores AC bonuses from armor, natural armor, and magical effects"},{"type":"active","uses":"1/trial","name":"Depth Charge","text":"Apex Strike automatically hits regardless of AC; deals full damage plus 3d10 bludgeoning; target makes STR save (DC 15) or be knocked prone and pushed 2 zones away"}],"flavorText":"Your lineage evolved to deliver force the way pressure delivers force at depth \u2014 compression, not impact."},{"id":"str_5A_gla","name":"The Killing Depth","tier":5,"epoch":3,"cost":40,"prerequisite":"str_4A_gla","unlocksNext":[],"mechanics":[{"type":"passive","text":"Apex Strike ignores all damage reduction, resistances, immunities, and HP thresholds \u2014 the damage lands unmodified by any defensive calculation"},{"type":"passive","text":"When you use Apex Strike, you may declare it a Depth Strike \u2014 if target is reduced to 0 HP, they cannot be stabilized, revived, or restored by any means this trial"},{"type":"active","uses":"1/trial","name":"Abyssal Pressure","text":"Apex Strike deals +5d12 bludgeoning damage; target makes CON save (DC 17); failure = reduced to 0 HP regardless of current HP total; success = take full 5d12 + Stunned 2 rounds"}],"flavorText":"At the deepest pressure, force stops being a quantity and becomes a categorical statement."}],"verath":[{"id":"str_4A_ver","name":"Venom Spike","tier":4,"epoch":3,"cost":30,"prerequisite":"str_3","unlocksNext":["str_5A_ver"],"mechanics":[{"type":"passive","text":"Apex Strike delivers venom payload \u2014 target makes CON save (DC 14) or takes 3d8 poison damage at start of each of their next 3 turns"},{"type":"active","uses":"1/trial","name":"Full Dose","text":"Apex Strike this round: CON save (DC 16). Failure: Poisoned + Incapacitated 2 rounds, then 4d10 poison damage when Incapacitation ends. Success: Poisoned 3 rounds + half damage immediately."}],"flavorText":"Your lineage evolved the biological equivalent of a loading mechanism \u2014 the body holds a full dose in reserve, delivers it in a single concentrated strike."},{"id":"str_5A_ver","name":"The Last Breath","tier":5,"epoch":3,"cost":40,"prerequisite":"str_4A_ver","unlocksNext":[],"mechanics":[{"type":"passive","text":"Any creature you hit with Apex Strike has their maximum HP reduced by the damage dealt for the rest of the trial"},{"type":"passive","text":"Creatures at 3+ Spore Drift stacks take double damage from your Apex Strike"},{"type":"active","uses":"1/trial","name":"Lethal Dose","text":"One creature makes CON save (DC 17). Failure: 6d10 poison damage + HP maximum reduced to current HP total for rest of trial. Success: half damage + HP maximum reduced by 25%."}],"flavorText":"The venom payload has reached a concentration where it isn't damaging the target's biology \u2014 it's replacing it."}],"khara":[{"id":"str_4A_kha","name":"Tectonic Strike","tier":4,"epoch":3,"cost":30,"prerequisite":"str_3","unlocksNext":["str_5A_kha"],"mechanics":[{"type":"passive","text":"Apex Strike deals +2d10 bludgeoning damage; if target is already below 75% HP, they make STR save (DC 14) or be knocked prone and lose their next turn entirely"},{"type":"active","uses":"1/trial","name":"Geological Force","text":"Apex Strike deals maximum damage on all dice plus STR modifier \u00d7 3 bonus; target makes CON save (DC 16) or be Stunned 2 rounds"}],"flavorText":"Your lineage evolved to hit the way tectonic plates hit \u2014 not fast, not frequent, but with a force that has no biological analogue."},{"id":"str_5A_kha","name":"The Inevitable Strike","tier":5,"epoch":3,"cost":40,"prerequisite":"str_4A_kha","unlocksNext":[],"mechanics":[{"type":"passive","text":"Apex Strike cannot be interrupted, redirected, or avoided by any reaction or ability; if it misses, still deals half damage"},{"type":"passive","text":"Once per trial, declare Apex Strike Inevitable \u2014 target cannot use any ability, reaction, or effect to reduce or avoid the damage (includes damage reduction, evasion, resistances, saving throws)"},{"type":"active","uses":"1/trial","name":"The Weight of Stone","text":"Apex Strike deals +4d12 bludgeoning damage; target knocked prone, loses next two turns, and makes STR save (DC 17) or HP maximum permanently reduced to half for rest of trial"}],"flavorText":"This creature doesn't telegraph. It simply arrives at the moment the strike occurs and the strike has already happened by the time defense becomes relevant."}]}}}}};
const TECH_DATA={"version":"1.0","description":"Proto-Genesis Tech Trees \u2014 all four planets, trunk + two branches each","costLadder":{"trunk1":10,"trunk2":15,"branch1":20,"branch2":25,"branch3":30,"branch4":35,"branch5":40,"branch6":45},"planets":{"pyrotheon":{"name":"Pyrotheon","trunkNarrative":"Your civilization learned to survive the volcano before it learned to use it.","trunk":[{"id":"pyr_t1","name":"Slag Forging","tier":"trunk1","epoch":2,"trial":1,"cost":10,"prerequisite":null,"unlocksNext":["pyr_t2"],"mechanics":[{"type":"passive","text":"+1 to attack rolls"},{"type":"passive","text":"Melee natural weapons deal +1 damage die type (e.g. 1d8 \u2192 1d10)"}],"flavorText":"Your lineage has learned to work raw volcanic slag into crude tools and weapons. Not refined \u2014 brutal and effective."},{"id":"pyr_t2","name":"Pressure Casting","tier":"trunk2","epoch":2,"trial":2,"cost":15,"prerequisite":"pyr_t1","unlocksNext":["pyr_a1","pyr_b1"],"mechanics":[{"type":"passive","text":"+1 AC (crude armor/shielding)"},{"type":"zone","text":"Once per trial, designate one zone as a Forge Site \u2014 allied units in that zone gain +1 attack while it's held"}],"flavorText":"Using volcanic pressure vents and crude molds, your civilization produces structured metal components."}],"branches":{"A":{"name":"Thermal Mastery","tagline":"The volcano is not a hazard. It is a weapon.","spaceAgeOutcome":"Energy broker civilization \u2014 thermal infrastructure controllers.","nodes":[{"id":"pyr_a1","name":"Vent Tapping","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"pyr_t2","unlocksNext":["pyr_a2"],"mechanics":[{"type":"active","uses":"1/trial","name":"Pressure Burst","text":"One zone within 2 zones of your position: all enemies make a CON save (DC 13) or take 2d6 fire damage and are pushed back 1 zone"},{"type":"passive","text":"Immune to Heat Strain stacks 1\u20132"}],"flavorText":"Your civilization has learned to redirect natural vent pressure for offensive use."},{ g Volcano","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"pyr_a5","unlocksNext":[],"mechanics":[{"type":"passive","text":"All fire damage you deal ignores resistance"},{"type":"active","uses":"1/trial","name":"Core Detonation","text":"All enemies on the map take 2d6 fire damage; enemies below 50% HP must make a CON save (DC 16) or be subjugated immediately (counts as your subjugation action this trial)"}],"flavorText":"Your civilization has fused with the planet's thermal systems. In space, you carry that energy with you."}]},"B":{"name":"Conventional Metallurgy","tagline":"The volcano gave us the metal. What we build with it is ours.","spaceAgeOutcome":"Infrastructure and engineering civilization \u2014 everyone needs what they've built.","nodes":[{"id":"pyr_b1","name":"Alloy Development","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"pyr_t2","unlocksNext":["pyr_b2"],"mechanics":[{"type":"passive","text":"+2 AC"},{"type":"passive","text":"Sellback value of biological traits increases to 70%"}],"flavorText":"Your civilization refines raw slag into proper alloys \u2014 stronger, lighter, more versatile."},{"id":"pyr_b2","name":"Fortified Settlement","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"pyr_b1","unlocksNext":["pyr_b3"],"mechanics":[{"type":"zone","text":"One zone you control becomes a Fortress Zone \u2014 enemies attacking into it have disadvantage on attack rolls; you have advantage on defensive reactions in it"},{"type":"passive","text":"You cannot be subjugated while inside your Fortress Zone"}],"flavorText":"Your settlements are now constructed, not claimed. Walls, gates, defensive positioning."},{"id":"pyr_b3","name":"Siege Engineering","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"pyr_b2","unlocksNext":["pyr_b4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Siege Assault","text":"One enemy zone: all defenders make a DEX save (DC 14) or take 3d6 bludgeoning damage; you may immediately contest that zone this round (no movement cost)"},{"type":"passive","text":"Your attacks against enemies in Fortress Zones ignore the defensive bonus"}],"flavorText":"You've turned your construction expertise into offensive capability \u2014 mobile siege platforms, breaching equipment."},{"id":"pyr_b4","name":"Distributed Infrastructure","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"pyr_b3","unlocksNext":["pyr_b5"],"mechanics":[{"type":"passive","text":"Your movement between zones costs 0 (you can move freely between any zones you've held at any point this trial)"},{"type":"passive","text":"Enemies need DC 16 instead of DC 15 to break free from your subjugation"}],"flavorText":"Your civilization has built roads, supply chains, and relay stations across the map."},{"id":"pyr_b5","name":"Industrial Forge","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"pyr_b4","unlocksNext":["pyr_b6"],"mechanics":[{"type":"passive","text":"At the start of each round, recover HP equal to CON modifier \u00d7 2 (resupply and reinforcement)"},{"type":"active","uses":"1/trial","name":"Emergency Refit","text":"Immediately restore 25% of your max HP"}],"flavorText":"Mass production. Your civilization equips armies faster than enemies can deplete them."},{"id":"pyr_b6","name":"Planetary Infrastructure","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"pyr_b5","unlocksNext":[],"mechanics":[{"type":"passive","text":"You score double points for zone control (each zone counts as 2 zones for scoring)"},{"type":"active","uses":"1/trial","name":"Eminent Domain","text":"Claim any one uncontested zone on the map instantly, regardless of position"}],"flavorText":"Your civilization has built the bones of the planet \u2014 and in space, everyone will need what you've made."}]}}},"glacara":{"name":"Glacara","trunkNarrative":"Your civilization learned to read the planet before it learned to use it.","trunk":[{"id":"gla_t1","name":"Vent Mapping","tier":"trunk1","epoch":2,"trial":1,"cost":10,"prerequisite":null,"unlocksNext":["gla_t2"],"mechanics":[{"type":"passive","text":"You always know the current Collapse risk for every zone (GM reveals section stability ratings at round start)"},{"type":"passive","text":"+1 to all DEX and CON saves"}],"flavorText":"Your lineage has charted the vent network beneath the ice \u2014 knowing where pressure builds, where safe passage lies, where the shelf is thin."},{"id":"gla_t2","name":"Thermal Drilling","tier":"trunk2","epoch":2,"trial":2,"cost":15,"prerequisite":"gla_t1","unlocksNext":["gla_a1","gla_b1"],"mechanics":[{"type":"zone","text":"Once per trial, create a Passage between any two non-adjacent zones you occupy \u2014 units can move between them as if adjacent for the rest of the trial"},{"type":"passive","text":"You are immune to Collapse damage"}],"flavorText":"Using vent heat, your civilization bores through ice to create controlled passages and new access routes."}],"branches":{"A":{"name":"Geothermal Engineering","tagline":"The vents are not a hazard. They are an engine.","spaceAgeOutcome":"Power broker civilization \u2014 galactic energy infrastructure.","nodes":[{"id":"gla_a1","name":"Vent Tapping","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"gla_t2","unlocksNext":["gla_a2"],"mechanics":[{"type":"passive","text":"Cold Exposure stacks do not affect your units"},{"type":"zone","text":"Each zone you control that contains a vent generates +1 bonus scoring point per round"}],"flavorText":"Your civilization has learned to cap and channel vent output rather than avoid it."},{"id":"gla_a2","name":"Pressure Grid","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"gla_a1","unlocksNext":["gla_a3"],"mechanics":[{"type":"passive","text":"Passage (from T2) now connects all zones you control simultaneously \u2014 free movement between any held zones"},{"type":"passive","text":"+1 to attack rolls for each consecutive round you've held your current zone (m erheated for enemies (no action cost, always active)"},{"type":"active","uses":"1/trial","name":"Controlled Meltdown","text":"Every zone on the map takes 2d10 fire damage applied to all enemies present. You are immune. All zones become contested (scoring resets) and must be recaptured."}],"flavorText":"Your civilization has turned Glacara itself into a machine. In space, you are the galaxy's power broker."}]},"B":{"name":"Cryo-Engineering","tagline":"The cold is not the enemy. It is the most reliable weapon you have.","spaceAgeOutcome":"Cold-environment civilization \u2014 operates where everyone else cannot.","nodes":[{"id":"gla_b1","name":"Ice Casting","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"gla_t2","unlocksNext":["gla_b2"],"mechanics":[{"type":"zone","text":"Once per trial, erect an Ice Wall between two adjacent zones \u2014 enemies cannot cross without spending full movement and making a DC 13 Athletics check; failure means they stay put"},{"type":"passive","text":"+1 AC (cryo-reinforced plating)"}],"flavorText":"Your civilization shapes ice structurally \u2014 walls, bridges, barriers \u2014 with precision and speed."},{"id":"gla_b2","name":"Cold Snap Weaponry","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"gla_b1","unlocksNext":["gla_b3"],"mechanics":[{"type":"passive","text":"Your attacks impose 1 Cold Exposure stack on hit"},{"type":"passive","text":"Enemies with 2+ Cold Exposure stacks have disadvantage on attacks against you"}],"flavorText":"Cryo-weapons that flash-freeze on contact, slowing enemies and locking joints."},{"id":"gla_b3","name":"Permafrost Zones","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"gla_b2","unlocksNext":["gla_b4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Permafrost","text":"One zone becomes Frozen for the rest of the trial; enemies in it when cast make a CON save (DC 14) or are restrained until end of their next turn; all movement into/out of the zone costs double"},{"type":"passive","text":"You and allies ignore movement penalties in Frozen zones"}],"flavorText":"Your civilization can flash-freeze entire zones, turning them into impassable terrain or killing fields."},{"id":"gla_b4","name":"Cryo-Shell Armor","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"gla_b3","unlocksNext":["gla_b5"],"mechanics":[{"type":"passive","text":"At the start of each round, if you are in a Frozen zone or a zone with Cold Exposure active, regain HP equal to CON modifier \u00d7 3"},{"type":"passive","text":"+2 AC (cryo-shell is now a full defensive system)"}],"flavorText":"Living ice-shell technology that regenerates under cold conditions."},{"id":"gla_b5","name":"Absolute Zero Field","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"gla_b4","unlocksNext":["gla_b6"],"mechanics":[{"type":"active","uses":"1/trial","name":"Zero Field","text":"One zone; all enemies make a CON save (DC 15) or be frozen solid: incapacitated until end of next round, take 4d8 cold damage, and gain 2 Cold Exposure stacks"},{"type":"passive","text":"Permafrost (B3) now affects two zones simultaneously"}],"flavorText":"Your civilization can project localized zero-kelvin fields \u2014 brief, catastrophic, and surgical."},{"id":"gla_b6","name":"Glacial Dominion","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"gla_b5","unlocksNext":[],"mechanics":[{"type":"passive","text":"Immune to all cold damage and Cold Exposure; enemies adjacent to you gain 1 Cold Exposure stack at the start of each round (passive emanation)"},{"type":"active","uses":"1/trial","name":"Deep Freeze","text":"All enemies on the map make a CON save (DC 16); failure = 3d10 cold damage + restrained until end of next round. Success = half damage only. Your zones cannot be contested this round."}],"flavorText":"Your civilization has mastered cold as completely as anything can. The universe's cold is your home."}]}}},"verath":{"name":"Verath","trunkNarrative":"Your civilization learned to read life itself before it learned to direct it.","trunk":[{"id":"ver_t1","name":"Mycelial Mapping","tier":"trunk1","epoch":2,"trial":1,"cost":10,"prerequisite":null,"unlocksNext":["ver_t2"],"mechanics":[{"type":"passive","text":"You always know the exact HP and active conditions of all enemies on the map"},{"type":"passive","text":"You cannot be surprised; enemies do not gain advantage from flanking you"}],"flavorText":"Your civilization has learned to read the spore network \u2014 interpreting chemical signals, tracking movement through mycelial vibration."},{"id":"ver_t2","name":"Spore Cultivation","tier":"trunk2","epoch":2,"trial":2,"cost":15,"prerequisite":"ver_t1","unlocksNext":["ver_a1","ver_b1"],"mechanics":[{"type":"active","uses":"1/trial","name":"Spore Cloud","text":"One zone; all enemies make a CON save (DC 12) or gain 1 Spore Drift stack"},{"type":"passive","text":"You are immune to Spore Drift (including Murval's passive production)"}],"flavorText":"Your civilization has learned to cultivate and concentrate specific spore strains \u2014 the foundation for either biological control or chemical synthesis."}],"branches":{"A":{"name":"Directed Biotechnology","tagline":"Life is programmable. You are learning the language.","spaceAgeOutcome":"Terraforming and seeding civilization \u2014 they grow things everywhere.","nodes":[{"id":"ver_a1","name":"Symbiont Bonding","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"ver_t2","unlocksNext":["ver_a2"],"mechanics":[{"type":"passive","text":"+1d6 poison damage on all attacks (symbiont venom delivery)"},{"type":"passive","text":"Once per round when you take damage, your symbiont absorbs some impact \u2014 reduce incoming damage by your CON modifier"}],"flavorText":"Your civilization cultivates biological symbiotes that enhance combat capability."},{"id":"ver_a2","name":"Growth Acceleration","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"ver_a1","unlocksNext":["ver_a3"],"mechanics":[{"type":"zone","text":"Each zone you hold for 2+ consecutive rounds becomes Overgrown \u2014 enemies entering take 1d6 poison damage; your units gain +1 AC while in Overgrown zones"},{"type":"passive","text":"Your symbiont (A1) damage increases to 2d6 poison"}],"flavorText":"You can accelerate biological growth in zones you control \u2014 terrain-altering fungal bloom that changes the battlefield."},{"id":"ver_a3","name":"Directed Organism","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"ver_a2","unlocksNext":["ver_a4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Deploy Organism","text":"Place a Directed Organism in any zone you control. It has AC 14, HP 30, attacks once per round for 2d8 poison damage against one enemy in its zone. It persists until destroyed or end of trial."},{"type":"passive","text":"Enemies that start their turn in an Overgrown zone must make a CON save (DC 13) or gain 1 Spore Drift stack"}],"flavorText":"Your civilization can direct semi-autonomous biological organisms as battlefield assets."},{"id":"ver_a4","name":"Biological Override","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"ver_a3","unlocksNext":["ver_a5"],"mechanics":[{"type":"active","uses":"1/trial","name":"Override","text":"One enemy with 2+ Spore Drift stacks makes a WIS save (DC 15). On failure, they attack their nearest ally instead of you this round and cannot move toward your units."},{"type":"passive","text":"Spore Drift stacks on enemies you inflict cap at 4 instead of the standard maximum"}],"flavorText":"Your biotech has advanced to the point of partial neural hijacking \u2014 enemies exposed to your spores can be redirected."},{"id":"ver_a5","name":"Apex Organism","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"ver_a4","unlocksNext":["ver_a6"],"mechanics":[{"type":"passive","text":"Directed Organism (A3) now has AC 16, HP 60, attacks twice per round for 2d10 poison damage, and when destroyed explodes for 2d8 poison damage to all enemies in its zone"},{"type":"active","uses":"1/trial","name":"Accelerate","text":"Your Directed Organism takes an extra turn immediately"}],"flavorText":"Your Directed Organism has been evolved into something that makes enemies reconsider their life choices."},{"id":"ver_a6","name":"Living World","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"ver_a5","unlocksNext":[],"mechanics":[{"type":"passive","text":"All zones on the map are treated as Overgrown for your units (you've seeded the whole battlefield)"},{"type":"active","uses":"1/trial","name":"World Bloom","text":"Every enemy on the map gains 2 Spore Drift stacks immediately; enemies with 3+ stacks make a WIS save (DC 16) or are Overridden as per A4, attacking their nearest ally this round"}],"flavorText":"Your civilization and the planet are no longer distinguishable. You seed life; you are life."}]},"B":{"name":"Chemical/Pharmaceutical","tagline":"The planet's chemistry is a library. You have learned to read it \u2014 and rewrite it.","spaceAgeOutcome":"Pharmaceutical civilization \u2014 controls what everyone else puts in their bodies.","nodes":[{"id":"ver_b1","name":"Compound Synthesis","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"ver_t2","unlocksNext":["ver_b2"],"mechanics":[{"type":"passive","text":"+1d6 poison damage on all attacks (synthesized venom coating)"},{"type":"passive","text":"Once per trial, neutralize all Spore Drift stacks on an ally (or yourself) as a bonus action"}],"flavorText":"Your civilization has learned to isolate and synthesize active compounds from the spore network."},{"id":"ver_b2","name":"Stimulant Distribution","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"ver_b1","unlocksNext":["ver_b3"],"mechanics":[{"type":"passive","text":"+10 ft movement"},{"type":"passive","text":"Advantage on initiative rolls and on the first attack roll of each combat round"}],"flavorText":"Performance-enhancing compounds distributed to your forces before and during battle."},{"id":"ver_b3","name":"Debilitant Aerosol","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"ver_b2","unlocksNext":["ver_b4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Aerosol Deployment","text":"One zone; all enemies make a CON save (DC 14) or be Poisoned (disadvantage on attack rolls and ability checks) for 3 rounds"},{"type":"passive","text":"Enemies Poisoned by your effects also have their movement reduced by 10 ft"}],"flavorText":"Weaponized synthesis \u2014 airborne compounds that degrade enemy function without killing them outright."},{"id":"ver_b4","name":"Adaptive Formula","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"ver_b3","unlocksNext":["ver_b5"],"mechanics":[{"type":"passive","text":"At the start of each trial, choose one damage type \u2014 you have resistance to that type for the trial"},{"type":"active","uses":"1/trial","name":"Emergency Dose","text":"Immediately end one condition affecting you (Poisoned, Restrained, Frightened, etc.) and gain advantage on all saves for 1 round"}],"flavorText":"Your pharmaceutical division now synthesizes in real time \u2014 adapting compounds to whatever threat is present."},{"id":"ver_b5","name":"Mass Debilitation","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"ver_b4","unlocksNext":["ver_b6"],"mechanics":[{"type":"passive","text":"Aerosol Deployment (B3) now affects all zones simultaneously"},{"type":"passive","text":"Enemies Poisoned by your effects cannot benefit from healing or HP recovery for the duration"}],"flavorText":"Your aerosols have become strategic-scale weapons \u2014 theater-wide deployment."},{"id":"ver_b6","name":"Pharmaceutical Dominion","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"ver_b5","unlocksNext":[],"mechanics":[{"type":"passive","text":"All enemies on the map are Poisoned; they make a CON save (DC 14) at the start of each turn to end the condition, on failure it persists (no initial save to apply)"},{"type":"active","uses":"1/trial","name":"Total Synthesis","text":"Choose one enemy; they make a CON save (DC 17). Failure = Incapacitated for 2 rounds and lose 25% of their max HP. Success = Poisoned for 3 rounds and disadvantage on all saves."}],"flavorText":"Your civilization controls the biochemistry of the battlefield absolutely. In space, you are the only ones who can synthesize certain compounds \u2014 or their antidotes."}]}}},"khara":{"name":"Khara","trunkNarrative":"Your civilization learned to read the stone before it learned to move through it.","trunk":[{"id":"kha_t1","name":"Structural Analysis","tier":"trunk1","epoch":2,"trial":1,"cost":10,"prerequisite":null,"unlocksNext":["kha_t2"],"mechanics":[{"type":"passive","text":"You always know the Pressure Sickness stack level of every zone and every creature on the map"},{"type":"passive","text":"+1 to all STR and CON saves"}],"flavorText":"Your civilization can read load-bearing patterns, pressure differentials, and tunnel integrity at a glance."},{"id":"kha_t2","name":"Controlled Excavation","tier":"trunk2","epoch":2,"trial":2,"cost":15,"prerequisite":"kha_t1","unlocksNext":["kha_a1","kha_b1"],"mechanics":[{"type":"zone","text":"Once per trial, collapse a tunnel between two adjacent zones \u2014 enemies in the passage make a DEX save (DC 13) or take 3d6 bludgeoning damage; the connection is destroyed for the rest of the trial"},{"type":"passive","text":"Your movement never triggers Pressure Sickness stacks"}],"flavorText":"Precision tunneling \u2014 not just moving through the earth, but shaping it deliberately."}],"branches":{"A":{"name":"Siege and Excavation","tagline":"The tunnel is a weapon. You are learning to aim it.","spaceAgeOutcome":"Megastructure engineering civilization \u2014 they build the bones of space stations and ringworlds.","nodes":[{"id":"kha_a1","name":"Breach Drilling","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"kha_t2","unlocksNext":["kha_a2"],"mechanics":[{"type":"active","uses":"1/trial","name":"Breach","text":"Instantly destroy one barrier or Ice Wall on the map; units may immediately move through the gap"},{"type":"passive","text":"Your siege assault actions deal +1d6 damage and ignore cover bonuses"}],"flavorText":"Purpose-built drilling rigs that punch through fortifications and barriers in minutes."},{"id":"kha_a2","name":"Undermining","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"kha_a1","unlocksNext":["kha_a3"],"mechanics":[{"type":"zone","text":"Designate one enemy-held zone as Undermined \u2014 enemies in it have disadvantage on attack rolls; if they hold it for 2+ consecutive rounds, they take 2d6 bludgeoning damage at round end"},{"type":"passive","text":"You may enter Undermined zones without triggering the instability effects"}],"flavorText":"Your excavators tunnel beneath enemy zones, destabilizing their footing."},{"id":"kha_a3","name":"Siege Platform","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"kha_a2","unlocksNext":["kha_a4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Deploy Platform","text":"Place a Siege Platform in any zone you control. AC 18, HP 50, provides +2 AC to all allies in its zone. Enemies attacking into the zone have disadvantage. Cannot move but persists until destroyed."},{"type":"passive","text":"While adjacent to your Siege Platform, you have advantage on all attack rolls"}],"flavorText":"Mobile, heavily armored excavation platforms that function as rolling fortresses."},{"id":"kha_a4","name":"Deep Strike","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"kha_a3","unlocksNext":["kha_a5"],"mechanics":[{"type":"active","uses":"1/trial","name":"Tunnel Strike","text":"Teleport to any zone on the map; immediately make a full attack action against all enemies in that zone with advantage; they cannot use reactions"},{"type":"passive","text":"Once per round, move between any two zones you've previously occupied without spending movement"}],"flavorText":"Your tunneling capability now lets you strike from completely unexpected angles \u2014 emerging beneath enemy positions."},{"id":"kha_a5","name":"Excavation Cascade","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"kha_a4","unlocksNext":["kha_a6"],"mechanics":[{"type":"active","uses":"1/trial","name":"Structural Collapse","text":"Choose up to 3 adjacent zones; all enemies make a DEX save (DC 15) or take 4d8 bludgeoning damage and are knocked prone; zones become Rubble (movement costs double) for the rest of the trial"},{"type":"passive","text":"Undermining (A2) now affects two zones simultaneously"}],"flavorText":"Mass excavation \u2014 whole sections of the map can be restructured in minutes."},{"id":"kha_a6","name":"World Drill","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"kha_a5","unlocksNext":[],"mechanics":[{"type":"passive","text":"All zones you control are connected by your tunnel network \u2014 free movement between all held zones, no action cost"},{"type":"active","uses":"1/trial","name":"Planetary Bore","text":"Target any one enemy; DEX save (DC 17) or fall into a bore shaft: removed from the map for 2 rounds (can't act, score, or be targeted), then reenter at 50% HP in a zone of your choice. On success, they take 4d10 bludgeoning damage and are moved to an adjacent zone of your choice."}],"flavorText":"Your civilization can excavate anything, anywhere, at any scale. In space, you bore through moons."}]},"B":{"name":"Acoustic and Seismic","tagline":"Sound travels through stone. Your civilization has been listening for a very long time.","spaceAgeOutcome":"Intelligence and early-warning civilization \u2014 they always know what's coming.","nodes":[{"id":"kha_b1","name":"Resonance Reading","tier":"branch1","epoch":2,"trial":3,"cost":20,"prerequisite":"kha_t2","unlocksNext":["kha_b2"],"mechanics":[{"type":"passive","text":"Tremorsense 60 ft \u2014 sense all creatures within 60 ft through vibration, even through walls; they cannot hide from you while on the ground"},{"type":"passive","text":"You cannot be ambushed or surprised by any means"}],"flavorText":"Fine-tuned acoustic sensors let your civilization detect movement, position, and intent through stone."},{"id":"kha_b2","name":"Dissonance Emitters","tier":"branch2","epoch":2,"trial":4,"cost":25,"prerequisite":"kha_b1","unlocksNext":["kha_b3"],"mechanics":[{"type":"active","uses":"1/trial","name":"Dissonance Pulse","text":"One zone; all enemies make a CON save (DC 13) or have disadvantage on all rolls for 2 rounds"},{"type":"passive","text":"Enemies within 30 ft of you have disadvantage on concentration checks and WIS saves"}],"flavorText":"Targeted vibration emitters that disrupt enemy coordination and focus."},{"id":"kha_b3","name":"Seismic Strike","tier":"branch3","epoch":3,"trial":1,"cost":30,"prerequisite":"kha_b2","unlocksNext":["kha_b4"],"mechanics":[{"type":"active","uses":"1/trial","name":"Seismic Strike","text":"One zone; all enemies take 3d8 bludgeoning damage ignoring AC entirely. CON save (DC 14) or knocked prone."},{"type":"passive","text":"Your attacks deal +1d6 bludgeoning damage (vibration-resonant strikes)"}],"flavorText":"Your civilization weaponizes ground vibration \u2014 targeted micro-quakes that hit through armor and fortification."},{"id":"kha_b4","name":"Acoustic Network","tier":"branch4","epoch":3,"trial":2,"cost":35,"prerequisite":"kha_b3","unlocksNext":["kha_b5"],"mechanics":[{"type":"passive","text":"You have perfect information about all creatures on the map \u2014 HP, conditions, position; GM reveals enemy intended actions at start of each round"},{"type":"passive","text":"Enemies cannot benefit from invisibility, stealth, or hidden positioning against you"}],"flavorText":"A civilization-scale acoustic sensor grid \u2014 you perceive the entire battlefield at all times."},{"id":"kha_b5","name":"Resonance Cascade","tier":"branch5","epoch":3,"trial":3,"cost":40,"prerequisite":"kha_b4","unlocksNext":["kha_b6"],"mechanics":[{"type":"passive","text":"Seismic Strike (B3) now hits all zones simultaneously (one save, one damage roll applied to all enemies on the map)"},{"type":"zone","text":"Each zone you hold generates a constant low-frequency field \u2014 enemies starting their turn in your zones take 1d6 bludgeoning damage (no save)"}],"flavorText":"You've learned to trigger sympathetic resonance across your seismic network \u2014 one strike echoes everywhere."},{"id":"kha_b6","name":"Geological Dominion","tier":"branch6","epoch":3,"trial":4,"cost":45,"prerequisite":"kha_b5","unlocksNext":[],"mechanics":[{"type":"passive","text":"You gain a flat +5 bonus to all attack rolls, saving throws, and ability checks; enemies take a flat \u22123 penalty to all attack rolls and saving throws against you"},{"type":"active","uses":"1/trial","name":"Resonance Event","text":"All enemies on the map take 5d10 bludgeoning damage, are knocked prone, and lose their movement next round. All zones become contested simultaneously. Your units are completely immune."}],"flavorText":"Your civilization hears and speaks through the planet. The stone is your instrument."}]}}}}};
const APEX_DATA={"version":"1.0","description":"Proto-Genesis Apex Biology \u2014 planet-distinct biological transcendence paths. Requires zero tech nodes purchased throughout the campaign. Two trunk nodes available from Epoch 2; three capstone nodes unlock at Epoch 3 transition.","eligibilityRule":"Zero tech nodes purchased at any point in the campaign. Purchasing even one tech node permanently closes this path.","timing":{"trunk":"Available from Epoch 2, Trial 1 onward \u2014 purchase any time during Epoch 2 adaptation windows","capstones":"Unlock at Epoch 3 transition window only \u2014 must have purchased both trunk nodes first","note":"A lineage may delay purchasing trunk nodes until the Epoch 3 transition window and buy all five nodes at once, provided they have never purchased a tech node."},"costLadder":{"trunk1":30,"trunk2":40,"capstone1":50,"capstone2":60,"capstone3":70,"total":250},"planets":{"pyrotheon":{"name":"Pyrotheon","pathName":"The Embered Path","pathNarrative":"They did not master the volcano. They became it.","trunk":[{"id":"pyr_apex_t1","name":"Pyrogenic Core","tier":"trunk1","epoch":2,"cost":30,"prerequisite":null,"unlocksNext":["pyr_apex_t2"],"mechanics":[{"type":"passive","text":"Complete immunity to fire damage and Heat Strain (all stacks)"},{"type":"passive","text":"Creatures that hit you with melee attacks take 1d6 fire damage (contact burn)"}],"flavorText":"The creature's metabolic processes have shifted to thermogenic \u2014 body heat measured in hundreds of degrees, not tens. External fire is irrelevant. Internal fire is the point."},{"id":"pyr_apex_t2","name":"Magmatic Skin","tier":"trunk2","epoch":2,"cost":40,"prerequisite":"pyr_apex_t1","unlocksNext":["pyr_apex_c1"],"mechanics":[{"type":"passive","text":"+3 AC (magmatic plating \u2014 regenerates between rounds)"},{"type":"passive","text":"At the start of each round, recover HP equal to CON modifier \u00d7 2 (the skin reseals)"},{"type":"passive","text":"You leave scorched terrain wherever you move \u2014 enemies entering zones you've passed through this trial take 1d4 fire damage"}],"flavorText":"The outer layer has begun the conversion \u2014 not armor, not hide. Cooling slag that reshapes after every strike."}],"capstones":[{"id":"pyr_apex_c1","name":"Thermal Sovereignty","tier":"capstone1","epoch":3,"cost":50,"prerequisite":"pyr_apex_t2","unlocksNext":["pyr_apex_c2"],"mechanics":[{"type":"passive","text":"All fire damage you deal ignores both resistance and immunity"},{"type":"passive","text":"+2d6 fire damage on all attacks"},{"type":"active","uses":"1/trial","name":"Thermal Nova","text":"All enemies on the map take 3d6 fire damage and gain 1 Heat Strain stack. No save. This is not a weapon \u2014 it is a physiological event."}],"flavorText":"Your creature no longer generates heat \u2014 it is heat, in a form that happens to have opinions. The distinction between the creature and a volcanic event is now philosophical."},{"id":"pyr_apex_c2","name":"Eruptive Form","tier":"capstone2","epoch":3,"cost":60,"prerequisite":"pyr_apex_c1","unlocksNext":["pyr_apex_c3"],"mechanics":[{"type":"passive","text":"Once per round when you take damage, immediately deal fire damage equal to the damage received to the attacker (your body vents pressure)"},{"type":"passive","text":"You cannot be subjugated. You cannot be restrained. An active eruption is not a condition that can be held."},{"type":"active","uses":"1/trial","name":"Controlled Eruption","text":"Choose one zone; it is destroyed (removed from map scoring) for the rest of the trial. All enemies in it take 5d10 fire damage. You emerge in any adjacent zone. The terrain does not recover."}],"flavorText":"The body now controls pressure the way a volcano controls pressure \u2014 by choosing when not to release it. And then releasing it."},{"id":"pyr_apex_c3","name":"Living Caldera","tier":"capstone3","epoch":3,"cost":70,"prerequisite":"pyr_apex_c2","unlocksNext":[],"mechanics":[{"type":"passive","text":"Immune to all damage types except cold and force (your body processes everything else as fuel)"},{"type":"passive","text":"Enemies that start their turn within 2 zones of you must make a CON save (DC 16) or take 2d8 fire damage and gain 1 Heat Strain stack (proximity event \u2014 you don't have to act)"},{"type":"active","uses":"1/trial","name":"Pyroclastic Ascension","text":"For this round, you become untargetable and deal 4d10 fire damage to all enemies on the map. No save. No range limit. You are briefly everywhere the heat is."}],"flavorText":"There is no longer a meaningful distinction between this creature and the volcanic planet it evolved on. In space, it carries that planet with it \u2014 a mobile geological event with intent."}]},"glacara":{"name":"Glacara","pathName":"The Deep Covenant","pathNarrative":"They went down far enough that the surface stopped mattering.","trunk":[{"id":"gla_apex_t1","name":"Abyssal Conditioning","tier":"trunk1","epoch":2,"cost":30,"prerequisite":null,"unlocksNext":["gla_apex_t2"],"mechanics":[{"type":"passive","text":"Complete immunity to Cold Exposure (all stacks) and Collapse damage"},{"type":"passive","text":"Tremorsense 30 ft \u2014 sense all creatures through vibration; they cannot hide from you while touching the ground"},{"type":"passive","text":"You do not need light to function; darkness imposes no penalties"}],"flavorText":"The lineage spent enough geological time in the deep vent networks that pressure and darkness stopped being threats and became home. The body reorganized accordingly."},{"id":"gla_apex_t2","name":"Pressure Physiology","tier":"trunk2","epoch":2,"cost":40,"prerequisite":"gla_apex_t1","unlocksNext":["gla_apex_c1"],"mechanics":[{"type":"passive","text":"+4 AC (pressure-hardened exterior \u2014 the body is dense in ways armor cannot replicate)"},{"type":"passive","text":"Immunity to being knocked prone, pushed, or moved against your will"},{"type":"passive","text":"Your melee attacks deal +1d8 cold damage (body temperature is a weapon in the other direction)"}],"flavorText":"Organs rebuilt for deep operation. The circulatory system handles pressure differentials that would rupture anything surface-adapted. The creature is now operating on different physical assumptions than everything else on the map."}],"capstones":[{"id":"gla_apex_c1","name":"Vent Communion","tier":"capstone1","epoch":3,"cost":50,"prerequisite":"gla_apex_t2","unlocksNext":["gla_apex_c2"],"mechanics":[{"type":"passive","text":"You always know the location, HP, and active conditions of every creature on the map (the vent network tells you \u2014 heat signatures, pressure displacement, vibration)"},{"type":"active","uses":"1/trial","name":"Vent Surge","text":"Direct a vent eruption through the network; one zone anywhere on the map; all enemies take 4d8 cold damage and make a STR save (DC 15) or be pushed 2 zones in a direction of your choice. You are immune."}],"flavorText":"The creature has developed a direct biological relationship with the vent network \u2014 not technological tapping, but actual organic integration. The vents respond to it like a nervous system responds to pain."},{"id":"gla_apex_c2","name":"Glacial Permanence","tier":"capstone2","epoch":3,"cost":60,"prerequisite":"gla_apex_c1","unlocksNext":["gla_apex_c3"],"mechanics":[{"type":"passive","text":"At the start of each round, recover 15 HP (the body's geological repair rate)"},{"type":"passive","text":"You cannot be subjugated. If an attempt is made, the attacker takes 2d8 cold damage and the attempt fails automatically."},{"type":"passive","text":"When you drop to 0 HP for the first time in a trial, you instead drop to 1 HP and are immune to damage until the start of your next turn (deep physiology has a failsafe)"}],"flavorText":"The creature no longer ages in any meaningful sense during a trial. Injuries that would accumulate on anything else simply don't. The deep adapted to pressure by making the body's responses geological i // Personal code — 4 uppercase chars derived from player ID, stable
function getPersonalCode(pid){
  // Simple hash of the player ID → 4 chars from base36
  let h = 0;
  for(let i=0;i<pid.length;i++) h = ((h<<5)-h+pid.charCodeAt(i))|0;
  return Math.abs(h).toString(36).toUpperCase().padStart(4,'0').slice(-4);
}

async function loadBuildFromFirebase(code){

  if(!data) return false;
  // Restore player identity
  if(data._playerId){
    PLAYER_ID = data._playerId;
    localStorage.setItem('pg_player_id', PLAYER_ID);
  }
  // Restore build state — copy all keys except internal ones
  const { _playerId, _savedAt, ...build } = data;
  Object.assign(S, build);
  saveBuildLocally();
  return true;
}
const BUILD_VERSION = 4; // increment when S shape changes incompatibly
function loadBuildFromLocal(){
  try{
    const raw = localStorage.getItem('pg_build_'+PLAYER_ID);
    if(raw){
      const parsed = JSON.parse(raw);
      // Version mismatch: wipe stale save and start fresh
      if((parsed._v||0) < BUILD_VERSION){
        localStorage.removeItem('pg_build_'+PLAYER_ID);
        return false;
      }
      Object.assign(S, parsed);
      return true;
    }
  }catch(e){}
  return false;
}

function fbURL(path){ return FIREBASE_URL + path + '.json'; }
async function fbRead(path){

  try{ const r=await fetch(fbURL(path)); return r.ok ? await r.json() : null; }
  catch{ return null; }
}
async function fbWrite(path, data){

  try{ await fetch(fbURL(path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); }
  catch{}
}

  catch{}
}

// ── RESISTANCE / IMMUNITY DERIVATION ──────────────────────────────────────────
// Derives from buildSnapshot (S.archetypes.unlockedNodes + S.techTree.unlockedNodes)
// then applies CS.lineageTrait override from Firebase.
function deriveResistances(){
  const res = new Set(), imm = new Set();
  const bio = S.archetypes?.unlockedNodes || [];
  const tech = S.techTree?.unlockedNodes || [];
  // Bio archetype nodes
  if(bio.includes('adp_1')) res.add('1 type (build choice)');
  if(bio.includes('adp_3')) res.add('2nd type (build choice)');
  if(bio.includes('adp_4A_pyr')){ imm.add('Fire'); imm.add('Heat Strain'); res.delete('1 type (build choice)'); }
  if(bio.includes('adp_5A_pyr')){ /* all res → imm, handled by 4A */ }
  if(bio.includes('adp_4A_gla')){ imm.add('Cold'); imm.add('Cold Exposure'); res.delete('1 type (build choice)'); }
  if(bio.includes('def_4A_pyr')){ res.add('Fire'); res.add('Bludgeoning'); res.add('Piercing'); }
  if(bio.includes('def_5A_pyr')){ imm.add('Fire'); imm.add('Heat Strain'); }
  if(bio.includes('def_4A_gla')){ res.add('Cold'); res.add('Bludgeoning'); }
  // Tech nodes
  if(tech.includes('pyr_a1')) imm.add('Heat Strain 1–2');
  if(tech.includes('gla_a4')) imm.add('Heat Strain');
  if(tech.includes('gla_b1') || tech.includes('gla_b2')) res.add('Cold (partial)');
  // Lineage Trait override from Firebase (T4 survivor reward)
  if(CS.lineageTrait && CS.lineageTrait.includes('Fire Immunity')){
    imm.add('Fire'); imm.add('Heat Strain');
  }
  return { resistances: [...res], immunities: [...imm] };
}

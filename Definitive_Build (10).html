      const n=NODES[id],isO=owned.includes(id),chk=canBuy(id),isN=!isO&&chk.ok;

  // EP summary + export
  const sp=calcEP(),bud=budget();
  html+=`<div style="display:flex;gap:8px;margin-bottom:8px">
    <button class="btn btn-g" style="flex:1;font-size:.62rem" data-goto="0">← Edit</button>
    <button class="btn btn-p" style="flex:1;font-size:.62rem" id="export-btn">Export JSON</button>
  </div>
  <div style="padding:8px 12px;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;font-family:'Orbitron',monospace;font-size:.52rem;color:var(--dm);display:flex;justify-content:space-between">
    <span>EP SPENT: ${sp} / ${bud}</span><span>REMAINING: ${bud-sp}</span>
  </div>`;
  return html;
}

function backLink(target,type){
  if(type==='bms')return`<div class="back-link" data-bms="${target.replace('bms','')}"><span>← Back</span></div>`;

      <!-- Main flow: room code + options -->

      <input id="room-code-input" type="text" maxlength="12"
        placeholder="e.g. PYRO1"
        value="${ROOM_ENTRY_CODE}"
        oninput="ROOM_ENTRY_CODE=this.value.toUpperCase().trim();this.value=ROOM_ENTRY_CODE"
        onkeydown="if(event.key==='Enter')document.querySelector('[data-joinroom]')?.click()"
        style="padding:16px;font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;letter-spacing:.2em;text-align:center;background:var(--sur2);border:2px solid var(--bdr);border-radius:12px;color:var(--tx);outline:none;width:100%;box-sizing:border-box"/>
      <button data-joinroom="1"
        style="padding:16px;font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;letter-spacing:.16em;background:${ac};color:#fff;border:none;border-radius:12px;cursor:pointer;width:100%">
        JOIN SESSION →
      </button>
      <div style="border-top:1px solid var(--bdr);padding-top:14px;margin-top:4px;display:flex;flex-direction:column;gap:8px">
        <button data-showplayercode="1"
          style="width:100%;padding:12px;font-family:'Orbitron',monospace;font-size:.52rem;font-weight:700;letter-spacing:.14em;background:none;border:1px solid rgba(255,107,53,.3);border-radius:10px;color:${ac};cursor:pointer">
          RESTORE BUILD WITH CODE
        </button>
        <button data-skiprotoom="1"
          style="width:100%;padding:12px;font-family:'Orbitron',monospace;font-size:.52rem;font-weight:700;letter-spacing:.14em;background:none;border:1px solid var(--bdr);border-radius:10px;color:var(--dm);cursor:pointer">
          BUILD WITHOUT SESSION
        </button>
        <div style="font-size:.6rem;color:var(--dm);text-align:center;line-height:1.5">Have a build from a previous session?<br>Use your personal code to restore it.</div>
      </div>`

      :`
      <!-- Personal code restore flow -->
      <button data-hideplayercode="1" style="background:none;border:none;color:var(--dm);font-size:.66rem;cursor:pointer;text-align:left;padding:0;margin-bottom:4px">← Back</button>
      <div style="font-family:'Orbitron',monospace;font-size:.5rem;color:${ac};letter-spacing:.18em;text-align:center;margin-bottom:4px">RESTORE YOUR BUILD</div>
      <div style="font-size:.68rem;color:var(--dm);text-align:center;line-height:1.6;margin-bottom:8px">Enter your 4-character personal code.<br>Your saved build will load on this device.</div>
      <input id="player-code-input" type="text" maxlength="4"
        placeholder="e.g. F7K2"
        value="${PLAYER_CODE_ENTRY}"
        oninput="PLAYER_CODE_ENTRY=this.value.toUpperCase().trim();this.value=PLAYER_CODE_ENTRY"
        onkeydown="if(event.key==='Enter')document.querySelector('[data-loadplayercode]')?.click()"
        style="padding:16px;font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:700;letter-spacing:.3em;text-align:center;background:var(--sur2);border:2px solid rgba(255,107,53,.4);border-radius:12px;color:var(--tx);outline:none;width:100%;box-sizing:border-box"/>
      <button data-loadplayercode="1"
        style="padding:14px;font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;letter-spacing:.16em;background:${ac};color:#fff;border:none;border-radius:12px;cursor:pointer;width:100%">
        LOAD BUILD →
      </button>
      <div id="code-load-msg" style="text-align:center;font-size:.68rem;color:var(--dm);min-height:20px"></div>`}

    </div>
  </div>`;
}

function render(){
  // Preserve name input focus/cursor across re-renders
  const _nameEl = document.querySelector('[data-nameinput]');
  const _nameFocused = _nameEl && document.activeElement === _nameEl;
  const _nameSel = _nameFocused ? [_nameEl.selectionStart, _nameEl.selectionEnd] : null;

  const app=document.getElementById('app');
  // Room entry gate
  if(!_buildLoaded){ _buildLoaded=true; loadBuildFromLocal(); }
  if(INTRO){app.innerHTML=renderIntro();return;}
  if(SPLASH){app.innerHTML=renderSplash();return;}
  if(INTERACT_ACTIVE || ADAPT_OVERLAY){app.innerHTML=renderInteract();return;}

  const pl=PLANETS[S.planet]||PLANETS.pyrotheon;
  const ac=pl.palette.ac,ac2=pl.palette.ac2;
  document.documentElement.style.setProperty('--ac',ac);
  document.documentElement.style.setProperty('--ac2',ac2);
  document.documentElement.style.setProperty('--ac3',ac);

  const ep=calcEP(),bud=budget(),rem=bud-ep,pct=Math.min(100,ep/bud*100);
  const over=rem<0;
  const hudCol=over?'var(--rd)':pct>85?'var(--gd)':pct>60?ac:'var(--gr)';

  const steps=[renderStep0,renderStep1,renderStep2,renderStep4,renderStep3,renderStep5];
  const content=(steps[STEP]||renderStep0)();

  app.innerHTML=`
    <div class="wrap">
      <div class="builder-hero">
        <h1>PROTO<span>GENESIS</span></h1>
        <div class="sub">
          Evolution Builder
          ${S.planet?`<span style="display:inline-flex;align-items:center;gap:6px;margin-left:8px">
            <span style="color:${ac};letter-spacing:.2em">${pl.name.toUpperCase()}</span>
            <button data-backsplash="1" style="background:none;border:1px solid var(--bdr);border-radius:4px;padding:1px 7px;color:var(--dm);font-size:.56rem;cursor:pointer">✎</button>
          </span>`:''}
        </div>
      </div>
      ${STEP>0?`<div class="sticky-hud">
        <div class="hud-inner">
          <span class="hud-lbl">EP</span>
          <div class="hud-track"><div class="hud-fill" style="width:${pct}%;background:${hudCol}"></div></div>
          <span class="hud-ep" style="color:${hudCol}">${ep}</span>
          <span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm)">/ ${bud}</span>
        </div>
      </div>`:''}
      <div class="wrap-inner">${content}</div>
      <div class="bottom-nav">
        ${NAV_STEPS.map((lbl,i)=>`<button class="bnav-btn${STEP===i?' active':isStepDone(i)?' done':''}" data-goto="${i}">${lbl}</button>`).join('')}
      </div>
    </div>`;
  // Restore name input focus + cursor position if it was active before re-render
  if(_nameFocused && _nameSel){
    const el = document.querySelector('[data-nameinput]');
    if(el){ el.focus(); try{ el.setSelectionRange(_nameSel[0], _nameSel[1]); }catch(e){} }
  }
}

function handleClick(e){
  const t=e.target.closest('[data-blinkpurchase],[data-blinkprev],[data-blinknext],[data-blinkdist],[data-sizeprev],[data-sizenext],[data-nodeprev],[data-nodenext],[data-goto],[data-planet],[data-trial],[data-splashprev],[data-splashnext],[data-beginevol],[data-backsplash],[data-bms],[data-bms-set],[data-size],[data-hd],[data-qs],[data-move],[data-statval],[data-statkey],[data-statclear],[data-statup],[data-statdown],[data-arch],[data-archprev],[data-archnext],[data-archsetprim],[data-archsetsec],[data-archphase],[data-dlvprev],[data-dlvnext],[data-shapeprev],[data-shapenext],[data-buy],[data-sell],[data-hp],[data-lvl],[data-enterapp],[data-cantpick],[data-cantprop],[data-abpick],[data-abprop],[data-abgoto],[data-abconfirm],[data-addab],[data-rmab],[data-pick],[data-seconddie],[data-chipopen],[data-dieup],[data-diedown],[data-medbonustoggle],[data-medopen],[data-medpick],[data-mvq],[data-mvtoggle],[data-mvblink],[data-splashq],[data-abdrop],[data-cantconfirm],[data-cantopen],[data-extradie],[data-statprev],[data-statnext],[data-dmgprev],[data-dmgnext],[data-statreopen],[data-atprev],[data-atnext],[data-roleprev],[data-rolenext],[data-healgrp],[data-healcondprev],[data-healcondnext],[data-healreviveprev],[data-healrevivenext],[data-guardtauntprev],[data-guardtauntnext],[data-guardstanceprev],[data-guardstancenext],[data-interact-harvest],[data-interact-platformdestroy],[data-interact-flagcorrection],[data-interact-toggleabs],[data-interact-toggleattack],[data-attack-target],[data-attack-confirm],[data-submitinit],[data-attackreact],[data-attackrespond],[data-hazardrespond],[data-joinroom],[data-skiprotoom],[data-showplayercode],[data-hideplayercode],[data-loadplayercode],[data-savebuild],[data-ab2toggle],[data-ab2flavoropen],[data-ab2flavorprev],[data-ab2flavornext],[data-ab2flavorset],[data-ab2at],[data-ab2upgbuy],[data-ab2upgsell],[data-ab2dieup],[data-ab2diedown],[data-ab2usesup],[data-ab2usesdown],[data-ab2remove],[data-ab2addslot],[data-ab2picktemplate],[data-ab2cancelbrowse],[data-lineagecarousel],[data-picklineage],[data-lineagereset],[data-overlaycarousel],[data-pickoverlay],[data-overlayback],[data-picksize],[data-s0nexthd],[data-s0sizeback],[data-s0confirmhd],[id="export-btn"]');
  if(!t){render();return;}

  // ── ROOM ENTRY ────────────────────────────────────────────────────────────
  if(t.dataset.joinroom!==undefined){
    const code = (ROOM_ENTRY_CODE||document.getElementById('room-code-input')?.value||'').toUpperCase().trim();
    if(!code){ render(); return; }
    ROOM_CODE = code;
    const url = new URL(window.location.href);
    url.searchParams.set('room', code);
    window.history.replaceState({}, '', url.toString());
    startInteractPolling();
    SHOW_ROOM_ENTRY = false; render(); return;
  }
  if(t.dataset.skiprotoom!==undefined){
    SHOW_ROOM_ENTRY = false; render(); return;
  }
  if(t.dataset.showplayercode!==undefined){
    PLAYER_CODE_MODE = true; PLAYER_CODE_ENTRY = ''; render(); return;
  }
  if(t.dataset.hideplayercode!==undefined){
    PLAYER_CODE_MODE = false; render(); return;
  }
  if(t.dataset.loadplayercode!==undefined){
    const code = (PLAYER_CODE_ENTRY||document.getElementById('player-code-input')?.value||'').toUpperCase().trim();
    if(code.length!==4){ const m=document.getElementById('code-load-msg'); if(m) m.textContent='Enter a 4-character code.'; return; }
    const msg = document.getElementById('code-load-msg');
    if(msg) msg.textContent = 'Loading…';
    loadBuildFromFirebase(code).then(ok=>{
      if(ok){
        PLAYER_CODE_MODE = false; _buildLoaded = true;
        SHOW_ROOM_ENTRY = false; render();
      } else {
        const m=document.getElementById('code-load-msg');
        if(m) m.textContent = '⚠ No build found for that code.';
      }
    });
    return;
  }
  if(t.dataset.savebuild!==undefined){
    saveBuildLocally();
    saveBuildToFirebase().then(()=>{
      const btn = document.querySelector('[data-savebuild]');
      if(btn){ const orig=btn.textContent; btn.textContent='✓ Saved!'; setTimeout(()=>btn.textContent=orig,2000); }
    });
    return;
  }

  // ── ABILITY SYSTEM V2 HANDLERS ────────────────────────────────────────────
  if(t.dataset.ab2toggle!==undefined){
    const id=t.dataset.ab2toggle;
    AB2_OPEN=AB2_OPEN===id?null:id;
    AB2_FLAVOR_OPEN=null;
    render();return;
  }
  if(t.dataset.ab2flavoropen!==undefined){
    const key=t.dataset.ab2flavoropen; // "abId:slot"
    AB2_FLAVOR_OPEN=AB2_FLAVOR_OPEN===key?null:key;
    render();return;
  }
  if(t.dataset.ab2flavorprev!==undefined||t.dataset.ab2flavornext!==undefined){
    const raw=t.dataset.ab2flavorprev!==undefined?t.dataset.ab2flavorprev:t.dataset.ab2flavornext;
    const isNext=t.dataset.ab2flavornext!==undefined;
    const [abId,slot]=raw.split(':');
    const idx2=slot==='stat'?AB2_STAT_IDX2:slot==='dmgType'?AB2_DMG_IDX2:AB2_DLV_IDX2;
    const opts=slot==='stat'?(['STR','DEX','CON','INT','WIS','CHA']):slot==='dmgType'?DMG_TYPES:['Melee','Ranged','AoE'];
    const key=abId+':'+slot;
    const cur=idx2[key]!==undefined?idx2[key]:0;
    idx2[key]=((cur+(isNext?1:-1))+opts.length*10)%opts.length;
    render();return;
  }
  if(t.dataset.ab2flavorset!==undefined){
    const parts=t.dataset.ab2flavorset.split(':');
    const abId=parts[0],slot=parts[1],val=parts.slice(2).join(':');
    if(abId==='cantrip'){
      if(slot==='stat') S.cantrip={...S.cantrip,stat:val};
      else if(slot==='dmgType') S.cantrip={...S.cantrip,dmgType:val};
      else if(slot==='delivery') S.cantrip={...S.cantrip,delivery:val.toLowerCase()};
    } else {
      S.abilities=S.abilities.map(a=>{
        if(a.id!==abId) return a;
        if(slot==='stat') return {...a,stat:val};
        if(slot==='dmgType') return {...a,dmgType:val};
        if(slot==='delivery') return {...a,delivery:val.toLowerCase()};
        return a;
      });
    }
    AB2_FLAVOR_OPEN=null;
    render();return;
  }
  if(t.dataset.ab2at!==undefined){
    const [abId,at]=t.dataset.ab2at.split(':');
    S.abilities=S.abilities.map(a=>a.id===abId?{...a,actionType:at}:a);
    render();return;
  }
  if(t.dataset.ab2upgbuy!==undefined){
    const parts=t.dataset.ab2upgbuy.split(':');
    const abId=parts[0],upgId=parts[1];
    if(abId==='cantrip'){
      const upgs={...S.cantrip.upgrades||{}};
      upgs[upgId]=true;
      if(upgId==='range_ranged'&&upgs.range_aoe) delete upgs.range_aoe;
      S.cantrip={...S.cantrip,upgrades:upgs};
    } else {
      S.abilities=S.abilities.map(a=>{
        if(a.id!==abId) return a;
        const upgs={...a.upgrades||{}};
        upgs[upgId]=true;
        return {...a,upgrades:upgs};
      });
    }
    render();return;
  }
  if(t.dataset.ab2upgsell!==undefined){
    const parts=t.dataset.ab2upgsell.split(':');
    const abId=parts[0],upgId=parts[1];
    if(abId==='cantrip'){
      const upgs={...S.cantrip.upgrades||{}};
      if(upgId==='range_aoe') delete upgs.range_aoe;
      else if(upgId==='range_ranged'){ delete upgs.range_ranged; delete upgs.range_aoe; }
      else delete upgs[upgId];
      S.cantrip={...S.cantrip,upgrades:upgs};
    } else {
      S.abilities=S.abilities.map(a=>{
        if(a.id!==abId) return a;
        const upgs={...a.upgrades||{}};
        if(upgId==='range_aoe') delete upgs.range_aoe;
        else if(upgId==='range_ranged'){ delete upgs.range_ranged; delete upgs.range_aoe; }
        else delete upgs[upgId];
        return {...a,upgrades:upgs};
      });
    }
    render();return;
  }
  if(t.dataset.ab2dieup!==undefined||t.dataset.ab2diedown!==undefined){
    const abId=t.dataset.ab2dieup!==undefined?t.dataset.ab2dieup:t.dataset.ab2diedown;
    const isUp=t.dataset.ab2dieup!==undefined;
    const ladder=['1d4','1d6','1d8','1d10','1d12'];
    function mutateDie(upgs){
      const ci=Math.max(0,ladder.indexOf(upgs.die||'1d4'));
      const ni=isUp?Math.min(ci+1,ladder.length-1):Math.max(ci-1,0);
      const nu={...upgs,die:ladder[ni]};
      if(ni===0) delete nu.die;
      return nu;
    }
    if(abId==='cantrip'){
      S.cantrip={...S.cantrip,upgrades:mutateDie(S.cantrip.upgrades||{})};
    } else {
      S.abilities=S.abilities.map(a=>a.id===abId?{...a,upgrades:mutateDie(a.upgrades||{})}:a);
    }
    render();return;
  }
  if(t.dataset.ab2usesup!==undefined||t.dataset.ab2usesdown!==undefined){
    const abId=t.dataset.ab2usesup!==undefined?t.dataset.ab2usesup:t.dataset.ab2usesdown;
    const isUp=t.dataset.ab2usesup!==undefined;
    function mutateUses(upgs){
      const cur=Math.min(upgs.uses||0,4);
      const nu={...upgs,uses:isUp?Math.min(cur+1,4):Math.max(cur-1,0)};
      if(nu.uses===0) delete nu.uses;
      return nu;
    }
    if(abId==='cantrip'){
      S.cantrip={...S.cantrip,upgrades:mutateUses(S.cantrip.upgrades||{})};
    } else {
      S.abilities=S.abilities.map(a=>a.id===abId?{...a,upgrades:mutateUses(a.upgrades||{})}:a);
    }
    render();return;
  }
  if(t.dataset.ab2remove!==undefined){
    const id=t.dataset.ab2remove;
    S.abilities=S.abilities.filter(a=>a.id!==id);
    if(AB2_OPEN===id) AB2_OPEN=null;
    render();return;
  }
  if(t.dataset.ab2addslot!==undefined){
    const useArch=t.dataset.ab2addslot==='arch';
    const numSlots=S.abilities.length;
    const slotEP=(useArch?SLOT_COSTS_ARCH:SLOT_COSTS_OTHER)[Math.min(numSlots-1,2)]||(useArch?35:40);
    AB2_CAT_OPEN={useArch,slotEP};
    render();return;
  }
  if(t.dataset.ab2picktemplate!==undefined){
    const tid=t.dataset.ab2picktemplate;
    if(!AB2_CAT_OPEN) return;
    const useArch=AB2_CAT_OPEN.useArch;
    const numSlots=S.abilities.length;
    const slotEP=AB2_CAT_OPEN.slotEP;
    // Deduct slot cost from remaining EP (tracked implicitly via fromArchCat flag)
    const ab=newAbility(tid,useArch);
    S.abilities=[...S.abilities,ab];
    AB2_CAT_OPEN=null;
    AB2_OPEN=ab.id;
    render();return;
  }
  if(t.dataset.ab2cancelbrowse!==undefined){
    AB2_CAT_OPEN=null;
    render();return;
  }
  // ── STEP 0: LINEAGE / OVERLAY HANDLERS ──────────────────────────────────
  if(t.dataset.lineagereset!==undefined){
    S.lineage=null; S.typeOverlay=null; LINEAGE_IDX=0; OVERLAY_IDX=0;
    render();return;
  }
  if(t.dataset.lineagecarousel!==undefined){
    const dir=parseInt(t.dataset.lineagecarousel);
    LINEAGE_IDX=((LINEAGE_IDX+dir)+9*10)%9;
    render();return;
  }
  if(t.dataset.picklineage!==undefined){
    S.lineage=t.dataset.picklineage;
    S.typeOverlay=null; OVERLAY_IDX=0;
    render();return;
  }
  if(t.dataset.overlaycarousel!==undefined){
    const dir=parseInt(t.dataset.overlaycarousel);
    OVERLAY_IDX=((OVERLAY_IDX+dir)+5*10)%5;
    render();return;
  }
  if(t.dataset.pickoverlay!==undefined){
    S.typeOverlay=t.dataset.pickoverlay;
    render();return;
  }
  if(t.dataset.overlayback!==undefined){
    S.typeOverlay=null; OVERLAY_IDX=0;
    render();return;
  }
  if(t.dataset.picksize!==undefined){
    const newSize=t.dataset.picksize;
    S.sizeId=newSize;
    SIZE_IDX=SIZES.findIndex(x=>x.id===newSize);
    if(newSize!=='medium'){ S.medBonus=[null,null]; }
    // Stay on size step so medium players can pick bonus stats; non-medium advances to HD
    if(newSize!=='medium'){ S.hdChoice='1d4'; } // reset so HD step triggers
    render();return;
  }
  if(t.dataset.s0nexthd!==undefined){
    // Medium confirmed with bonus stats — advance to HD step
    S.hdChoice='1d4';
    render();return;
  }
  if(t.dataset.s0sizeback!==undefined){
    S.sizeId=null; S.medBonus=[null,null]; S.hdChoice='1d4'; SIZE_IDX=0;
    render();return;
  }
  if(t.dataset.s0confirmhd!==undefined){
    // HD confirmed — advance to confirm (hdChoice already set by data-hd handlers)
    render();return;
  }
  // ── END STEP 0 HANDLERS ───────────────────────────────────────────────────

  if(t.dataset.blinkpurchase!==undefined){
    if(t.dataset.blinkpurchase==='1'){
      S.blinkstep={purchased:true,actionType:'action',distance:0};
    } else {
      S.blinkstep={purchased:false,actionType:'action',distance:0};
    }
    render();return;
  }
  if(t.dataset.blinkprev!==undefined||t.dataset.blinknext!==undefined){
    const isNext=t.dataset.blinknext!==undefined;
    const ATO=['action','bonus','reaction'];
    const ci=ATO.indexOf(S.blinkstep?.actionType||'action');
    const ni=isNext?Math.min(ci+1,ATO.length-1):Math.max(ci-1,0);
    S.blinkstep={...S.blinkstep,actionType:ATO[ni]};
    render();return;
  }
  if(t.dataset.blinkdist!==undefined){
    const cur=S.blinkstep?.distance||0;
    const nv=t.dataset.blinkdist==='+'?Math.min(cur+1,4):Math.max(cur-1,0);
    S.blinkstep={...S.blinkstep,distance:nv};
    render();return;
  }
  if(t.dataset.sizeprev!==undefined||t.dataset.sizenext!==undefined){
    const isNext=t.dataset.sizenext!==undefined;
    SIZE_IDX=isNext?Math.min(SIZE_IDX+1,SIZES.length-1):Math.max(SIZE_IDX-1,0);
    render();return;
  }
  if(t.dataset.nodeprev!==undefined||t.dataset.nodenext!==undefined){
    const archKey=t.dataset.nodeprev!==undefined?t.dataset.nodeprev:t.dataset.nodenext;
    const isNext=t.dataset.nodenext!==undefined;
    const chain=getArchChain(archKey);
    const cur=NODE_IDX[archKey]||0;
    NODE_IDX[archKey]=isNext?Math.min(cur+1,chain.length-1):Math.max(cur-1,0);
    render();return;
  }

  if(t.dataset.goto!==undefined){STEP=parseInt(t.dataset.goto);render();return;}
  if(t.dataset.enterapp){INTRO=false;render();return;}
  if(t.dataset.splashprev){SPLASH_IDX=Math.max(0,SPLASH_IDX-1);SPLASH_TRIAL=null;render();return;}
  if(t.dataset.splashnext){SPLASH_IDX=Math.min(Object.keys(PLANETS).length-1,SPLASH_IDX+1);SPLASH_TRIAL=null;render();return;}
  if(t.dataset.beginevol){S.planet=t.dataset.beginevol;SPLASH=false;SHOW_ROOM_ENTRY=false;STEP=0;ARCH_PHASE='pick_primary';ARCH_IDX=0;render();return;}
  if(t.dataset.backsplash){SPLASH=true;render();return;}
  if(t.dataset.trial!==undefined){const i=parseInt(t.dataset.trial);SPLASH_TRIAL=SPLASH_TRIAL===i?null:i;render();return;}



  if(t.dataset.bms!==undefined){S.bodyMotionStep=parseInt(t.dataset.bms);render();return;}
  if(t.dataset.bmsSet!==undefined){S.bodyMotionStep=parseInt(t.dataset.bmsSet);render();return;}
  if(t.dataset.size){
    const newSize=t.dataset.size;
    S.sizeId=newSize;
    SIZE_IDX=SIZES.findIndex(x=>x.id===newSize);
    if(newSize!=='medium') S.medBonus=[null,null];
    render();return;
  }
  if(t.dataset.medopen!==undefined){
    const idx=parseInt(t.dataset.medopen);
    MED_OPEN=MED_OPEN===idx?null:idx;
    render();return;
  }
  if(t.dataset.medpick!==undefined){
    const[idx,stat]=t.dataset.medpick.split(':');

        if(a.id!==prefix) return a;
        const patch={delivery:nv};
        if(nv!=='aoe') patch.aoeShape=null;
        ABILITY_STEP[prefix]=2; // stay on delivery step
        return {...a,...patch};
      });
    }
    render();return;
  }
  if(t.dataset.archprev!==undefined){
    const keys=Object.keys(ARCH_META);
    ARCH_IDX=(ARCH_IDX-1+keys.length)%keys.length;
    render();return;
  }
  if(t.dataset.archnext!==undefined){
    const keys=Object.keys(ARCH_META);
    ARCH_IDX=(ARCH_IDX+1)%keys.length;
    render();return;
  }
  if(t.dataset.archsetprim!==undefined){
    const k=t.dataset.archsetprim,{primary,secondary}=S.archetypes;
    if(primary===k){
      S.archetypes={...S.archetypes,primary:secondary||null,secondary:null};
    } else {
      S.archetypes={...S.archetypes,primary:k};
      if(secondary===k) S.archetypes={...S.archetypes,secondary:null};
    }
    // Advance to buying primary nodes
    ARCH_PHASE='buy_primary';
    render();return;
  }
  if(t.dataset.archsetsec!==undefined){
    const k=t.dataset.archsetsec,{primary,secondary}=S.archetypes;
    if(!primary){
      // Fallback: no primary yet, set as primary
      S.archetypes={...S.archetypes,primary:k};
      ARCH_PHASE='buy_primary';
    } else if(secondary===k){
      // Deselect secondary — back to pick
      S.archetypes={...S.archetypes,secondary:null};
    } else {
      S.archetypes={...S.archetypes,secondary:k};
      ARCH_PHASE='buy_secondary';
    }
    render();return;
  }
  if(t.dataset.buy){
    const boughtId=t.dataset.buy;
    buyNode(boughtId);
    for(const ak of ['primary','secondary']){
      const chain2=getArchChain(S.archetypes?.[ak]||'');
      if(chain2.includes(boughtId)){
        const ci=chain2.indexOf(boughtId);
        if(ci<chain2.length-1) NODE_IDX[S.archetypes?.[ak]||'']=ci+1;
      }
    }
    render();return;
  }
  if(t.dataset.sell){sellNode(t.dataset.sell);return;}

  if(t.dataset.hp){
    const avgHp2=getMaxHP();
    const cur=(S.currentHp!==null?S.currentHp:avgHp2);
    if(t.dataset.hp==='+1')S.currentHp=Math.min(avgHp2,cur+1);
    else if(t.dataset.hp==='-1')S.currentHp=Math.max(0,cur-1);
    else S.currentHp=null;
    render();return;
  }
  if(t.dataset.lvl){if(ROOM_CODE)return;S.creatureLevel=(t.dataset.lvl==='+'?Math.min(6,(S.creatureLevel||1)+1):Math.max(1,(S.creatureLevel||1)-1));S.currentHp=null;render();return;}

  // ── INTERACT PAGE HANDLERS ────────────────────────────────────────────────
  if(t.dataset.interactHarvest!==undefined){
    sendHarvestRequest();
    // Optimistic UI: flash feedback (GM confirms actual token increment)
    const btn=t; btn.textContent='✓ Sent!'; btn.disabled=true;
    setTimeout(()=>{ btn.textContent='🍖 HARVEST'; btn.disabled=false; }, 1800);
    return;
  }
  if(t.dataset.interactPlatformdestroy!==undefined){
    sendPlatformDestroyRequest();
    const btn=t; btn.textContent='✓ Sent!'; btn.disabled=true;
    setTimeout(()=>{ btn.textContent='💥 PLATFORM DESTROY'; btn.disabled=false; }, 1800);
    return;
  }
  if(t.dataset.interactFlagcorrection!==undefined){
    sendFlagCorrection();
    const btn=t; btn.textContent='✓ Flagged'; btn.disabled=true;
    setTimeout(()=>{ btn.textContent='⚑ FLAG HP'; btn.disabled=false; }, 2000);
    return;
  }
  if(t.dataset.submitinit!==undefined){
    const roll = CS.initiativeRoll || document.getElementById('init-roll-input')?.value;
    if(!roll){ render(); return; }
    sendInitiativeRoll(roll);
    render(); return;
  }
  if(t.dataset.attackreact!==undefined){
    CS.reactionUsed = (t.dataset.attackreact === 'yes');
    if(!CS.reactionUsed) CS.reactionText = '';
    render(); return;
  }
  if(t.dataset.attackrespond!==undefined){
    const saveVal = CS.saveRoll || document.getElementById('save-roll-input')?.value || '';
    const reactText = CS.reactionText || document.getElementById('reaction-text-input')?.value || '';
    sendAttackResponse(CS.incomingAttackReqId, CS.reactionUsed, reactText, saveVal);
    render(); return;
  }
  if(t.dataset.hazardrespond!==undefined){
    const saveVal = CS.hazardSaveRoll || document.getElementById('hazard-save-input')?.value || '';
    sendHazardResponse(CS.incomingHazardReqId, saveVal);
    render(); return;
  }
  if(t.dataset.interactToggleabs!==undefined){
    INTERACT_ABS_OPEN = !INTERACT_ABS_OPEN;
    render(); return;
  }
  if(t.dataset.interactToggleattack!==undefined){
    CS.attackOpen = !CS.attackOpen;
    CS.attackTarget = null; CS.attackDmg = '';
    render(); return;
  }
  if(t.dataset.attackTarget!==undefined){
    CS.attackTarget = t.dataset.attackTarget;
    CS.attackDmg = '';
    render(); return;
  }
  if(t.dataset.attackConfirm!==undefined){
    const dmg = parseInt(CS.attackDmg);
    if(!CS.attackTarget){ render(); return; }
    if(!dmg || dmg<=0){ render(); return; }
    sendDamageRequest(CS.attackTarget, dmg);
    const btn=t; btn.textContent='✓ Sent!'; btn.disabled=true;
    CS.attackDmg=''; CS.attackTarget=null; CS.attackOpen=false;
    setTimeout(()=>render(), 1400);
    return;
  }

  if(t.id==='export-btn'){
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=(S.name||'creature')+'.json';a.click();
    render();return;
  }
  render();
}

function handleChange(e){
  if(e.target.dataset.nameinput!==undefined){
    S.name = e.target.value;
    // Don't re-render — cursor would jump. Name is read on next render.
    return;
  }
  render();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
document.addEventListener('click', handleClick);
document.addEventListener('change', handleChange);
if(ROOM_CODE) startInteractPolling();
else startLobbyPolling();
render();
</script>
</body>
</html>

  await fbWrite('/rooms/' + ROOM_CODE + '/initiativeSubmissions/' + PLAYER_ID, parseInt(roll)||0);
  CS.initiativeSubmitted = true;
}
async function sendAttackResponse(reqId, reaction, reactionText, saveRoll){
  if(!ROOM_CODE || !FIREBASE_URL) return;
  const resp = { reaction: reaction ? (reactionText||'Reaction used') : 'None' };
  if(saveRoll !== undefined && saveRoll !== '') resp.saveTotal = parseInt(saveRoll)||0;
  await fbWrite('/rooms/' + ROOM_CODE + '/attackResponses/' + reqId + '/' + PLAYER_ID, resp);
  CS.attackResponded = true;
}
async function sendHazardResponse(reqId, saveRoll){
  if(!ROOM_CODE || !FIREBASE_URL) return;
  await fbWrite('/rooms/' + ROOM_CODE + '/hazardResponses/' + reqId + '/' + PLAYER_ID, {
    saveTotal: parseInt(saveRoll)||0,
  });
  CS.hazardResponded = true;
}
async function sendDamageRequest(targetId, amount){
  if(!ROOM_CODE || !FIREBASE_URL || !targetId || !amount) return;
  const target = CS.targets[targetId];
  const reqId = 'dr_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  await fbWrite('/rooms/' + ROOM_CODE + '/damageRequests/' + reqId, {
    playerId: PLAYER_ID,
    playerName: S.name || 'Unnamed',
    targetId,
    targetType: target?.isPlayer ? 'player' : 'npc',
    targetName: target?.name || targetId,
    amount: parseInt(amount),
    ts: Date.now(),
    status: 'pending',
  });
}

// ── INTERACT: POLLING ──────────────────────────────────────────────────────────
async function pollInteract(){
  if(!ROOM_CODE || !FIREBASE_URL) return;
  const base = '/rooms/' + ROOM_CODE;
  const [sigStart, sigEnd, meta, combat, targets, sigInit, attackRequests, hazardRequests] = await Promise.all([
    fbRead(base + '/signals/trialStart'),
    fbRead(base + '/signals/trialEnd'),
    fbRead(base + '/meta'),
    fbRead(base + '/creatures/' + PLAYER_ID + '/combat'),
    fbRead(base + '/targets'),
    fbRead(base + '/signals/initiative'),
    fbRead(base + '/attackRequests'),
    fbRead(base + '/hazardRequests'),
  ]);
  if(meta){
    if(meta.currentTrial !== undefined) CS.currentTrial = meta.currentTrial;
    if(meta.trialLabel   !== undefined) CS.trialLabel   = meta.trialLabel;
    if(meta.round        !== undefined) CS.round        = meta.round;
    if(meta.planet       !== undefined) CS.planet       = meta.planet;
    CS.adaptationWindowOpen = !!(meta.adaptationWindowOpen);
  }
  if(combat){
    if(combat.hp              !== undefined) CS.hp              = combat.hp;
    if(combat.maxHp           !== undefined) CS.maxHp           = combat.maxHp;
    if(combat.heatStrainStacks!== undefined) CS.heatStrainStacks= combat.heatStrainStacks;
    if(combat.conditions      !== undefined) CS.conditions      = combat.conditions || [];
    if(combat.resourceTokens  !== undefined) CS.resourceTokens  = combat.resourceTokens;
    if(combat.epBalance       !== undefined) CS.epBalance       = combat.epBalance;
    if(combat.lineageTrait    !== undefined) CS.lineageTrait    = combat.lineageTrait;
  }
  // Targets roster (names + status tiers, HP never sent)
  if(targets) CS.targets = targets;
  // Initiative signal
  if(sigInit && sigStart && !sigEnd){
    if(!CS.initiativeOpen){
      CS.initiativeOpen = true;
      CS.initiativeSubmitted = false;
      CS.initiativeRoll = '';
    }
  } else {
    CS.initiativeOpen = false;
  }
  // Incoming hazard requests targeting this player
  if(hazardRequests){
    const myHazard = Object.entries(hazardRequests)
      .filter(([id,req])=>req.status==='pending' && Array.isArray(req.targets) && req.targets.includes(PLAYER_ID))
      .sort(([,a],[,b])=>b.ts-a.ts)[0];
    if(myHazard){
      const [reqId, req] = myHazard;
      if(CS.incomingHazardReqId !== reqId){
        CS.incomingHazard = req;
        CS.incomingHazardReqId = reqId;
        CS.hazardSaveRoll = '';
        CS.hazardResponded = false;
      }
    } else {
      if(CS.incomingHazard) CS.incomingHazard = null;
    }
  }
  if(attackRequests){
    const myAttack = Object.entries(attackRequests)
      .filter(([id,req])=>req.status==='pending' && Array.isArray(req.targets) && req.targets.includes(PLAYER_ID))
      .sort(([,a],[,b])=>b.expiresAt-a.expiresAt)[0]; // most recent
    if(myAttack){
      const [reqId, req] = myAttack;
      if(CS.incomingAttackReqId !== reqId){
        CS.incomingAttack = req;
        CS.incomingAttackReqId = reqId;
        CS.saveRoll = '';
        CS.reactionUsed = false;
        CS.reactionText = '';
        CS.attackResponded = false;
      }
    } else {
      // No pending attacks for us
      if(CS.incomingAttack) CS.incomingAttack = null;
    }
  }
  // Trial state machine
  const trialLive = sigStart && !sigEnd;
  if(trialLive && !INTERACT_ACTIVE){
    INTERACT_ACTIVE = true;
    ADAPT_OVERLAY   = false;
  }
  if(!trialLive && INTERACT_ACTIVE){
    INTERACT_ACTIVE = false;
    if(CS.adaptationWindowOpen) ADAPT_OVERLAY = true;
  }
  render();
}
function startInteractPolling(){
  stopInteractPolling();
  pollInteract();
  INTERACT_POLL = setInterval(pollInteract, 5000);
}
function stopInteractPolling(){
  if(INTERACT_POLL){ clearInterval(INTERACT_POLL); INTERACT_POLL = null; }
}

// ── LOBBY POLLER — checks /global/lobbyCode before session starts ──────────────
async function pollLobby(){
  if(ROOM_CODE) { stopLobbyPolling(); return; } // already in session
  if(!FIREBASE_URL) return;
  try {
    const data = await fbRead('/global/lobbyCode');
    if(data && data.code && data.code !== ROOM_ENTRY_CODE){
      ROOM_ENTRY_CODE = data.code;
      // Re-render summary/splash to show the incoming code
      if(!INTRO && !SPLASH) render();
    }
  } catch(e){}
}
function startLobbyPolling(){
  if(LOBBY_POLL) return;
  pollLobby();
  LOBBY_POLL = setInterval(pollLobby, 5000);
}
function stopLobbyPolling(){
  if(LOBBY_POLL){ clearInterval(LOBBY_POLL); LOBBY_POLL = null; }
}

// ── MATH ──────────────────────────────────────────────────────────────────────
function statMod(v){return Math.floor((v-10)/2)}
function fmtMod(v){return(v>=0?"+":"")+v}
function hdTotalCost(hd){
  let t=0;
  for(const [d,c] of Object.entries(HD_COSTS))
    if(HD_LIST.indexOf(d)<=HD_LIST.indexOf(hd)&&d!=="1d4") t+=c;
  return t;
}
// dieTotalCost: cantrip die cost (always melee/action baseline)
function dieTotalCost(die){ return DIE_COSTS_MA[die]||0; }
// Full ability EP cost for one encounter ability object
function calcAbilityEP(ab){
  return calcAbilityEP2(ab);
}
// Quick stack cost: 5,5,10,10,15,15 per pair of stacks; max 6 stacks
function quickStackCost(n){ const tier=Math.ceil(n/2); return tier===1?5:tier===2?10:15; }
// Second die costs double the primary die table
// (extraDice cost: 5 EP unlock + dieCost(d)*2 per die, computed inline)
function quickTotalCost(n){ let t=0; for(let i=1;i<=n;i++) t+=quickStackCost(i); return t; }
const QUICK_MAX=6;
function nodeCostDisc(id){
  const n=NODES[id];if(!n)return 0;
  let c=n.cost;
  if(n.nodeType==='bio'&&(n.tier===1||n.tier===2)&&(TYPE_DISC[S.typeId]||[]).includes(n.archetype))
    c=Math.max(0,c-5);
  return c;
}
function calcEP(){
  let ep=0;
  const sz=SIZES.find(x=>x.id===S.sizeId);if(sz)ep+=sz.cost;
  ep+=hdTotalCost(S.hdChoice||"1d4");
  // Land speed quick stacks
  ep+=quickTotalCost(S.landQuick||0);
  // Alt movement types
  for(const [id,mv] of Object.entries(S.altMoves||{})){
    const def=ALT_MOVES.find(x=>x.id===id);
    if(mv.owned&&def){ ep+=def.baseCost; ep+=quickTotalCost(mv.quick||0); }
  }
  // Blink Step
  if(S.blinkstep?.purchased){ep+=BLINK_STEP.cost;const _bsac={action:0,bonus:5,reaction:5};ep+=_bsac[S.blinkstep.actionType||'action']||0;const _bsdc=[0,5,15,35,65];ep+=_bsdc[Math.min(S.blinkstep.distance||0,4)];}
  const epB=S.statEPBonuses||{},tots=Object.values(epB).reduce((t,v)=>t+(v||0),0);
  for(let i=0;i<tots;i++)ep+=i===0?5:i===1?10:20;
  // Cantrip upgrades (v2)
  ep+=calcCantripEP2();
  // Encounter abilities: slot cost by index + upgrade EP
  const abs=S.abilities||[];
  const arch=S.archetypes?.primary;
  abs.forEach((ab,i)=>{
    if(i===0) return; // kit slot is free
    const sc=(ab.fromArchCat?SLOT_COSTS_ARCH:SLOT_COSTS_OTHER)[Math.min(i-1,2)]||40;
    ep+=sc;
  });
  for(const ab of abs) ep+=calcAbilityEP2(ab);
  for(const id of S.archetypes?.unlockedNodes||[])ep+=nodeCostDisc(id);
  for(const id of S.techTree?.unlockedNodes||[]){const n=NODES[id];if(n)ep+=n.cost}
  for(const id of S.apexBiology?.unlockedNodes||[]){const n=NODES[id];if(n)ep+=n.cost}
  return ep;
}
function lvlBonus(){return((S.creatureLevel||1)-1)*10}
function budget(){return EP_MAX+lvlBonus()}
function remaining(){return budget()-calcEP()}

function getFinalStats(){
  const out={},epB=S.statEPBonuses||{},assign=S.statAssign||{};
  const sz=SIZES.find(x=>x.id===S.sizeId);
  for(const k of STAT_KEYS){
    let v=(assign[k]||8)+(epB[k]||0);
    if(sz?.bon?.[k]) v+=sz.bon[k];
    // Medium choose2: medBonus is [stat0, stat1] — each adds +1 independently
    if(sz?.choose2){
      const med=S.medBonus||[];
      med.forEach(s=>{ if(s===k) v+=1; });
    }
    out[k]=v;
  }
  return out;
}
function getSpeed(){
  const sz=SIZES.find(x=>x.id===S.sizeId);
  return(sz?.speed||20)+(S.landQuick||0)*5;
}
function calcAC(){
  const fs=getFinalStats(),dex=statMod(fs.DEX||10);
  if((S.archetypes?.unlockedNodes||[]).includes('def_1'))return 13+dex+statMod(fs.CON||10);
  return 10+dex;
}
function getMaxHP(){
  const fs=getFinalStats(),conMod=statMod(fs.CON||10);
  const hd=S.hdChoice||"1d4",szhd=SIZES.find(x=>x.id===S.sizeId)?.hd||"1d4";
  const idx=Math.max(HD_LIST.indexOf(hd),HD_LIST.indexOf(szhd));
  const hdN=parseInt(HD_LIST[idx].split('d')[1]||4);
  const hdCount=4+(S.creatureLevel||1);
  return Math.floor(hdN/2+1)*hdCount+conMod*hdCount;
}

// ── PURCHASE ──────────────────────────────────────────────────────────────────
function allOwned(){
  return[...(S.archetypes?.unlockedNodes||[]),...(S.techTree?.unlockedNodes||[]),...(S.apexBiology?.unlockedNodes||[])];
}
function canBuy(id){
  const n=NODES[id];if(!n)return{ok:false,why:"Not found"};
  if(allOwned().includes(id))return{ok:false,why:"Owned"};
  if(n.prerequisite&&!allOwned().includes(n.prerequisite))return{ok:false,why:"Requires prerequisite"};
  if(n.nodeType==='apex'&&(S.techTree?.unlockedNodes||[]).length>0)return{ok:false,why:"Apex Biology closed"};
  const ep=S.currentEpoch||1;
  if(n.tier===3&&ep<2)return{ok:false,why:"Unlocks Epoch 2"};
  if((n.tier>=4||(n.nodeType==='apex'&&!n.id.includes('_t')))&&ep<3)return{ok:false,why:"Unlocks Epoch 3"};
  if(n.nodeType==='bio'){
    const{primary,secondary}=S.archetypes||{};
    if(n.archetype!==primary&&n.archetype!==secondary)return{ok:false,why:"Select archetype first"};
  }
  if(n.planetExclusive&&n.planet!==S.planet)return{ok:false,why:PLANETS[n.planet]?.name+" only"};
  if(remaining()<nodeCostDisc(id))return{ok:false,why:"Need "+nodeCostDisc(id)+" EP"};
  return{ok:true};
}
function buyNode(id){
  const chk=canBuy(id);if(!chk.ok)return;
  const n=NODES[id];
  if(n.nodeType==='bio')S.archetypes={...S.archetypes,unlockedNodes:[...S.archetypes.unlockedNodes,id]};
  else if(n.nodeType==='apex')S.apexBiology={...S.apexBiology,unlockedNodes:[...S.apexBiology.unlockedNodes,id]};
  else{S.techTree={...S.techTree,unlockedNodes:[...S.techTree.unlockedNodes,id]};S.apexBiology={...S.apexBiology,eligible:false}}
  render();
}
function sellNode(id){
  if(allOwned().some(x=>NODES[x]?.prerequisite===id))return;
  const n=NODES[id];
  if(n.nodeType==='bio')S.archetypes={...S.archetypes,unlockedNodes:S.archetypes.unlockedNodes.filter(x=>x!==id)};
  else if(n.nodeType==='apex')S.apexBiology={...S.apexBiology,unlockedNodes:S.apexBiology.unlockedNodes.filter(x=>x!==id)};
  else{S.techTree={...S.techTree,unlockedNodes:S.techTree.unlockedNodes.filter(x=>x!==id)};
    if(!S.techTree.unlockedNodes.length)S.apexBiology={...S.apexBiology,eligible:true}}
  render();
}

// ── SUGGESTIONS ───────────────────────────────────────────────────────────────
function suggestArch(){
  // Maps lineage → archetype suggestion (discounts deferred to TODO)
  const LINEAGE_ARCH={
    strider:   {p:'apexStriker', s:'predator'},
    ape:       {p:'defender',    s:'apexStriker'},
    hound:     {p:'predator',    s:'apexStriker'},
    cephalid:  {p:'sensor',      s:'adaptor'},
    serpent:   {p:'adaptor',     s:'predator'},
    shellback: {p:'defender',    s:'regenerator'},
    bracer:    {p:'defender',    s:'sensor'},
    arachnid:  {p:'sensor',      s:'adaptor'},
    glider:    {p:'apexStriker', s:'sensor'},
  };
  const entry=LINEAGE_ARCH[S.lineage]||{p:'predator',s:'defender'};
  return{primary:entry.p,secondary:entry.s};
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function e(s){return String(s||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function getArchChain(archKey){
  const arch=BIO_DATA.archetypes[archKey];if(!arch)return[];
  const chain=arch.nodes.universal.map(n=>n.id);
  if(S.planet){(arch.nodes.planetExclusive[S.planet]||[]).forEach(n=>chain.push(n.id))}
  return chain;
}
function isStepDone(i){
  if(i===0)return !!(S.lineage&&S.typeOverlay&&S.sizeId&&S.hdChoice&&S.hdChoice!=='1d4');
  if(i===1)return!!S.bodyMotionStep&&S.bodyMotionStep>=5;
  if(i===2)return STAT_KEYS.every(k=>S.statAssign[k]);
  if(i===3)return!!(S.archetypes?.primary)&&(S.archetypes?.unlockedNodes||[]).length>0;
  if(i===4)return !!(S.cantrip?.templateId&&S.cantrip?.stat&&(S.cantrip?.delivery||AB_TEMPLATES[S.cantrip?.templateId]?.fixedDelivery));
  if(i===5)return false;
  return false;
}
function primaryStat(fs){return STAT_KEYS.reduce((b,k)=>fs[k]>fs[b]?k:b,"STR")}

// ── HTML HELPERS ──────────────────────────────────────────────────────────────
function chainHTML(archKey){
  const chain=getArchChain(archKey),owned=S.archetypes?.unlockedNodes||[];
  return '<div class="chain">'+chain.map((id,i)=>{
    const isO=owned.includes(id),n=NODES[id],isX=n?.planetExclusive;
    const cls=isO?'owned':isX?'excl':'';
    const line=i>0?`<div class="chain-line${isO||owned.includes(chain[i-1])?' done':''}"></div>`:'';
    return line+`<div class="chain-dot ${cls}" title="${e(n?.name||'')}">${i+1}</div>`;
  }).join('')+'</div>';
}
function mechHTML(m){
  const tag=m.type==='active'?'▶ Active':m.type==='zone'?'⬡ Zone':'◆ Passive';
  const cls=`mt-${m.type}`;
  const nm=m.name?`<span class="mname">${e(m.name)}: </span>`:'';
  const uses=m.uses?`<span style="color:var(--ac2);font-family:'Orbitron',monospace;font-size:.5rem">[${e(m.uses)}] </span>`:'';
  return `<div class="mrow"><span class="mtag ${cls}">${tag}</span><div class="mtxt">${nm}${uses}${e(m.text)}</div></div>`;
}
function nodeCardHTML(id,showLocked=true){
  const n=NODES[id];if(!n)return'';
  const owned=allOwned().includes(id);
  const chk=canBuy(id),avail=!owned&&chk.ok,locked=!owned&&!avail;
  if(locked&&!showLocked)return'';
  const c=nodeCostDisc(id),orig=n.cost,hasDisc=c<orig;
  const epochLbl=n.tier<=2?'E1':n.tier===3?'E2':'E3';
  const planLbl=n.planetExclusive?` · ${PLANETS[n.planet]?.icon||''} Excl`:'';
  const cardCls=owned?'owned':avail?'avail':locked?'locked':'';
  const hdrBg=owned?'rgba(255,170,0,.08)':avail?'rgba(204,51,0,.1)':'var(--sur2)';
  const nameCol=owned?'var(--gr)':avail?'var(--ac)':'var(--dm)';
  const epCol=owned?'var(--gr)':avail?'var(--gd)':'var(--dm)';
  const discH=hasDisc?`<span style="text-decoration:line-through;opacity:.5;margin-right:3px">${orig}</span>`:'';
  const btnH=avail?`<button class="btn" style="background:var(--ac);color:#000;padding:2px 8px;font-size:.5rem;margin-top:3px" data-buy="${id}">Buy</button>`
    :owned?`<button class="btn-d" style="font-size:.5rem;margin-top:3px" data-sell="${id}">Sell</button>`
    :locked?`<div style="font-size:.5rem;color:var(--dm);font-family:'Orbitron',monospace;margin-top:2px">${e(chk.why)}</div>`:'';
  const bodyH=(owned||avail)?`<div class="node-body">
    <div class="node-flavor">${e(n.flavorText||'')}</div>
    ${(n.mechanics||[]).map(mechHTML).join('')}
  </div>`:(locked&&showLocked)?`<div class="node-body"><div class="node-flavor">${e(n.flavorText||'')}</div></div>`:'';
  return `<div class="node-card ${cardCls}">
    <div class="node-hdr" style="background:${hdrBg}">
      <div>
        <div class="node-name" style="color:${nameCol}">${owned?'✓ ':''}${e(n.name)}</div>
        <div class="node-epoch">${epochLbl}${planLbl}</div>
      </div>
      <div style="text-align:right">
        <div class="node-ep" style="color:${epCol}">${discH}${c} EP</div>
        ${btnH}
      </div>
    </div>${bodyH}
  </div>`;
}

          [[.5,.5],[.7,.7],[.8,.84]],

          const pathD=pts.map((p,pi)=>`${pi===0?'M':'L'}${(p[0]*S).toFixed(1)},${(p[1]*S).toFixed(1)}`).join(' ');

        ${[[.28,.35],[.65,.28],[.7,.65],[.32,.68],[.5,.18]].map(([cx2,cy2],i)=>
          `<circle cx="${(cx2*S).toFixed(1)}" cy="${(cy2*S).toFixed(1)}" r="${(S*(.022+i*.004)).toFixed(1)}"

      <circle cx="${S/2}" cy="${S/2}" r="${S*.46}" fill="none" stroke="#aa6622" stroke-width="${(S*.01).toFixed(1)}" opacity=".45"/>

  return '';

// ── SPLASH ────────────────────────────────────────────────────────────────────
function renderSplash(){
  const keys=Object.keys(PLANETS),pk=keys[SPLASH_IDX],pl=PLANETS[pk];
  const ac=pl.palette.ac;
  const canP=SPLASH_IDX>0,canN=SPLASH_IDX<keys.length-1;
  let trialHTML='';
  if(pl.trials.length){
    trialHTML=`<div style="font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.15em;color:var(--dm);text-transform:uppercase;margin-bottom:8px">Trials</div>`;
    for(let i=0;i<pl.trials.length;i++){
      const t=pl.trials[i],isOpen=SPLASH_TRIAL===i;
      trialHTML+=`<div style="margin-bottom:8px;border-radius:8px;border:1px solid ${isOpen?ac+'66':' var(--bdr)'};overflow:hidden">
        <div data-trial="${i}" style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;background:var(--sur2)">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-family:'Orbitron',monospace;font-size:.56rem;font-weight:700;color:${ac}">${t.points}</span>
            <span style="font-size:.82rem;font-weight:600">${e(t.label)}</span>
          </div>
          <span style="color:var(--dm);font-size:.8rem">${isOpen?'▲':'▼'}</span>
        </div>
        ${isOpen?`<div style="padding:10px 12px;border-top:1px solid ${ac}33;background:var(--sur)">
          <div style="font-size:.7rem;color:var(--dm);line-height:1.6;margin-bottom:8px">${e(t.challenge)}</div>
          ${t.refresh?`<div style="display:flex;gap:6px;margin-bottom:6px;align-items:flex-start">
            <span style="font-size:.68rem;flex-shrink:0">${t.refresh.includes('NO')?'⚠':'✓'}</span>
            <span style="font-size:.66rem;color:${t.refresh.includes('NO')?'var(--rd)':'var(--dm)'}">${e(t.refresh)}</span>
          </div>`:''}
          ${t.tips?.length?`<div style="font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.12em;color:var(--dm);text-transform:uppercase;margin-bottom:5px">Build Tips</div>
          ${t.tips.map(tip=>`<div style="display:flex;gap:6px;margin-bottom:3px"><span style="color:${ac};font-size:.62rem;flex-shrink:0">›</span><span style="font-size:.66rem;color:var(--dm)">${e(tip)}</span></div>`).join('')}`:''}
        </div>`:''}
      </div>`;
    }
  }
  let warnHTML='';
  if(pl.warnings.length){
    warnHTML=`<div style="font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.15em;color:var(--dm);text-transform:uppercase;margin:12px 0 8px">Warnings</div>
    ${pl.warnings.map(w=>`<div style="display:flex;gap:6px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--bdr)">
      <span style="color:${ac};flex-shrink:0">⚠</span><span style="font-size:.7rem;color:var(--dm)">${e(w)}</span>
    </div>`).join('')}`;
  }
  return `
  <div style="min-height:100vh;background:var(--bg);display:flex;flex-direction:column">
    <div style="padding:28px 20px 14px;text-align:center;background:linear-gradient(180deg,${ac}18 0%,transparent 100%)">
      <div style="display:flex;align-items:center;justify-content:center;gap:14px">
        <button data-splashprev="1" ${!canP?'disabled':''} style="background:none;border:1px solid var(--bdr);border-radius:50%;width:36px;height:36px;color:var(--dm);font-size:1.1rem;cursor:pointer">‹</button>
        <div style="font-family:'Orbitron',monospace;font-size:clamp(2rem,9vw,3rem);font-weight:900;color:${ac};letter-spacing:.04em">${pl.name.toUpperCase()}</div>
        <button data-splashnext="1" ${!canN?'disabled':''} style="background:none;border:1px solid var(--bdr);border-radius:50%;width:36px;height:36px;color:var(--dm);font-size:1.1rem;cursor:pointer">›</button>
      </div>
      <div style="font-family:'Orbitron',monospace;font-size:.62rem;color:var(--dm);letter-spacing:.15em;margin-top:4px">${e(pl.tagline)}</div>
      <div style="display:flex;gap:6px;justify-content:center;margin-top:10px">
        ${keys.map((_,i)=>`<div style="width:6px;height:6px;border-radius:50%;background:${i===SPLASH_IDX?ac:'var(--bdr)'}"></div>`).join('')}
      </div>
    </div>
    <div style="padding:0 20px;max-width:600px;margin:0 auto;width:100%;flex:1">
      <!-- Planet portrait -->
      <div style="display:flex;justify-content:center;margin:16px 0 20px">
        <div style="position:relative;filter:drop-shadow(0 0 18px ${ac}55)">
          ${planetSVG(pk, 160, true)}
        </div>
      </div>
      <div style="font-size:.78rem;color:var(--dm);line-height:1.7;margin:0 0 10px">${e(pl.lore)}</div>
      ${trialHTML}${warnHTML}
    </div>
    <div style="padding:20px 20px 36px;max-width:600px;margin:0 auto;width:100%">
      ${pl.locked
        ?`<div style="width:100%;padding:14px;background:var(--sur);color:var(--dm);border-radius:8px;font-family:'Orbitron',monospace;font-size:.6rem;text-align:center;letter-spacing:.1em">— World Locked —</div>`
        :PLAYER_CODE_MODE
          ?`<!-- Personal code restore flow -->
            <div style="display:flex;flex-direction:column;gap:10px">
            <button data-hideplayercode="1" style="background:none;border:none;color:var(--dm);font-size:.62rem;cursor:pointer;text-align:left;padding:0">← Back</button>
            <div style="font-family:'Orbitron',monospace;font-size:.48rem;color:${ac};letter-spacing:.18em;text-align:center">RESTORE YOUR BUILD</div>
            <div style="font-size:.64rem;color:var(--dm);text-align:center;line-height:1.55">Enter your 4-character personal code.</div>
            <input id="player-code-input" type="text" maxlength="4"
              placeholder="e.g. F7K2"
              value="${PLAYER_CODE_ENTRY}"
              oninput="PLAYER_CODE_ENTRY=this.value.toUpperCase().trim();this.value=PLAYER_CODE_ENTRY"
              onkeydown="if(event.key==='Enter')document.querySelector('[data-loadplayercode]')?.click()"
              style="padding:14px;font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;letter-spacing:.3em;text-align:center;background:var(--sur2);border:2px solid rgba(255,107,53,.4);border-radius:10px;color:var(--tx);outline:none;width:100%;box-sizing:border-box"/>
            <button data-loadplayercode="1"
              style="padding:12px;font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;letter-spacing:.16em;background:${ac};color:#000;border:none;border-radius:10px;cursor:pointer;width:100%">
              LOAD BUILD →
            </button>
            <div id="code-load-msg" style="text-align:center;font-size:.64rem;color:var(--dm);min-height:18px"></div>
            </div>`
          :`<div style="display:flex;flex-direction:column;gap:10px">
            <!-- Primary CTA: Begin Evolving -->
            <button data-beginevol="${pk}"
              style="width:100%;padding:16px;background:${ac};color:#000;border:none;border-radius:10px;font-family:'Orbitron',monospace;font-size:.85rem;font-weight:900;letter-spacing:.1em;cursor:pointer;box-shadow:0 0 18px ${ac}55">
              BEGIN EVOLVING →
            </button>
            <!-- Compact room code row -->
            <div style="display:flex;gap:6px;align-items:center;margin-top:2px">
              <input id="room-code-input" type="text" maxlength="12"
                placeholder="${ROOM_ENTRY_CODE?ROOM_ENTRY_CODE:'Room code'}"
                value="${ROOM_ENTRY_CODE}"
                oninput="ROOM_ENTRY_CODE=this.value.toUpperCase().trim();this.value=ROOM_ENTRY_CODE"
                onkeydown="if(event.key==='Enter')document.querySelector('[data-joinroom]')?.click()"
                style="flex:1;padding:7px 10px;font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;letter-spacing:.12em;text-align:center;background:var(--sur2);border:1px solid ${ROOM_ENTRY_CODE?ac+'66':'var(--bdr)'};border-radius:7px;color:var(--tx);outline:none;min-width:0;box-sizing:border-box"/>
              <button data-joinroom="1"
                style="padding:7px 12px;font-family:'Orbitron',monospace;font-size:.55rem;font-weight:700;letter-spacing:.1em;background:${ROOM_ENTRY_CODE?ac:'var(--sur2)'};color:${ROOM_ENTRY_CODE?'#000':'var(--dm)'};border:1px solid ${ROOM_ENTRY_CODE?ac:'var(--bdr)'};border-radius:7px;cursor:pointer;white-space:nowrap;transition:all .15s">
                JOIN SESSION →
              </button>
            </div>
            ${ROOM_ENTRY_CODE?`<div style="font-size:.56rem;color:${ac};text-align:center;letter-spacing:.08em">⬆ GM pushed a session code — ready to join</div>`:''}
            <!-- Restore build link -->
            <button data-showplayercode="1"
              style="background:none;border:none;color:var(--dm);font-family:'Orbitron',monospace;font-size:.48rem;letter-spacing:.1em;cursor:pointer;text-align:center;padding:2px 0;text-decoration:underline;text-underline-offset:3px">
              RESTORE BUILD WITH CODE
            </button>
          </div>`
      }
    </div>
  </div>`;
}

      <rect x="6" y="6" width="40" height="40" rx="7" stroke="${c}" stroke-width="2.5" fill="${c}18"/>
      <text x="26" y="33" text-anchor="middle" font-family="'Orbitron',monospace" font-weight="900" font-size="14" fill="${c}">6</text>
    </svg>`,
    '1d8': `<svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="26,3 49,20 49,32 26,49 3,32 3,20" stroke="${c}" stroke-width="2.5" fill="${c}18" stroke-linejoin="round"/>
      <text x="26" y="33" text-anchor="middle" font-family="'Orbitron',monospace" font-weight="900" font-size="14" fill="${c}">8</text>

// Returns an <img> tag if planet+lineage has assets, otherwise null
function getCreatureImg(planet, lineageId, tier, style=''){
  const p = (planet||'pyrotheon').toLowerCase();
  const t = tier||'feral';
  const src = CREATURE_IMAGES[p]?.[lineageId]?.[t];
  if(!src) return null;
  return `<img src="${src}" alt="${lineageId} ${t}" style="max-width:100%;max-height:100%;object-fit:contain;${style}" onerror="this.style.display='none'">`;
}

// Utility: convert hex color to "r,g,b" for rgba() usage
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

// ── FLAVOR GENERATOR ─────────────────────────────────────────────
function generateBMFlavor(S){
  const sz=SIZES.find(x=>x.id===S.sizeId);
  const hd=S.hdChoice||'1d4';
  const am=S.altMoves||{};
  const lq=S.landQuick||0;
  const spd=getSpeed();
  const baseSpd=sz?.speed||20; // size's native land speed
  const ownedAlt=ALT_MOVES.filter(m=>am[m.id]?.owned);
  const hasBlink=S.blinkstep?.purchased;

  // Size sentence — remove "fast" framing for tiny/small since they aren't inherently fast
  const szPhrases={
    small:'A lean frame — quick and precise, trading mass for deflection and mobility.',
    medium:'A balanced frame — adaptable architecture, no single trait dominant, no obvious weakness.',
    large:'A massive frame — mass is the primary tool. Everything this creature does, it does through presence.',
  };
  const s1=szPhrases[S.sizeId]||'';

  // Hit die sentence
  const hdPhrases={
    '1d4':'Structurally fragile — this creature survives through evasion, not absorption.',
    '1d6':'Lightly built — takes damage but not designed to.',
    '1d8':'Moderate durability — built to weather a fight, not necessarily win one on attrition.',
    '1d10':'Durable — designed to take punishment and remain functional.',
    '1d12':'Heavily built — damage is an expected part of operating in this body.',
    '2d8':'Exceptionally resilient — this creature is designed to absorb significant punishment and continue.',
  };
  const s2=hdPhrases[hd]||'';

  // Movement sentence — speed described relative to size baseline
  const spdDelta=spd-baseSpd; // how much above size base
  let spdDesc;
  if(spdDelta<=0)        spdDesc=`${spd}ft land speed — baseline for its size`;
  else if(spdDelta<=5)   spdDesc=`${spd}ft land speed — slightly above baseline`;
  else if(spdDelta<=10)  spdDesc=`${spd}ft land speed — meaningfully faster than baseline`;
  else if(spdDelta<=15)  spdDesc=`${spd}ft land speed — notably fast for its frame`;
  else                   spdDesc=`${spd}ft land speed — exceptionally fast, well beyond baseline`;

  const movParts=[spdDesc];
  ownedAlt.forEach(m=>{
    const labels={
      aquatic:'aquatic movement (breathes underwater)',
      burrower:'burrowing capability (bypasses terrain)',
      climb:'climb speed (full speed on walls and ceilings)',
      flight:'true flight (ignores ground terrain entirely)',
    };
    movParts.push(labels[m.id]||m.label);
  });
  if(hasBlink){
    const at=S.blinkstep.actionType||'action';
    const dist=30+(S.blinkstep.distance||0)*10;
    const atLabel={action:'action',bonus:'bonus action',reaction:'reaction'}[at]||at;
    movParts.push(`Blink Step — ${dist}ft teleport as ${atLabel}`);
  }
  const s3=movParts.length===1
    ?`Movement: ${movParts[0]}.`
    :`Movement: ${movParts[0]}. Additional: ${movParts.slice(1).join(', ')}.`;

  return [s1,s2,s3].filter(Boolean).join(' ');
}

  }
  if(bms===3){
    const lq=S.landQuick||0;
    const am=S.altMoves||{aquatic:{owned:false,quick:0},burrower:{owned:false,quick:0},climb:{owned:false,quick:0},flight:{owned:false,quick:0}};
    function quickRow2(label, n, upKey, downKey, baseFt, col){

// ── STEP 2: STATS ─────────────────────────────────────────────────────────────
function renderStep2(){
  const ARRAY=[16,15,14,12,10,8];
  const assign=S.statAssign||{},pending=S.statPending,epB=S.statEPBonuses||{};
  const used=Object.values(assign);
  const avail=[...new Set(ARRAY.filter(v=>used.filter(u=>u===v).length<ARRAY.filter(a=>a===v).length))];
  const allAssigned=ARRAY.every(v=>used.includes(v));
  const globalBonusTotal=Object.values(epB).reduce((t,v)=>t+(v||0),0);
  function globalNextCost(){ return globalBonusTotal===0?5:globalBonusTotal===1?10:20; }
  let html=`<div class="panel"><div class="ph"><h2>Ability Scores</h2></div><div class="pb">
    <div class="sec" style="margin-top:0">Standard Array — tap a value, then tap a stat</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">`;
  for(const v of ARRAY){
    const isUsed=used.includes(v),isSel=pending===v;
    html+=`<div data-statval="${v}" style="font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;padding:8px 12px;border-radius:6px;cursor:${isUsed?'default':'pointer'};border:1px solid ${isSel?'var(--ac)':isUsed?'var(--bdr)':'var(--bdr)'};background:${isSel?'rgba(255,107,53,.1)':isUsed?'rgba(255,255,255,.03)':'var(--sur2)'};color:${isUsed?'var(--dm)':isSel?'var(--ac)':'var(--tx)'};opacity:${isUsed?.45:1}">${v}</div>`;
  }
  html+=`</div><div class="stats-g">`;
  for(const k of STAT_KEYS){
    const base=assign[k],epb=epB[k]||0,final=base?base+epb:null;
    const isTarget=pending!==null&&!base;
    const nextCost=globalNextCost();
    const atGlobalMax=globalBonusTotal>=3;
    html+=`<div class="sbox${isTarget?' sel':''}" data-statkey="${k}" style="${isTarget?'border-color:var(--ac);':''}">
      <div class="sn">${k}</div>
      ${final!==null
        ?`<div class="sv" style="color:var(--ac)">${final}</div>
           <div class="sm">${fmtMod(statMod(final))}</div>
           <div style="display:flex;align-items:center;justify-content:center;gap:3px;margin-top:5px">
             <button data-statdown="${k}" ${epb===0?'disabled':''} class="sub-btn" style="padding:0 7px;font-size:.85rem;line-height:1.6" >−</button>
             <span style="font-family:'Orbitron',monospace;font-size:.52rem;color:${epb>0?'var(--ac3)':'var(--dm)'};min-width:20px;text-align:center">${epb>0?'+'+epb+' ↑':'EP'}</span>
             <button data-statup="${k}" ${atGlobalMax?'disabled':''} class="sub-btn sa" style="padding:0 5px;font-size:.48rem;line-height:1.6" >+${nextCost}</button>
           </div>
           <button class="btn-d" style="font-size:.46rem;padding:1px 4px;margin-top:4px;width:100%;letter-spacing:.04em" data-statclear="${k}">× clear</button>`
        :`<div style="font-family:'Orbitron',monospace;font-size:1.4rem;color:var(--dm)">—</div>`
      }
    </div>`;
  }
  html+=`</div>`;
  if(pending!==null)html+=`<div style="margin-top:8px;font-size:.72rem;color:var(--ac);text-align:center">Tap a stat to assign <strong>${pending}</strong></div>`;
  if(allAssigned&&pending===null)
    html+=`<button class="btn btn-p" style="width:100%;padding:11px;font-size:.7rem;margin-top:12px" data-goto="3">Evolution →</button>`;
  html+=`</div></div>`;
  return html;
}

// Die ladder cost lookup for v2 abilities
const AB2_DIE_COSTS_MELEE  = {'1d4':0,'1d6':5,'1d8':10,'1d10':15,'1d12':20};
const AB2_DIE_COSTS_RANGED = {'1d4':0,'1d6':10,'1d8':15,'1d10':20,'1d12':25};
const AB2_DIE_COSTS_BA_MELEE  = {'1d4':0,'1d6':10,'1d8':20,'1d10':30,'1d12':40};
const AB2_DIE_COSTS_BA_RANGED = {'1d4':0,'1d6':15,'1d8':25,'1d10':35,'1d12':45};
function ab2DieCost(die,actionType,delivery){
  const isBA=actionType==='bonus';
  const isRanged=(delivery==='ranged'||delivery==='aoe');
  const tbl=isBA?(isRanged?AB2_DIE_COSTS_BA_RANGED:AB2_DIE_COSTS_BA_MELEE):(isRanged?AB2_DIE_COSTS_RANGED:AB2_DIE_COSTS_MELEE);
  return tbl[die]||0;
}
function ab2UpgradeCost(upgId,upgrades,actionType,delivery){
  if(upgId==='uses'){const u=upgrades.uses||0;return[0,10,25,45,70][Math.min(u+1,4)]-[0,10,25,45,70][Math.min(u,4)];}
  const die=upgrades.die||'1d4';
  if(upgId==='die'){const ladder=['1d4','1d6','1d8','1d10','1d12'];const ci=ladder.indexOf(die);if(ci>=ladder.length-1)return 0;return ab2DieCost(ladder[ci+1],actionType,delivery)-ab2DieCost(ladder[ci],actionType,delivery);}
  return 0; // flat upgrades — cost is stored on the upgrade entry itself
}
function calcAbilityEP2(ab){
  if(!ab||!ab.templateId) return 0;
  const tmpl=AB_TEMPLATES[ab.templateId]; if(!tmpl) return 0;
  const upgs=ab.upgrades||{};
  const actionType=ab.actionType||tmpl.baseAction;
  const delivery=upgs.range_aoe?'aoe':upgs.range_ranged?'ranged':(ab.delivery||'melee');
  let ep=0;
  // Die cost
  const die=upgs.die||'1d4';
  ep+=ab2DieCost(die,actionType,delivery);
  // Range cost
  if(upgs.range_aoe) ep+=10+5; // ranged+aoe
  else if(upgs.range_ranged) ep+=5;
  // Flat upgrade costs (non-die, non-range, non-uses)
  for(const uid of Object.keys(upgs)){
    if(uid==='die'||uid==='range_ranged'||uid==='range_aoe'||uid==='uses') continue;
    if(!upgs[uid]) continue;
    const upgDef=(AB_UPGRADES[ab.templateId]||[]).find(u=>u.id===uid);
    if(upgDef&&typeof upgDef.cost==='number') ep+=upgDef.cost;
  }
  // Uses buy-down
  ep+=[0,10,25,45,70][Math.min(upgs.uses||0,4)];
  return ep;
}

// Cantrip EP calculation for v2
function calcCantripEP2(){
  const upgs=S.cantrip.upgrades||{};
  const delivery=upgs.range_aoe?'aoe':upgs.range_ranged?'ranged':'melee';
  let ep=0;
  const die=upgs.die||'1d4';
  ep+=ab2DieCost(die,'action',delivery);
  if(upgs.range_aoe) ep+=10+5;
  else if(upgs.range_ranged) ep+=5;
  return ep;
}

// Get archetype catalog set for current primary archetype
function archCatalogTemplates(){
  const arch=S.archetypes?.primary;
  const kitEntry=arch?ARCH_KITS[arch]:null;
  if(!kitEntry) return Object.keys(AB_TEMPLATES);
  // Archetype catalog = same category as kit encounter ability + defense + intervention
  const kitTmpl=AB_TEMPLATES[kitEntry.encounter.templateId];
  const archCats=new Set([kitTmpl?.cat,'defense','intervention']);
  return Object.keys(AB_TEMPLATES).filter(k=>{
    const t=AB_TEMPLATES[k]; return archCats.has(t.cat);
  });
}

// Initialize S.cantrip and S.abilities from archetype kit if not yet set
function initAbilityKit(){
  const arch=S.archetypes?.primary;
  if(!arch||!ARCH_KITS[arch]) return;
  const kit=ARCH_KITS[arch];
  // Set cantrip if not yet initialized with a template
  if(!S.cantrip.templateId){
    S.cantrip={...S.cantrip, templateId:kit.cantrip.templateId, stat:kit.cantrip.stat,
      dmgType:kit.cantrip.dmgType, delivery:kit.cantrip.delivery, upgrades:{}};
  }
  // Set first encounter ability if list is empty
  if((S.abilities||[]).length===0){
    const abId='ab_kit_'+arch;
    S.abilities=[{id:abId, templateId:kit.encounter.templateId, stat:kit.encounter.stat,
      dmgType:kit.encounter.dmgType, delivery:kit.encounter.delivery,
      actionType:AB_TEMPLATES[kit.encounter.templateId]?.baseAction||'action',
      upgrades:{}, isKit:true}];
  }
}

// ── STEP 3: ABILITIES ─────────────────────────────────────────────────────────
function renderStep3(){
  initAbilityKit();
  const fs=getFinalStats(), rem=remaining();

  function deliveryLabel(d){ return d==='melee'?'Melee':d==='ranged'?'Ranged':d==='aoe'?'AoE':d==='self'?'Self':d||'Delivery'; }

  function flavorCarousel(abId, slot, current, opts){
    const idx2 = slot==='stat'?AB2_STAT_IDX2:slot==='dmgType'?AB2_DMG_IDX2:AB2_DLV_IDX2;
    const idxKey = abId+':'+slot;
    const ci = ((idx2[idxKey]!==undefined?idx2[idxKey]:Math.max(0,opts.indexOf(current)))+opts.length*10)%opts.length;
    const cur = opts[ci]||opts[0];
    const isSel = current===cur;
    const col = isSel?'var(--ac)':'var(--dm)';
    const pips = opts.map((_,i)=>'<div style="width:6px;height:6px;border-radius:50%;background:'+(i===ci?(opts[i]===current?'var(--ac)':'var(--dm)'):'var(--bdr)')+';flex-shrink:0"></div>').join('');
    return '<div style="padding:10px 14px 12px;background:var(--sur2);border-radius:8px;margin-bottom:8px;border:1px solid '+(isSel?'var(--ac)':'rgba(255,107,53,.25)')+'">'+
      '<div style="font-family:\'Orbitron\',monospace;font-size:.46rem;color:var(--dm);letter-spacing:.12em;margin-bottom:8px">'+(slot==='stat'?'ATTACK STAT':slot==='dmgType'?'DAMAGE TYPE':'DELIVERY')+'</div>'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'+
        '<button data-ab2flavorprev="'+abId+':'+slot+'" style="flex-shrink:0;width:32px;height:32px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&lsaquo;</button>'+
        '<div style="flex:1;text-align:center">'+
          '<div style="font-family:\'Orbitron\',monospace;font-weight:900;font-size:1.3rem;color:'+col+'">'+cur+'</div>'+
          '<div style="display:flex;gap:4px;justify-content:center;margin-top:5px">'+pips+'</div>'+
        '</div>'+
        '<button data-ab2flavornext="'+abId+':'+slot+'" style="flex-shrink:0;width:32px;height:32px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&rsaquo;</button>'+
      '</div>'+
      '<button data-ab2flavorset="'+abId+':'+slot+':'+cur+'" class="btn btn-p" style="width:100%;padding:8px;font-size:.62rem">'+(isSel?'&#10003; '+cur+' confirmed':'Set '+cur)+'</button>'+
    '</div>';
  }

  function dieLadderRow(abId, die, actionType, delivery, gated){
    const ladder=['1d4','1d6','1d8','1d10','1d12'];
    const ci=Math.max(0,ladder.indexOf(die||'1d4'));
    const isMax=ci>=ladder.length-1, isMin=ci<=0;
    const nextDie=!isMax?ladder[ci+1]:null;
    const curCost=ab2DieCost(die||'1d4',actionType||'action',delivery||'melee');
    const nextCost=nextDie?ab2DieCost(nextDie,actionType||'action',delivery||'melee'):0;
    const upgCost=nextCost-curCost;
    const canAfford=rem>=upgCost&&upgCost>0;
    const dots=ladder.map((_,i)=>'<div style="width:6px;height:6px;border-radius:50%;background:'+(i===ci?'var(--gd)':'var(--bdr)')+'"></div>').join('');
    return '<div style="padding:8px 10px;border-radius:6px;background:var(--sur2);border:1px solid var(--bdr);margin-bottom:4px'+(gated?';opacity:.4;pointer-events:none':'')+'">'+
      '<div style="display:flex;align-items:center;justify-content:space-between">'+
        '<div><span style="font-family:\'Orbitron\',monospace;font-weight:900;font-size:.95rem;color:var(--gd)">'+( die||'1d4')+'</span>'+
        '<span style="font-size:.58rem;color:var(--dm);margin-left:6px">damage die</span>'+
        '<div style="display:flex;gap:3px;margin-top:4px">'+dots+'</div></div>'+
        '<div style="display:flex;gap:6px;align-items:center">'+
          (!isMin?'<button data-ab2diedown="'+abId+'" style="padding:3px 11px;font-size:.9rem;background:none;border:1px solid var(--bdr);border-radius:4px;color:var(--dm);cursor:pointer">−</button>':'')+
          (!isMax&&canAfford?'<button data-ab2dieup="'+abId+'" style="padding:3px 11px;font-size:.9rem;background:var(--ac);border:none;border-radius:4px;color:#000;cursor:pointer;font-weight:700">+'+upgCost+' EP</button>':'')+
          (!isMax&&!canAfford?'<button disabled style="padding:3px 11px;font-size:.9rem;background:none;border:1px solid var(--bdr);border-radius:4px;color:var(--dm);opacity:.4">+'+upgCost+' EP</button>':'')+
          (isMax?'<span style="font-family:\'Orbitron\',monospace;font-size:.48rem;color:var(--gd)">MAX</span>':'')+
        '</div>'+
      '</div>'+
    '</div>';
  }

  function usesRow(abId, uses){
    const USES_LABELS=['PB/enc','PB+1/enc','PB+2/enc','PB+3/enc','Unlimited'];
    const USES_C=[0,10,25,45,70];
    const cur=Math.min(uses||0,4);
    const canUp=cur<4&&rem>=(USES_C[cur+1]-USES_C[cur]);
    const canDown=cur>0;
    return '<div style="padding:7px 10px;border-radius:6px;background:var(--sur2);border:1px solid var(--bdr);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between">'+
      '<div><span style="font-size:.66rem;color:var(--tx)">Uses/enc</span>'+
      '<span style="font-family:\'Orbitron\',monospace;font-size:.6rem;color:var(--ac);margin-left:6px">'+USES_LABELS[cur]+'</span></div>'+
      '<div style="display:flex;gap:5px">'+
        (canDown?'<button data-ab2usesdown="'+abId+'" style="padding:2px 9px;font-size:.8rem;background:none;border:1px solid var(--bdr);border-radius:4px;color:var(--dm);cursor:pointer">−</button>':'')+
        (canUp?'<button data-ab2usesup="'+abId+'" style="padding:2px 9px;font-size:.8rem;background:var(--ac);border:none;border-radius:4px;color:#000;cursor:pointer;font-weight:700">+'+(USES_C[cur+1]-USES_C[cur])+' EP</button>':'')+
      '</div>'+
    '</div>';
  }

  function sentenceChips(abId, tmpl, ab){
    const upgs=ab.upgrades||{};
    const delivery=upgs.range_aoe?'AoE':upgs.range_ranged?'Ranged':deliveryLabel(ab.delivery);
    const actionType=(ab.actionType||tmpl.baseAction||'action');
    const atLabel=actionType==='action'?'Action':actionType==='bonus'?'Bonus Action':'Reaction';
    const die=upgs.die||'1d4';
    const parts=[];
    parts.push({label:atLabel,key:'at'});
    parts.push({label:tmpl.name,key:'tmpl'});
    if(tmpl.flavor.includes('delivery')&&tmpl.fixedDelivery!=='self') parts.push({label:delivery,key:'delivery',slot:'delivery'});
    if(tmpl.flavor.includes('stat')) parts.push({label:ab.stat||'Stat',key:'stat',slot:'stat',missing:!ab.stat});
    if(tmpl.flavor.includes('dmgType')) parts.push({label:ab.dmgType||'Dmg Type',key:'dmgType',slot:'dmgType',missing:!ab.dmgType});
    if(['attack','intervention'].includes(tmpl.cat)) parts.push({label:die,key:'die'});
    return '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;padding:6px 10px;background:rgba(0,0,0,.2);border-radius:6px;margin-bottom:10px">'+
      parts.map((p,i)=>(i?'<span style="color:var(--dm);font-size:.55rem;opacity:.5">&middot;</span>':'')+
        '<span '+(p.slot?'data-ab2flavoropen="'+abId+':'+p.slot+'"':'')+
        ' style="font-family:\'Orbitron\',monospace;font-size:.52rem;padding:2px 6px;border-radius:3px;cursor:'+(p.slot?'pointer':'default')+
        ';background:'+(p.missing?'rgba(255,107,53,.08)':'rgba(255,107,53,.14)')+
        ';border:1px solid '+(p.missing?'rgba(255,107,53,.3)':'rgba(255,107,53,.4)')+
        ';color:'+(p.missing?'rgba(255,107,53,.5)':'var(--ac)')+'">'+p.label+'</span>'
      ).join('')+
    '</div>';
  }

  function abilityCard(ab, isCantrip){
    const abId=isCantrip?'cantrip':ab.id;
    const tmplId=isCantrip?S.cantrip.templateId:ab.templateId;
    const tmpl=AB_TEMPLATES[tmplId]; if(!tmpl) return '';
    const upgs=isCantrip?(S.cantrip.upgrades||{}):(ab.upgrades||{});
    const isOpen=AB2_OPEN===abId;
    const flavor_open_slot=AB2_FLAVOR_OPEN&&AB2_FLAVOR_OPEN.startsWith(abId+':')?AB2_FLAVOR_OPEN.split(':')[1]:null;
    const delivery=upgs.range_aoe?'aoe':upgs.range_ranged?'ranged':(isCantrip?S.cantrip.delivery:ab.delivery)||'melee';
    const actionType=isCantrip?'action':(ab.actionType||tmpl.baseAction||'action');
    const stat=isCantrip?S.cantrip.stat:ab.stat;
    const dmgType=isCantrip?S.cantrip.dmgType:ab.dmgType;
    const die=upgs.die||'1d4';
    const uses=upgs.uses||0;
    const ep=isCantrip?calcCantripEP2():calcAbilityEP2(ab);
    const catM=CAT_META[tmpl.cat]||{label:'?',icon:'?',color:'var(--ac)'};
    const usesStr=isCantrip?'&infin; uses':(uses===4?'Unlimited':('PB'+(uses>0?'+'+uses:'')+'/enc'));
    const deliveryStr=tmpl.fixedDelivery==='self'?'Self':delivery==='melee'?'5ft':delivery==='ranged'?'60ft':'AoE';
    const missingFlavor=(!stat&&tmpl.flavor.includes('stat'))||(!dmgType&&tmpl.flavor.includes('dmgType'));

    const summaryLine='<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer" data-ab2toggle="'+abId+'">'+
      '<div style="flex:1">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'+
          '<span style="font-family:\'Orbitron\',monospace;font-size:.46rem;padding:1px 5px;border-radius:3px;background:'+catM.color+'22;border:1px solid '+catM.color+'44;color:'+catM.color+'">'+catM.icon+' '+catM.label.toUpperCase()+'</span>'+
          (isCantrip?'<span style="font-family:\'Orbitron\',monospace;font-size:.46rem;color:var(--gr);background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.25);padding:1px 5px;border-radius:3px">CANTRIP &bull; &infin;</span>':'<span style="font-family:\'Orbitron\',monospace;font-size:.46rem;color:var(--dm)">'+usesStr+'</span>')+
          (ep>0?'<span style="font-family:\'Orbitron\',monospace;font-size:.46rem;color:var(--ac3);margin-left:auto">'+ep+' EP</span>':'')+
        '</div>'+
        '<div style="font-weight:700;font-size:.88rem;color:var(--tx)">'+tmpl.name+
          (stat?' <span style="font-size:.68rem;font-weight:400;color:var(--dm)">'+stat+'</span>':'')+
          (dmgType?' <span style="font-size:.68rem;font-weight:400;color:var(--dm)">&bull; '+dmgType+'</span>':'')+
          ' <span style="font-size:.62rem;font-weight:400;color:var(--dm)">&bull; '+deliveryStr+'</span>'+
        '</div>'+
        (missingFlavor?'<div style="font-size:.58rem;color:rgba(255,107,53,.7);margin-top:2px">&uarr; tap to set flavor slots</div>':'')+
      '</div>'+
      '<span style="color:var(--dm);font-size:.8rem">'+(isOpen?'▲':'▼')+'</span>'+
    '</div>';

    if(!isOpen) return '<div class="panel" style="padding:0;margin-bottom:6px;border-color:rgba(255,107,53,.25)">'+summaryLine+'</div>';

    let body='';
    body+=sentenceChips(abId,tmpl,isCantrip?{...S.cantrip,actionType:'action',upgrades:upgs}:ab);

    // Action type toggle (encounter only, non-reaction base)
    if(!isCantrip&&tmpl.baseAction!=='reaction'){
      body+='<div style="display:flex;gap:5px;margin-bottom:10px">'+
        [{id:'action',label:'Action',icon:'⚡'},{id:'bonus',label:'Bonus Action',icon:'✦'}].map(a=>
          '<button data-ab2at="'+abId+':'+a.id+'" style="flex:1;padding:6px 4px;font-family:\'Orbitron\',monospace;font-size:.52rem;border-radius:5px;cursor:pointer;border:'+(actionType===a.id?'2px solid var(--ac)':'1px solid var(--bdr)')+';background:'+(actionType===a.id?'rgba(255,107,53,.12)':'var(--sur2)')+';color:'+(actionType===a.id?'var(--ac)':'var(--dm)')+'">'+a.icon+' '+a.label+'</button>'
        ).join('')+
      '</div>';
    }

    // Flavor slots
    if(tmpl.flavor.length>0){
      body+='<div style="font-family:\'Orbitron\',monospace;font-size:.48rem;color:var(--dm);letter-spacing:.12em;margin-bottom:7px">FLAVOR SLOTS</div>';
      for(const slot of tmpl.flavor){
        if(slot==='delivery'&&tmpl.fixedDelivery) continue;
        const curVal=slot==='stat'?stat:slot==='dmgType'?dmgType:(delivery==='aoe'?'AoE':delivery==='ranged'?'Ranged':'Melee');
        const isSlotOpen=flavor_open_slot===slot;
        if(!isSlotOpen){
          const chipSet=!!curVal;
          body+='<div data-ab2flavoropen="'+abId+':'+slot+'" style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-radius:6px;background:var(--sur2);border:1px solid '+(chipSet?'rgba(255,107,53,.3)':'rgba(255,107,53,.2)')+';margin-bottom:5px;cursor:pointer">'+
            '<span style="font-size:.6rem;color:var(--dm);font-family:\'Orbitron\',monospace;letter-spacing:.1em">'+(slot==='stat'?'STAT':slot==='dmgType'?'DMG TYPE':'DELIVERY')+'</span>'+
            '<span style="font-weight:700;font-size:.82rem;color:'+(chipSet?'var(--ac)':'rgba(255,107,53,.5)')+'">'+( curVal||'&mdash; tap to set')+' <span style="font-size:.6rem;color:var(--dm)">&#9998;</span></span>'+
          '</div>';
        } else {
          const opts=slot==='stat'?(tmpl.cat==='heal'?['INT','WIS','CHA','CON']:['STR','DEX','CON','INT','WIS','CHA']):slot==='dmgType'?DMG_TYPES:['Melee','Ranged','AoE'];
          body+=flavorCarousel(abId,slot,curVal,opts);
        }
      }
    }

    // Upgrade section
    body+='<div style="font-family:\'Orbitron\',monospace;font-size:.48rem;color:var(--dm);letter-spacing:.12em;margin:10px 0 7px">UPGRADES'+(actionType==='bonus'?' &bull; BONUS ACTION (die costs &times;2)':'')+'</div>';

    const upgDefs=isCantrip?CANTRIP_UPGRADES:(AB_UPGRADES[tmpl.id]||[]);
    const hasAddDie=upgDefs.some(u=>u.id==='adddie');
    const hasDieUpg=upgDefs.some(u=>u.id==='die');
    const dieUnlocked=!hasAddDie||!!upgs.adddie;

    if(hasAddDie&&!upgs.adddie){
      const addDieUpg=upgDefs.find(u=>u.id==='adddie');
      const canBuyIt=rem>=addDieUpg.cost;
      body+='<div style="padding:7px 10px;border-radius:6px;background:var(--sur2);border:1px solid var(--bdr);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between">'+
        '<span style="font-size:.66rem;color:var(--tx)">Add damage die: 1d4</span>'+
        (canBuyIt?'<button data-ab2upgbuy="'+abId+':adddie" style="font-family:\'Orbitron\',monospace;font-size:.5rem;padding:3px 9px;background:var(--ac);border:none;border-radius:4px;color:#000;cursor:pointer;font-weight:700">+'+addDieUpg.cost+' EP</button>':'<span style="font-family:\'Orbitron\',monospace;font-size:.46rem;color:var(--dm)">Need '+addDieUpg.cost+' EP</span>')+
      '</div>';
    } else if(hasDieUpg){
      body+=dieLadderRow(abId,die,actionType,delivery,!dieUnlocked);
    }

    // Range section
    const hasRange=upgDefs.some(u=>u.id==='range_ranged');
    if(hasRange){
      if(upgs.range_aoe||upgs.range_ranged){
        body+='<div style="padding:5px 10px;border-radius:5px;background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.2);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">'+
          '<span style="font-size:.62rem;color:var(--ac)">'+(upgs.range_aoe?'AoE active':upgs.range_ranged?'Ranged active':'Melee')+'</span>'+
          '<div style="display:flex;gap:4px">'+
            (!upgs.range_aoe&&upgDefs.some(u=>u.id==='range_aoe')&&rem>=10?'<button data-ab2upgbuy="'+abId+':range_aoe" style="font-family:\'Orbitron\',monospace;font-size:.46rem;padding:2px 6px;background:var(--ac);border:none;border-radius:3px;color:#000;cursor:pointer;font-weight:700">→ AoE +10 EP</button>':'')+
            (upgs.range_aoe?'<button data-ab2upgsell="'+abId+':range_aoe" style="font-family:\'Orbitron\',monospace;font-size:.44rem;padding:1px 6px;background:none;border:1px solid var(--bdr);border-radius:3px;color:var(--dm);cursor:pointer">← Ranged</button>':'')+
            (upgs.range_ranged&&!upgs.range_aoe?'<button data-ab2upgsell="'+abId+':range_ranged" style="font-family:\'Orbitron\',monospace;font-size:.44rem;padding:1px 6px;background:none;border:1px solid var(--bdr);border-radius:3px;color:var(--dm);cursor:pointer">← Melee</button>':'')+
          '</div>'+
        '</div>';
      } else {
        body+='<div style="padding:5px 10px;border-radius:5px;background:var(--sur2);border:1px solid var(--bdr);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">'+
          '<span style="font-size:.62rem;color:var(--dm)">Range: Melee</span>'+
          (rem>=5?'<button data-ab2upgbuy="'+abId+':range_ranged" style="font-family:\'Orbitron\',monospace;font-size:.46rem;padding:2px 7px;background:var(--ac);border:none;border-radius:3px;color:#000;cursor:pointer;font-weight:700">→ Ranged +5 EP</button>':'<span style="font-family:\'Orbitron\',monospace;font-size:.44rem;color:var(--dm)">→ Ranged (5 EP)</span>')+
        '</div>';
      }
    }

    // Other flat upgrades
    for(const upg of upgDefs){
      if(['die','adddie','uses','range_ranged','range_aoe'].includes(upg.id)) continue;
      const gateOk=!upg.gate||!!upgs[upg.gate];
      const owned=!!upgs[upg.id];
      const canAffordIt=!owned&&gateOk&&rem>=upg.cost;
      const bg=owned?'rgba(255,107,53,.12)':canAffordIt?'var(--sur2)':'rgba(0,0,0,.08)';
      const bdr=owned?'1px solid var(--ac)':canAffordIt?'1px solid var(--bdr)':'1px solid rgba(255,255,255,.06)';
      const col=owned?'var(--ac)':canAffordIt?'var(--tx)':'var(--dm)';
      const noteStr=upg.note?' <span style="font-size:.5rem;opacity:.6">'+upg.note+'</span>':'';
      body+='<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;background:'+bg+';border:'+bdr+';margin-bottom:4px;opacity:'+(canAffordIt||owned?1:.45)+'">'+
        '<span style="font-size:.65rem;color:'+col+'">'+upg.label+noteStr+'</span>'+
        '<div style="flex-shrink:0;margin-left:8px">'+
          (owned?'<button data-ab2upgsell="'+abId+':'+upg.id+'" style="font-family:\'Orbitron\',monospace;font-size:.46rem;padding:2px 7px;background:none;border:1px solid var(--bdr);border-radius:3px;color:var(--dm);cursor:pointer">SELL</button>':
           canAffordIt?'<button data-ab2upgbuy="'+abId+':'+upg.id+'" style="font-family:\'Orbitron\',monospace;font-size:.5rem;padding:3px 9px;background:var(--ac);border:none;border-radius:4px;color:#000;cursor:pointer;font-weight:700">+'+upg.cost+' EP</button>':
           '<span style="font-family:\'Orbitron\',monospace;font-size:.46rem;color:var(--dm)">'+(gateOk?'Need '+upg.cost+' EP':'Gate: '+upg.gate)+'</span>')+
        '</div>'+
      '</div>';
    }

    body+=usesRow(abId,uses);

    if(!isCantrip&&!ab.isKit){
      body+='<div style="margin-top:8px"><button data-ab2remove="'+ab.id+'" style="padding:5px 10px;font-size:.56rem;font-family:\'Orbitron\',monospace;background:none;border:1px solid rgba(255,80,80,.3);border-radius:5px;color:rgba(255,80,80,.7);cursor:pointer">&#10005; Remove</button></div>';
    }

    return '<div class="panel" style="padding:0;margin-bottom:6px;border-color:rgba(255,107,53,.4)">'+summaryLine+'<div style="padding:0 14px 14px">'+body+'</div></div>';
  }

  // ── BUILD PAGE ─────────────────────────────────────────────────────────────
  let html='';

  // Cantrip card
  if(S.cantrip.templateId){
    html+=abilityCard(null,true);
  } else {
    html+='<div class="panel" style="border-color:rgba(255,170,0,.3)"><div class="ph"><h2 style="color:var(--gr)">CANTRIP</h2><span style="font-size:.6rem;color:var(--dm);margin-left:auto">&infin; uses &mdash; pre-assigned by archetype</span></div>'+
      '<div class="pb"><div class="info">Complete Evolution (Step 4) first to assign your archetype kit, then return here.</div></div></div>';
  }

  // Encounter ability cards
  const abs2=S.abilities||[];
  for(const ab of abs2){ html+=abilityCard(ab,false); }

  // Add slot buttons
  const numSlots=abs2.length;
  if(numSlots<4&&!AB2_CAT_OPEN){
    const arch=S.archetypes?.primary;
    const slotIdx=numSlots;
    const costArch=SLOT_COSTS_ARCH[Math.min(slotIdx-1,2)]||35;
    const costOther=SLOT_COSTS_OTHER[Math.min(slotIdx-1,2)]||40;
    const canArch=rem>=costArch&&!!arch;
    const canOther=rem>=costOther;
    html+='<div class="panel" style="border-style:dashed;border-color:rgba(255,107,53,.2);padding:0"><div style="padding:12px 14px">'+
      '<div style="font-family:\'Orbitron\',monospace;font-size:.52rem;color:var(--ac);letter-spacing:.1em;margin-bottom:8px">+ ADD ENCOUNTER SLOT</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
        '<button data-ab2addslot="arch" '+(canArch?'':'disabled')+' style="padding:9px 6px;font-family:\'Orbitron\',monospace;font-size:.56rem;border-radius:6px;cursor:'+(canArch?'pointer':'not-allowed')+';background:'+(canArch?'rgba(255,107,53,.1)':'rgba(0,0,0,.1)')+';border:1px solid '+(canArch?'rgba(255,107,53,.35)':'var(--bdr)')+';color:'+(canArch?'var(--ac)':'var(--dm)')+';opacity:'+(canArch?1:.5)+'">Archetype Catalog<br><span style="font-size:.48rem;opacity:.7">'+costArch+' EP &bull; '+(arch?ARCH_META[arch].name+' themed':'Pick archetype first')+'</span></button>'+
        '<button data-ab2addslot="other" '+(canOther?'':'disabled')+' style="padding:9px 6px;font-family:\'Orbitron\',monospace;font-size:.56rem;border-radius:6px;cursor:'+(canOther?'pointer':'not-allowed')+';background:var(--sur2);border:1px solid var(--bdr);color:'+(canOther?'var(--tx)':'var(--dm)')+';opacity:'+(canOther?1:.5)+'">Any Catalog<br><span style="font-size:.48rem;opacity:.7">'+costOther+' EP &bull; All templates</span></button>'+
      '</div></div></div>';
  }

  // Template browser
  if(AB2_CAT_OPEN){
    const isBrowseArch=AB2_CAT_OPEN.useArch;
    const slotEP=AB2_CAT_OPEN.slotEP;
    const availTemplates=isBrowseArch?archCatalogTemplates():Object.keys(AB_TEMPLATES);
    const cats=[...new Set(availTemplates.map(k=>AB_TEMPLATES[k].cat))];
    html+='<div class="panel" style="border-color:rgba(255,107,53,.5)"><div class="ph"><h2>CHOOSE TEMPLATE</h2><span style="font-size:.6rem;color:var(--ac3);margin-left:auto">'+slotEP+' EP</span></div><div class="pb">'+
      cats.map(cat=>{
        const catM=CAT_META[cat]||{label:cat,icon:'?',color:'var(--ac)'};
        const tmpls=availTemplates.filter(k=>AB_TEMPLATES[k].cat===cat);
        return '<div style="margin-bottom:12px"><div style="font-family:\'Orbitron\',monospace;font-size:.5rem;color:'+catM.color+';letter-spacing:.15em;margin-bottom:6px">'+catM.icon+' '+catM.label.toUpperCase()+'</div>'+
          tmpls.map(tid=>{
            const t=AB_TEMPLATES[tid];
            return '<div data-ab2picktemplate="'+tid+'" style="padding:9px 12px;border-radius:7px;margin-bottom:4px;cursor:pointer;background:var(--sur2);border:1px solid var(--bdr)">'+
              '<div style="font-weight:700;font-size:.82rem;color:var(--tx);margin-bottom:3px">'+t.name+'</div>'+
              '<div style="font-size:.62rem;color:var(--dm);line-height:1.4">'+t.desc+'</div></div>';
          }).join('')+'</div>';
      }).join('')+
      '<button data-ab2cancelbrowse="1" class="btn" style="width:100%;padding:8px;font-size:.58rem;font-family:\'Orbitron\',monospace;color:var(--dm);background:none;border:1px solid var(--bdr);border-radius:6px">Cancel</button></div></div>';
  }

  const cantripReady=!!(S.cantrip.templateId&&S.cantrip.stat&&(S.cantrip.delivery||AB_TEMPLATES[S.cantrip.templateId]&&AB_TEMPLATES[S.cantrip.templateId].fixedDelivery));
  if(cantripReady){
    html+='<button class="btn btn-p" style="width:100%;padding:11px;font-size:.7rem" data-goto="5">Summary &rarr;</button>';
  }
  return html;
}

// ── STEP 4: EVOLUTION (phased: pick → buy → pick → buy → done) ─────────────
function renderStep4(){
  const sug=suggestArch(),typeKey=S.typeId;
  const primary=S.archetypes?.primary,secondary=S.archetypes?.secondary;
  const ARCH_KEYS=Object.keys(ARCH_META);
  const idx=((ARCH_IDX%ARCH_KEYS.length)+ARCH_KEYS.length)%ARCH_KEYS.length;

  // ── Helper: carousel panel (used in pick phases) ──────────────────────────
  function carouselHTML(phase){
    const k=ARCH_KEYS[idx];
    const m=ARCH_META[k];
    const isCurrentPrim=primary===k,isCurrentSec=secondary===k;
    const isSugP=sug.primary===k,isSugS=sug.secondary===k;
    const hasDisc=(TYPE_DISC[typeKey]||[]).includes(k);
    const accentCol=isCurrentPrim?m.color:isCurrentSec?'var(--ac2)':'var(--bdr)';

    const pips=ARCH_KEYS.map((_,i)=>{
      const isP=primary===ARCH_KEYS[i],isS=secondary===ARCH_KEYS[i];
      const col=isP?'var(--ac)':isS?'var(--ac2)':i===idx?'var(--dm)':'var(--bdr)';
      const sz=i===idx?'9px':'6px';
      return `<div style="width:${sz};height:${sz};border-radius:50%;background:${col};transition:all .15s;flex-shrink:0"></div>`;
    }).join('');

    let statusLabel='';
    if(isCurrentPrim) statusLabel=`<span style="font-family:'Orbitron',monospace;font-size:.5rem;padding:2px 7px;border-radius:3px;background:var(--ac);color:#000;font-weight:700">PRIMARY</span>`;
    else if(isCurrentSec) statusLabel=`<span style="font-family:'Orbitron',monospace;font-size:.5rem;padding:2px 7px;border-radius:3px;background:var(--ac2);color:#fff;font-weight:700">SECONDARY</span>`;
    else if(isSugP&&phase==='pick_primary') statusLabel=`<span style="font-family:'Orbitron',monospace;font-size:.5rem;padding:2px 7px;border-radius:3px;background:var(--gd);color:#000;font-weight:700">SUGGESTED PRIMARY</span>`;
    else if(isSugS&&phase==='pick_secondary') statusLabel=`<span style="font-family:'Orbitron',monospace;font-size:.5rem;padding:2px 7px;border-radius:3px;background:rgba(255,215,0,.15);color:var(--gd);border:1px solid var(--gd);font-weight:700">SUGGESTED SECONDARY</span>`;

    const discBadge=hasDisc?`<span style="font-family:'Orbitron',monospace;font-size:.5rem;padding:2px 6px;border-radius:3px;background:#2a1a00;color:var(--gr);border:1px solid var(--gr)">&minus;5 EP on first 2 nodes</span>`:'';

    // CTA button for this phase
    let ctaBtn='';
    if(phase==='pick_primary'){
      ctaBtn=`<button data-archsetprim="${k}" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem">
        ${isCurrentPrim?'&#10003; Confirm Primary &rarr;':'Select as Primary &rarr;'}
      </button>`;
    } else {
      // pick_secondary
      const isPrimArch=k===primary;
      if(isPrimArch){
        ctaBtn=`<div style="display:flex;flex-direction:column;gap:8px">
          <div style="font-family:'Orbitron',monospace;font-size:.56rem;color:var(--dm);text-align:center;padding:8px 0">This is your Primary &mdash; navigate to a different archetype</div>
          <button data-archphase="buy_secondary" class="btn btn-g" style="width:100%;padding:10px;font-size:.62rem;border:1px solid var(--bdr)">Skip Secondary</button>
        </div>`;
      } else {
        ctaBtn=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button data-archsetsec="${k}" class="btn btn-p" style="padding:11px;font-size:.65rem">
            ${isCurrentSec?'&#10003; Confirm Secondary &rarr;':'Select as Secondary &rarr;'}
          </button>
          <button data-archphase="buy_secondary" class="btn btn-g" style="padding:11px;font-size:.62rem;border:1px solid var(--bdr)">Skip Secondary</button>
        </div>`;
      }
    }

    return `<div class="panel" style="border-color:${accentCol};transition:border-color .2s">
      <div class="pb" style="padding-top:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <button data-archprev="1" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&lsaquo;</button>
          <div style="flex:1;display:flex;justify-content:center;gap:6px;align-items:center">${pips}</div>
          <button data-archnext="1" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center">&rsaquo;</button>
        </div>
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:2rem;margin-bottom:6px">${m.icon}</div>
          <div style="font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:${isCurrentPrim?m.color:isCurrentSec?'var(--ac2)':'var(--tx)'};letter-spacing:.06em;margin-bottom:8px">${m.name.toUpperCase()}</div>
          <div style="display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;min-height:20px">${statusLabel} ${discBadge}</div>
          <div style="font-size:.84rem;color:var(--tx);opacity:.8;line-height:1.7;max-width:400px;margin:0 auto;padding:0 4px">${m.fantasy}</div>
        </div>
        <div style="display:flex;justify-content:center;margin-bottom:16px;padding:10px 0;border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr)">
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="font-family:'Orbitron',monospace;font-size:.46rem;color:var(--dm);letter-spacing:.15em">NODE CHAIN</div>
            ${chainHTML(k)}
            <div style="font-size:.6rem;color:var(--dm)">5 universal &bull; 2 ${(PLANETS[S.planet]||PLANETS.pyrotheon).name} exclusive</div>
          </div>
        </div>
        ${ctaBtn}
      </div>
    </div>`;
  }

  // ── Helper: node tree panel for one archetype ─────────────────────────────
  function nodeTreeHTML(archKey, label, acol, nextPhaseBtn){
    const am=ARCH_META[archKey];
    const chain=getArchChain(archKey);
    const owned=S.archetypes?.unlockedNodes||[];
    const ownedInChain=owned.filter(id=>chain.includes(id));
    const curIdx=Math.max(0,Math.min(NODE_IDX[archKey]||0, chain.length-1));
    const id=chain[curIdx];
    const n=NODES[id];
    if(!n) return '';
    const isOwned=owned.includes(id);
    const chk=canBuy(id);
    const isAvail=!isOwned&&chk.ok;
    const isLocked=!isOwned&&!isAvail;
    const c=nodeCostDisc(id),orig=n.cost,hasDisc=c<orig;
    const epochLbl=n.tier<=2?'E1':n.tier===3?'E2':'E3';
    const planLbl=n.planetExclusive?` · ${PLANETS[n.planet]?.icon||''} Exclusive`:'';
    const statusCol=isOwned?'var(--gr)':isAvail?acol:'var(--dm)';
    const bgCol=isOwned?'rgba(255,170,0,.06)':isAvail?acol+'12':'var(--sur2)';
    const borderCol=isOwned?'var(--gr)':isAvail?acol:'var(--bdr)';
    const discH=hasDisc?`<span style="text-decoration:line-through;opacity:.5;margin-right:4px;font-size:.65rem">${orig}</span>`:'';

    // Pip track — chain dots showing owned/available/locked
    const pips=chain.map((_,i)=>{
      const pid=chain[i];
      const isO=owned.includes(pid);
      const isA=!isO&&canBuy(pid).ok;
      const sz=i===curIdx?'10px':'7px';
      const col=isO?'var(--gr)':isA?acol:i===curIdx?'var(--dm)':'var(--bdr)';
      return `<div style="width:${sz};height:${sz};border-radius:50%;background:${col};transition:all .15s;flex-shrink:0;${isO?'box-shadow:0 0 4px var(--gr)':''}"></div>`;
    }).join('');

    // Action button
    let actionBtn='';
    if(isOwned)       actionBtn=`<button data-sell="${id}" class="btn-d" style="width:100%;padding:9px;font-size:.58rem;margin-top:10px">Sell (refund ${c} EP)</button>`;
    else if(isAvail)  actionBtn=`<button data-buy="${id}" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem;margin-top:10px;background:${acol};color:#000">Buy — ${discH}${c} EP</button>`;
    else              actionBtn=`<div style="padding:10px 14px;background:rgba(0,0,0,.2);border-radius:8px;margin-top:10px;font-family:'Orbitron',monospace;font-size:.56rem;color:var(--dm);text-align:center">${e(chk.why)}</div>`;

    return `<div class="panel" style="border-color:${borderCol};transition:border-color .2s;background:${bgCol}">
      <div class="ph" style="background:${acol}0a">
        <h2 style="color:${acol}">${am.icon} ${am.name}</h2>
        <span style="font-family:'Orbitron',monospace;font-size:.48rem;color:${acol};background:${acol}18;border:1px solid ${acol}40;border-radius:3px;padding:2px 6px;margin-left:auto">${label}</span>
      </div>
      <div class="pb" style="padding-top:14px">
        <!-- Node carousel nav -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button data-nodeprev="${archKey}" ${curIdx===0?'disabled':''} style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:${curIdx===0?.35:1}">&lsaquo;</button>
          <div style="flex:1;display:flex;justify-content:center;gap:6px;align-items:center">${pips}</div>
          <button data-nodenext="${archKey}" ${curIdx===chain.length-1?'disabled':''} style="flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--sur2);color:var(--dm);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:${curIdx===chain.length-1?.35:1}">&rsaquo;</button>
        </div>
        <!-- Node detail -->
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-family:'Orbitron',monospace;font-size:.48rem;color:var(--dm);letter-spacing:.15em;margin-bottom:6px">${epochLbl}${planLbl} · NODE ${curIdx+1} OF ${chain.length}</div>
          <div style="font-family:'Orbitron',monospace;font-size:1.05rem;font-weight:900;color:${statusCol};letter-spacing:.04em;margin-bottom:4px">${isOwned?'✓ ':''}${e(n.name)}</div>
          ${isOwned?`<div style="display:inline-block;font-family:'Orbitron',monospace;font-size:.48rem;padding:2px 7px;border-radius:3px;background:var(--gr);color:#000;font-weight:700;margin-bottom:8px">OWNED</div>`:''}
          ${isLocked?`<div style="display:inline-block;font-family:'Orbitron',monospace;font-size:.48rem;padding:2px 7px;border-radius:3px;background:var(--bdr);color:var(--dm);font-weight:700;margin-bottom:8px">LOCKED</div>`:''}
          <div style="font-size:.78rem;color:var(--tx);opacity:.75;font-style:italic;line-height:1.65;max-width:400px;margin:0 auto;padding:0 4px">${e(n.flavorText||'')}</div>
        </div>
        <!-- Mechanics -->
        <div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px;margin-bottom:6px;opacity:${isLocked?.5:1}">
          ${(n.mechanics||[]).map(m=>{
            const tag=m.type==='active'?'▶ Active':m.type==='zone'?'⬡ Zone':'◆ Passive';
            const cls=`mt-${m.type}`;
            const nm=m.name?`<span class="mname">${e(m.name)}: </span>`:'';
            const uses=m.uses?`<span style="color:var(--ac2);font-family:'Orbitron',monospace;font-size:.5rem">[${e(m.uses)}] </span>`:'';
            return `<div class="mrow" style="margin-bottom:5px"><span class="mtag ${cls}">${tag}</span><div class="mtxt">${nm}${uses}${e(m.text)}</div></div>`;
          }).join('')}
        </div>
        ${actionBtn}
        <div style="margin-top:10px;border-top:1px solid var(--bdr);padding-top:12px">
          ${nextPhaseBtn}
        </div>
      </div>
    </div>`;
  }

  // ── Render based on phase ─────────────────────────────────────────────────
  let html='';

  if(ARCH_PHASE==='pick_primary'){
    html+=carouselHTML('pick_primary');
  }
  else if(ARCH_PHASE==='buy_primary'){
    const am=ARCH_META[primary];
    const _primOwned=(S.archetypes?.unlockedNodes||[]).filter(id=>getArchChain(primary).includes(id)).length;
    const continueBtn=(_primOwned>0
      ? `<button data-archphase="pick_secondary" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem">Confirm Primary &rarr; Choose Secondary</button>`
      : `<div style="padding:10px;text-align:center;font-family:'Orbitron',monospace;font-size:.56rem;color:var(--dm)">Buy at least one node to continue</div>`
    )+`<button data-archphase="pick_primary" class="btn btn-g" style="width:100%;padding:10px;font-size:.62rem;margin-top:8px;border:1px solid var(--bdr)">&larr; Change Primary Archetype</button>`;
    html+=nodeTreeHTML(primary,'PRIMARY',am.color,continueBtn);
  }
  else if(ARCH_PHASE==='pick_secondary'){
    // Show locked primary header
    const am=ARCH_META[primary];
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.2);border-radius:8px;margin-bottom:8px">
      <span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm)">PRIMARY:</span>
      <span style="font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;color:var(--ac)">${am.icon} ${am.name}</span>
      <span data-archphase="buy_primary" style="font-family:'Orbitron',monospace;font-size:.48rem;color:var(--dm);cursor:pointer;margin-left:auto;text-decoration:underline">view nodes</span>
    </div>`;
    html+=carouselHTML('pick_secondary');
  }
  else if(ARCH_PHASE==='buy_secondary'){
    // Show locked primary header
    const pam=ARCH_META[primary];
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,107,53,.06);border:1px solid rgba(255,107,53,.2);border-radius:8px;margin-bottom:8px">
      <span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm)">PRIMARY:</span>
      <span style="font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;color:var(--ac)">${pam.icon} ${pam.name}</span>
      <span data-archphase="buy_primary" style="font-family:'Orbitron',monospace;font-size:.48rem;color:var(--dm);cursor:pointer;margin-left:auto;text-decoration:underline">view nodes</span>
    </div>`;
    if(secondary){
      const sam=ARCH_META[secondary];
      const _secOwned=(S.archetypes?.unlockedNodes||[]).filter(id=>getArchChain(secondary).includes(id)).length;
      const doneBtn=(_secOwned>0
        ? `<button data-archphase="done" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem">Confirm &rarr; Summary</button>`
        : `<div style="padding:10px;text-align:center;font-family:'Orbitron',monospace;font-size:.56rem;color:var(--dm)">Buy at least one node to confirm</div>`
      )+`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <button data-archphase="pick_secondary" class="btn btn-g" style="padding:10px;font-size:.6rem;border:1px solid var(--bdr)">&larr; Change Secondary</button>
        <button data-archphase="buy_primary" class="btn btn-g" style="padding:10px;font-size:.6rem;border:1px solid var(--bdr)">View Primary Nodes</button>
      </div>`;
      html+=nodeTreeHTML(secondary,'SECONDARY','var(--ac2)',doneBtn);
    } else {
      // Skipped secondary — just show confirm
      html+=`<div class="panel"><div class="pb" style="text-align:center;padding:20px">
        <div style="font-family:'Orbitron',monospace;font-size:.62rem;color:var(--dm);margin-bottom:14px">No secondary archetype selected</div>
        <button data-archphase="done" class="btn btn-p" style="width:100%;padding:11px;font-size:.68rem">Confirm &rarr; Summary</button>
        <div style="margin-top:8px"><span data-archphase="pick_secondary" style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm);cursor:pointer;text-decoration:underline">&larr; Add secondary</span></div>
      </div></div>`;
    }
  }
  else {
    // done — stacked summary cards with descriptions and node counts
    const pam=ARCH_META[primary]||{};
    const sam=secondary?ARCH_META[secondary]:null;
    const owned=S.archetypes?.unlockedNodes||[];

    function archSummaryCard(archKey, roleLabel, acol, bgCol, editPhase){
      const am=ARCH_META[archKey];
      const chain=getArchChain(archKey);
      const ownedInChain=owned.filter(id=>chain.includes(id));
      const epSpent=ownedInChain.reduce((t,id)=>t+(NODES[id]?.cost||0),0);

      // Build a stat-block entry for each owned node
      function nodeEntry(id){
        const n=NODES[id];
        if(!n) return '';
        const epochLbl=n.tier<=2?'E1':n.tier===3?'E2':'E3';
        const planetTag=n.planetExclusive?` &bull; ${(PLANETS[S.planet]||PLANETS.pyrotheon).icon} Excl`:'';
        const mechs=(n.mechanics||[]).map(m=>{
          const tagLabel=m.type==='active'?'Active':m.type==='zone'?'Zone':'Passive';
          const tagCls=m.type==='active'?'mt-active':m.type==='zone'?'mt-zone':'mt-passive';
          const nm=m.name?`<span style="font-weight:700;color:var(--gd)">${m.name}: </span>`:'';
          const uses=m.uses?`<span style="font-family:'Orbitron',monospace;font-size:.46rem;color:var(--ac2)">[${m.uses}] </span>`:'';
          return `<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px">
            <span class="mtag ${tagCls}" style="flex-shrink:0;margin-top:1px">${tagLabel}</span>
            <span style="font-size:.68rem;color:var(--tx);line-height:1.4">${nm}${uses}${m.text}</span>
          </div>`;
        }).join('');
        return `<div style="padding:9px 0;border-bottom:1px solid var(--bdr)">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
            <div>
              <span style="font-weight:700;font-size:.84rem;color:${acol}">${n.name}</span>
              <span style="font-family:'Orbitron',monospace;font-size:.46rem;color:var(--dm);margin-left:6px">${epochLbl}${planetTag}</span>
            </div>
            <span style="font-family:'Orbitron',monospace;font-size:.5rem;color:var(--dm)">${n.cost} EP</span>
          </div>
          ${n.flavorText?`<div style="font-size:.64rem;color:var(--dm);font-style:italic;line-height:1.35;margin-bottom:6px">${n.flavorText}</div>`:''}
          ${mechs}
        </div>`;
      }

      const nodeTable=ownedInChain.map(nodeEntry).join('');

      return `<div style="border:1px solid ${acol}44;border-radius:10px;overflow:hidden;margin-bottom:8px">
        <!-- Header -->
        <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:${bgCol}">
          <div style="font-size:1.5rem">${am.icon}</div>
          <div style="flex:1">

        style="width:100%;padding:9px 12px;background:var(--sur2);border:1px solid ${inSession?'var(--bdr)':plAc+'66'};border-radius:8px;color:var(--tx);font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700;outline:none;letter-spacing:.04em"/>

          ${isCtrl&&ab.duration?`<div style="font-size:.6rem;color:var(--dm);margin-top:4px">Duration: ${ab.duration.charAt(0).toUpperCase()+ab.duration.slice(1)}${ab.duration==='persistent'?' — Concentration':''}</div>`:''}
        </div>`;
      }
      html+=`</div></div>`;
    }
  }
  // Archetype evolution paths
  for(const archKey of archs){
    const m=ARCH_META[archKey],chain=getArchChain(archKey),owned=S.archetypes?.unlockedNodes||[];
    html+=`<div class="panel">
      <div class="ph"><h2 style="color:${m.color}">${m.icon} ${m.name} — Path</h2></div>
